<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RayBlob — 4×5" Hatched Blob</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 16px; font: 12px/1.35 system-ui, sans-serif;
         background: #1c1c1c; color: #ddd; }
  .layout { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .panel { display: flex; flex-direction: column; gap: 4px;
           width: 220px; padding: 12px;
           background: #262626; border-radius: 6px; }
  .panel h2 { margin: 6px 0 1px; font-size: 10px; font-weight: 600;
              letter-spacing: 0.06em; text-transform: uppercase; color: #999; }
  .field { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .field label { color: #aaa; font-size: 11px; }
  .field input, .field select { width: 78px; padding: 3px 5px; background: #1a1a1a;
                 color: #eee; border: 1px solid #3a3a3a; border-radius: 3px;
                 font: inherit; font-size: 11px; text-align: right; }
  .field input[type="text"] { text-align: left; }
  .row { display: flex; gap: 6px; }
  button { padding: 6px 8px; background: #3a78d8; color: white;
           border: none; border-radius: 3px; cursor: pointer; font: inherit;
           font-size: 11px; flex: 1; }
  button:hover { background: #4a88e8; }
  button.secondary { background: #444; }
  button.secondary:hover { background: #555; }
  button:disabled { opacity: 0.5; cursor: wait; }
  .stats { padding-top: 10px; margin-top: 6px; border-top: 1px solid #3a3a3a;
           color: #888; font-size: 11px; line-height: 1.6;
           font-family: ui-monospace, monospace; white-space: pre-wrap;
           min-height: 32px; }
  .stage { background: white; border-radius: 6px;
           box-shadow: 0 6px 24px rgba(0,0,0,0.4); }
  #preview { display: block; }
  a.url-link { color: #6aa8ff; font-family: ui-monospace, monospace;
               font-size: 10px; word-break: break-all; }
</style>
</head>
<body>
<div class="layout">
  <div class="panel">
    <h2>Composition</h2>
    <div class="field"><label>Seed</label><input id="seed" type="text" value="42"></div>
    <div class="field"><label>Scene</label>
      <select id="scene">
        <option value="single" selected>Single blob</option>
        <option value="monoliths">Monoliths</option>
        <option value="stonehenge">Stonehenge</option>
        <option value="arch">Cave arch</option>
        <option value="lighthouse">Lighthouse</option>
        <option value="cairn">Cairn</option>
        <option value="pyramid">Pyramid</option>
        <option value="twistedColumn">Twisted column</option>
        <option value="forest">Forest</option>
        <option value="sphereWithHole">Sphere with hole</option>
        <option value="tessellation">Tessellation field</option>
        <option value="metaballs">Floating metaballs</option>
        <option value="doorway">Doorway</option>
        <option value="cathedral">Cathedral</option>
        <option value="mengerSponge">Menger sponge</option>
        <option value="wave">Wave</option>
        <option value="schotter">Schotter (3D)</option>
        <option value="spiralStaircase">Spiral staircase</option>
        <option value="bonsai">Bonsai</option>
        <option value="gnarledTree">Gnarled tree</option>
        <option value="revolutionProfile">Revolution profile (urn)</option>
        <option value="hand">Hand</option>
        <option value="wireframeLattice">Wireframe lattice</option>
        <option value="eroded">Eroded structure</option>

        <option value="mountains">Mountains</option>

    </div>
    <div class="field"><label>Cam tilt (°)</label><input id="camTilt" type="number" min="0" max="20" step="0.5" value="6"></div>

    <h2 id="sceneParamsHeader" style="display:none">Scene parameters</h2>
    <div id="sceneParamsPanel"></div>
    <div class="field"><label>Ground style</label>
      <select id="groundStyle"
              style="width:120px;padding:5px;background:#1a1a1a;color:#eee;border:1px solid #3a3a3a;border-radius:4px;font:inherit">
        <option value="perspective" selected>Perspective</option>
        <option value="waves">Waves</option>
        <option value="sandGarden">Sand garden</option>
      </select>
    </div>
    <div class="field"><label>Hatch style</label>
      <select id="hatchStyle"
              style="width:140px;padding:5px;background:#1a1a1a;color:#eee;border:1px solid #3a3a3a;border-radius:4px;font:inherit">
        <option value="scan" selected>Scan (4-angle)</option>
        <option value="crosshatch">Crosshatch (H + V)</option>
        <option value="vertical">Vertical only</option>
        <option value="cell">Cell halftone</option>
        <option value="monet">Monet brushstrokes</option>
        <option value="tsp">TSP infill</option>
        <option value="isoDepth">Iso-depth contours</option>
        <option value="projNormal">Projected normal</option>
        <option value="principal">Principal curvature</option>
      </select>
    </div>
    <div class="field"><label>Sky style</label>
      <select id="skyStyle"
              style="width:120px;padding:5px;background:#1a1a1a;color:#eee;border:1px solid #3a3a3a;border-radius:4px;font:inherit">
        <option value="gradient" selected>Gradient</option>
        <option value="wobbly">Wobbly lines</option>
        <option value="multiGradient">Box gradient</option>
        <option value="paperGrain">Paper grain</option>

    <div class="field"><label>Waviness</label><input id="waviness" type="number" min="0" max="8" step="0.25" value="3.0"></div>
    <div class="field"><label>Ripple freq</label><input id="rippleFreq" type="number" min="2" max="30" step="0.5" value="7.0"></div>

    <h2>Pasma Hatching</h2>
    <div class="field"><label>Paper size</label>
      <select id="paperSize"
              style="width:120px;padding:5px;background:#1a1a1a;color:#eee;border:1px solid #3a3a3a;border-radius:4px;font:inherit">
        <option value="4x5" selected>4 × 5 in</option>
        <option value="4x6">4 × 6 in</option>
        <option value="5x7">5 × 7 in</option>
        <option value="8x10">8 × 10 in</option>
        <option value="9x12">9 × 12 in</option>
      </select>
    </div>

    <div class="field"><label>Density ×lw</label><input id="density" type="number" min="1.5" max="6" step="0.25" value="2.5"></div>
    <div class="field"><label>Buffer res</label><input id="bufRes" type="number" min="200" max="800" step="25" value="400"></div>

    <div class="field"><label>Brightness</label><input id="brightness" type="number" min="-0.5" max="0.5" step="0.05" value="0"></div>
    <div class="field"><label>Contrast</label><input id="contrast" type="number" min="0.5" max="2.0" step="0.05" value="1"></div>
    <div class="field"><label>Gamma</label><input id="gamma" type="number" min="0.4" max="2.5" step="0.05" value="1"></div>
    <div class="field"><label>Posterize</label><input id="posterLevels" type="number" min="1" max="8" step="1" value="1"></div>

    <div class="row" style="margin-top:10px">
      <button id="render">Render</button>
      <button id="randomize" class="secondary">Random</button>
      <button id="save" class="secondary">Save SVG</button>
    </div>

    <div class="stats" id="stats">Ready.</div>
    <a class="url-link" id="permalink" href="#">permalink</a>
    <a class="url-link" href="gallery.html" style="margin-top:4px">→ gallery</a>
  </div>

  <div class="stage">
    <svg id="preview" width="480" height="600" viewBox="0 0 1200 1500"
         xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<script>
'use strict';

// ============================================================
// Constants & coordinate system
// ============================================================
// SVG output: paper size in inches, viewBox at 300 units/inch. The
// concrete paper size is configurable via the UI; setPaperSize() below
// is the single point that keeps all derived values consistent.
let W_IN = 4, H_IN = 5;
let VB_W = 1200, VB_H = 1500;
const MARGIN_VB = 60;

// Screen-space coords. sx ∈ [-1, 1] regardless of paper, sy extends
// proportionally so the aspect matches the paper (positive sy = UP).
const SX_MIN = -1, SX_MAX = 1;
let SY_MIN = -1.25, SY_MAX = 1.25;

// Paper-size registry — string id → {w, h} in inches. Add a new entry
// + an <option> in the paperSize <select> to expose another size.
const PAPER_SIZES = {
  '4x5':  { w: 4, h: 5  },
  '4x6':  { w: 4, h: 6  },
  '5x7':  { w: 5, h: 7  },
  '8x10': { w: 8, h: 10 },
  '9x12': { w: 9, h: 12 }
};

// Set the active paper size and recompute everything that derives from
// it (viewBox, sy range, world-per-mm). Call before each render whenever
// state.paperSize changes.
function setPaperSize(wIn, hIn) {
  W_IN = wIn; H_IN = hIn;
  VB_W = Math.round(wIn * 300); VB_H = Math.round(hIn * 300);
  // SY range is centred at 0 and scales with paper aspect (SX range stays [-1, 1]).
  const halfSY = hIn / wIn;
  SY_MIN = -halfSY; SY_MAX = halfSY;
  // 1 sx-unit spans wIn/2 inches; WORLD_PER_MM = 1 / (wIn/2 * 25.4) = 2 / (wIn * 25.4).
  WORLD_PER_MM = 2.0 / (wIn * 25.4);
}

// Camera position is fixed; the *direction* changes with `camTilt`, so the
// horizon position on screen is configurable. These F/R/U vectors are
// recomputed at render time by setupCamera().
// Camera position and focal distance — `let` so scenes can override them
// per-render through `setupCamera({ pos, focal, tiltDeg })`. Defaults work
// for the standard "subject on a horizon" composition.
let CAM = [0, 0, -5];
let FOCAL = 4;
const GROUND_Y = -0.5;
let camF = [0, 0, 1];
let camR = [1, 0, 0];
let camU = [0, 1, 0];
let syHorizon = 0;

// `opts` is an object: { tiltDeg, yawDeg, distance, pos: [x,y,z], focal }.
// Defaults: tilt 0, yaw 0, distance 5 (camera orbits at this radius around
// the origin in the xz plane). `pos` overrides the orbit math entirely.
function setupCamera(opts) {
  opts = opts || {};
  const tiltDeg = opts.tiltDeg != null ? opts.tiltDeg : 0;
  const yawDeg  = opts.yawDeg  != null ? opts.yawDeg  : 0;
  const dist    = opts.distance != null ? opts.distance : 5;
  const tilt = tiltDeg * Math.PI / 180;
  const yaw  = yawDeg  * Math.PI / 180;
  const sy_ = Math.sin(yaw), cy_ = Math.cos(yaw);
  const st_ = Math.sin(tilt), ct_ = Math.cos(tilt);
  // Orbit: yaw=0 → camera at (0, 0, -dist) (legacy default).
  if (opts.pos) CAM = opts.pos.slice();
  else          CAM = [dist * sy_, 0, -dist * cy_];
  FOCAL = opts.focal != null ? opts.focal : 4;
  // Yaw-then-pitch camera basis. F points from CAM toward the origin
  // (modulo the pitch).
  camF = [-sy_ * ct_, st_, cy_ * ct_];
  camR = [ cy_,       0,   sy_      ];
  // U = F × R for right-handed +y-up
  camU = [
    camF[1] * camR[2] - camF[2] * camR[1],
    camF[2] * camR[0] - camF[0] * camR[2],
    camF[0] * camR[1] - camF[1] * camR[0]
  ];
  // Horizon on screen: where the world-y component of the ray is zero.
  syHorizon = -camF[1] * FOCAL / camU[1];
}

// Named camera poses. Scenes can `return { sdf, camera: CAMERA.hero }` for
// a standard horizon-line composition (mostly used for ground-based forms)
// or use one of the alternates. Scene-specific compositions still pass
// their own `{ tiltDeg, yawDeg, distance }` literals where the framing is
// genuinely bespoke.
const CAMERA = {
  hero:        { tiltDeg: 6 },                       // standard horizon, looking at a ground-anchored form
  threeQuarter:{ tiltDeg: 6,  yawDeg: 22 },          // hero pose with a slight off-axis turn
  closeUp:     { tiltDeg: 14, yawDeg: 22 },          // closer, more vertical (polyhedron-style)
  topDown:     { tiltDeg: 22, yawDeg: 18 }           // dramatic looking-down (UFO/mengerSponge)
};

// Hatching: 4 fixed screen-space angles, picked per-pixel from the projected
// surface normal of the blob.
const HATCH_ANGLES = [0, Math.PI / 4, Math.PI / 2, 3 * Math.PI / 4];

// Per-pixel material id (buf.material[idx]) is set by scenes via their
// materialFn. Each id selects a row of MATERIAL_PROPS that shifts the
// hatcher's per-pixel darkness up or down — positive shifts more hatching
// (denser/darker), negative shifts less (sparser/lighter). 0 is the
// default and has no effect, so scenes that don't set material at all
// render exactly as before.
const MATERIAL_PROPS = [
  { darknessShift:  0.00 },  // 0: default
  { darknessShift:  0.30 },  // 1: dense / shadowed (e.g. underwater)
  { darknessShift: -0.30 },  // 2: bright / sparse (e.g. ice in sun)
  { darknessShift:  0.18 },  // 3: medium dense
  { darknessShift: -0.18 },  // 4: medium sparse
  { darknessShift:  0.45 },  // 5: very dense (near-solid black)
  { darknessShift: -0.45 }   // 6: very sparse (near highlights only)
];
function materialDarknessShift(buf, idx) {
  const m = buf.material[idx];
  const p = MATERIAL_PROPS[m];
  return p ? p.darknessShift : 0;
}

// Cheap deterministic [0,1) hash from (sx, sy). Used by hatchers that
// need a per-position dropout probability.
function hash01(sx, sy) {
  const h = Math.sin(sx * 1234.5 + sy * 5678.9 + 0.137) * 43758.5;
  return h - Math.floor(h);
}

// Canonical per-pixel darkness for the blob surface, in [0, 1]:
// Lambert (inverted) + soft-shadow penumbra + AO contribution + material shift.
// Every hatcher should call this; tonal-curve tweaks happen in one place.
function computeDarkness(buf, idx) {
  return Math.max(0, Math.min(1,
    (1 - buf.light[idx]) +
    0.50 * buf.shadow[idx] +
    0.20 * (1 - buf.ao[idx]) +
    materialDarknessShift(buf, idx)
  ));
}

// Width of one sx-unit in mm, derived from current paper width. Updated
// by setPaperSize() — `let` so it tracks the active paper.
let WORLD_PER_MM = 2.0 / (W_IN * 25.4);

// ============================================================
// PRNG
// ============================================================
function hashSeed(s) {
  s = String(s);
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function makeRng(seed) {
  let s = hashSeed(seed);
  return function () {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ============================================================
// SDF
// ============================================================
function sphereSDF(x, y, z, c, r) {
  const dx = x - c[0], dy = y - c[1], dz = z - c[2];
  return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
}
function smin(a, b, k) {
  const h = Math.max(k - Math.abs(a - b), 0) / k;
  return Math.min(a, b) - h * h * k * 0.25;
}
// Position-aware blob SDF — multiple of these can be composed via
// sdfUnion() to build "multiple blobs in a scene" (Monoliths, Forest,
// Cacti, Skyline, …). Each blob picks its own random lobes from `rng`.
//
//   opts = {
//     center:      [x, y, z]   (default [0,0,0])
//     nSpheres:    int         lobes incl. central anchor
//     smoothK:     0..0.8      smooth-min radius
//     spread:      0..3        horizontal/radial offset multiplier
//     verticality: 0.4..3      world-y stretch (taller > 1)
//     pointiness:  0..2        upper-lobe taper for sea-stack/cone forms
//     scale:       any         overall size multiplier
//   }
function makeBlobSDFAt(rng, opts) {
  const center = opts.center || [0, 0, 0];
  const nSpheres = opts.nSpheres || 4;
  const smoothK = opts.smoothK == null ? 0.3 : opts.smoothK;
  const spread = opts.spread == null ? 1 : opts.spread;
  const V = opts.verticality == null ? 1 : opts.verticality;
  const P = opts.pointiness || 0;
  const sc = opts.scale == null ? 1 : opts.scale;

  const spheres = [];
  spheres.push({ c: center.slice(), r: (0.4 + rng() * 0.15) * sc });
  for (let i = 1; i < nSpheres; i++) {
    const cyRaw = ((rng() - 0.5) * 0.6 * spread) * V * sc;
    const taper = cyRaw > 0 ? Math.max(0.15, 1 - P * cyRaw) : 1;
    spheres.push({
      c: [
        center[0] + (rng() - 0.5) * 0.7 * spread * taper * sc,
        center[1] + cyRaw,
        center[2] + (rng() - 0.5) * 0.5 * spread * taper * sc
      ],
      r: (0.22 + rng() * 0.25) * Math.max(0.3, taper) * sc
    });
  }
  return function (x, y, z) {
    function ell(c, r) {
      const dx = x - c[0];
      const dy = (y - c[1]) / V;
      const dz = z - c[2];
      return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
    }
    let d = ell(spheres[0].c, spheres[0].r);
    for (let i = 1; i < spheres.length; i++) {
      d = smin(d, ell(spheres[i].c, spheres[i].r), smoothK);
    }
    return d;
  };
}

// Octahedral analogue of makeBlobSDFAt — same parameter shape (centre,
// nSpheres, smoothK, spread, verticality, pointiness, scale) but each
// primitive is an octahedron instead of an ellipsoidal sphere. With
// smoothK ≈ 0 the union preserves the diamond-face silhouettes, so the
// result reads as a faceted/edgy rock instead of a soft blob.
//
// Extras to break the "all-pyramids" silhouette pattern:
//   - randomRotate (default true): each shard is rotated by a random
//     angle around Y plus small tilts around X and Z, so vertices land
//     in different directions instead of aligning into a regular pyramid
//     grid.
//   - roundMix (0..1, default 0): fraction of shards (excluding the
//     central one) rendered as spheres instead of octahedra, giving a
//     mix of faceted + weathered rock surfaces.
function makeOctahedralBlobAt(rng, opts) {
  const center  = opts.center || [0, 0, 0];
  const n       = opts.nSpheres || 4;
  const smoothK = opts.smoothK == null ? 0 : opts.smoothK;
  const spread  = opts.spread  == null ? 1 : opts.spread;
  const V       = opts.verticality == null ? 1 : opts.verticality;
  const P       = opts.pointiness || 0;
  const sc      = opts.scale == null ? 1 : opts.scale;
  const randomRotate = opts.randomRotate !== false;
  const roundMix     = opts.roundMix == null ? 0 : opts.roundMix;
  const shards = [];
  // Central shard: always an octahedron, axis-aligned so the form has
  // a stable centre of mass even with random rotation on the others.
  shards.push(makeOctahedron(
    center[0], center[1], center[2],
    (0.40 + rng() * 0.15) * sc
  ));
  for (let i = 1; i < n; i++) {
    const cyRaw = ((rng() - 0.5) * 0.6 * spread) * V * sc;
    const taper = cyRaw > 0 ? Math.max(0.15, 1 - P * cyRaw) : 1;
    const cx = center[0] + (rng() - 0.5) * 0.7 * spread * taper * sc;
    const cy = center[1] + cyRaw;
    const cz = center[2] + (rng() - 0.5) * 0.5 * spread * taper * sc;
    const sz = (0.22 + rng() * 0.25) * Math.max(0.3, taper) * sc;
    // Decide primitive: sphere with probability roundMix, otherwise oct.
    const useSphere = (rng() < roundMix);
    if (useSphere) {
      // Spheres need no rotation (rotational symmetry).
      shards.push(makeSphere(cx, cy, cz, sz));
    } else if (randomRotate) {
      // Random Y rotation (full 0..2π) + small X / Z tilts (±0.35 rad ≈
      // ±20°) so the octahedron's vertices land in unique directions.
      const ay = rng() * Math.PI * 2;
      const ax = (rng() - 0.5) * 0.70;
      const az = (rng() - 0.5) * 0.70;
      let o = makeOctahedron(0, 0, 0, sz);
      o = rotateY(o, ay);
      if (ax !== 0) o = rotateX(o, ax);
      if (az !== 0) o = rotateZ(o, az);
      o = translate(o, cx, cy, cz);
      shards.push(o);
    } else {
      shards.push(makeOctahedron(cx, cy, cz, sz));
    }
  }
  return sdfUnion(shards, smoothK);
}

// ============================================================
// SDF composition engines
// ============================================================
// Union of multiple SDFs. `smoothK > 0` → smooth-min blending (good for
// organic forms that flow into each other). `smoothK = 0` → sharp
// Math.min (good for visually distinct objects).
function sdfUnion(sdfs, smoothK) {
  if (sdfs.length === 0) return function () { return Infinity; };
  if (sdfs.length === 1) return sdfs[0];
  if (smoothK > 0) {
    return function (x, y, z) {
      let d = sdfs[0](x, y, z);
      for (let i = 1; i < sdfs.length; i++) {
        d = smin(d, sdfs[i](x, y, z), smoothK);
      }
      return d;
    };
  }
  return function (x, y, z) {
    let d = sdfs[0](x, y, z);
    for (let i = 1; i < sdfs.length; i++) {
      const e = sdfs[i](x, y, z);
      if (e < d) d = e;
    }
    return d;
  };
}

// Intersect a list of SDFs — `result = max(d0, d1, …)`. Inside = where ALL
// component SDFs are inside.
function sdfIntersect(sdfs) {
  return function (x, y, z) {
    let d = -Infinity;
    for (let i = 0; i < sdfs.length; i++) {
      const di = sdfs[i](x, y, z);
      if (di > d) d = di;
    }
    return d;
  };
}

// Plane carving — subtract each carver from base. `result = max(base, -c0, -c1, …)`.
// Useful for arches, cave mouths, windows, valleys.
function sdfSubtract(base, carvers) {
  if (!carvers || carvers.length === 0) return base;
  return function (x, y, z) {
    let d = base(x, y, z);
    for (let i = 0; i < carvers.length; i++) {
      const c = -carvers[i](x, y, z);
      if (c > d) d = c;
    }
    return d;
  };
}

// Axis-aligned box (optionally rounded). cx,cy,cz = centre; hx,hy,hz = half-sizes.
// `round` shrinks the box by `round` and adds it back as a fillet — set to 0 for
// sharp corners.
function makeBox(cx, cy, cz, hx, hy, hz, round) {
  const r = round || 0;
  const hxR = hx - r, hyR = hy - r, hzR = hz - r;
  return function (x, y, z) {
    const dx = Math.abs(x - cx) - hxR;
    const dy = Math.abs(y - cy) - hyR;
    const dz = Math.abs(z - cz) - hzR;
    const ox = Math.max(dx, 0), oy = Math.max(dy, 0), oz = Math.max(dz, 0);
    const outside = Math.sqrt(ox * ox + oy * oy + oz * oz);
    const inside = Math.min(Math.max(dx, Math.max(dy, dz)), 0);
    return outside + inside - r;
  };
}

// Finite cone with apex at (cx, cy_apex, cz), base disk at y = cy_base with
// radius r_base. `cy_apex > cy_base` for an upward-pointing cone (pyramid /
// rocket-cone shape); pass `cy_apex < cy_base` for a downward-pointing cone.
function makeConeY(cx, cy_apex, cy_base, cz, r_base) {
  const apexUp = cy_apex > cy_base;
  const h = Math.abs(cy_apex - cy_base);
  const slantLen = Math.sqrt(r_base * r_base + h * h);
  return function (x, y, z) {
    const dx = x - cx, dz = z - cz;
    const dxz = Math.sqrt(dx * dx + dz * dz);
    const py = y - cy_apex;

    // Past the apex point (outside the cone, on the pointy side):
    if (apexUp ? (py > 0) : (py < 0)) {
      return Math.sqrt(dxz * dxz + py * py);
    }
    // Past the base disk (outside the cone, on the open side):
    if (apexUp ? (y < cy_base) : (y > cy_base)) {
      const dxDisk = Math.max(0, dxz - r_base);
      const dy = y - cy_base;
      return Math.sqrt(dxDisk * dxDisk + dy * dy);
    }
    // Within the cone's height range — signed distance to the slant surface.
    return (dxz * h - Math.abs(py) * r_base) / slantLen;
  };
}

// Square pyramid: square base of `halfSide` half-length centered at
// (cx, cy_base, cz), apex straight above at (cx, cy_base + height, cz).
// SDF = max of the four slanted-face half-spaces + the base plane —
// not a true Euclidean SDF (it under-estimates near edges) but it's
// a valid Lipschitz SDF that raymarches correctly.
function makePyramidSquare(cx, cy_base, cz, halfSide, height) {
  const s = halfSide;
  const h = height;
  const norm = Math.sqrt(h * h + s * s) || 1;
  return function (x, y, z) {
    const px = x - cx;
    const py = y - cy_base;
    const pz = z - cz;
    // Mirror through the diagonal symmetry of the square so we only have
    // to evaluate two slant planes instead of four.
    const ax = Math.abs(px);
    const az = Math.abs(pz);
    // Slanted faces: outward normal (h, s, 0)/norm and (0, s, h)/norm.
    // Plane SDF = (h*|p| + s*y - h*s) / norm, positive outside.
    const slantX = (h * ax + s * py - h * s) / norm;
    const slantZ = (h * az + s * py - h * s) / norm;
    // Base half-space: y ≥ cy_base must hold; outward normal (0, -1, 0).
    const base = -py;
    return Math.max(slantX, slantZ, base);
  };
}

// Half-space plane. Normal (nx, ny, nz) need not be unit-length; it gets
// normalised internally. The plane passes through the point where
// dot(p, n) + d = 0. SDF is positive on the +n side, negative on the -n side
// — pass as a carver to `sdfSubtract` to slice a base SDF in half.
function makePlane(nx, ny, nz, d) {
  const len = Math.sqrt(nx * nx + ny * ny + nz * nz) || 1;
  const ux = nx / len, uy = ny / len, uz = nz / len;
  const ud = d / len;
  return function (x, y, z) {
    return x * ux + y * uy + z * uz + ud;
  };
}

// Torus on the xz plane: major radius R, minor radius r.
function makeTorus(cx, cy, cz, R, r) {
  return function (x, y, z) {
    const dx = x - cx, dz = z - cz;
    const q = Math.sqrt(dx * dx + dz * dz) - R;
    const dy = y - cy;
    return Math.sqrt(q * q + dy * dy) - r;
  };
}

// Sphere primitive.
function makeSphere(cx, cy, cz, r) {
  return function (x, y, z) {
    const dx = x - cx, dy = y - cy, dz = z - cz;
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
  };
}

// Regular octahedron centred at (cx, cy, cz). `s` controls overall size —
// the inscribed sphere has radius s × sqrt(1/3). This is the L1-ball
// distance approximation; not a perfect Euclidean SDF, but accurate
// enough for raymarched silhouette rendering.
function makeOctahedron(cx, cy, cz, s) {
  return function (x, y, z) {
    return (Math.abs(x - cx) + Math.abs(y - cy) + Math.abs(z - cz) - s) * 0.5774;
  };
}

// Y-axis-aligned finite cylinder from y=cy0 to y=cy1, axis at (cx, _, cz),
// radius r. Standard "cylinder = (radial cap, axial cap)" combination.
function makeCylinderY(cx, cy0, cy1, cz, r) {
  return function (x, y, z) {
    const dx = x - cx, dz = z - cz;
    const dxz = Math.sqrt(dx * dx + dz * dz) - r;
    const dyTop = y - cy1, dyBot = cy0 - y;
    const dy = Math.max(dyTop, dyBot);
    const outX = Math.max(dxz, 0), outY = Math.max(dy, 0);
    const outside = Math.sqrt(outX * outX + outY * outY);
    const inside = Math.min(Math.max(dxz, dy), 0);
    return outside + inside;
  };
}

// ============================================================
// Tier 2: domain operators. Each wraps a base SDF and returns a new SDF.
// ============================================================

// 3-D smoothstep value-noise factory. Returns f(x, y, z) ∈ [0, 1].
function makeNoise3D(seedKey) {
  const rng = makeRng(seedKey);
  const GS = 32;
  const grid = new Float32Array(GS * GS * GS);
  for (let i = 0; i < grid.length; i++) grid[i] = rng();
  function idx3(x, y, z) {
    return (x % GS) + (y % GS) * GS + (z % GS) * GS * GS;
  }
  return function n3(x, y, z) {
    const ux = ((x % GS) + GS) % GS;
    const uy = ((y % GS) + GS) % GS;
    const uz = ((z % GS) + GS) % GS;
    const ix = Math.floor(ux), iy = Math.floor(uy), iz = Math.floor(uz);
    const fx = ux - ix, fy = uy - iy, fz = uz - iz;
    const sx = fx * fx * (3 - 2 * fx);
    const sy = fy * fy * (3 - 2 * fy);
    const sz = fz * fz * (3 - 2 * fz);
    const c000 = grid[idx3(ix,     iy,     iz    )];
    const c100 = grid[idx3(ix + 1, iy,     iz    )];
    const c010 = grid[idx3(ix,     iy + 1, iz    )];
    const c110 = grid[idx3(ix + 1, iy + 1, iz    )];
    const c001 = grid[idx3(ix,     iy,     iz + 1)];
    const c101 = grid[idx3(ix + 1, iy,     iz + 1)];
    const c011 = grid[idx3(ix,     iy + 1, iz + 1)];
    const c111 = grid[idx3(ix + 1, iy + 1, iz + 1)];
    const x00 = c000 + (c100 - c000) * sx;
    const x10 = c010 + (c110 - c010) * sx;
    const x01 = c001 + (c101 - c001) * sx;
    const x11 = c011 + (c111 - c011) * sx;
    const y0 = x00 + (x10 - x00) * sy;
    const y1 = x01 + (x11 - x01) * sy;
    return y0 + (y1 - y0) * sz;
  };
}

// Surface displacement: roughen a smooth SDF by adding noise to its value.
// `noiseFn` is expected in [0, 1]; it's centered before applying.
// `amp` is the peak-to-peak displacement amplitude (≤ ~0.2 for raymarch
// stability — large amps make the SDF non-Lipschitz and the raymarcher
// overshoots).
function displace(sdf, noiseFn, amp) {
  return function (x, y, z) {
    return sdf(x, y, z) + (noiseFn(x, y, z) - 0.5) * amp;
  };
}

// 3-octave isotropic surface roughening. Standard pattern across rock /
// stone / ice scenes. Caller supplies a seed key (so multiple instances
// don't share noise), the displacement amplitude, and optionally per-
// octave frequencies and weights. Default freqs/weights produce a
// general-purpose "weathered stone" texture. amp ≤ 0 returns sdf
// unchanged so callers don't need their own zero-guard.
function roughenSDF(sdf, seedKey, amp, freqs, weights) {
  if (amp <= 0) return sdf;
  const F = freqs   || [6,    16,   38];
  const W = weights || [0.50, 0.30, 0.20];
  const n3 = makeNoise3D(seedKey);
  return displace(sdf, function (x, y, z) {
    return W[0] * n3(x * F[0], y * F[0], z * F[0]) +
           W[1] * n3(x * F[1], y * F[1], z * F[1]) +
           W[2] * n3(x * F[2], y * F[2], z * F[2]);
  }, amp);
}

// Rotate the input position around the Y axis by `k * y` radians before
// evaluating — twists any vertical form into a helix.
// Generic position warp: offset the input p by a 3-vector returned by
// `fn(x, y, z)` before evaluating. More general than twistY/bendY —
// can do any sinusoidal/turbulent positional distortion.
function warp(sdf, fn) {
  return function (x, y, z) {
    const w = fn(x, y, z);
    return sdf(x + w[0], y + w[1], z + w[2]);
  };
}

// Constant-angle rotations around each axis. `angle` is in radians.
// The position is rotated by the inverse so the SHAPE is rotated by +angle.
function rotateY(sdf, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return function (x, y, z) {
    return sdf(x * c + z * s, y, -x * s + z * c);
  };
}
function rotateZ(sdf, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return function (x, y, z) {
    return sdf(x * c + y * s, -x * s + y * c, z);
  };
}
function rotateX(sdf, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return function (x, y, z) {
    return sdf(x, y * c + z * s, -y * s + z * c);
  };
}

// Translate an SDF by (dx, dy, dz). Pairs with rotate to place rotated
// shapes anywhere in space.
function translate(sdf, dx, dy, dz) {
  return function (x, y, z) {
    return sdf(x - dx, y - dy, z - dz);
  };
}

// Domain repetition: wrap each axis by its period before evaluating, so
// a single SDF tiles infinitely along that axis. period <= 0 disables
// repetition on that axis.
function repeat(sdf, periodX, periodY, periodZ) {
  return function (x, y, z) {
    const px = periodX > 0 ? ((x % periodX) + periodX) % periodX - periodX / 2 : x;
    const py = periodY > 0 ? ((y % periodY) + periodY) % periodY - periodY / 2 : y;
    const pz = periodZ > 0 ? ((z % periodZ) + periodZ) % periodZ - periodZ / 2 : z;
    return sdf(px, py, pz);
  };
}

function twistY(sdf, k) {
  return function (x, y, z) {
    const c = Math.cos(k * y), s = Math.sin(k * y);
    return sdf(x * c - z * s, y, x * s + z * c);
  };
}

// Cheap-bend (Inigo Quilez): rotate the xy plane by `k * y` before
// evaluating. Turns a straight column into a curve / hook.
function bendY(sdf, k) {
  return function (x, y, z) {
    const c = Math.cos(k * y), s = Math.sin(k * y);
    return sdf(c * x - s * y, s * x + c * y, z);
  };
}

// Mirror around the given axis ('x' | 'y' | 'z') — instant bilateral
// symmetry. The half-SDF you define on the +axis side gets reflected.
function mirror(sdf, axis) {
  if (axis === 'x') return (x, y, z) => sdf(Math.abs(x), y, z);
  if (axis === 'y') return (x, y, z) => sdf(x, Math.abs(y), z);
  return (x, y, z) => sdf(x, y, Math.abs(z));
}

// Poisson-disc / blue-noise scatter — Bridson's dart-throwing algorithm.
// Returns an array of [x, y] points within `region` (xMin/xMax/yMin/yMax)
// such that every pair is at least `minDist` apart. Each `rng()` draw
// supplies a uniform [0, 1) random.
function poissonScatter(rng, minDist, region, maxAttempts) {
  maxAttempts = maxAttempts || 20;
  const cellSize = minDist / Math.SQRT2;
  const cols = Math.max(1, Math.ceil((region.xMax - region.xMin) / cellSize));
  const rows = Math.max(1, Math.ceil((region.yMax - region.yMin) / cellSize));
  const grid = new Array(cols * rows).fill(null);
  const points = [];
  const active = [];

  function cellOf(p) {
    return [
      Math.floor((p[0] - region.xMin) / cellSize),
      Math.floor((p[1] - region.yMin) / cellSize)
    ];
  }
  function place(p) {
    points.push(p);
    active.push(p);
    const [cx, cy] = cellOf(p);
    grid[cy * cols + cx] = p;
  }

  place([
    region.xMin + rng() * (region.xMax - region.xMin),
    region.yMin + rng() * (region.yMax - region.yMin)
  ]);

  while (active.length) {
    const idx = Math.floor(rng() * active.length);
    const c = active[idx];
    let placed = false;
    for (let k = 0; k < maxAttempts; k++) {
      const ang = rng() * 2 * Math.PI;
      const rad = minDist * (1 + rng());
      const p = [c[0] + Math.cos(ang) * rad, c[1] + Math.sin(ang) * rad];
      if (p[0] < region.xMin || p[0] > region.xMax) continue;
      if (p[1] < region.yMin || p[1] > region.yMax) continue;
      const [pcx, pcy] = cellOf(p);
      let ok = true;
      for (let dy = -2; dy <= 2 && ok; dy++) {
        for (let dx = -2; dx <= 2 && ok; dx++) {
          const ny = pcy + dy, nx = pcx + dx;
          if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
          const other = grid[ny * cols + nx];
          if (!other) continue;
          const ddx = other[0] - p[0], ddy = other[1] - p[1];
          if (ddx * ddx + ddy * ddy < minDist * minDist) ok = false;
        }
      }
      if (ok) { place(p); placed = true; break; }
    }
    if (!placed) active.splice(idx, 1);
  }
  return points;
}

// ============================================================
// 2-D distance functions in the (r, y) plane — for revolveY profiles.
// Same call signature as 3-D SDFs (x, y, z) so they compose with the
// existing sdfUnion/sdfSubtract/smin operators; the `z` argument is
// ignored. By convention r = the first coord (treat as "radius") and
// y = the second.
// ============================================================
function circle2D(cr, cy, radius) {
  return function (r, y) {
    const dr = r - cr, dy = y - cy;
    return Math.sqrt(dr * dr + dy * dy) - radius;
  };
}
function box2D(cr, cy, hr, hy, round) {
  const ro = round || 0;
  const hrR = hr - ro, hyR = hy - ro;
  return function (r, y) {
    const dr = Math.abs(r - cr) - hrR;
    const dy = Math.abs(y - cy) - hyR;
    const oR = Math.max(dr, 0), oY = Math.max(dy, 0);
    const outside = Math.sqrt(oR * oR + oY * oY);
    const inside = Math.min(Math.max(dr, dy), 0);
    return outside + inside - ro;
  };
}

// Revolve a 2-D distance function around the Y axis. The 2-D SDF lives
// in the (r, y) plane (r = signed radius). The 3-D SDF samples it at
// r = sqrt(x² + z²). Useful for vases, urns, saucers, banisters, any
// rotationally-symmetric form.
function revolveY(dist2D) {
  return function (x, y, z) {
    return dist2D(Math.sqrt(x * x + z * z), y, 0);
  };
}

// Stack — build N instances of an SDF parametrised by index and combine
// them. `builder(i)` returns the per-instance SDF. Sharp union when
// smoothK is 0, smooth-min otherwise. Useful for recursive towers,
// spiral staircases, repeated motifs that vary slightly per instance.
function stack(builder, count, smoothK) {
  const sdfs = [];
  for (let i = 0; i < count; i++) sdfs.push(builder(i));
  return sdfUnion(sdfs, smoothK || 0);
}

// X-axis-aligned capsule — useful as a "tunnel" carver to punch a
// horizontal arch through a rock. (Hvítserkur-style.)
function makeCapsuleX(cx, cy, cz, halfLen, r) {
  return function (x, y, z) {
    const tx = Math.max(-halfLen, Math.min(halfLen, x - cx));
    const dx = (x - cx) - tx;
    const dy = y - cy;
    const dz = z - cz;
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
  };
}

// Z-axis-aligned capsule — front-to-back tunnel.
function makeCapsuleZ(cx, cy, cz, halfLen, r) {
  return function (x, y, z) {
    const tz = Math.max(-halfLen, Math.min(halfLen, z - cz));
    const dx = x - cx;
    const dy = y - cy;
    const dz = (z - cz) - tz;
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
  };
}

// Beam helper: returns viewBox-space polylines for a fan of light rays
// emanating from a world-space lamp position. Used by the lighthouse
// scenes via the scene `extraStrokes` callback. Rays are clipped to the
// printable area (inside MARGIN_VB) so they don't bleed into the page
// margin.
function lighthouseBeam(ctx, lampWorldPos, opts) {
  opts = opts || {};
  const lampVB = ctx.worldToVB(lampWorldPos);
  if (!lampVB) return [];
  const numRays    = opts.numRays    != null ? opts.numRays    : 7;
  const centerDeg  = opts.centerDeg  != null ? opts.centerDeg  : 30;  // 0=up, +=right
  const spreadDeg  = opts.spreadDeg  != null ? opts.spreadDeg  : 22;
  const lengthVB   = opts.lengthVB   != null ? opts.lengthVB   : 900;
  // Inside-margin bounds. Liang-Barsky clip clamps each ray's end to
  // the first place it exits this rectangle, so rays don't run into
  // the page margin.
  const m = MARGIN_VB;
  const xMin = m, yMin = m, xMax = VB_W - m, yMax = VB_H - m;
  const paths = [];
  for (let i = 0; i < numRays; i++) {
    const t = numRays === 1 ? 0 : (i / (numRays - 1) - 0.5) * 2;  // -1..1
    const ang = (centerDeg + t * spreadDeg) * Math.PI / 180;
    // 0° = straight up in viewBox (negative y direction).
    const dx =  Math.sin(ang) * lengthVB;
    const dy = -Math.cos(ang) * lengthVB;
    let tMax = 1;
    if (dx > 0) tMax = Math.min(tMax, (xMax - lampVB[0]) / dx);
    if (dx < 0) tMax = Math.min(tMax, (xMin - lampVB[0]) / dx);
    if (dy > 0) tMax = Math.min(tMax, (yMax - lampVB[1]) / dy);
    if (dy < 0) tMax = Math.min(tMax, (yMin - lampVB[1]) / dy);
    if (tMax <= 0) continue;
    paths.push([
      [lampVB[0],            lampVB[1]],
      [lampVB[0] + dx * tMax, lampVB[1] + dy * tMax]
    ]);
  }
  return paths;
}

// Rain dashes: short straight strokes scattered across the sky region,
// all at the same angle. Deterministic via seed so the same image renders
// the same rain every time.
function rainDashes(ctx, opts) {
  opts = opts || {};
  const numDashes = opts.numDashes != null ? opts.numDashes : 250;
  const dashLen = opts.dashLen != null ? opts.dashLen : 20;
  const angleDeg = opts.angleDeg != null ? opts.angleDeg : 78;
  const a = angleDeg * Math.PI / 180;
  const dx = Math.cos(a) * dashLen;
  const dy = Math.sin(a) * dashLen;
  let s = (opts.seed != null) ? hashStringToInt(String(opts.seed)) : 12345;
  function r() { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; }
  const yMin = 50;
  const yMax = ctx.syHorizon - 20;
  const paths = [];
  for (let i = 0; i < numDashes; i++) {
    const x = r() * 1200;
    const y = yMin + r() * (yMax - yMin);
    paths.push([[x, y], [x + dx, y + dy]]);
  }
  return paths;
}

function hashStringToInt(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// ============================================================
// Scene registry. Adding a new sister project = adding an entry here.
//
// Two entry shapes are accepted:
//   1. A function of (rng, state) — back-compat shape; scenes with no
//      tunable parameters just use this. State carries global controls
//      (lw, density, light, camera tilt, etc.) only.
//   2. An object { ui: [...], build: function (rng, state, params) }
//      where `ui` is a list of param descriptors rendered into the
//      "Scene parameters" panel, and `build` receives the live values.
//      Param descriptors: { id, label, type: 'int' | 'number', min, max,
//      step?, default }.
// ============================================================

// Forest tree builders. Body (small, many) and hero (big, one) use the
// SAME 4-style switch; pulled out so each style's branching logic lives
// in one place per call site. They were previously two ~50-line inline
// switches, identical in structure but with slightly different
// proportions.
function buildForestTreeBody(rng, style, cx, cz, trunkR, canopyR, baseHeight, heightScale) {
  if (style === 'conifer') {
    const trunkTop = -0.70 + 0.25 * baseHeight;
    const conePeak = trunkTop + canopyR * 2.6 * heightScale;
    const trunk  = makeCylinderY(cx, -0.70, trunkTop, cz, trunkR * 0.6);
    const canopy = makeConeY(cx, conePeak, trunkTop - 0.04, cz, canopyR * 0.85);
    return sdfUnion([trunk, canopy], 0.012);
  }
  if (style === 'winter') {
    const trunkTop = -0.70 + 0.55 * heightScale;
    const trunk = makeCylinderY(cx, -0.70, trunkTop, cz, trunkR);
    const parts = [trunk];
    const nB = 4;
    for (let b = 0; b < nB; b++) {
      const yaw  = (b / nB) * Math.PI * 2 + rng() * 0.8;
      const lift = (0.5 + rng() * 0.5) * Math.PI / 4;
      const len  = canopyR * (1.1 + rng() * 0.6);
      const seg  = makeCapsuleX(0, 0, 0, len, trunkR * 0.45);
      let b1 = rotateZ(seg, lift);
      b1 = rotateY(b1, yaw);
      b1 = translate(b1, cx, trunkTop + len * 0.5, cz);
      parts.push(b1);
    }
    return sdfUnion(parts, 0.012);
  }
  if (style === 'oldgrowth') {
    const trunkTop = -0.70 + 0.40 * baseHeight * heightScale;
    const trunk = makeCylinderY(cx, -0.70, trunkTop, cz, trunkR * 1.8);
    const c1 = makeSphere(cx, trunkTop + canopyR * 0.60 * heightScale, cz, canopyR * 1.4 * heightScale);
    const c2 = makeSphere(cx + canopyR * 0.5, trunkTop + canopyR * 0.95 * heightScale,
                          cz + (rng() - 0.5) * canopyR * 0.5, canopyR * 1.0 * heightScale);
    return sdfUnion([trunk, c1, c2], 0.04);
  }
  // 'mixed' — per-tree random pick between conifer-ish and round.
  if (rng() < 0.55) {
    const trunkTop = -0.70 + 0.25 * baseHeight;
    const conePeak = trunkTop + canopyR * 2.4 * heightScale;
    const trunk  = makeCylinderY(cx, -0.70, trunkTop, cz, trunkR * 0.6);
    const canopy = makeConeY(cx, conePeak, trunkTop - 0.04, cz, canopyR * 0.8);
    return sdfUnion([trunk, canopy], 0.012);
  }
  const trunkTop = -0.70 + 0.35 * baseHeight;
  const canopyY  = trunkTop + canopyR * 0.6 * heightScale;
  const trunk = makeCylinderY(cx, -0.70, trunkTop, cz, trunkR);
  const canopy = makeSphere(cx, canopyY, cz, canopyR * heightScale);
  return sdfUnion([trunk, canopy], 0.025);
}

function buildForestTreeHero(rng, style, hx, hz, trunkR, canopyR, H) {
  if (style === 'conifer') {
    const trunkTop = -0.70 + 0.20 * H;
    const conePeak = trunkTop + canopyR * 3.4;
    const trunk = makeCylinderY(hx, -0.72, trunkTop, hz, trunkR * 0.7);
    const cone  = makeConeY(hx, conePeak, trunkTop - 0.05, hz, canopyR * 0.95);
    return sdfUnion([trunk, cone], 0.015);
  }
  if (style === 'winter') {
    const trunkTop = -0.70 + 0.55 * H;
    const trunk = makeCylinderY(hx, -0.72, trunkTop, hz, trunkR);
    const parts = [trunk];
    const nB = 6;
    for (let b = 0; b < nB; b++) {
      const yaw  = (b / nB) * Math.PI * 2 + rng() * 0.6;
      const lift = (0.5 + rng() * 0.5) * Math.PI / 4;
      const len  = canopyR * (1.4 + rng() * 0.6);
      const seg  = makeCapsuleX(0, 0, 0, len, trunkR * 0.4);
      let b1 = rotateZ(seg, lift);
      b1 = rotateY(b1, yaw);
      b1 = translate(b1, hx, trunkTop + len * 0.5, hz);
      parts.push(b1);
    }
    return sdfUnion(parts, 0.015);
  }
  if (style === 'oldgrowth') {
    const trunkTop = -0.70 + 0.35 * H;
    const trunk = makeCylinderY(hx, -0.72, trunkTop, hz, trunkR * 1.6);
    const c1 = makeSphere(hx,                  trunkTop + canopyR * 0.5, hz,         canopyR * 1.5);
    const c2 = makeSphere(hx + canopyR * 0.55, trunkTop + canopyR * 0.9, hz - 0.04,  canopyR * 1.1);
    const c3 = makeSphere(hx - canopyR * 0.35, trunkTop + canopyR * 1.1, hz + 0.04,  canopyR * 0.9);
    return sdfUnion([trunk, c1, c2, c3], 0.05);
  }
  // 'mixed' — round-canopy hero with thick trunk.
  const trunkTop = -0.70 + 0.30 * H;
  const trunk = makeCylinderY(hx, -0.72, trunkTop, hz, trunkR);
  const c1 = makeSphere(hx,                trunkTop + canopyR * 0.6, hz, canopyR * 1.3);
  const c2 = makeSphere(hx + canopyR * 0.5, trunkTop + canopyR * 0.9, hz, canopyR * 0.9);
  return sdfUnion([trunk, c1, c2], 0.04);
}

    ui: [
      { id: 'stoneCount',   label: 'Stone count',  type: 'int',    min: 3,    max: 12,   step: 1,    default: 7    },
      { id: 'ringRadius',   label: 'Ring radius',  type: 'number', min: 0.40, max: 1.40, step: 0.05, default: 0.85 },
      { id: 'ringFlatten',  label: 'Ring flatten', type: 'number', min: 0.20, max: 1.00, step: 0.05, default: 0.50 },
      { id: 'maxHeight',    label: 'Max height',   type: 'number', min: 0.40, max: 1.40, step: 0.05, default: 0.95 },
      { id: 'thickness',    label: 'Slab thinness',type: 'number', min: 0.15, max: 0.80, step: 0.05, default: 0.40 },
      { id: 'tiltAmount',   label: 'Tilt',         type: 'number', min: 0.00, max: 0.45, step: 0.02, default: 0.12 },
      { id: 'roughness',    label: 'Roughness',    type: 'number', min: 0.00, max: 0.10, step: 0.005, default: 0.025 },
      { id: 'fallenChance', label: 'Fallen %',     type: 'number', min: 0.00, max: 0.60, step: 0.05, default: 0.10 }
    ],
    build: function (rng, state, params) {
      // Stones-of-Stenness style: a roughly circular ring of tall thin
      // sandstone slabs, each yaw-rotated to face a different direction,
      // slightly tilted (rotation around the base, so the bottom stays
      // planted), with stratified-noise surface weathering. Some stones
      // may be "fallen" — lying flat on the ground in random orientation.
      const stones = [];
      const n = params.stoneCount;
      const GROUND_Y = -0.5;
      for (let i = 0; i < n; i++) {
        // Position around an ellipse. The ring is flattened in z so the
        // camera perspective foreshortens the back of the circle naturally.
        const baseAngle = (i / n) * Math.PI * 2;
        // angle jitter: up to half a stone's slot in either direction.
        const angleJitter = (rng() - 0.5) * (Math.PI / n) * 0.7;
        const angle = baseAngle + angleJitter;
        const r = params.ringRadius * (0.85 + rng() * 0.30);
        const cx = Math.cos(angle) * r;
        const cz = Math.sin(angle) * r * params.ringFlatten;
        // Each slab varies in dimensions: tall, narrow (wide face),
        // thin (edge-on face).
        const stoneH = (0.55 + rng() * 0.45) * params.maxHeight;
        const stoneW = 0.10 + rng() * 0.05;
        const stoneD = stoneW * params.thickness;
        const fallen = rng() < params.fallenChance;
        let stone;
        if (fallen) {
          // Lying flat: the box's long axis is horizontal (x in local
          // frame), height in local y, width in local z.
          const halfH = stoneD;       // thin axis up
          let s = makeBox(0, 0, 0, stoneH, halfH, stoneW, 0.02);
          // Put the BOTTOM at y=0 in local frame (translate up by halfH).
          s = translate(s, 0, halfH, 0);
          const yaw = rng() * Math.PI * 2;
          s = rotateY(s, yaw);
          stone = translate(s, cx, GROUND_Y, cz);
        } else {
          // Standing: build the box at origin, translate UP by half-height
          // so its bottom sits at the world origin, then rotate around
          // origin (= the base of the stone), then translate to position.
          let s = makeBox(0, 0, 0, stoneW, stoneH, stoneD, 0.02);
          s = translate(s, 0, stoneH, 0);
          // Random yaw — every stone faces a different direction.
          const yaw = rng() * Math.PI * 2;
          s = rotateY(s, yaw);
          // Slight tilt forward/back and side-to-side. The rotation
          // pivot is the origin (the stone's base) so the bottom stays
          // planted on the ground.
          const tiltX = (rng() - 0.5) * params.tiltAmount;
          const tiltZ = (rng() - 0.5) * params.tiltAmount;
          if (tiltX !== 0) s = rotateX(s, tiltX);
          if (tiltZ !== 0) s = rotateZ(s, tiltZ);
          stone = translate(s, cx, GROUND_Y, cz);
        }
        stones.push(stone);
      }
      let combined = sdfUnion(stones, 0);
      // Sandstone weathering: anisotropic noise with strong y frequency
      // produces faint horizontal layering (stratification) plus
      // isotropic small-scale wear.
      if (params.roughness > 0) {
        const n3 = makeNoise3D(state.seed + ':monolithNoise');
        combined = displace(combined, function (x, y, z) {
          const strata = n3(x * 3, y * 25, z * 3);
          const wear   = n3(x * 8, y * 8,  z * 8);
          return 0.55 * strata + 0.45 * wear;
        }, params.roughness);
      }
      return combined;
    }
  },
  stonehenge: {
    ui: [
      { id: 'trilithonCount', label: 'Trilithons',     type: 'int',    min: 3,    max: 8,    step: 1,    default: 5    },
      { id: 'ringRadius',     label: 'Ring radius',    type: 'number', min: 0.50, max: 1.40, step: 0.05, default: 0.85 },
      { id: 'arcSpan',        label: 'Arc span',       type: 'number', min: 0.40, max: 1.00, step: 0.05, default: 0.75 },
      { id: 'stoneHeight',    label: 'Stone height',   type: 'number', min: 0.30, max: 1.00, step: 0.05, default: 0.55 },

    ],
    build: function (rng, state, params) {
      // Inspired by Piter Pasma's Universal Rayhatcher #437 — a Stonehenge
      // arrangement of trilithons (two uprights + horizontal lintel),
      // distributed along an arc of the ground, with scattered fallen
      // stones in the foreground. Pair with skyStyle = 'vertical' for the
      // URH #437 look.
      const N = params.trilithonCount;
      const parts = [];
      const w = params.stoneWidth;
      const h = params.stoneHeight;
      const halfArc = Math.PI * params.arcSpan;
      const arcStart = -halfArc + Math.PI / 2;
      const r = params.ringRadius;
      const flatten = 0.55; // foreshorten z so the ring reads as elliptical
      const sep = w * 4;    // distance between two uprights of one trilithon
      for (let i = 0; i < N; i++) {
        const t = N <= 1 ? 0.5 : i / (N - 1);
        const angle = arcStart + t * (halfArc * 2);
        const cx = Math.cos(angle) * r;
        const cz = Math.sin(angle) * r * flatten - 0.05;
        // The two uprights of a trilithon are arranged tangent to the ring.
        const tangent = [Math.sin(angle), 0, -Math.cos(angle) * flatten];
        const heightHere = h * (0.92 + (i * 7919 % 100) / 600); // mild variation
        for (const side of [-1, 1]) {
          const ux = cx + tangent[0] * (sep / 2) * side;
          const uz = cz + tangent[2] * (sep / 2) * side;
          let upright = makeBox(0, heightHere, 0, w, heightHere, w * 0.75, 0.012);
          upright = rotateY(upright, angle);
          parts.push(translate(upright, ux, GROUND_Y, uz));
        }
        // Lintel: thick horizontal slab spanning the two uprights.
        const lintelH = w * 0.55;
        let lintel = makeBox(0, heightHere * 2 + lintelH, 0,
                             sep / 2 + w, lintelH, w * 0.75, 0.012);
        lintel = rotateY(lintel, angle);
        parts.push(translate(lintel, cx, GROUND_Y, cz));
      }
      // Fallen / scattered stones in the foreground for narrative weight.
      for (let i = 0; i < params.fallenStones; i++) {
        const a = rng() * Math.PI * 2;
        const fr = r * (1.05 + rng() * 0.45);
        const fx = Math.cos(a) * fr;
        const fz = Math.sin(a) * fr * flatten - 0.30;
        const fw = w * (0.55 + rng() * 0.65);
        const fh = fw * (0.4 + rng() * 0.5);
        let stone = makeBox(0, fh, 0, fw, fh, fw * 0.85, 0.012);
        stone = rotateY(stone, rng() * Math.PI * 2);
        stone = rotateZ(stone, (rng() - 0.5) * 0.50);
        parts.push(translate(stone, fx, GROUND_Y, fz));
      }
      let scene = sdfUnion(parts, 0);
      scene = roughenSDF(scene, state.seed + ':stonehengeNoise',
                         params.roughness, [5, 14, 32], [0.55, 0.30, 0.15]);
      return { sdf: scene, camera: { tiltDeg: 12, yawDeg: 0, distance: 2.8 } };
    }
  },

      { id: 'rockVerticality', label: 'Rock vert.',     type: 'number', min: 0.40, max: 2.00, step: 0.10, default: 0.85 },
      { id: 'rockSpread',      label: 'Rock spread',    type: 'number', min: 0.50, max: 2.50, step: 0.05, default: 1.70 },

  lighthouse: {
    ui: [
      { id: 'beamStyle',       label: 'Beam style',     type: 'enum',
        options: [
          { value: 'negative', label: 'negative' },
          { value: 'rays',     label: 'rays'     },
          { value: 'both',     label: 'both'     },
          { value: 'none',     label: 'off'      }
        ], default: 'rays' },
      { id: 'beamRays',        label: 'Ray count',      type: 'int',    min: 5,    max: 60,   step: 1,    default: 34   },
      { id: 'beamSpreadDeg',   label: 'Ray spread (°)', type: 'number', min: 4,    max: 60,   step: 1,    default: 7    },
      { id: 'rockStacks',      label: 'Rock stacks',    type: 'int',    min: 1,    max: 3,    step: 1,    default: 2    },
      { id: 'rockShards',      label: 'Rock shards',    type: 'int',    min: 4,    max: 12,   step: 1,    default: 7    },
      { id: 'rockScale',       label: 'Rock scale',     type: 'number', min: 0.20, max: 3.00, step: 0.05, default: 1.10 },
      { id: 'rockVerticality', label: 'Rock vert.',     type: 'number', min: 0.6,  max: 3.5,  step: 0.1,  default: 1.6  },
      { id: 'rockSpread',      label: 'Rock spread',    type: 'number', min: 0.20, max: 3.00, step: 0.05, default: 0.85 },
      { id: 'rockSmoothK',     label: 'Rock smooth K',  type: 'number', min: 0.00, max: 0.20, step: 0.01, default: 0.03 },
      { id: 'rockTaper',       label: 'Stack taper',    type: 'number', min: 0.10, max: 0.70, step: 0.05, default: 0.40 },
      { id: 'rockOverlap',     label: 'Rock overlap',   type: 'number', min: -0.05, max: 0.35, step: 0.02, default: 0.12 },
      { id: 'rockJaggedness',  label: 'Rock jaggedness',type: 'number', min: 0.00, max: 0.30, step: 0.005, default: 0.08 },
      { id: 'rockRoundMix',    label: 'Round mix',      type: 'number', min: 0.00, max: 1.00, step: 0.05, default: 0.40 },
      { id: 'foundationWidth', label: 'Foundation',     type: 'number', min: 0.00, max: 3.50, step: 0.10, default: 1.80 },
      { id: 'clusterRocks',    label: 'Cluster rocks',  type: 'int',    min: 0,    max: 5,    step: 1,    default: 2    }
    ],
    build: function (rng, state, params) {
      // Lighthouse perched on a faceted monument-style rock, off-centre
      // to the right. The rock is composed of octahedra (sharp diamond
      // facets) instead of spheres, so the silhouette reads as edgy
      // basalt rather than a soft blob. With Rock stacks > 1 the rock
      // is built as multiple narrowing octahedral clusters stacked on
      // top of each other — a wider base + narrower spire feel. An
      // optional noise displacement adds fine surface jaggedness.
      //
      // The light beam emanates horizontally from the lamp room as
      // negative-space — the buffer marks the wedge as non-sky so the
      // user's chosen sky texture naturally vanishes inside it.
      const baseX = 0.42;
      const stacks = params.rockStacks;
      const stackParts = [];
      // Build the stack list bottom-to-top so the bottom rock (s=0)
      // is the WIDEST and the top rock (s=stacks-1) is the SMALLEST.
      // Then place each one downward from y = lighthouseBase so the
      // entire stack sits BELOW the lighthouse rather than poking up
      // through it.
      // Top of the rock stack. y = -0.10 is the lighthouse base; a
       // positive `rockOverlap` lifts the rocks ABOVE the base so they
       // wrap around the lower part of the lighthouse cylinder and
       // smooth-merge with it, making the lighthouse look planted in
       // the rocks rather than perched on top of them.
      const TOP_Y = -0.10 + (params.rockOverlap || 0);
      const OVERLAP = 0.30;
      const scales = [];
      const spreads = [];
      const halfHeights = [];
      for (let s = 0; s < stacks; s++) {
        const t = stacks <= 1 ? 0 : s / (stacks - 1);
        // t=0 → bottom (full scale); t=1 → top (tapered smallest)
        const sc = params.rockScale  * (1 - t * params.rockTaper);
        const sp = params.rockSpread * (1 - t * params.rockTaper * 0.6);
        scales.push(sc);
        spreads.push(sp);
        // Anchor on the CENTRAL octahedron's half-extent (sc * 0.475).
        // Additional shards inside the blob may scatter a bit further up
        // — that's fine; the smooth-min union with the lighthouse body
        // blends them naturally. The previous worst-case formula buried
        // most of the rock below the horizon, leaving only the tip visible.
        halfHeights.push(sc * 0.475);
      }
      // Topmost stack: its TOP is at TOP_Y → its centre is TOP_Y minus
      // its own half-height.
      const positions = new Array(stacks);
      positions[stacks - 1] = TOP_Y - halfHeights[stacks - 1];
      for (let s = stacks - 2; s >= 0; s--) {
        positions[s] = positions[s + 1] -
                       (1 - OVERLAP) * (halfHeights[s] + halfHeights[s + 1]);
      }
      for (let s = 0; s < stacks; s++) {
        // Bottom stack gets the full shard count; top stack gets fewer.
        const stackShards = Math.max(3, params.rockShards - (stacks - 1 - s));
        stackParts.push(makeOctahedralBlobAt(rng, {
          center: [baseX, positions[s], 0],
          nSpheres: stackShards,
          smoothK: params.rockSmoothK,
          spread: spreads[s],
          verticality: params.rockVerticality,
          pointiness: 0.20,
          scale: scales[s],
          roundMix: params.rockRoundMix,
          randomRotate: true
        }));
      }
      // Foundation — a wide, flat octahedral blob at the base of the
      // stack. Verticality 0.30 squashes it horizontally so it reads
      // as a rocky outcrop rather than another spire. Sits below the
      // bottommost stack with an overlap so the two smooth-merge.
      if (params.foundationWidth > 0) {
        const fScale = params.rockScale * params.foundationWidth;
        const fHalfH = fScale * 0.475 * 0.30; // verticality 0.30 → flatter
        const fY = positions[0] - halfHeights[0] * 0.60;
        stackParts.push(makeOctahedralBlobAt(rng, {
          center: [baseX, fY, 0],
          nSpheres: Math.max(4, params.rockShards),
          smoothK: params.rockSmoothK,
          spread: 1.40,
          verticality: 0.30,
          pointiness: 0,
          scale: fScale,
          roundMix: params.rockRoundMix,
          randomRotate: true
        }));
      }
      // Cluster rocks — N additional smaller rocks scattered laterally
      // around the base. Each gets its own random offset, scale, and
      // z-depth jitter so the cluster reads as a natural rocky outcrop.
      const clusterCount = params.clusterRocks || 0;
      for (let i = 0; i < clusterCount; i++) {
        const sideSign = (rng() < 0.5) ? -1 : 1;
        const lateral  = (0.18 + rng() * 0.32) * sideSign;
        const cx = baseX + lateral;
        const cy = positions[0] - halfHeights[0] * (0.20 + rng() * 0.40);
        const cz = (rng() - 0.5) * 0.25;
        const cScale = params.rockScale * (0.30 + rng() * 0.30);
        stackParts.push(makeOctahedralBlobAt(rng, {
          center: [cx, cy, cz],
          nSpheres: 5,
          smoothK: params.rockSmoothK,
          spread: 0.60,
          verticality: 0.85,
          pointiness: 0,
          scale: cScale,
          roundMix: params.rockRoundMix,
          randomRotate: true
        }));
      }
      let rock = sdfUnion(stackParts, 0.025);
      // Optional surface jaggedness — two-octave 3-D noise displaces the
      // octahedral silhouette, breaking the clean diamond edges into
      // fractured rocky detail when the slider is above 0.
      rock = roughenSDF(rock, state.seed + ':lighthouseRock', params.rockJaggedness);
      // Lighthouse cylinder + lamp room + dome on top of the rock.
      const body = makeCylinderY(baseX, -0.10, 0.46, 0, 0.10);
      const lamp = makeCylinderY(baseX,  0.46, 0.62, 0, 0.14);
      const roof = makeSphere   (baseX,  0.70, 0, 0.12);
      const result = {
        sdf: sdfUnion([rock, body, lamp, roof], 0.035),
        camera: CAMERA.hero
      };
      // Beam dispatch: 'negative' carves a sky wedge, 'rays' draws a fan
      // of line strokes from the dome via the lighthouseBeam helper,
      // 'both' does both, 'off' does neither.
      const useNeg  = (params.beamStyle === 'negative' || params.beamStyle === 'both');
      const useRays = (params.beamStyle === 'rays'     || params.beamStyle === 'both');
      if (useNeg) {
        result.beamMask = {
          apex: [baseX, 0.70, 0],   // dome centre
          dirSx: -1.0,
          dirSy:  0.0,
          halfAngleDeg: 7
        };
      }
      if (useRays) {
        const numRays = params.beamRays != null ? params.beamRays : 34;
        const spreadDeg = params.beamSpreadDeg != null ? params.beamSpreadDeg : 7;
        result.extraStrokes = function (ctx) {
          // centerDeg = -90 → rays radiate to the LEFT (lighthouseBeam's

          return lighthouseBeam(ctx, [baseX, 0.70, 0], {
            numRays: numRays,
            centerDeg: -90,
            spreadDeg: spreadDeg,
            lengthVB: 1400
          });
        };

  cairn: {
    ui: [
      { id: 'stacks',         label: 'Stacks',         type: 'int',    min: 3,    max: 9,    step: 1,    default: 5    },
      { id: 'shardsPerStack', label: 'Shards/stack',   type: 'int',    min: 3,    max: 8,    step: 1,    default: 5    },
      { id: 'baseScale',      label: 'Base scale',     type: 'number', min: 0.20, max: 0.80, step: 0.02, default: 0.56 },
      { id: 'taper',          label: 'Taper',          type: 'number', min: 0.10, max: 0.85, step: 0.05, default: 0.55 },
      { id: 'flatness',       label: 'Flatness',       type: 'number', min: 0.30, max: 1.20, step: 0.05, default: 0.55 },
      { id: 'flatnessJitter', label: 'Flatness jitter',type: 'number', min: 0.00, max: 0.60, step: 0.05, default: 0.30 },
      { id: 'wobble',         label: 'Wobble',         type: 'number', min: 0.00, max: 0.15, step: 0.01, default: 0.05 },
      { id: 'smoothK',        label: 'Smooth K',       type: 'number', min: 0.00, max: 0.10, step: 0.005, default: 0.030 },
      { id: 'roundMix',       label: 'Round mix',      type: 'number', min: 0.00, max: 1.00, step: 0.05, default: 0.65 },
      { id: 'jaggedness',     label: 'Jaggedness',     type: 'number', min: 0.00, max: 0.20, step: 0.005, default: 0.080 }
    ],
    build: function (rng, state, params) {
      // Cairn — a pyramidal stack of weathered rocks. Each stack is a
      // small octahedral blob mixed with spheres (roundMix) so the
      // shards don't all look like diamonds. Each rock gets its own
      // randomized flatness within ±flatnessJitter so the silhouette
      // varies stone-to-stone rather than reading as repeated copies.
      // A higher smoothK softens the joins so adjacent rocks blend into
      // a single weathered mass. Multi-octave noise displacement
      // (controlled by jaggedness) adds rocky surface texture.
      const stacks = params.stacks;
      const rocks = [];
      let cy = -0.55;
      for (let i = 0; i < stacks; i++) {
        const t = stacks <= 1 ? 0 : i / (stacks - 1);
        const scale = params.baseScale * (1 - t * params.taper);
        const cx = (rng() - 0.5) * params.wobble;
        const cz = (rng() - 0.5) * params.wobble;
        const flatnessHere = params.flatness *
                             (1 + (rng() - 0.5) * 2 * params.flatnessJitter);
        const shardsHere = Math.max(2, params.shardsPerStack + (rng() < 0.5 ? -1 : 1));
        let rock = makeOctahedralBlobAt(rng, {
          center: [cx, cy, cz],
          nSpheres: shardsHere,
          smoothK: params.smoothK,
          spread: 0.45 + rng() * 0.25,
          verticality: flatnessHere,
          pointiness: 0,
          scale: scale,
          roundMix: params.roundMix,
          randomRotate: true
        });
        // Per-rock noise displacement (was applied to the UNION, which
        // smeared adjacent-rock valleys together). With per-rock
        // displacement and a sharp union, each rock keeps its own
        // weathered silhouette and the gaps between rocks stay visible.
        rock = roughenSDF(rock, state.seed + ':cairnRock' + i, params.jaggedness);
        rocks.push(rock);
        // Step between rocks: <1 = heavy overlap (rocks blend), 1 = touching,
        // >1 = visible gap. ~1.10 leaves a thin seam where the rocks meet
        // without floating apart.
        cy += scale * flatnessHere * 1.10;
      }
      // Sharp union — each rock silhouette stays distinct.
      const cairn = sdfUnion(rocks, 0);
      return cairn;
    }
  },

  iceberg: {
    ui: [
      { id: 'aboveSize',  label: 'Above-water size',  type: 'number', min: 0.20, max: 0.80, step: 0.02, default: 0.45 },
      { id: 'belowSize',  label: 'Below-water size',  type: 'number', min: 0.40, max: 1.50, step: 0.05, default: 1.00 },
      { id: 'pinnacle',   label: 'Pinnacle factor',   type: 'number', min: 0.00, max: 1.00, step: 0.05, default: 0.35 },
      { id: 'asymmetry',  label: 'Asymmetry',         type: 'number', min: 0.00, max: 0.50, step: 0.02, default: 0.18 },
      { id: 'aboveCount', label: 'Above shards',      type: 'int',    min: 2,    max: 8,    step: 1,    default: 5    },
      { id: 'belowCount', label: 'Below shards',      type: 'int',    min: 3,    max: 8,    step: 1,    default: 5    },
      { id: 'jaggedness', label: 'Jaggedness',        type: 'number', min: 0.00, max: 0.20, step: 0.005, default: 0.080 },
      { id: 'companion',  label: 'Companion berg',    type: 'enum',
        options: [{ value: 'yes', label: 'yes' }, { value: 'no', label: 'no' }], default: 'yes' },
      { id: 'companionSize', label: 'Companion size', type: 'number', min: 0.20, max: 0.80, step: 0.05, default: 0.45 }
    ],
    build: function (rng, state, params) {
      // Reference: glaciers calve into 6 main iceberg shapes (tabular,
      // wedge, dome, pinnacle, drydock, block). About 90 % of the mass
      // is submerged — the visible part is the asymmetric, jagged tip.
      // We build the above- and below-water portions separately so they
      // can be shaped independently, then smooth-merge them. Material
      // id 1 (dense) below water, 2 (bright) above — the cutoff is at
      // the actual ocean surface (y = -0.5), NOT y = 0.
      //
      // Everything is driven from `rng`, so changing the seed produces
      // a completely different iceberg silhouette each time.
      const WATER_Y = -0.5;
      // A consistent lean direction for the whole berg — both above and
      // below shards drift in the same direction so it reads as a
      // single tilted form rather than two unrelated piles.
      const leanDir = (rng() - 0.5) * 2; // -1..1
      const leanAmt = params.asymmetry;
      const aboveShards = [];
      const aboveCount = params.aboveCount;
      // Above-water: cluster of octahedral and conical shards stacked
      // somewhat asymmetrically. Higher shards get smaller and have a
      // chance to be tall thin "pinnacles" rather than chunky blocks.
      for (let i = 0; i < aboveCount; i++) {
        const t = aboveCount <= 1 ? 0.5 : i / (aboveCount - 1);
        // x position drifts in the lean direction toward the top.
        const cx = leanDir * leanAmt * (t * 0.8 + 0.2) +
                   (rng() - 0.5) * params.aboveSize * 0.55;
        // y rises from just above the water line to a peak.
        const baseHeight = WATER_Y + 0.05;
        const cy = baseHeight + t * params.aboveSize * 1.4 +
                   (rng() - 0.5) * 0.08;
        const cz = (rng() - 0.5) * params.aboveSize * 0.35;
        // Higher = smaller, occasionally pinnacled.
        const sz = (0.55 - t * 0.30) * params.aboveSize *
                   (0.65 + rng() * 0.45);
        const isPinnacle = (t > 0.45) && (rng() < params.pinnacle);
        if (isPinnacle) {
          // Tall thin cone, apex up.
          const peak = cy + sz * 1.4;
          const baseY = cy - sz * 0.2;
          aboveShards.push(makeConeY(cx, peak, baseY, cz, sz * 0.55));
        } else {
          // Random-rotated octahedron — breaks the regular pyramid grid.
          let o = makeOctahedron(0, 0, 0, sz);
          o = rotateY(o, rng() * Math.PI * 2);
          o = rotateX(o, (rng() - 0.5) * 0.6);
          o = rotateZ(o, (rng() - 0.5) * 0.6);
          o = translate(o, cx, cy, cz);
          aboveShards.push(o);
        }
      }
      // Below-water: wider, lower mass. Centred slightly opposite the
      // above-water lean (the bulk of the iceberg counterweights the tip)
      // and scattered laterally far enough to give the silhouette a wide
      // base where it intersects the water plane.
      const belowShards = [];
      const belowCount = params.belowCount;
      for (let i = 0; i < belowCount; i++) {
        const cx = -leanDir * leanAmt * 0.4 +
                   (rng() - 0.5) * params.belowSize * 1.0;
        const cy = WATER_Y - 0.10 - rng() * params.belowSize * 0.55;
        const cz = (rng() - 0.5) * params.belowSize * 0.45;
        const sz = (0.35 + rng() * 0.35) * params.belowSize;
        let o = makeOctahedron(0, 0, 0, sz);
        o = rotateY(o, rng() * Math.PI * 2);
        o = rotateX(o, (rng() - 0.5) * 0.5);
        o = translate(o, cx, cy, cz);
        belowShards.push(o);
      }
      // Smooth-min the two clusters so the iceberg reads as a single
      // mass with a continuous waterline rather than two stacks.
      let mainBerg = sdfUnion(aboveShards.concat(belowShards), 0.18);
      // Optional companion berg — a smaller iceberg floating off to one
      // side. Placed on the opposite side of the main lean so the pair
      // composes diagonally. Built with the same algorithm but at
      // ~companionSize scale, fewer shards, less pinnacle chance.
      let companion = null;
      let companionCx = 0;
      if (params.companion === 'yes') {
        const cScale = params.companionSize;
        // Place on the opposite side of the main berg's lean.
        const side = leanDir >= 0 ? -1 : 1;
        companionCx = side * (0.55 + rng() * 0.20);
        const compShards = [];
        // Above-water of companion: 2 small shards, occasionally a pinnacle.
        const aN = 2 + (rng() < 0.5 ? 0 : 1);
        for (let i = 0; i < aN; i++) {
          const t = aN <= 1 ? 0.5 : i / (aN - 1);
          const cx = companionCx + (rng() - 0.5) * cScale * 0.5;
          const cy = WATER_Y + 0.04 + t * cScale * 1.1 + (rng() - 0.5) * 0.05;
          const cz = (rng() - 0.5) * cScale * 0.30;
          const sz = (0.45 - t * 0.20) * cScale * (0.65 + rng() * 0.35);
          if (t > 0.6 && rng() < 0.4) {
            const peak = cy + sz * 1.3;
            const baseY = cy - sz * 0.2;
            compShards.push(makeConeY(cx, peak, baseY, cz, sz * 0.55));
          } else {
            let o = makeOctahedron(0, 0, 0, sz);
            o = rotateY(o, rng() * Math.PI * 2);
            o = rotateX(o, (rng() - 0.5) * 0.5);
            o = translate(o, cx, cy, cz);
            compShards.push(o);
          }
        }
        // Below-water of companion: 2-3 wider shards.
        const bN = 2 + Math.floor(rng() * 2);
        for (let i = 0; i < bN; i++) {
          const cx = companionCx + (rng() - 0.5) * cScale * 0.7;
          const cy = WATER_Y - 0.08 - rng() * cScale * 0.40;
          const cz = (rng() - 0.5) * cScale * 0.35;
          const sz = (0.30 + rng() * 0.25) * cScale;
          let o = makeOctahedron(0, 0, 0, sz);
          o = rotateY(o, rng() * Math.PI * 2);
          o = translate(o, cx, cy, cz);
          compShards.push(o);
        }
        companion = sdfUnion(compShards, 0.18);
      }
      let berg = companion ? sdfUnion([mainBerg, companion], 0) : mainBerg;
      // Surface jaggedness — three octaves of noise. The mid + fine
      // octaves break up the diamond facets; the big octave shapes
      // overall folds in the silhouette.
      berg = roughenSDF(berg, state.seed + ':icebergNoise',
                        params.jaggedness, [5, 14, 32]);
      return {
        sdf: berg,
        // Material cutoff is the WATER LINE (y = GROUND_Y = -0.5).
        // Above-water = material 2 (bright/sparse, sun-struck ice).
        // Below-water = material 5 (very dense, darknessShift +0.45) —
        // darker than the old material 1 (+0.30) per user request.
        materialFn: function (x, y, z) {
          // 3-tier shading for better tonal range:
          //   y > 0          → material 6 (very sparse / -0.45)  : sun-struck peak
          //   WATER_Y < y < 0 → material 2 (sparse / -0.30)        : mid above-water body
          //   y < WATER_Y    → material 5 (very dense / +0.45)    : drowned mass
          if (y > 0)        return 6;
          if (y > WATER_Y)  return 2;
          return 5;
        }
      };
    }
  },
  forest: {
    ui: [
      { id: 'style', label: 'Style', type: 'enum',
        options: [
          { value: 'conifer',   label: 'conifer'   },
          { value: 'oldgrowth', label: 'old-growth'},
          { value: 'winter',    label: 'winter'    },
          { value: 'mixed',     label: 'mixed'     }
        ], default: 'conifer' },
      { id: 'treeCount',   label: 'Tree count',   type: 'int',    min: 8,    max: 50,   step: 1,    default: 28   },
      { id: 'depthLayers', label: 'Depth layers', type: 'int',    min: 1,    max: 6,    step: 1,    default: 4    },
      { id: 'depthFade',   label: 'Depth fade',   type: 'number', min: 0.00, max: 1.00, step: 0.05, default: 0.65 },
      { id: 'sizeJitter',  label: 'Size jitter',  type: 'number', min: 0.00, max: 0.80, step: 0.05, default: 0.40 },
      { id: 'heroTree',    label: 'Hero tree',    type: 'enum',
        options: [{ value: 'yes', label: 'yes' }, { value: 'no', label: 'no' }], default: 'yes' },
      { id: 'heroSide',    label: 'Hero side',    type: 'enum',
        options: [{ value: 'left', label: 'left' }, { value: 'right', label: 'right' }], default: 'left' },
      { id: 'heroScale',   label: 'Hero scale',   type: 'number', min: 1.20, max: 3.20, step: 0.10, default: 2.00 }
    ],
    build: function (rng, state, params) {
      // Forest scene with four tree styles and depth-layered placement.
      // Each tree is tagged with its depth layer; the materialFn sweeps
      // distant trees toward the bright/sparse material so they fade
      // into atmospheric haze (misty receding depth).
      const trees = [];
      const N = params.treeCount;
      const L = params.depthLayers;
      for (let i = 0; i < N; i++) {
        const layer = Math.floor(rng() * L);
        const t = L <= 1 ? 0 : layer / (L - 1);
        // Deeper layer = farther in z, slightly compressed in x.
        const cx = (rng() - 0.5) * (1.7 - t * 0.7);
        const cz = -0.15 + t * 0.45 + (rng() - 0.5) * 0.20;
        // Per-tree size variation. Deeper trees are smaller (perspective).
        const baseHeight = 0.55 + rng() * params.sizeJitter * 1.5;
        const heightScale = (1 - t * 0.45) * baseHeight;
        const trunkR = (0.025 + rng() * 0.02) * (1 - t * 0.40);
        const canopyR = 0.14 * baseHeight + rng() * 0.03;
        trees.push(buildForestTreeBody(rng, params.style, cx, cz, trunkR, canopyR, baseHeight, heightScale));
      }
      // Foreground HERO tree — much larger than the rest, positioned
      // off-centre via heroSide. Lives in the closest depth layer (negative
      // z) so it dominates the composition while the background grove
      // recedes through the misty depth-fade tiers.
      if (params.heroTree === 'yes') {
        const H = params.heroScale;
        const hx = (params.heroSide === 'left' ? -1 : 1) * 0.55;
        const hz = -0.32;
        trees.push(buildForestTreeHero(rng, params.style, hx, hz, 0.038 * H, 0.18 * H, H));
      }
      return {
        sdf: sdfUnion(trees, 0),
        // Misty receding depth: distant trees (high z) get material 4
        // (medium-sparse, lighter hatching) so they fade into atmospheric
        // haze. The threshold scales with depthFade so the user can dial
        // the mist intensity.
        materialFn: function (x, y, z) {
          if (params.depthFade <= 0.01) return 0;
          // Trees with cz > zFar are 'distant' → material 6 (very sparse).
          // Trees with cz > zMid are 'mid' → material 4.
          const zFar = 0.20 - 0.10 * params.depthFade;
          const zMid = -0.05;
          if (z > zFar) return 6;
          if (z > zMid) return 4;
          return 0;
        }
      };
    }
  },
  balloons: function (rng, state) {

    }
    return sdfUnion(items, 0);
  },
  volcano: {
    ui: [
      { id: 'mountainRadius', label: 'Mountain radius', type: 'number', min: 0.50, max: 1.80, step: 0.05, default: 1.20 },
      { id: 'mountainHeight', label: 'Mountain height',type: 'number', min: 0.30, max: 1.20, step: 0.05, default: 0.60 },
      { id: 'mountainNoise',  label: 'Slope noise',    type: 'number', min: 0.00, max: 0.12, step: 0.005, default: 0.030 },
      { id: 'smokeHeight',    label: 'Smoke height',   type: 'number', min: 0.40, max: 1.50, step: 0.05, default: 1.10 },
      { id: 'smokeBaseR',     label: 'Smoke base r',   type: 'number', min: 0.03, max: 0.15, step: 0.01, default: 0.07 },
      { id: 'smokeTaper',     label: 'Smoke taper',    type: 'number', min: 0.10, max: 1.20, step: 0.05, default: 0.55 },
      { id: 'smokeDrift',     label: 'Smoke drift',    type: 'number', min: 0.00, max: 0.35, step: 0.02, default: 0.18 },
      { id: 'smokeWisps',     label: 'Smoke pieces',   type: 'int',    min: 6,    max: 18,   step: 1,    default: 12   },
