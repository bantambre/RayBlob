      { id: 'cameraYaw',      label: 'Cam yaw (°)',    type: 'number', min: 0,    max: 30,   step: 1,    default: 14   }
    ],
    build: function (rng, state, params) {
      // Stratovolcano — wide conical mountain with a tall wispy plume
      // rising from the summit. The mountain is sized to dominate the
      // frame (base extends across most of the page width, apex well
      // above the horizon). The smoke is built from small spheres that
      // TAPER as they rise, drift laterally with accumulating offset,
      // and are smoothed lightly so individual puffs stay distinct
      // (instead of forming one fat column). A noise displacement on
      // top of the plume gives wispy irregular edges.
      const horizonY = -0.50;
      const apexY = horizonY + params.mountainHeight;
      const baseY = horizonY - 0.15;        // base extends slightly below the visible ground
      let mountain = makeConeY(0, apexY, baseY, 0, params.mountainRadius);
      // Slight noise on the slopes so it doesn't read as a perfect
      // geometric cone — adds erosion / weathering detail.
      mountain = roughenSDF(mountain, state.seed + ':volcanoMountain',
                            params.mountainNoise, [5, 14, 32], [0.55, 0.30, 0.15]);
      // Build the smoke as small spheres along an upward path. Radius
      // tapers from baseR at the bottom to baseR × smokeTaper at the top.
      // Drift accumulates with t² so the plume curves more strongly higher up.
      const smokeParts = [];
      const N = params.smokeWisps;
      // Smoke originates just above the mountain apex.
      const smokeStartY = apexY - 0.02;
      let accumDx = 0;
      let accumDz = 0;
      for (let i = 0; i < N; i++) {
        const t = N <= 1 ? 0.5 : i / (N - 1);
        const y = smokeStartY + t * params.smokeHeight;
        // Per-step drift, weighted higher up.
        const stepDrift = params.smokeDrift * (0.2 + t * 1.4);
        accumDx += (rng() - 0.5) * stepDrift * 0.30;
        accumDz += (rng() - 0.5) * stepDrift * 0.20;
        const r = params.smokeBaseR *
                  (1 - t * (1 - params.smokeTaper)) *
                  (0.70 + rng() * 0.50);
        smokeParts.push(makeSphere(accumDx, y, accumDz, r));
      }
      // Smoke fluidity: smaller smoothK = puffs blend into a continuous
      // tube. The previous version (0.04) left each puff visible as a
      // bulge, which read as "fake" puffballs. Default 0.025 merges them
      // smoothly so the noise displacement below shapes the silhouette
      // rather than the discrete spheres.
      let smoke = sdfUnion(smokeParts, params.smokeFluidity);
      // Gentle twist around y for natural curl as the plume rises.
      smoke = twistY(smoke, 1.0);
      // Surface breakup — multi-octave noise carves the smooth tube into
      // realistic wispy filaments. Default amplitude bumped 0.030 → 0.070
      // so the silhouette is genuinely ragged rather than slightly
      // textured.
      if (params.smokeBreakup > 0) {
        const n3 = makeNoise3D(state.seed + ':volcanoSmoke');
        smoke = displace(smoke, function (x, y, z) {
          return 0.50 * n3(x *  5, y *  4, z *  5) +
                 0.30 * n3(x * 14, y * 12, z * 14) +
                 0.20 * n3(x * 35, y * 30, z * 35);
        }, params.smokeBreakup);
      }
      // Sharp union between mountain and smoke so the silhouette change
      // at the summit reads as 'rock ends, smoke starts'.
      return {
        sdf: sdfUnion([mountain, smoke], 0.03),
        camera: { tiltDeg: 6, yawDeg: params.cameraYaw }
      };
    }
  },

      { id: 'spirePosition',label: 'Spire',         type: 'enum',
        options: [
          { value: 'center', label: 'center' },
          { value: 'left',   label: 'left tower' },
          { value: 'right',  label: 'right tower' }
        ], default: 'center' },
      { id: 'flyingButtress',label: 'Buttresses',   type: 'enum',
        options: [{ value: 'yes', label: 'yes' }, { value: 'no', label: 'no' }], default: 'yes' },
      { id: 'roseWindow',   label: 'Rose window',   type: 'enum',
        options: [{ value: 'yes', label: 'yes' }, { value: 'no', label: 'no' }], default: 'yes' }
    ],
    build: function (rng, state, params) {
      // Gothic cathedral facade — central nave body flanked by two
      // square towers, with a tall thin spire either crowning the
      // central body or one of the towers. A rose window pierces the
      // front of the nave; tall lancet arches carve into the towers.
      // Optional flying buttresses on each side give the recognisable
      // gothic profile.
      const parts = [];
      const carvers = [];
      const groundY = GROUND_Y;
      const bw = params.bodyWidth;
      const bh = params.bodyHeight;
      const bd = params.bodyDepth;
      const bodyCY = groundY + bh;             // body box center y
      const bodyTopY = groundY + 2 * bh;
      // ─── Central body ────────────────────────────────────────────
      parts.push(makeBox(0, bodyCY, 0, bw, bh, bd, 0.012));
      // Pitched roof: cone-ish ridge running front-to-back (use a
      // narrow box behind a slightly taller box gives an OK gable).
      parts.push(makeBox(0, bodyTopY + 0.04, 0, bw * 0.92, 0.04, bd * 0.96, 0.012));
      // ─── Side towers ─────────────────────────────────────────────
      const tw = bw * 0.40;                    // tower half-width
      const tx = bw + tw * 0.5;                // tower center x
      const towerH = params.towerHeight;
      const towerCY = groundY + towerH;
      const towerTopY = groundY + 2 * towerH;
      const towerDepth = bd * 0.85;
      parts.push(makeBox(-tx, towerCY, 0, tw, towerH, towerDepth, 0.012));
      parts.push(makeBox( tx, towerCY, 0, tw, towerH, towerDepth, 0.012));
      // Crenellated tower caps — a slightly wider belt at the top.
      parts.push(makeBox(-tx, towerTopY + 0.02, 0, tw * 1.10, 0.025, towerDepth * 1.05, 0.006));
      parts.push(makeBox( tx, towerTopY + 0.02, 0, tw * 1.10, 0.025, towerDepth * 1.05, 0.006));
      // ─── Spire ───────────────────────────────────────────────────
      let spireBaseX = 0;
      let spireBaseY = bodyTopY + 0.08;        // sits on the gable
      if (params.spirePosition === 'left')  { spireBaseX = -tx; spireBaseY = towerTopY + 0.05; }
      if (params.spirePosition === 'right') { spireBaseX =  tx; spireBaseY = towerTopY + 0.05; }
      const spireBaseR = (params.spirePosition === 'center') ? bw * 0.18 : tw * 0.55;
      const spireApex = spireBaseY + params.spireHeight;
      parts.push(makeConeY(spireBaseX, spireApex, spireBaseY, 0, spireBaseR));
      // Tiny pinnacle ball at the very top of the spire — finial.
      parts.push(makeSphere(spireBaseX, spireApex + 0.018, 0, 0.012));
      // ─── Flying buttresses ──────────────────────────────────────
      if (params.flyingButtress === 'yes') {
        for (const side of [-1, 1]) {
          // Two buttress arches per side, tying tower base to body top.
          for (const fz of [-bd * 0.45, bd * 0.45]) {
            const x0 = side * bw;             // anchored at body wall
            const x1 = side * (bw + tw * 0.85); // anchored at tower outer wall
            const y0 = bodyCY + bh * 0.3;     // mid-body height (arch springs from here)
            const y1 = groundY + 0.10;        // sloping down to tower base
            const seg = makeCapsuleX(0, 0, 0, Math.abs(x1 - x0) * 0.5, 0.018);
            const dx = (x1 - x0), dy = (y1 - y0);
            const ang = Math.atan2(dy, dx);
            let buttress = rotateZ(seg, ang);
            buttress = translate(buttress, (x0 + x1) * 0.5, (y0 + y1) * 0.5, fz);
            parts.push(buttress);
          }
        }
      }
      // ─── Rose window cutout ─────────────────────────────────────
      if (params.roseWindow === 'yes') {
        const roseY = bodyCY + bh * 0.10;
        const roseR = Math.min(bw * 0.45, bh * 0.45);
        carvers.push(makeSphere(0, roseY, -bd - 0.02, roseR));
      }
      // ─── Lancet window slits in the towers ──────────────────────
      // Tall pointed-arch openings, two per tower, on the front face.
      const slitR = tw * 0.22;
      for (const side of [-1, 1]) {
        for (const yi of [0, 1]) {
          const sy = groundY + towerH * (0.55 + yi * 0.45);
          carvers.push(makeCapsuleZ(side * tx, sy, -towerDepth - 0.02,
                                    towerDepth * 0.6, slitR));
        }
      }
      const facade = sdfSubtract(sdfUnion(parts, 0.012), carvers);
      return {
        sdf: facade,
        camera: { tiltDeg: 6, distance: 3.2 }
      };
    }
  },
  mengerSponge: {
    ui: [
      { id: 'cubeSize',  label: 'Cube size',   type: 'number', min: 0.08, max: 0.20, step: 0.01, default: 0.13 },
      { id: 'pedestal',  label: 'Pedestal',    type: 'enum',
        options: [{ value: 'yes', label: 'yes' }, { value: 'no', label: 'no' }], default: 'yes' },
      { id: 'noise',     label: 'Surface noise', type: 'number', min: 0.000, max: 0.030, step: 0.002, default: 0.008 },
      { id: 'yawDeg',    label: 'Cam yaw (°)', type: 'number', min: 0,    max: 45,   step: 1,    default: 28   }
    ],
    build: function (rng, state, params) {
      // Menger sponge level 1: 3x3x3 grid of unit cubes with the seven
      // "centre" cubes removed (body centre + 6 face centres). Cube
      // is dropped if ≥2 of its three index coordinates are 1.
      //
      // Sits on an optional two-tier stone pedestal (museum sculpture
      // composition) and gets a subtle 3-D noise displacement so the
      // cubes don't read as perfectly geometric — just enough surface
      // weathering to give them character without losing the fractal
      // structure.
      const half = params.cubeSize;
      const step = half * 2;
      const cubes = [];
      for (let ix = 0; ix < 3; ix++) {
        for (let iy = 0; iy < 3; iy++) {
          for (let iz = 0; iz < 3; iz++) {
            const centerCount = (ix === 1 ? 1 : 0) + (iy === 1 ? 1 : 0) + (iz === 1 ? 1 : 0);
            if (centerCount >= 2) continue;
            cubes.push(makeBox(
              -step + ix * step,
              -0.06 + iy * step,
              -step + iz * step,
              half, half, half, 0.006
            ));
          }
        }
      }
      let menger = sdfUnion(cubes, 0);
      menger = roughenSDF(menger, state.seed + ':mengerNoise',
                          params.noise, [14, 30, 60], [0.55, 0.30, 0.15]);
      const all = [menger];
      if (params.pedestal === 'yes') {
        // Upper plinth (closer to the sponge).
        all.push(makeBox(0, -0.40, 0, step * 1.8, 0.05, step * 1.8, 0.012));
        // Wider lower plinth (sits on the ground).
        all.push(makeBox(0, -0.48, 0, step * 2.2, 0.06, step * 2.2, 0.015));
      }
      return {
        sdf: sdfUnion(all, 0),
        camera: { tiltDeg: 6, yawDeg: params.yawDeg }
      };
    }
  },
  mobius: function (rng, state) {
    // 32 thin flat band segments around a loop, each rotated around its
    // radial axis by twist = i/n × π. After a full loop the band has
    // half-turned — the defining property of a Möbius strip.
    const parts = [];
    const n = 32;
    const radius = 0.32;
    for (let i = 0; i < n; i++) {
      const phi = (i / n) * Math.PI * 2;
      const twist = (i / n) * Math.PI;
      const seg = makeBox(0, 0, 0, 0.05, 0.006, 0.04, 0.004);
      const twisted = rotateX(seg, twist);
      const positioned = rotateY(twisted, phi);
      parts.push(translate(
        positioned,
        Math.cos(phi) * radius,
        0,
        -Math.sin(phi) * radius
      ));
    }
    return { sdf: sdfUnion(parts, 0.010), camera: CAMERA.topDown };
  },
  dinoRibcage: function (rng, state) {
    // Central spine + paired arcing ribs. Each rib is 4 short capsule
    // segments at progressively larger angles off vertical, joined
    // tip-to-tip — a piecewise-linear approximation of a curving rib.
    const parts = [];
    parts.push(makeCapsuleX(0, 0.15, 0, 0.34, 0.028));
    const nRibs = 9;
    const segLen = 0.06;
    const segR = 0.013;
    const yStart = 0.13;
    for (let i = 0; i < nRibs; i++) {
      const xSpine = -0.30 + i * (0.60 / (nRibs - 1));
      for (let side = -1; side <= 1; side += 2) {
        let yCur = yStart;
        let zCur = 0;
        for (let j = 0; j < 4; j++) {
          const tilt = (j / 3) * 0.65 * side;
          const dy = -Math.cos(tilt) * segLen * 2;
          const dz = Math.sin(tilt) * segLen * 2;
          const yMid = yCur + dy / 2;
          const zMid = zCur + dz / 2;
          const seg = makeCapsuleX(0, 0, 0, segLen, segR);
          const vertical = rotateZ(seg, Math.PI / 2);
          const tilted = rotateX(vertical, tilt);
          parts.push(translate(tilted, xSpine, yMid, zMid));
          yCur += dy;
          zCur += dz;
        }
      }
    }
    return sdfUnion(parts, 0.012);
  },
  wave: function (rng, state) {
    // A line of wave-crest shapes — small spheres along a sine curve
    // across the foreground, smooth-merged into a continuous undulating
    // ridge of water.
    const parts = [];
    const n = 14;
    for (let i = 0; i < n; i++) {
      const xt = i / (n - 1);
      const x = -0.70 + xt * 1.40;
      const y = -0.10 + Math.sin(xt * 8) * 0.06;
      parts.push(makeSphere(x, y, 0, 0.080));
    }
    return sdfUnion(parts, 0.06);
  },
  submerged: function (rng, state) {
    // 3 wavy kelp stalks rising from a low seabed hill. Each stalk is
    // a stack of small spheres whose x-position undulates with height.
    const parts = [];
    parts.push(makeBlobSDFAt(rng, {
      center: [0, -0.50, 0],
      nSpheres: 3,
      smoothK: 0.40,

      verticality: 0.3,

    }));

        const y = -0.35 + yt * 0.72;
        const wob = Math.sin(yt * 6 + s * 2) * 0.045;

  },
  schotter: function (rng, state) {
    // Grid of unit boxes, each row progressively more random in rotation
    // and position — homage to Georg Nees' Schotter (1968).
    const parts = [];
    const rows = 6, cols = 7;
    const unit = makeBox(0, 0, 0, 0.055, 0.040, 0.040, 0.005);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const chaos = r / rows;
        const x = -0.46 + c * 0.13 + (rng() - 0.5) * chaos * 0.05;
        const y = -0.36 + r * 0.10 + (rng() - 0.5) * chaos * 0.03;
        const z = (rng() - 0.5) * chaos * 0.10;
        const angle = (rng() - 0.5) * chaos * 1.8;
        parts.push(translate(rotateY(unit, angle), x, y, z));
      }
    }
    return sdfUnion(parts, 0);
  },
  spiralStaircase: function (rng, state) {
    // 12 steps spiralling up around a central column.
    const parts = [];
    parts.push(makeCylinderY(0, -0.55, 0.55, 0, 0.045));
    const nSteps = 12;
    const radius = 0.18;
    const step = makeBox(0, 0, 0, 0.13, 0.015, 0.05, 0.005);
    for (let i = 0; i < nSteps; i++) {
      const angle = i * (Math.PI / 6);
      const y = -0.50 + i * 0.085;
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      parts.push(translate(rotateY(step, angle), x, y, z));
    }
    return sdfUnion(parts, 0);
  },
  whaleBreach: function (rng, state) {
    // Whale body as a long horizontal capsule with a tail box at one end,
    // rotated 50° around Z so the body points up and to the right —
    // mid-breach silhouette.
    const body = makeCapsuleX(0, 0, 0, 0.28, 0.10);
    const tailFin = makeBox(-0.34, 0, 0, 0.025, 0.10, 0.04, 0.005);
    const whale = sdfUnion([body, tailFin], 0.05);
    return translate(rotateZ(whale, -55 * Math.PI / 180), 0.05, 0.05, 0);
  },
  coral: function (rng, state) {
    // Branching coral: base sphere + four V-branches + tip spheres.
    // Each branch is a capsuleX rotated and translated to join its
    // start to its end point in screen space.
    function branch(x0, y0, x1, y1, r) {
      const dx = x1 - x0, dy = y1 - y0;
      const len = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx);
      const mid = makeCapsuleX(0, 0, 0, len / 2, r);
      return translate(rotateZ(mid, angle), (x0 + x1) / 2, (y0 + y1) / 2, 0);
    }
    return sdfUnion([
      makeSphere(0, -0.45, 0, 0.08),
      branch( 0,    -0.42, -0.10, -0.10, 0.040),
      branch(-0.10, -0.10, -0.22,  0.20, 0.028),
      branch(-0.10, -0.10,  0.02,  0.22, 0.028),
      branch( 0,    -0.42,  0.12, -0.05, 0.040),
      branch( 0.12, -0.05,  0.24,  0.22, 0.028),
      branch( 0.12, -0.05,  0.07,  0.20, 0.028),
      makeSphere(-0.22,  0.20, 0, 0.045),
      makeSphere( 0.02,  0.22, 0, 0.045),
      makeSphere( 0.24,  0.22, 0, 0.045),
      makeSphere( 0.07,  0.20, 0, 0.045)
    ], 0.025);
  },
  rain: function (rng, state) {
    // Low ridge silhouette + scattered short slanted dashes across the sky.
    const ridge = makeBlobSDFAt(rng, {
      center: [0, -0.35, 0],
      nSpheres: 3,
      smoothK: 0.40,
      spread: 1.3,
      verticality: 0.4,

    });

  domainRepeat: function (rng, state) {
    // Tall narrow column repeated on a 2D grid in x and z, intersected
    // with a bounding box so the lattice doesn't fill the entire scene,
    // then warped with low-frequency noise so the lattice wobbles.
    const unit = makeCylinderY(0, -0.30, 0.20, 0, 0.040);
    const grid = repeat(unit, 0.18, 0, 0.18);
    const n3 = makeNoise3D(state.seed + ':repeatWobble');
    function wobble(x, y, z) {
      return [
        n3(x * 2.0, y * 2.0, z * 2.0) * 0.05 - 0.025,
        0,
        n3(x * 2.0 + 11, y * 2.0 + 11, z * 2.0 + 11) * 0.05 - 0.025
      ];
    }
    const wobbled = warp(grid, wobble);
    const bound = makeBox(0, -0.05, 0, 0.55, 0.30, 0.30, 0.02);
    return sdfIntersect([wobbled, bound]);
  },
  bonsai: function (rng, state) {
    // Seed-driven bonsai: pot + curved gnarled trunk + recursive
    // branching with foliage clusters at the tips. Every position,
    // angle, length, and choice consumes rng so each seed produces a
    // distinct tree. Randomize-reseeds change the silhouette entirely.
    const parts = [];
    // Pot at the base.
    parts.push(makeBox(0, -0.30, 0, 0.16, 0.045, 0.11, 0.022));
    // Lip rim on the pot.
    parts.push(makeBox(0, -0.245, 0, 0.17, 0.012, 0.115, 0.006));
    // Trunk: curving stack of short cylinders + occasional knot bulges.
    const trunkSegs = 6;
    let tx = 0, ty = -0.255, tz = 0;
    let trunkR = 0.028;
    const lean = (rng() - 0.5) * 0.10;   // overall trunk lean
    const sway = 0.35 + rng() * 0.35;    // sway amplitude
    for (let i = 0; i < trunkSegs; i++) {
      const t = i / trunkSegs;
      const segH = 0.05 + rng() * 0.025;
      const nextY = ty + segH;
      const nextX = tx + lean * 0.03 + Math.sin(t * sway * 6) * 0.012 + (rng() - 0.5) * 0.012;
      const nextZ = tz + (rng() - 0.5) * 0.010;
      parts.push(makeCylinderY((tx + nextX) * 0.5, ty, nextY, (tz + nextZ) * 0.5, trunkR));
      // Occasional knot — a bulged sphere on the side of the trunk.
      if (rng() < 0.5) {
        parts.push(makeSphere(tx + (rng() - 0.5) * 0.04, ty + segH * 0.5, tz, trunkR * 1.15));
      }
      tx = nextX; ty = nextY; tz = nextZ;
      trunkR *= 0.86;
    }
    // Main branches — 3-5 of them, anchored partway up the trunk.
    const nMain = 3 + Math.floor(rng() * 3);
    for (let b = 0; b < nMain; b++) {
      const anchorT = 0.35 + b * (0.55 / nMain) + rng() * 0.08;
      const ax = lean * anchorT + Math.sin(anchorT * sway * 6) * 0.012;
      const ay = -0.255 + anchorT * 0.40;
      // Branch heading — random yaw in [-π, π], gentle lift.
      const yaw = (rng() - 0.5) * Math.PI * 1.5;
      const lift = 0.20 + rng() * 0.45;
      const len = 0.10 + rng() * 0.06;
      const bx = ax + Math.cos(yaw) * len;
      const by = ay + lift * len;
      const bz = Math.sin(yaw) * len * 0.6;
      // Branch segment as an oriented capsule (capsule on origin, then
      // rotate+translate to (a→b)).
      const branchR = 0.012 + rng() * 0.008;
      const dx = bx - ax, dy = by - ay, dz = bz - 0;
      const segLen = Math.hypot(dx, dy, dz);
      let seg = makeCapsuleX(0, 0, 0, segLen * 0.5, branchR);
      const elev = Math.atan2(dy, Math.hypot(dx, dz));
      const az   = Math.atan2(dz, dx);
      seg = rotateZ(seg, elev);
      seg = rotateY(seg, -az);
      seg = translate(seg, (ax + bx) * 0.5, (ay + by) * 0.5, bz * 0.5);
      parts.push(seg);
      // Sub-branches — 2-3 short twigs at the tip.
      const nSub = 2 + Math.floor(rng() * 2);
      const tipSpheres = [];
      for (let s = 0; s < nSub; s++) {
        const subYaw = yaw + (rng() - 0.5) * 1.0;
        const subLen = len * (0.45 + rng() * 0.35);
        const subLift = lift * 0.6 + (rng() - 0.5) * 0.15;
        const sx = bx + Math.cos(subYaw) * subLen;
        const sy = by + subLift * subLen;
        const sz = bz + Math.sin(subYaw) * subLen * 0.6;
        const sdx = sx - bx, sdy = sy - by, sdz = sz - bz;
        const sL = Math.hypot(sdx, sdy, sdz);
        let sub = makeCapsuleX(0, 0, 0, sL * 0.5, branchR * 0.65);
        const sElev = Math.atan2(sdy, Math.hypot(sdx, sdz));
        const sAz   = Math.atan2(sdz, sdx);
        sub = rotateZ(sub, sElev);
        sub = rotateY(sub, -sAz);
        sub = translate(sub, (bx + sx) * 0.5, (by + sy) * 0.5, (bz + sz) * 0.5);
        parts.push(sub);
        tipSpheres.push([sx, sy, sz]);
      }
      // Foliage cluster — 2-4 overlapping spheres at the branch tips.
      const nFoliage = 2 + Math.floor(rng() * 3);
      for (let f = 0; f < nFoliage; f++) {
        const tip = tipSpheres[f % tipSpheres.length];
        const r = 0.030 + rng() * 0.022;
        parts.push(makeSphere(
          tip[0] + (rng() - 0.5) * 0.04,
          tip[1] + (rng() - 0.5) * 0.025 + 0.015,
          tip[2] + (rng() - 0.5) * 0.025,
          r
        ));
      }
    }
    return sdfUnion(parts, 0.020);
  },
  gnarledTree: function (rng, state) {
    // Seed-driven gnarled old tree: thick recursive trunk with knots,
    // 4-6 major branches splitting into sub-branches, foliage clumps.
    const parts = [];
    // Wider base flare.
    parts.push(makeSphere(0, -0.46, 0, 0.075));
    // Trunk: stack of cylinder segments with knot bulges.
    const trunkSegs = 7;
    let tx = 0, ty = -0.46, tz = 0;
    let trunkR = 0.045;
    const lean = (rng() - 0.5) * 0.10;
    const sway = 0.30 + rng() * 0.35;
    const stopY = -0.05 + rng() * 0.10;
    for (let i = 0; i < trunkSegs; i++) {
      const t = i / trunkSegs;
      const segH = (stopY - (-0.46)) / trunkSegs;
      const nextY = ty + segH;
      const nextX = tx + lean * 0.04 + Math.sin(t * sway * 5) * 0.020 + (rng() - 0.5) * 0.015;
      const nextZ = tz + (rng() - 0.5) * 0.010;
      parts.push(makeCylinderY((tx + nextX) * 0.5, ty, nextY, (tz + nextZ) * 0.5, trunkR));
      // Knot bulge.
      if (rng() < 0.45) {
        const kSide = rng() < 0.5 ? -1 : 1;
        parts.push(makeSphere(tx + kSide * trunkR * 0.7, ty + segH * 0.5, tz, trunkR * 1.10));
      }
      tx = nextX; ty = nextY; tz = nextZ;
      trunkR *= 0.92;
    }
    // Major branches — 4-6 of them.
    const nMain = 4 + Math.floor(rng() * 3);
    for (let b = 0; b < nMain; b++) {
      const anchorT = 0.40 + b * (0.55 / nMain) + rng() * 0.06;
      const ax = lean * anchorT + Math.sin(anchorT * sway * 5) * 0.020;
      const ay = -0.46 + anchorT * 0.55;
      const yaw = (rng() - 0.5) * Math.PI * 1.8;
      const lift = 0.35 + rng() * 0.55;
      const len = 0.13 + rng() * 0.10;
      const bx = ax + Math.cos(yaw) * len;
      const by = ay + lift * len;
      const bz = Math.sin(yaw) * len * 0.55;
      const branchR = 0.018 + rng() * 0.010;
      const dx = bx - ax, dy = by - ay, dz = bz - 0;
      const segLen = Math.hypot(dx, dy, dz);
      let seg = makeCapsuleX(0, 0, 0, segLen * 0.5, branchR);
      const elev = Math.atan2(dy, Math.hypot(dx, dz));
      const az   = Math.atan2(dz, dx);
      seg = rotateZ(seg, elev);
      seg = rotateY(seg, -az);
      seg = translate(seg, (ax + bx) * 0.5, (ay + by) * 0.5, bz * 0.5);
      parts.push(seg);
      // Sub-branches — 2-4 short twigs.
      const nSub = 2 + Math.floor(rng() * 3);
      const tipSpheres = [];
      for (let s = 0; s < nSub; s++) {
        const subYaw = yaw + (rng() - 0.5) * 1.1;
        const subLen = len * (0.45 + rng() * 0.40);
        const subLift = lift * 0.7 + (rng() - 0.5) * 0.20;
        const sx = bx + Math.cos(subYaw) * subLen;
        const sy = by + subLift * subLen;
        const sz = bz + Math.sin(subYaw) * subLen * 0.55;
        const sdx = sx - bx, sdy = sy - by, sdz = sz - bz;
        const sL = Math.hypot(sdx, sdy, sdz);
        let sub = makeCapsuleX(0, 0, 0, sL * 0.5, branchR * 0.55);
        const sElev = Math.atan2(sdy, Math.hypot(sdx, sdz));
        const sAz   = Math.atan2(sdz, sdx);
        sub = rotateZ(sub, sElev);
        sub = rotateY(sub, -sAz);
        sub = translate(sub, (bx + sx) * 0.5, (by + sy) * 0.5, (bz + sz) * 0.5);
        parts.push(sub);
        tipSpheres.push([sx, sy, sz]);
      }
      // Foliage clumps at the tips — 3-5 spheres.
      const nFoliage = 3 + Math.floor(rng() * 3);
      for (let f = 0; f < nFoliage; f++) {
        const tip = tipSpheres[f % tipSpheres.length];
        const r = 0.050 + rng() * 0.040;
        parts.push(makeSphere(
          tip[0] + (rng() - 0.5) * 0.06,
          tip[1] + (rng() - 0.5) * 0.035 + 0.020,
          tip[2] + (rng() - 0.5) * 0.040,
          r
        ));
      }
    }
    return sdfUnion(parts, 0.025);

  revolutionProfile: function (rng, state) {
    // Classical urn revolved around Y. The profile is a connected
    // tall box (the urn's wall) plus a wider circle (the belly)
    // plus a wider foot and flared lip — all overlapping so nothing
    // floats. Per-seed jitter on radii and heights varies the
    // silhouette between squat amphora and tall narrow vase shapes.
    const footR    = 0.090 + rng() * 0.040;          // 0.09–0.13
    const stemR    = 0.040 + rng() * 0.025;          // 0.04–0.065
    const bellyY   = -0.10 + rng() * 0.14;           // -0.10..+0.04
    const bellyR   = 0.13 + rng() * 0.07;            // 0.13–0.20
    const bellyH   = 0.18 + rng() * 0.10;            // height of belly oval
    const neckR    = stemR * (0.85 + rng() * 0.30);  // 0.034–0.085
    const lipR     = footR * (0.85 + rng() * 0.40);  // ~0.08–0.18
    const baseY    = -0.42;
    const topY     = 0.30 + rng() * 0.10;            // 0.30–0.40
    // The CENTRAL COLUMN — a tall thin box that runs the full height of
    // the urn so the foot, belly, neck, and lip are all anchored to the
    // same continuous spine. Without this the smooth-union gaps between
    // disjoint elements made the foot look like it floated.
    const columnH = (topY - baseY) * 0.5;
    const columnCY = (topY + baseY) * 0.5;
    const profile = sdfUnion([
      // Central column (the urn's wall).
      box2D(stemR * 0.80, columnCY, stemR * 0.80, columnH, 0.012),
      // Foot ring at the base — wider disc.
      box2D(footR, baseY + 0.020, footR, 0.020, 0.012),
      // Foot upper rim — gentle taper into the column.
      box2D(footR * 0.70, baseY + 0.060, footR * 0.70, 0.020, 0.010),
      // Belly — fat oval midway up.
      circle2D(bellyR, bellyY, bellyH * 0.55),
      // Belly lower shoulder — keeps the belly from looking detached.
      box2D(bellyR * 0.55, bellyY - bellyH * 0.40, bellyR * 0.55, 0.020, 0.012),
      // Belly upper shoulder.
      box2D(bellyR * 0.55, bellyY + bellyH * 0.40, bellyR * 0.55, 0.020, 0.012),
      // Neck.
      box2D(neckR, topY - 0.080, neckR, 0.060, 0.012),
      // Flared lip at the top.
      box2D(lipR, topY, lipR, 0.025, 0.012)
    ], 0.045);
    return { sdf: revolveY(profile), camera: { tiltDeg: 8 } };
  },

  astronaut: {

    ],

      // Close-up helmet-shoulder portrait. Helmet is a big sphere

      const HR = params.helmetSize;
      const HY = params.helmetY;
      const parts = [];
      // Main helmet sphere.
      parts.push(makeSphere(0, HY, 0, HR));
      // Comms 'ears' on each side — small bumps at helmet equator.
      parts.push(makeSphere(-HR * 0.88, HY + HR * 0.08, 0, HR * 0.18));
      parts.push(makeSphere( HR * 0.88, HY + HR * 0.08, 0, HR * 0.18));
      // Helmet collar / neck ring — short wider cylinder at helmet base.
      parts.push(makeCylinderY(0, HY - HR - 0.10, HY - HR + 0.05, 0, HR * 0.72));
      // Shoulders — wide chunky box; chops the frame bottom.
      parts.push(makeBox(0, HY - HR - 0.42, 0,

      // Chest pack — small front box on the chest plate.

                         HR * 0.34, HR * 0.20, HR * 0.10, 0.025));
      // Antenna stub on top of the helmet.
      if (params.antenna === 'yes') {
        parts.push(makeCylinderY(HR * 0.35,
                                  HY + HR - 0.02, HY + HR + 0.20, 0,
                                  HR * 0.020));
        parts.push(makeSphere(HR * 0.35, HY + HR + 0.21, 0, HR * 0.04));
      }
      // Backpack peeking above shoulders behind the helmet.
      if (params.backpack === 'yes') {
        parts.push(makeBox(0, HY - HR + 0.04, HR * 0.55,
                           HR * 0.78, HR * 0.55, HR * 0.10, 0.04));
      }
      const sdf = sdfUnion(parts, 0.04);
      const result = {
        sdf: sdf,
        camera: { tiltDeg: 0, distance: 4.0 }

      if (params.visor === 'yes') {
        // Visor ellipsoid on the FRONT of the helmet. Materials 6 marks
        // a very-sparse (very bright) zone — the hatcher leaves it
        // nearly empty so the visor reads as a strong highlight.
        const vCx = 0, vCy = HY + HR * 0.10, vCz = -HR * 0.92;
        const rx = HR * 0.55, ry = HR * 0.40, rz = HR * 0.30;
        result.materialFn = function (x, y, z) {

          if (z > -HR * 0.35) return 0;

          const dy = (y - vCy) / ry;
          const dz = (z - vCz) / rz;
          if (dx * dx + dy * dy + dz * dz < 1.0) return 6;
          return 0;
        };
      }
      return result;
    }
  },

    build: function (rng, state, params) {

    build: function (rng, state, params) {
      // Detailed flying saucer + landscape + negative-space beam.
      // Saucer profile in (r, y) plane: wide flat disc + central dome +
      // small antenna nub on top + rim notches for portholes.
      const sz = params.saucerSize;
      const cy = params.saucerY;
      // Refined classic-flying-saucer profile in (r, y) plane:
      //   - Wide lower rim (sharp circular edge)
      //   - Curved disc body tapering inward from the rim
      //   - Rim ring of small bulges (suggests porthole lights)
      //   - Central dome
      //   - Antenna stub + tip bead
      // Built from layered 2D primitives, then revolved around Y.
      const rim     = circle2D(sz * 0.92, cy + 0.00, sz * 0.07);   // outer rim torus-cross-section
      const disc    = box2D(0, cy + 0.005, sz * 0.65, sz * 0.045, sz * 0.030);
      const dome    = circle2D(0, cy + 0.075, sz * 0.32);
      const domeBase= box2D(0, cy + 0.045, sz * 0.36, sz * 0.020, sz * 0.020);

      const profile = sdfUnion([rim, disc, dome, domeBase, antRod, antTip], 0.022);
      let saucer = revolveY(profile);
      // Optional landscape below.
      let combined = saucer;

        const d1 = makeBlobSDFAt(rng, { center: [-0.35, -0.45, 0.20], nSpheres: 3, smoothK: 0.30, spread: 1.20, verticality: 0.40, pointiness: 0, scale: 0.55 });
        const d2 = makeBlobSDFAt(rng, { center: [ 0.40, -0.50, 0.10], nSpheres: 3, smoothK: 0.30, spread: 1.00, verticality: 0.35, pointiness: 0, scale: 0.45 });
        combined = sdfUnion([saucer, d1, d2], 0);
      } else if (params.landscape === 'mountains') {
        const m1 = makeBlobSDFAt(rng, { center: [-0.45, -0.30, 0.30], nSpheres: 4, smoothK: 0.18, spread: 1.10, verticality: 0.85, pointiness: 0.4, scale: 0.45 });
        const m2 = makeBlobSDFAt(rng, { center: [ 0.30, -0.30, 0.25], nSpheres: 4, smoothK: 0.18, spread: 1.10, verticality: 0.85, pointiness: 0.4, scale: 0.45 });
        combined = sdfUnion([saucer, m1, m2], 0);
      }
      const result = { sdf: combined, camera: CAMERA.hero };
      const wantNegative = (params.beam === 'negative' || params.beam === 'both');
      const wantRays     = (params.beam === 'rays'     || params.beam === 'both');
      if (wantNegative) {
        // Beam shoots STRAIGHT DOWN from the saucer's underside. Apex at
        // (0, cy - 0.01, 0); direction (0, -1, 0) in screen space ≈ down.
        result.beamMask = {
          apex: [0, cy - 0.01, 0],
          dirSx: 0, dirSy: -1,
          halfAngleDeg: params.beamSpread
        };
      }
      if (wantRays) {
        result.extraStrokes = function (ctx) {
          return lighthouseBeam(ctx, [0, cy - 0.01, 0], {
            numRays: params.beamRays,
            centerDeg: 180,   // 0 = up, 180 = straight down
            spreadDeg: params.beamSpread,
            lengthVB: 1400
          });
        };
      }

    ],
    build: function (rng, state, params) {
      // Pagoda-style multi-tier tower. Each tier = square body box +
      // SLOPED pyramidal roof on top (makePyramidSquare). The pyramidal
      // roof gives the characteristic pagoda silhouette — overhanging
      // upturned roof edges — instead of the flat boxy eaves that
      // looked too modernist before.
      const parts = [];
      const n = params.tiers;
      const groundY = -0.70;
      let y = groundY;
      let sc = 1.0;
      for (let i = 0; i < n; i++) {
        const halfW = params.baseWidth * sc;
        const halfH = params.tierHeight * sc * 0.55;
        const eaveHalfW = halfW + params.roofOverhang * sc;
        const roofH = halfH * 1.6 * params.roofPitch;
        // Body box.
        parts.push(makeBox(0, y + halfH, 0, halfW, halfH, halfW, 0.010));
        // Square pyramidal roof — wide base = eave overhang, pointed top.
        const roofBaseY = y + 2 * halfH;
        const roofPeakY = roofBaseY + roofH;
        parts.push(makePyramidSquare(0, roofBaseY, 0, eaveHalfW, roofH));
        y = roofPeakY;
        sc *= params.tierTaper;
      }
      // Slender finial spire on the topmost peak.
      if (params.spireHeight > 0) {
        parts.push(makeConeY(0, y + params.spireHeight * sc, y, 0,
                             params.baseWidth * sc * 0.30));
      }
      return { sdf: sdfUnion(parts, 0), camera: { tiltDeg: 5, yawDeg: 18 } };

  twistedColumn: {
    ui: [
      { id: 'columnCount',  label: 'Columns',        type: 'int',    min: 1,    max: 8,    step: 1,    default: 5    },
      { id: 'twistAmount',  label: 'Twist',          type: 'number', min: 0.50, max: 6.00, step: 0.10, default: 3.20 },
      { id: 'twistVariety', label: 'Twist variety',  type: 'number', min: 0.00, max: 0.60, step: 0.05, default: 0.25 },
      { id: 'columnHeight', label: 'Column height',  type: 'number', min: 0.50, max: 1.50, step: 0.05, default: 1.15 },
      { id: 'columnWidth',  label: 'Column width',   type: 'number', min: 0.08, max: 0.30, step: 0.01, default: 0.16 },
      { id: 'spacing',      label: 'Spacing',        type: 'number', min: 0.25, max: 0.70, step: 0.02, default: 0.46 },
      { id: 'pedestal',     label: 'Pedestal',       type: 'enum',
        options: [{ value: 'yes', label: 'yes' }, { value: 'no', label: 'no' }], default: 'yes' },
      { id: 'lintel',       label: 'Lintel',         type: 'enum',
        options: [
          { value: 'none',   label: 'none'   },
          { value: 'flat',   label: 'flat'   },
          { value: 'arches', label: 'arches' }
        ], default: 'flat' },
      { id: 'brokenChance', label: 'Broken %',       type: 'number', min: 0.00, max: 0.60, step: 0.05, default: 0.20 },
      { id: 'fluting',      label: 'Fluting',        type: 'number', min: 0.00, max: 0.015, step: 0.001, default: 0.005 }
    ],
    build: function (rng, state, params) {
      // Solomonic colonnade — temple-scale, with optional connecting
      // architecture above (flat lintel architrave or arches between
      // columns) and a chance each column is broken / partially fallen.
      const cols = [];
      const n = params.columnCount;
      const centerOffset = -(n - 1) / 2 * params.spacing;
      const baseHalfH = 0.045;
      const hasBase = params.pedestal === 'yes';
      // Track each column's actual top y so the lintel sits on the
      // shortest standing column (so broken columns don't poke through
      // the lintel awkwardly).
      let minStandingTop = Infinity;
      const colHeights = [];
      const isBroken = [];
      const colTwists = [];
      for (let i = 0; i < n; i++) {
        const twist = params.twistAmount *
                      (1 + (rng() - 0.5) * 2 * params.twistVariety);
        const broken = rng() < params.brokenChance;
        const baseH = params.columnHeight * (0.92 + rng() * 0.16);
        const h = broken ? baseH * (0.25 + rng() * 0.40) : baseH;
        colTwists.push(twist);
        colHeights.push(h);
        isBroken.push(broken);
        if (!broken) minStandingTop = Math.min(minStandingTop, 2 * h);
      }
      // Pre-pass done; now build assembly.
      const lintelY = (minStandingTop === Infinity) ? 0 : minStandingTop;
      for (let i = 0; i < n; i++) {
        const cx = centerOffset + i * params.spacing;
        const twist = colTwists[i];
        const h = colHeights[i];
        const w = params.columnWidth;
        const slab = makeBox(0, h, 0, w * 1.5, h, w * 0.55);
        let col = twistY(slab, twist);
        // Fluting — sinusoidal grooves carved into the column surface
        // via displace(). Because the column is twisted, the grooves
        // run helically (spiral) along its length — exactly what real
        // Solomonic columns have.
        if (params.fluting > 0) {
          col = displace(col, function (x, y, z) {
            // Sample a high-frequency sinusoid in xz; gets warped by
            // the twist applied above, producing a spiral.
            return 0.5 + 0.5 * Math.sin(Math.atan2(z, x) * 8 + y * 6);
          }, params.fluting);
        }
        const parts = [col];
        if (hasBase) {
          const baseExtent = w * 1.8;
          parts.push(makeBox(0, -baseHalfH, 0, baseExtent, baseHalfH, baseExtent, 0.012));
          // Only put a capital on UNBROKEN columns.
          if (!isBroken[i]) {
            parts.push(makeBox(0, 2 * h + baseHalfH, 0, baseExtent, baseHalfH, baseExtent, 0.012));
          }
        }
        let assembly = sdfUnion(parts, 0.02);
        const liftY = GROUND_Y + (hasBase ? 2 * baseHalfH : 0);
        assembly = translate(assembly, cx, liftY, 0);
        cols.push(assembly);
        // Broken column: add a fallen drum on the ground next to it.
        if (isBroken[i]) {
          const drumR = w * 1.05;
          const drumLen = w * 1.6;
          // Lying capsule along X, rotated random yaw, translated to base.
          let drum = makeCapsuleX(0, 0, 0, drumLen, drumR);
          drum = rotateY(drum, rng() * Math.PI * 2);
          drum = translate(drum, cx + (rng() - 0.5) * 0.10,
                                 GROUND_Y + drumR,
                                 (rng() - 0.5) * 0.08);
          cols.push(drum);
        }
      }
      // Lintel architecture above the standing columns.
      if (params.lintel !== 'none' && minStandingTop !== Infinity) {
        const liftY = GROUND_Y + (hasBase ? 2 * baseHalfH : 0);
        const lintelWorldY = liftY + lintelY + baseHalfH * 2;
        const lintelExtent = (n - 1) / 2 * params.spacing + params.columnWidth * 2.0;
        if (params.lintel === 'flat') {
          const lintelH = 0.05;
          cols.push(makeBox(0, lintelWorldY + lintelH, 0,
                            lintelExtent, lintelH, params.columnWidth * 1.0, 0.012));
        } else if (params.lintel === 'arches') {
          // Long solid lintel block with semicircular cutouts between
          // columns (the cutouts make the lintel read as an arcade).
          const lintelH = 0.13;
          const blockY = lintelWorldY + lintelH;
          let lintel = makeBox(0, blockY, 0,
                               lintelExtent, lintelH, params.columnWidth * 1.0, 0.012);
          // Subtract semi-circular openings between adjacent columns.
          const carvers = [];
          for (let i = 0; i < n - 1; i++) {
            const cx = centerOffset + (i + 0.5) * params.spacing;
            const archR = params.spacing * 0.42;
            carvers.push(makeCapsuleZ(cx, blockY - lintelH, 0,
                                       params.columnWidth * 1.2, archR));
          }
          lintel = sdfSubtract(lintel, carvers);
          cols.push(lintel);
        }
      }
      return {
        sdf: sdfUnion(cols, 0),
        camera: { tiltDeg: 6, yawDeg: 12 }
      };
    }
  }
};

// Domain operator registry. Each layer can carry an ordered list of
// operators applied to its primitive SDF before union. `apply(sdf, p, ctx)`
// receives the SDF, the op's parameter values, and a context object
// (used by `displace` to seed a noise function per layer+op).
const BUILDER_OPS = {
  twistY: {
    label: 'Twist Y',
    params: [{ id: 'k', label: 'k', min: -8, max: 8, step: 0.2, default: 2.0 }],
    apply: function (sdf, p) { return twistY(sdf, p.k); }
  },
  bendY: {
    label: 'Bend Y',
    params: [{ id: 'k', label: 'k', min: -4, max: 4, step: 0.1, default: 1.0 }],
    apply: function (sdf, p) { return bendY(sdf, p.k); }
  },
  rotateX: {
    label: 'Rotate X',
    params: [{ id: 'angle', label: 'rad', min: -3.14, max: 3.14, step: 0.05, default: 0 }],
    apply: function (sdf, p) { return rotateX(sdf, p.angle); }
  },
  rotateY: {
    label: 'Rotate Y',
    params: [{ id: 'angle', label: 'rad', min: -3.14, max: 3.14, step: 0.05, default: 0 }],
    apply: function (sdf, p) { return rotateY(sdf, p.angle); }
  },
  rotateZ: {
    label: 'Rotate Z',
    params: [{ id: 'angle', label: 'rad', min: -3.14, max: 3.14, step: 0.05, default: 0 }],
    apply: function (sdf, p) { return rotateZ(sdf, p.angle); }
  },
  translate: {
    label: 'Translate',
    params: [
      { id: 'dx', label: 'dx', min: -1, max: 1, step: 0.02, default: 0 },
      { id: 'dy', label: 'dy', min: -1, max: 1, step: 0.02, default: 0 },
      { id: 'dz', label: 'dz', min: -1, max: 1, step: 0.02, default: 0 }
    ],
    apply: function (sdf, p) { return translate(sdf, p.dx, p.dy, p.dz); }
  },
  mirror: {
    label: 'Mirror',
    params: [
      { id: 'axis', label: 'axis', type: 'enum', options: ['x', 'y', 'z'], default: 'x' }
    ],
    apply: function (sdf, p) { return mirror(sdf, p.axis); }
  },
  displace: {
    label: 'Displace',
    params: [
      { id: 'freq', label: 'freq', min: 1,    max: 30,  step: 0.5,  default: 6    },
      { id: 'amp',  label: 'amp',  min: 0.01, max: 0.3, step: 0.01, default: 0.05 }
    ],
    apply: function (sdf, p, ctx) {
      const seedKey = (ctx && ctx.seed) ? ctx.seed : 'default';
      const layerId = (ctx && ctx.layerId) || 'L?';
      const opIdx = (ctx && ctx.opIdx != null) ? ctx.opIdx : 0;
      const n3 = makeNoise3D(seedKey + ':bld:' + layerId + ':' + opIdx);
      return displace(sdf, function (x, y, z) {
        return n3(x * p.freq, y * p.freq, z * p.freq);
      }, p.amp);
    }
  }
};

    { id: 'L1', type: 'sphere', params: { cx: 0, cy: 0,    cz: 0, r: 0.25 }, ops: [] },

  ],

  smoothK: 0.05,

SCENES.builder = {
  ui: 'custom',
  build: function (rng, state) {
    const sdfs = [];
    for (const layer of builderState.layers) {
      const def = BUILDER_PRIMITIVES[layer.type];
      if (!def) continue;
      const p = {};
      for (const desc of def.params) {
        p[desc.id] = (layer.params[desc.id] != null) ? layer.params[desc.id] : desc.default;
      }
      let sdf = def.build(p);
      // Chain operators in order.
      const ops = layer.ops || [];
      for (let i = 0; i < ops.length; i++) {
        const op = ops[i];
        const opDef = BUILDER_OPS[op.type];
        if (!opDef) continue;
        const opP = {};
        for (const desc of opDef.params) {
          opP[desc.id] = (op.params && op.params[desc.id] != null) ? op.params[desc.id] : desc.default;
        }
        const ctx = { seed: state.seed, layerId: layer.id, opIdx: i };
        sdf = opDef.apply(sdf, opP, ctx);
      }
      sdfs.push(sdf);
    }
    const sdf = sdfs.length === 0
      ? makeSphere(0, -10, 0, 0.001)
      : sdfUnion(sdfs, Math.max(0, builderState.smoothK || 0));

      sdf: sdf,

      });

// ----- Builder serialisation + JS export -----
//
// `serialiseBuilder()` packs builderState.layers + smoothK into a compact
// JSON string and base64-encodes it for safe URL transport. The inverse
// `deserialiseBuilder(str)` restores it.
function serialiseBuilder() {
  const minimal = {
    s: builderState.smoothK,
    ct: builderState.cameraTilt,
    cy: builderState.cameraYaw,
    l: builderState.layers.map(function (layer) {
      return {
        t: layer.type,
        p: layer.params,
        o: (layer.ops || []).map(function (op) {
          return { t: op.type, p: op.params };
        })
      };
    })
  };
  try {
    return btoa(unescape(encodeURIComponent(JSON.stringify(minimal))));
  } catch (e) {
    return '';
  }
}
function deserialiseBuilder(encoded) {
  if (!encoded) return false;
  try {
    const obj = JSON.parse(decodeURIComponent(escape(atob(encoded))));
    if (!obj || !obj.l) return false;
    builderState.smoothK = obj.s != null ? obj.s : 0.05;
    builderState.cameraTilt = obj.ct != null ? obj.ct : 6;
    builderState.cameraYaw  = obj.cy != null ? obj.cy : 0;
    builderState.layers = obj.l.map(function (L, i) {
      return {
        id: 'L' + (i + 1),
        type: L.t,
        params: L.p || {},
        ops: (L.o || []).map(function (O) {
          return { type: O.t, params: O.p || {} };
        })
      };
    });
    builderState.nextId = builderState.layers.length + 1;
    return true;
  } catch (e) {
    return false;
  }
}

// `builderToJs()` generates a paste-ready SCENES entry equivalent to the
// current builder composition.
function builderToJs() {
  function primCall(layer) {
    const def = BUILDER_PRIMITIVES[layer.type];
    if (!def) return 'makeSphere(0,0,0,0.01) /* unknown ' + layer.type + ' */';
    const args = def.params.map(function (p) {
      const v = (layer.params[p.id] != null) ? layer.params[p.id] : p.default;
      return JSON.stringify(v);
    }).join(', ');
    // Map registry name back to the codebase function name.
    const fnByType = {
      sphere: 'makeSphere', box: 'makeBox', cylinderY: 'makeCylinderY',
      coneY: 'makeConeY', capsuleX: 'makeCapsuleX', octahedron: 'makeOctahedron'
    };
    return (fnByType[layer.type] || layer.type) + '(' + args + ')';
  }
  function wrapOps(expr, ops) {
    let cur = expr;
    for (const op of (ops || [])) {
      const opDef = BUILDER_OPS[op.type];
      if (!opDef) continue;
      const ps = opDef.params.map(function (p) {
        const v = (op.params && op.params[p.id] != null) ? op.params[p.id] : p.default;
        return JSON.stringify(v);
      });
      if (op.type === 'mirror') {
        cur = "mirror(" + cur + ", " + ps[0] + ")";
      } else if (op.type === 'translate') {
        cur = "translate(" + cur + ", " + ps.join(', ') + ")";
      } else if (op.type === 'displace') {
        const freq = ps[0], amp = ps[1];
        cur = "displace(" + cur + ", function(x,y,z){var n=makeNoise3D(state.seed+':myDisp');return n(x*" +
              freq + ",y*" + freq + ",z*" + freq + ");}, " + amp + ")";
      } else {
        cur = op.type + "(" + cur + ", " + ps.join(', ') + ")";
      }
    }
    return cur;
  }
  const lines = builderState.layers.map(function (layer) {
    return '    ' + wrapOps(primCall(layer), layer.ops);
  });
  const ct = builderState.cameraTilt || 0;
  const cy = builderState.cameraYaw  || 0;
  const hasCamera = (ct !== 0 || cy !== 0);
  if (hasCamera) {
    return 'SCENES.myScene = function (rng, state) {\n' +
           '  return {\n' +
           '    sdf: sdfUnion([\n' +
           lines.join(',\n') + '\n' +
           '    ], ' + (builderState.smoothK || 0) + '),\n' +
           '    camera: { tiltDeg: ' + ct + ', yawDeg: ' + cy + ' }\n' +
           '  };\n' +
           '};';
  }
  return 'SCENES.myScene = function (rng, state) {\n' +
         '  return sdfUnion([\n' +
         lines.join(',\n') + '\n' +
         '  ], ' + (builderState.smoothK || 0) + ');\n' +
         '};';
}

// ============================================================
// Camera + raymarch (orthographic in y, mild perspective in z so the
// horizon plane is visible)
// ============================================================
// Inverse of castRay — projects a 3-D world point onto the screen (sx, sy).
// Returns null if the point is behind the camera.
function worldToScreen(P) {
  const dx = P[0] - CAM[0], dy = P[1] - CAM[1], dz = P[2] - CAM[2];
  const fDotD = camF[0] * dx + camF[1] * dy + camF[2] * dz;
  if (fDotD <= 1e-6) return null;
  const t = FOCAL / fDotD;
  return [
    t * (camR[0] * dx + camR[1] * dy + camR[2] * dz),
    t * (camU[0] * dx + camU[1] * dy + camU[2] * dz)
  ];
}

function castRay(sx, sy) {
  // direction = F·focal + R·sx + U·sy, normalized
  const dx = camF[0] * FOCAL + camR[0] * sx + camU[0] * sy;
  const dy = camF[1] * FOCAL + camR[1] * sx + camU[1] * sy;
  const dz = camF[2] * FOCAL + camR[2] * sx + camU[2] * sy;
  const len = Math.hypot(dx, dy, dz);
  return [dx / len, dy / len, dz / len];
}
function rayMarch(sdf, ox, oy, oz, dx, dy, dz, tMax) {
  let t = 0;
  for (let i = 0; i < 96; i++) {
    const d = sdf(ox + dx * t, oy + dy * t, oz + dz * t);
    if (d < 0.0008) return t;
    t += Math.max(d, 0.004);
    if (t > tMax) return -1;
  }
  return -1;
}

// Cast a shadow ray from a near-surface point toward the light direction L.
// Returns 1 if another SDF surface blocks the ray before maxT, else 0.
// Soft shadow with penumbra. Returns 0..1 where 1 = fully shadowed and
// 0 = fully lit. Inigo Quilez's "soft shadow" technique: at each marching
// step track min(k*d/t) along the ray; small values of d (close to a
// surface) at large t (far from origin) produce a soft falloff.
//
// `k` controls penumbra hardness — higher k = sharper edge. maxT extends
// the ray's reach so we get the LONG cast shadows you see in URH-style
// landscapes when the sun is low.
function softShadow(sdf, x, y, z, L, maxT, k) {
  let res = 1.0;
  let t = 0.008;
  for (let i = 0; i < 48; i++) {
    const d = sdf(x + L[0] * t, y + L[1] * t, z + L[2] * t);
    if (d < 0.001) return 1;          // hard occlusion
    const r = k * d / t;
    if (r < res) res = r;
    t += Math.max(d, 0.006);
    if (t > maxT) break;
  }
  if (res < 0) res = 0;
  if (res > 1) res = 1;
  return 1 - res;                     // invert: 1 = shadowed
}

// Ambient occlusion: short rays along the surface normal sampled at
// progressive distances. Inward corners and creases see less open space
// and read darker. Returns 0..1 where 1 = fully exposed.
function ambientOcclusion(sdf, x, y, z, nx, ny, nz) {
  let occ = 0.0;
  let weight = 1.0;
  for (let i = 1; i <= 5; i++) {
    const d = 0.025 * i;
    const sample = sdf(x + nx * d, y + ny * d, z + nz * d);
    occ += weight * (d - sample);
    weight *= 0.65;
  }
  let v = 1 - 3.0 * occ;
  if (v < 0) v = 0;
  if (v > 1) v = 1;
  return v;
}
function normalAt(sdf, x, y, z) {
  const e = 0.0009;
  const nx = sdf(x + e, y, z) - sdf(x - e, y, z);
  const ny = sdf(x, y + e, z) - sdf(x, y - e, z);
  const nz = sdf(x, y, z + e) - sdf(x, y, z - e);
  const l = Math.hypot(nx, ny, nz) || 1;
  return [nx / l, ny / l, nz / l];
}

// ============================================================
// Scene buffer (depth, normal, lighting, surface, precomputed primary
// hatch angle index per pixel)
// surface: 0 = sky, 1 = blob, 2 = ground
// ============================================================
function snapAngle(a) {
  let amod = ((a % Math.PI) + Math.PI) % Math.PI;
  let bestI = 0, bestD = Infinity;
  for (let i = 0; i < HATCH_ANGLES.length; i++) {
    let d = Math.abs(amod - HATCH_ANGLES[i]);
    if (d > Math.PI / 2) d = Math.PI - d;
    if (d < bestD) { bestD = d; bestI = i; }
  }
  return bestI;
}

function renderSceneBuffer(state, sdf, materialFn) {
  const W = state.bufRes;
  const H = Math.round(W * (SY_MAX - SY_MIN) / (SX_MAX - SX_MIN));
  const N = W * H;
  const buf = {
    W, H,
    surface: new Uint8Array(N),  // 0=sky 1=rock 2=ground
    nx: new Float32Array(N), ny: new Float32Array(N), nz: new Float32Array(N),
    light: new Float32Array(N),
    depth: new Float32Array(N),
    primary: new Uint8Array(N),
    shadow: new Float32Array(N), // 0..1, 1 = fully shadowed (soft shadows)
    ao: new Float32Array(N),     // 0..1, 1 = fully exposed (1.0 by default)
    material: new Uint8Array(N)  // 0=default; scenes may set 1..255 per pixel
  };

  let lL = Math.hypot(state.lx, state.ly, state.lz) || 1;
  const L = [state.lx / lL, state.ly / lL, state.lz / lL];

  for (let py = 0; py < H; py++) {
    const sy = SY_MAX - (py / (H - 1)) * (SY_MAX - SY_MIN);
    for (let px = 0; px < W; px++) {
      const sx = SX_MIN + (px / (W - 1)) * (SX_MAX - SX_MIN);
      const idx = py * W + px;
      const [dx, dy, dz] = castRay(sx, sy);

      let tG = -1;
      if (dy < -1e-5) {
        const t = (GROUND_Y - CAM[1]) / dy;
        if (t > 0) tG = t;
      }
      const tB = rayMarch(sdf, CAM[0], CAM[1], CAM[2], dx, dy, dz, 25);

      let hit = 0, n = null, t = -1;
      if (tB > 0 && (tG < 0 || tB < tG)) {
        hit = 1; t = tB;
        n = normalAt(sdf, CAM[0] + dx * tB, CAM[1] + dy * tB, CAM[2] + dz * tB);
      } else if (tG > 0) {
        hit = 2; t = tG; n = [0, 1, 0];
      }

      if (hit === 0) { buf.surface[idx] = 0; continue; }
      buf.surface[idx] = hit;
      buf.nx[idx] = n[0]; buf.ny[idx] = n[1]; buf.nz[idx] = n[2];
      buf.depth[idx] = t;
      const ld = Math.max(0, n[0] * L[0] + n[1] * L[1] + n[2] * L[2]);
      buf.light[idx] = 0.15 + 0.85 * ld;

      // Scene-supplied per-pixel material id. Only computed for blob
      // hits (hit === 1) — ground and sky always sit at material 0.
      if (hit === 1 && materialFn) {
        const wx = CAM[0] + dx * t;
        const wy = CAM[1] + dy * t;
        const wz = CAM[2] + dz * t;
        const m = materialFn(wx, wy, wz);
        buf.material[idx] = (m >= 0 && m <= 255) ? (m | 0) : 0;
      }

      // Soft shadow ray + AO. For blobs, offset along the surface normal.
      // For ground, the surface normal is (0, 1, 0) so we offset slightly
      // upward. AO defaults to 1 (fully exposed); we compute it for blob
      // hits where creases / pockets matter.
      buf.ao[idx] = 1;
      if (ld > 0) {
        if (hit === 1) {
          const hx = CAM[0] + dx * t + n[0] * 0.004;
          const hy = CAM[1] + dy * t + n[1] * 0.004;
          const hz = CAM[2] + dz * t + n[2] * 0.004;
          // maxT 25 + penumbra factor 24 → long soft cast shadows.
          buf.shadow[idx] = softShadow(sdf, hx, hy, hz, L, 25, 24);
          buf.ao[idx] = ambientOcclusion(sdf, hx, hy, hz, n[0], n[1], n[2]);
        } else if (hit === 2) {
          const gx = CAM[0] + dx * t;
          const gy = GROUND_Y + 0.005;
          const gz = CAM[2] + dz * t;
          buf.shadow[idx] = softShadow(sdf, gx, gy, gz, L, 25, 24);
        }
      }

      // Per-pixel "primary" hatch angle = perpendicular to projected normal.
      // For very face-on regions (small projected normal), the angle is
      // unstable, so default to the diagonal there.
      const projMag = Math.hypot(n[0], n[1]);
      let pri;
      if (hit === 2) {
        pri = 0; // ground = horizontal
      } else if (projMag < 0.15) {
        pri = 1;
      } else {
        pri = snapAngle(Math.atan2(n[1], n[0]) + Math.PI / 2);
      }
      buf.primary[idx] = pri;
    }
  }
  return buf;
}

function bufIdx(buf, sx, sy) {
  const px = Math.round((sx - SX_MIN) / (SX_MAX - SX_MIN) * (buf.W - 1));
  const py = Math.round((SY_MAX - sy) / (SY_MAX - SY_MIN) * (buf.H - 1));
  if (px < 0 || px >= buf.W || py < 0 || py >= buf.H) return -1;
  return py * buf.W + px;
}

// ============================================================
// Hatching decision: for each (sx, sy) and a given hatch angle index,
// returns whether the scan line at that angle should be "on" here.
// ============================================================
function shouldDrawAt(buf, sx, sy, angleIdx) {
  const idx = bufIdx(buf, sx, sy);
  if (idx < 0) return false;
  // Sky and ground are handled by their own generators — the screen-space
  // scan-line passes here are blob-only.
  if (buf.surface[idx] !== 1) return false;

  const pri = buf.primary[idx];
  if (angleIdx === pri) return true;

  // Blob: tiered crosshatch by offset from primary. Cast shadow pushes
  // the effective darkness up, so shadowed regions reach further
  // crosshatch tiers than their Lambert lighting alone would. The
  // scene-supplied material id can shift darkness further (denser or
  // sparser hatching per region — see MATERIAL_PROPS).
  const offset = (angleIdx - pri + 4) % 4;
  const darkness = computeDarkness(buf, idx);
  const T = [0, 0.30, 0.55, 0.78];
  return darkness > T[offset];
}

// ============================================================
// Hatch generation: scan parallel lines across the image at each angle.
// ============================================================
function generateHatches(state, buf) {
  const paths = [];
  const spacingMM = state.lw * state.density;
  const worldStep = Math.max(0.002, spacingMM * WORLD_PER_MM);
  const sampleStep = Math.max(0.0015, worldStep * 0.35);
  const RANGE = 1.8;

  for (let a = 0; a < HATCH_ANGLES.length; a++) {
    const ang = HATCH_ANGLES[a];
    const ca = Math.cos(ang), sa = Math.sin(ang);

    // Stagger every other angle by half spacing so different angle grids
    // don't visually align into moiré.
    const phase = (a % 2) * worldStep * 0.5;
    for (let s = -RANGE + phase; s <= RANGE; s += worldStep) {
      const sx0 = -sa * s;
      const sy0 = ca * s;

      let inDraw = false;
      let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;

      for (let t = -RANGE; t <= RANGE; t += sampleStep) {
        const sx = sx0 + ca * t;
        const sy = sy0 + sa * t;
        const inBounds = (sx >= SX_MIN && sx <= SX_MAX &&
                          sy >= SY_MIN && sy <= SY_MAX);
        const draw = inBounds && shouldDrawAt(buf, sx, sy, a);

        if (draw) {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        } else if (inDraw) {
          const segLen = Math.hypot(lastX - dx0, lastY - dy0);
          if (segLen > worldStep * 0.4) {
            paths.push([[dx0, dy0], [lastX, lastY]]);
          }
          inDraw = false;
        }
      }
      if (inDraw) {
        const segLen = Math.hypot(lastX - dx0, lastY - dy0);
        if (segLen > worldStep * 0.4) {
          paths.push([[dx0, dy0], [lastX, lastY]]);
        }
      }
    }
  }
  return paths;
}

// ============================================================
// Cell hatcher: port of VectorFriend's modules/hatching.js.
//
// Divide the image into a grid of square cells. For each cell that lands
// on the blob surface, compute the average brightness and emit up to
// maxHatches horizontal hatches whose count is proportional to darkness.
// The hatch lines are evenly distributed within the cell's vertical
// slots so the placement reads as a halftone screen. A small Perlin
// wobble can be applied to each line (line wobble parameter).
//
// Unlike the scan-line hatcher (continuous strokes broken by surface
// transitions), each cell contributes its own short strokes — a tight
// halftone look distinct from any of the curve modes.
// ============================================================
function generateCellHatches(state, buf) {
  const paths = [];
  const baseSpacing = Math.max(0.002, state.lw * state.density * WORLD_PER_MM);
  // Cell grid: maxHatches and cellSize are now decoupled so we can keep
  // 4 tonal levels per cell while shrinking cells for halftone density.
  // - maxHatches = 4 → cells resolve 4 tonal steps (1, 2, 3, 4 lines).
  // - cellSize = baseSpacing × 2.5 → cells are ~1.6× smaller per side
  //   (about 2.6× more cells per page area) than the original
  //   baseSpacing × 4 sizing.
  // Line spacing inside a cell = cellSize / maxHatches = 0.625 × the
  // user's lw spacing — a touch denser than the lw spec, which is the
  // tradeoff for finer halftone resolution.
  const maxHatches = 4;
  const cellSize = baseSpacing * 2.5;
  const cellsX = Math.max(2, Math.round((SX_MAX - SX_MIN) / cellSize));
  const actualCellSize = (SX_MAX - SX_MIN) / cellsX;
  const cellsY = Math.max(2, Math.round((SY_MAX - SY_MIN) / actualCellSize));
  const wobbleNoise = makeNoise2D(state.seed + ':cellWobble');
  const wobbleAmp = baseSpacing * 0.30;
  for (let cy = 0; cy < cellsY; cy++) {
    const cellY0 = SY_MIN + cy * actualCellSize;
    const cellY1 = cellY0 + actualCellSize;
    for (let cx = 0; cx < cellsX; cx++) {
      const cellX0 = SX_MIN + cx * actualCellSize;
      const cellX1 = cellX0 + actualCellSize;
      let total = 0, count = 0;
      const subStep = actualCellSize / 6;
      for (let sy = cellY0; sy < cellY1; sy += subStep) {
        for (let sx = cellX0; sx < cellX1; sx += subStep) {
          const idx = bufIdx(buf, sx, sy);
          if (idx >= 0 && buf.surface[idx] === 1) {
            total += 1 - computeDarkness(buf, idx);
            count++;
          }
        }
      }
      if (count === 0) continue;
      const avg = total / count;
      // Even the brightest cell on the blob gets ONE line so highlights
      // read as the first hatch level rather than pure white paper.
      // buf.light has 0.15 ambient floor (light = 0.15 + 0.85 × lambert),
      // so the darkest single-blob cells only reach avg ≈ 0.15 — not low
      // enough to round up to numHatches = maxHatches. Rescale (1 − avg)
      // by 1/0.85 ≈ 1.18 so unlit cells fully reach the 4-line tier, and
      // clamp at maxHatches.
      const darkness = Math.min(1, (1 - avg) / 0.85);
      const numHatches = Math.max(1, Math.min(maxHatches, Math.floor(darkness * maxHatches + 0.5)));
      for (let i = 0; i < numHatches; i++) {
        // Distribute `numHatches` lines across `maxHatches` slot positions.
        // Old formula was Math.round((i+1) * (M/(N+1))) - 1 which collided
        // (e.g. N=M=4 → slots 0,1,1,2 — only 3 distinct lines for 4 levels).
        // floor((i + 0.5) * M / N) is collision-free for N ≤ M.
        const slotIdx = Math.floor((i + 0.5) * maxHatches / numHatches);
        if (slotIdx < 0 || slotIdx >= maxHatches) continue;
        const slotY = cellY0 + (slotIdx + 0.5) / maxHatches * actualCellSize;
        const segs = 8;
        let pts = [];
        for (let s = 0; s <= segs; s++) {
          const t = s / segs;
          const x = cellX0 + t * actualCellSize;
          const w = (wobbleNoise(x * 8, slotY * 8) - 0.5) * wobbleAmp * 2;
          const ySamp = slotY + w;
          const idx = bufIdx(buf, x, ySamp);
          if (idx >= 0 && buf.surface[idx] === 1) {
            pts.push([x, ySamp]);
          } else if (pts.length >= 2) {
            paths.push(pts);
            pts = [];
          } else {
            pts = [];
          }
        }
        if (pts.length >= 2) paths.push(pts);
      }
    }
  }
  return paths;
}

// ============================================================
// Monet hatcher: short wavy brushstrokes scattered on the blob surface.
// Each stroke is a curved polyline of ~8 segments centred on its seed
// point, oriented along the projected-normal perpendicular with a small
// random direction jitter. A sinusoidal perpendicular wobble overlaid
// on the stroke gives the brush-mark feel. Stroke density is driven by
// per-pixel darkness so unlit regions accumulate strokes.
// ============================================================
// TSP infill: scatter fill points across the blob surface with density
// modulated by brightness (darker areas get more points), then visit
// every point with a single nearest-neighbour path. The result is a
// single continuous polyline — minimal pen lifts, organic flowing
// fill, denser passes through shadowed regions.
//
// Uses a spatial-hash bucket grid for O(N) (amortised) nearest-neighbour
// lookups so the pen routing stays fast even for thousands of points.
function generateTspHatches(state, buf) {
  const paths = [];
  const baseSpacing = Math.max(0.002, state.lw * state.density * WORLD_PER_MM);
  // Seed grid — slightly tighter than line spacing so dropouts give
  // a usable point density.
  const seedStep = baseSpacing * 1.1;
  // Collect points with brightness-modulated keep probability.
  const points = [];
  for (let sy = SY_MIN; sy <= SY_MAX; sy += seedStep) {
    for (let sx = SX_MIN; sx <= SX_MAX; sx += seedStep) {
      const idx = bufIdx(buf, sx, sy);
      if (idx < 0 || buf.surface[idx] !== 1) continue;
      const darkness = computeDarkness(buf, idx);
      // 12 % minimum so highlights get sparse coverage (not pure white).
      const keepProb = Math.max(0.12, Math.pow(darkness, 1.4));
      if (hash01(sx, sy) > keepProb) continue;
      points.push([sx, sy]);
    }
  }
  if (points.length < 2) return paths;

  // Spatial-hash bucket so nearest-neighbour scans are O(local cell) not
  // O(N). Bucket size ≈ 4 × seedStep keeps each cell to a few points.
  const bucketSize = seedStep * 4;
  const buckets = new Map();
  function bkey(bx, by) { return bx + ',' + by; }
  for (let i = 0; i < points.length; i++) {
    const bx = Math.floor(points[i][0] / bucketSize);
    const by = Math.floor(points[i][1] / bucketSize);
    const k = bkey(bx, by);
    let list = buckets.get(k);
    if (!list) { list = []; buckets.set(k, list); }
    list.push(i);
  }
  const visited = new Uint8Array(points.length);
  function findNearest(cx, cy) {
    const cbx = Math.floor(cx / bucketSize);
    const cby = Math.floor(cy / bucketSize);
    let best = -1;
    let bestDist = Infinity;
    for (let radius = 0; radius < 16; radius++) {
      for (let dby = -radius; dby <= radius; dby++) {
        for (let dbx = -radius; dbx <= radius; dbx++) {
          if (Math.max(Math.abs(dbx), Math.abs(dby)) !== radius) continue;
          const list = buckets.get(bkey(cbx + dbx, cby + dby));
          if (!list) continue;
          for (let li = 0; li < list.length; li++) {
            const i = list[li];
            if (visited[i]) continue;
            const dx = points[i][0] - cx, dy = points[i][1] - cy;
            const d = dx * dx + dy * dy;
            if (d < bestDist) { bestDist = d; best = i; }
          }
        }
      }
      // If we found a candidate and the next ring can't beat it, stop.
      if (best >= 0) {
        const ringReach = radius * bucketSize;
        if (bestDist <= ringReach * ringReach) return best;
      }
    }
    return best;
  }
  // Build the path. If the next-nearest jump is too long, break the
  // polyline and start a fresh one — keeps long penlines from slashing
  // across the silhouette.
  const maxJump = baseSpacing * 14;
  const maxJumpSqr = maxJump * maxJump;
  let path = [points[0]];
  visited[0] = 1;
  let current = 0;
  let remaining = points.length - 1;
  while (remaining > 0) {
    const next = findNearest(points[current][0], points[current][1]);
    if (next < 0) break;
    visited[next] = 1;
    remaining--;
    const dx = points[next][0] - points[current][0];
    const dy = points[next][1] - points[current][1];
    if (dx * dx + dy * dy > maxJumpSqr) {
      // Far jump — emit current path, start a new one at this point.
      if (path.length >= 2) paths.push(path);
      path = [points[next]];
    } else {
      path.push(points[next]);
    }
    current = next;
  }
  if (path.length >= 2) paths.push(path);
  return paths;
}

function generateMonetHatches(state, buf) {
  const paths = [];
  const baseSpacing = Math.max(0.002, state.lw * state.density * WORLD_PER_MM);
  const strokeLen = baseSpacing * 7;
  // Seeds spaced 1.4× line spacing (was 0.9×) so the foreground stroke
  // population is much sparser by default. Density still scales with
  // darkness via the probabilistic dropout test below.
  const seedStep = baseSpacing * 1.4;
  const wobbleAmp = baseSpacing * 0.45;
  const dirNoise = makeNoise2D(state.seed + ':monetDir');
  for (let sy = SY_MIN; sy <= SY_MAX; sy += seedStep) {
    for (let sx = SX_MIN; sx <= SX_MAX; sx += seedStep) {
      const idx = bufIdx(buf, sx, sy);
      if (idx < 0 || buf.surface[idx] !== 1) continue;
      const darkness = computeDarkness(buf, idx);
      // Probability of placing a stroke = darkness^1.8 — a steeper
      // exponent than the old linear curve so mid-tones thin out fast
      // while only the genuinely dark regions stay densely stroked.
      // Minimum 8 % stroke probability everywhere on the surface — even
      // the brightest highlights get a sparse first-tier of brushstrokes
      // (no pure-white-paper gaps).
      const strokeProb = Math.max(0.08, Math.pow(darkness, 1.8));
      if (hash01(sx, sy) > strokeProb) continue;
      const nx = buf.nx[idx], ny = buf.ny[idx];
      let dirX = -ny, dirY = nx;
      const m = Math.hypot(dirX, dirY);
      if (m < 1e-4) { dirX = 1; dirY = 0; } else { dirX /= m; dirY /= m; }
      const jitter = (dirNoise(sx * 5, sy * 5) - 0.5) * 0.6;
      const cosJ = Math.cos(jitter), sinJ = Math.sin(jitter);
      const dx = dirX * cosJ - dirY * sinJ;
      const dy = dirX * sinJ + dirY * cosJ;
      const segs = 8;
      const pts = [];
      let allOn = true;
      for (let i = -segs / 2; i <= segs / 2; i++) {
        const t = i / segs;
        const px = sx + dx * t * strokeLen;
        const py = sy + dy * t * strokeLen;
        const wob = Math.sin(t * Math.PI * 3) * wobbleAmp;
        const wpx = px - dy * wob;
        const wpy = py + dx * wob;
        const sIdx = bufIdx(buf, wpx, wpy);
        if (sIdx < 0 || buf.surface[sIdx] !== 1) { allOn = false; break; }
        pts.push([wpx, wpy]);
      }
      if (allOn && pts.length >= 2) paths.push(pts);
    }
  }
  return paths;
}

// ============================================================
// Crosshatch hatcher: just horizontals + verticals. Two-tier threshold:
// horizontals always draw on the surface; verticals only draw in regions
// darker than 'crossThreshold'. Lightweight alternative to the 4-angle
// scan-line.
// ============================================================
function generateCrosshatchHatches(state, buf) {
  const paths = [];
  const worldStep = Math.max(0.002, state.lw * state.density * WORLD_PER_MM);
  const sampleStep = Math.max(0.0015, worldStep * 0.35);
  const RANGE = 1.8;
  // Four-level threshold-based crosshatch. Each layer adds another set
  // of strokes in progressively darker regions, so the user sees
  // continuous tonal variation instead of a single bright/dark split.
  //
  //   Layer 0: primary H lines    (always — bright surface = level 1)
  //   Layer 1: secondary H lines  (darkness > 0.30 — level 2)
  //   Layer 2: primary V lines    (darkness > 0.50 — level 3)
  //   Layer 3: secondary V lines  (darkness > 0.70 — level 4)
  //
  // Secondary H/V are offset by half a worldStep so they interleave
  // with the primary lines, doubling local line density.
  const layers = [
    { ang: 0,           offset: 0,                threshold: -0.01 },
    { ang: 0,           offset: worldStep * 0.5,  threshold: 0.30  },
    { ang: Math.PI / 2, offset: 0,                threshold: 0.50  },
    { ang: Math.PI / 2, offset: worldStep * 0.5,  threshold: 0.70  }
  ];
  for (const L of layers) {
    const ca = Math.cos(L.ang), sa = Math.sin(L.ang);
    for (let s = -RANGE + L.offset; s <= RANGE; s += worldStep) {
      const sx0 = -sa * s;
      const sy0 = ca * s;
      let inDraw = false;
      let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;
      for (let t = -RANGE; t <= RANGE; t += sampleStep) {
        const sx = sx0 + ca * t;
        const sy = sy0 + sa * t;
        const inBounds = (sx >= SX_MIN && sx <= SX_MAX &&
                          sy >= SY_MIN && sy <= SY_MAX);
        let draw = false;
        if (inBounds) {
          const idx = bufIdx(buf, sx, sy);
          if (idx >= 0 && buf.surface[idx] === 1) {
            draw = computeDarkness(buf, idx) > L.threshold;
          }
        }
        if (draw) {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        } else if (inDraw) {
          if (Math.hypot(lastX - dx0, lastY - dy0) > worldStep * 0.4) {
            paths.push([[dx0, dy0], [lastX, lastY]]);
          }
          inDraw = false;
        }
      }
      if (inDraw && Math.hypot(lastX - dx0, lastY - dy0) > worldStep * 0.4) {
        paths.push([[dx0, dy0], [lastX, lastY]]);
      }
    }
  }
  return paths;
}

// ============================================================
// Vertical-only hatcher: single pass of evenly-spaced vertical scan
// lines, clipped to the blob surface. Reads as engraving / wood-cut.
// ============================================================
function generateVerticalHatches(state, buf) {
  const paths = [];
  const baseSpacing = Math.max(0.002, state.lw * state.density * WORLD_PER_MM);
  const sampleStep = baseSpacing * 0.4;
  const RANGE = 1.8;
  // Four-level vertical hatching. Each level is a separate set of
  // columns at an OFFSET position so the layers interleave on the page.
  //
  //   Layer 0:  offset 0       always (level 1)
  //   Layer 1:  offset 0.5     darkness > 0.30 (level 2 — 2× density)
  //   Layer 2:  offset 0.25    darkness > 0.55 (level 3 — 3× density)
  //   Layer 3:  offset 0.75    darkness > 0.75 (level 4 — 4× density)
  //
  // All offsets are fractions of baseSpacing, so the four sub-grids
  // interleave to give true tonal variation across light → dark.
  const layers = [
    { offset: 0.00 * baseSpacing, threshold: -0.01 },
    { offset: 0.50 * baseSpacing, threshold: 0.30  },
    { offset: 0.25 * baseSpacing, threshold: 0.55  },
    { offset: 0.75 * baseSpacing, threshold: 0.75  }
  ];
  for (const L of layers) {
    for (let sx = -RANGE + L.offset; sx <= RANGE; sx += baseSpacing) {
      let inDraw = false;
      let sy0 = 0, lastY = 0;
      function flush() {
        if (inDraw && Math.abs(lastY - sy0) > baseSpacing * 0.4) {
          paths.push([[sx, sy0], [sx, lastY]]);
        }
        inDraw = false;
      }
      for (let sy = SY_MIN; sy <= SY_MAX; sy += sampleStep) {
        const idx = bufIdx(buf, sx, sy);
        let draw = false;
        if (idx >= 0 && buf.surface[idx] === 1) {
          draw = L.threshold < 0 || computeDarkness(buf, idx) > L.threshold;
        }
        if (draw) {
          if (!inDraw) { sy0 = sy; inDraw = true; }
          lastY = sy;
        } else if (inDraw) {
          flush();
        }
      }
      flush();
    }
  }
  return paths;
}

// ============================================================
// Beam-mask post-process: scenes can return { beamMask: { apex, targetSx,
// targetSy, halfAngleDeg } } to carve a wedge of negative space out of
// the sky. The apex is a world position (projected to screen here);
// targetSx/Sy give the direction of the beam in screen space, and any
// sky pixel inside [centreAngle ± halfAngle] of the wedge is reclassified
// from surface=0 to surface=4 ("beam"). Existing sky generators all gate
// on surface===0 so they automatically skip the beam region.
// ============================================================
function applyBeamMask(buf, spec) {
  if (!spec || !spec.apex) return;
  const apexScreen = worldToScreen(spec.apex);
  if (!apexScreen) return;
  const aSx = apexScreen[0], aSy = apexScreen[1];
  // Accept either an explicit direction vector (dirSx/dirSy — easier to
  // reason about for "horizontal beam") or an absolute screen target
  // (targetSx/targetSy) as a back-compat fallback.
  let bdx, bdy;
  if (spec.dirSx != null || spec.dirSy != null) {
    bdx = spec.dirSx != null ? spec.dirSx : 0;
    bdy = spec.dirSy != null ? spec.dirSy : 0;
  } else {
    bdx = (spec.targetSx != null ? spec.targetSx : -aSx) - aSx;
    bdy = (spec.targetSy != null ? spec.targetSy : aSy + 1.0) - aSy;
  }
  const bMag = Math.hypot(bdx, bdy);
  if (bMag < 1e-6) return;
  bdx /= bMag; bdy /= bMag;
  const cosHalf = Math.cos((spec.halfAngleDeg != null ? spec.halfAngleDeg : 12) * Math.PI / 180);
  const W = buf.W, H = buf.H;
  for (let py = 0; py < H; py++) {
    const sy = SY_MAX - (py / (H - 1)) * (SY_MAX - SY_MIN);
    for (let px = 0; px < W; px++) {
      const idx = py * W + px;
      if (buf.surface[idx] !== 0) continue;
      const sx = SX_MIN + (px / (W - 1)) * (SX_MAX - SX_MIN);
      const vx = sx - aSx;
      const vy = sy - aSy;
      const vMag = Math.hypot(vx, vy);
      if (vMag < 1e-6) continue;
      const dot = (vx * bdx + vy * bdy) / vMag;
      if (dot > cosHalf) buf.surface[idx] = 4;
    }
  }
}

// ============================================================
// Tone mapping on buf.light. Applied after raymarching, before the hatcher
// reads brightness for stroke-density decisions.
//
//   brightness:  uniform offset on the final brightness value
//   contrast:    multiplicative scaling around 0.5
//   gamma:       power curve (gamma > 1 deepens shadows)
//   posterLevels: quantize the result into N discrete levels
//                 (1 = no quantization)
//
// Only the blob surfaces (buf.surface === 1) are affected; sky and
// ground keep their original light.
// ============================================================
function applyToneMap(buf, state) {
  const b = state.brightness || 0;
  const c = state.contrast != null ? state.contrast : 1;
  const g = state.gamma != null ? state.gamma : 1;
  const p = state.posterLevels != null ? state.posterLevels : 1;
  const skipTransform = (b === 0 && c === 1 && g === 1);
  const skipPoster = (p <= 1);
  if (skipTransform && skipPoster) return;
  for (let i = 0; i < buf.light.length; i++) {
    if (buf.surface[i] !== 1) continue;
    let v = buf.light[i];
    if (!skipTransform) {
      v = (v - 0.5) * c + 0.5 + b;
      if (v < 0) v = 0; else if (v > 1) v = 1;
      if (g !== 1) v = Math.pow(v, g);
    }
    if (!skipPoster) {
      // Quantize into p discrete buckets: {0, 1/(p-1), 2/(p-1), ..., 1}.
      // Use min(floor(v * p), p - 1) so v = 1.0 maps to the top bucket.
      let bucket = Math.floor(v * p);
      if (bucket >= p) bucket = p - 1;
      v = bucket / (p - 1);
    }
    buf.light[i] = v;
  }
}

// ============================================================
// Curved hatching: trace evenly-spaced streamlines through a direction
// field defined per buffer pixel. Three field flavours are available:
//
//   isoDepth   — perpendicular to the depth gradient (topographic
//                contours: lines of constant distance from the camera).
//   projNormal — perpendicular to the projected surface normal in
//                screen space (continuous version of the scan-line
//                hatcher's per-pixel primary angle).
//   principal  — direction of slowest change of the lighting field; a
//                cheap stand-in for principal curvature.
// ============================================================
function bufPxToScreen(buf, px, py) {
  const sx = SX_MIN + (px / (buf.W - 1)) * (SX_MAX - SX_MIN);
  const sy = SY_MAX - (py / (buf.H - 1)) * (SY_MAX - SY_MIN);
  return [sx, sy];
}

// Sample a Float32 buffer with a 3x3 box blur centred at (ix, iy),
// skipping pixels where mask is not 1. Returns 0 if no valid samples.
function sampleSmooth(buf, src, ix, iy) {
  const W = buf.W, H = buf.H;
  let sum = 0, count = 0;
  for (let dy = -1; dy <= 1; dy++) {
    const y = iy + dy;
    if (y < 0 || y >= H) continue;
    for (let dx = -1; dx <= 1; dx++) {
      const x = ix + dx;
      if (x < 0 || x >= W) continue;
