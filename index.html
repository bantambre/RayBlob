<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RayBlob — 4×5" Hatched Blob</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 16px; font: 12px/1.35 system-ui, sans-serif;
         background: #1c1c1c; color: #ddd; }
  .layout { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .panel { display: flex; flex-direction: column; gap: 4px;
           width: 220px; padding: 12px;
           background: #262626; border-radius: 6px; }
  .panel h2 { margin: 6px 0 1px; font-size: 10px; font-weight: 600;
              letter-spacing: 0.06em; text-transform: uppercase; color: #999; }
  .field { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .field label { color: #aaa; font-size: 11px; }
  .field input, .field select { width: 78px; padding: 3px 5px; background: #1a1a1a;
                 color: #eee; border: 1px solid #3a3a3a; border-radius: 3px;
                 font: inherit; font-size: 11px; text-align: right; }
  .field input[type="text"] { text-align: left; }
  .row { display: flex; gap: 6px; }
  button { padding: 6px 8px; background: #3a78d8; color: white;
           border: none; border-radius: 3px; cursor: pointer; font: inherit;
           font-size: 11px; flex: 1; }
  button:hover { background: #4a88e8; }
  button.secondary { background: #444; }
  button.secondary:hover { background: #555; }
  button:disabled { opacity: 0.5; cursor: wait; }
  .stats { padding-top: 10px; margin-top: 6px; border-top: 1px solid #3a3a3a;
           color: #888; font-size: 11px; line-height: 1.6;
           font-family: ui-monospace, monospace; white-space: pre-wrap;
           min-height: 32px; }
  .stage { background: white; border-radius: 6px;
           box-shadow: 0 6px 24px rgba(0,0,0,0.4); }
  #preview { display: block; }
  a.url-link { color: #6aa8ff; font-family: ui-monospace, monospace;
               font-size: 10px; word-break: break-all; }
</style>
</head>
<body>
<div class="layout">
  <div class="panel">
    <h2>Composition</h2>
    <div class="field"><label>Seed</label><input id="seed" type="text" value="42"></div>
    <div class="field"><label>Scene</label>
      <select id="scene">
        <option value="single" selected>Single blob</option>
        <option value="monoliths">Monoliths</option>
        <option value="arch">Cave arch</option>
        <option value="lighthouse">Lighthouse</option>
        <option value="iceberg">Iceberg</option>
        <option value="cone">Cone</option>
        <option value="pyramid">Pyramid</option>
        <option value="twistedColumn">Twisted column</option>
      </select>
    </div>
    <div class="field"><label>Blob spheres</label><input id="nSpheres" type="number" min="4" max="12" value="4"></div>
    <div class="field"><label>Spread</label><input id="spread" type="number" min="0.2" max="3.0" step="0.1" value="1.0"></div>
    <div class="field"><label>Verticality</label><input id="verticality" type="number" min="0.4" max="3.0" step="0.1" value="1.4"></div>
    <div class="field"><label>Pointiness</label><input id="pointiness" type="number" min="0" max="2.0" step="0.1" value="0"></div>
    <div class="field"><label>Smoothing k</label><input id="smoothK" type="number" min="0.05" max="0.8" step="0.05" value="0.3"></div>
    <div class="field"><label>Cam tilt (°)</label><input id="camTilt" type="number" min="0" max="20" step="0.5" value="6"></div>
    <div class="field"><label>Ground style</label>
      <select id="groundStyle"
              style="width:120px;padding:5px;background:#1a1a1a;color:#eee;border:1px solid #3a3a3a;border-radius:4px;font:inherit">
        <option value="perspective" selected>Perspective</option>
        <option value="waves">Waves</option>
      </select>
    </div>
    <div class="field"><label>Sky style</label>
      <select id="skyStyle"
              style="width:120px;padding:5px;background:#1a1a1a;color:#eee;border:1px solid #3a3a3a;border-radius:4px;font:inherit">
        <option value="gradient" selected>Gradient</option>
        <option value="wobbly">Wobbly lines</option>
        <option value="multiGradient">Box gradient</option>
        <option value="paperGrain">Paper grain</option>
        <option value="arcs">Concentric arcs</option>
        <option value="none">None (empty sky)</option>
      </select>
    </div>
    <div class="field"><label>Waviness</label><input id="waviness" type="number" min="0" max="8" step="0.25" value="3.0"></div>
    <div class="field" style="display:none"><label>Cloud threshold</label><input id="cloudThreshold" type="number" min="0.3" max="0.8" step="0.025" value="0.5"></div>

    <h2>Pasma Hatching</h2>
    <div class="field"><label>lw (mm)</label><input id="lw" type="number" min="0.1" max="1.0" step="0.05" value="0.3"></div>
    <div class="field"><label>Density ×lw</label><input id="density" type="number" min="1.5" max="6" step="0.25" value="2.5"></div>
    <div class="field"><label>Buffer res</label><input id="bufRes" type="number" min="200" max="800" step="50" value="400"></div>

    <h2>Light</h2>
    <div class="field"><label>Light X</label><input id="lx" type="number" step="0.1" value="-0.6"></div>
    <div class="field"><label>Light Y</label><input id="ly" type="number" step="0.1" value="0.8"></div>
    <div class="field"><label>Light Z</label><input id="lz" type="number" step="0.1" value="-0.4"></div>

    <div class="row" style="margin-top:10px">
      <button id="render">Render</button>
      <button id="randomize" class="secondary">Random</button>
      <button id="save" class="secondary">Save SVG</button>
    </div>

    <div class="stats" id="stats">Ready.</div>
    <a class="url-link" id="permalink" href="#">permalink</a>
  </div>

  <div class="stage">
    <svg id="preview" width="480" height="600" viewBox="0 0 1200 1500"
         xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<script>
'use strict';

// ============================================================
// Constants & coordinate system
// ============================================================
// SVG output: 4×5 inch portrait, viewBox 1200×1500 (300 units/inch)
const W_IN = 4, H_IN = 5;
const VB_W = 1200, VB_H = 1500;
const MARGIN_VB = 60;

// Screen-space coords. sx ∈ [-1, 1], sy ∈ [-1.25, 1.25] (positive sy = UP).
const SX_MIN = -1, SX_MAX = 1;
const SY_MIN = -1.25, SY_MAX = 1.25;

// Camera position is fixed; the *direction* changes with `camTilt`, so the
// horizon position on screen is configurable. These F/R/U vectors are
// recomputed at render time by setupCamera().
// Camera position and focal distance — `let` so scenes can override them
// per-render through `setupCamera({ pos, focal, tiltDeg })`. Defaults work
// for the standard "subject on a horizon" composition.
let CAM = [0, 0, -5];
let FOCAL = 4;
const GROUND_Y = -0.5;
let camF = [0, 0, 1];
let camR = [1, 0, 0];
let camU = [0, 1, 0];
let syHorizon = 0;

// `opts` accepts either a number (legacy tilt-degrees) or an object:
//   { tiltDeg, yawDeg, distance, pos: [x,y,z], focal }
// Defaults: tilt 0, yaw 0, distance 5 (camera orbits at this radius around
// the origin in the xz plane). `pos` overrides the orbit math entirely.
function setupCamera(opts) {
  if (typeof opts === 'number') opts = { tiltDeg: opts };
  opts = opts || {};
  const tiltDeg = opts.tiltDeg != null ? opts.tiltDeg : 0;
  const yawDeg  = opts.yawDeg  != null ? opts.yawDeg  : 0;
  const dist    = opts.distance != null ? opts.distance : 5;
  const tilt = tiltDeg * Math.PI / 180;
  const yaw  = yawDeg  * Math.PI / 180;
  const sy_ = Math.sin(yaw), cy_ = Math.cos(yaw);
  const st_ = Math.sin(tilt), ct_ = Math.cos(tilt);
  // Orbit: yaw=0 → camera at (0, 0, -dist) (legacy default).
  if (opts.pos) CAM = opts.pos.slice();
  else          CAM = [dist * sy_, 0, -dist * cy_];
  FOCAL = opts.focal != null ? opts.focal : 4;
  // Yaw-then-pitch camera basis. F points from CAM toward the origin
  // (modulo the pitch).
  camF = [-sy_ * ct_, st_, cy_ * ct_];
  camR = [ cy_,       0,   sy_      ];
  // U = F × R for right-handed +y-up
  camU = [
    camF[1] * camR[2] - camF[2] * camR[1],
    camF[2] * camR[0] - camF[0] * camR[2],
    camF[0] * camR[1] - camF[1] * camR[0]
  ];
  // Horizon on screen: where the world-y component of the ray is zero.
  syHorizon = -camF[1] * FOCAL / camU[1];
}

// Hatching: 4 fixed screen-space angles, picked per-pixel from the projected
// surface normal of the blob.
const HATCH_ANGLES = [0, Math.PI / 4, Math.PI / 2, 3 * Math.PI / 4];

// 1 sx-unit = 2 inches = 50.8mm  ⇒  WORLD_PER_MM = 0.5 / 25.4
const WORLD_PER_MM = 2.0 / (W_IN * 25.4);

// ============================================================
// PRNG
// ============================================================
function hashSeed(s) {
  s = String(s);
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function makeRng(seed) {
  let s = hashSeed(seed);
  return function () {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ============================================================
// SDF
// ============================================================
function sphereSDF(x, y, z, c, r) {
  const dx = x - c[0], dy = y - c[1], dz = z - c[2];
  return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
}
function smin(a, b, k) {
  const h = Math.max(k - Math.abs(a - b), 0) / k;
  return Math.min(a, b) - h * h * k * 0.25;
}
// Position-aware blob SDF — multiple of these can be composed via
// sdfUnion() to build "multiple blobs in a scene" (Monoliths, Forest,
// Cacti, Skyline, …). Each blob picks its own random lobes from `rng`.
//
//   opts = {
//     center:      [x, y, z]   (default [0,0,0])
//     nSpheres:    int         lobes incl. central anchor
//     smoothK:     0..0.8      smooth-min radius
//     spread:      0..3        horizontal/radial offset multiplier
//     verticality: 0.4..3      world-y stretch (taller > 1)
//     pointiness:  0..2        upper-lobe taper for sea-stack/cone forms
//     scale:       any         overall size multiplier
//   }
function makeBlobSDFAt(rng, opts) {
  const center = opts.center || [0, 0, 0];
  const nSpheres = opts.nSpheres || 4;
  const smoothK = opts.smoothK == null ? 0.3 : opts.smoothK;
  const spread = opts.spread == null ? 1 : opts.spread;
  const V = opts.verticality == null ? 1 : opts.verticality;
  const P = opts.pointiness || 0;
  const sc = opts.scale == null ? 1 : opts.scale;

  const spheres = [];
  spheres.push({ c: center.slice(), r: (0.4 + rng() * 0.15) * sc });
  for (let i = 1; i < nSpheres; i++) {
    const cyRaw = ((rng() - 0.5) * 0.6 * spread) * V * sc;
    const taper = cyRaw > 0 ? Math.max(0.15, 1 - P * cyRaw) : 1;
    spheres.push({
      c: [
        center[0] + (rng() - 0.5) * 0.7 * spread * taper * sc,
        center[1] + cyRaw,
        center[2] + (rng() - 0.5) * 0.5 * spread * taper * sc
      ],
      r: (0.22 + rng() * 0.25) * Math.max(0.3, taper) * sc
    });
  }
  return function (x, y, z) {
    function ell(c, r) {
      const dx = x - c[0];
      const dy = (y - c[1]) / V;
      const dz = z - c[2];
      return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
    }
    let d = ell(spheres[0].c, spheres[0].r);
    for (let i = 1; i < spheres.length; i++) {
      d = smin(d, ell(spheres[i].c, spheres[i].r), smoothK);
    }
    return d;
  };
}

// ============================================================
// SDF composition engines
// ============================================================
// Union of multiple SDFs. `smoothK > 0` → smooth-min blending (good for
// organic forms that flow into each other). `smoothK = 0` → sharp
// Math.min (good for visually distinct objects).
function sdfUnion(sdfs, smoothK) {
  if (sdfs.length === 0) return function () { return Infinity; };
  if (sdfs.length === 1) return sdfs[0];
  if (smoothK > 0) {
    return function (x, y, z) {
      let d = sdfs[0](x, y, z);
      for (let i = 1; i < sdfs.length; i++) {
        d = smin(d, sdfs[i](x, y, z), smoothK);
      }
      return d;
    };
  }
  return function (x, y, z) {
    let d = sdfs[0](x, y, z);
    for (let i = 1; i < sdfs.length; i++) {
      const e = sdfs[i](x, y, z);
      if (e < d) d = e;
    }
    return d;
  };
}

// Plane carving — subtract each carver from base. `result = max(base, -c0, -c1, …)`.
// Useful for arches, cave mouths, windows, valleys.
function sdfSubtract(base, carvers) {
  if (!carvers || carvers.length === 0) return base;
  return function (x, y, z) {
    let d = base(x, y, z);
    for (let i = 0; i < carvers.length; i++) {
      const c = -carvers[i](x, y, z);
      if (c > d) d = c;
    }
    return d;
  };
}

// Axis-aligned box (optionally rounded). cx,cy,cz = centre; hx,hy,hz = half-sizes.
// `round` shrinks the box by `round` and adds it back as a fillet — set to 0 for
// sharp corners.
function makeBox(cx, cy, cz, hx, hy, hz, round) {
  const r = round || 0;
  const hxR = hx - r, hyR = hy - r, hzR = hz - r;
  return function (x, y, z) {
    const dx = Math.abs(x - cx) - hxR;
    const dy = Math.abs(y - cy) - hyR;
    const dz = Math.abs(z - cz) - hzR;
    const ox = Math.max(dx, 0), oy = Math.max(dy, 0), oz = Math.max(dz, 0);
    const outside = Math.sqrt(ox * ox + oy * oy + oz * oz);
    const inside = Math.min(Math.max(dx, Math.max(dy, dz)), 0);
    return outside + inside - r;
  };
}

// Finite cone with apex at (cx, cy_apex, cz), base disk at y = cy_base with
// radius r_base. `cy_apex > cy_base` for an upward-pointing cone (pyramid /
// rocket-cone shape); pass `cy_apex < cy_base` for a downward-pointing cone.
function makeConeY(cx, cy_apex, cy_base, cz, r_base) {
  const apexUp = cy_apex > cy_base;
  const h = Math.abs(cy_apex - cy_base);
  const slantLen = Math.sqrt(r_base * r_base + h * h);
  return function (x, y, z) {
    const dx = x - cx, dz = z - cz;
    const dxz = Math.sqrt(dx * dx + dz * dz);
    const py = y - cy_apex;

    // Past the apex point (outside the cone, on the pointy side):
    if (apexUp ? (py > 0) : (py < 0)) {
      return Math.sqrt(dxz * dxz + py * py);
    }
    // Past the base disk (outside the cone, on the open side):
    if (apexUp ? (y < cy_base) : (y > cy_base)) {
      const dxDisk = Math.max(0, dxz - r_base);
      const dy = y - cy_base;
      return Math.sqrt(dxDisk * dxDisk + dy * dy);
    }
    // Within the cone's height range — signed distance to the slant surface.
    return (dxz * h - Math.abs(py) * r_base) / slantLen;
  };
}

// Square pyramid: square base of `halfSide` half-length centered at
// (cx, cy_base, cz), apex straight above at (cx, cy_base + height, cz).
// SDF = max of the four slanted-face half-spaces + the base plane —
// not a true Euclidean SDF (it under-estimates near edges) but it's
// a valid Lipschitz SDF that raymarches correctly.
function makePyramidSquare(cx, cy_base, cz, halfSide, height) {
  const s = halfSide;
  const h = height;
  const norm = Math.sqrt(h * h + s * s) || 1;
  return function (x, y, z) {
    const px = x - cx;
    const py = y - cy_base;
    const pz = z - cz;
    // Mirror through the diagonal symmetry of the square so we only have
    // to evaluate two slant planes instead of four.
    const ax = Math.abs(px);
    const az = Math.abs(pz);
    // Slanted faces: outward normal (h, s, 0)/norm and (0, s, h)/norm.
    // Plane SDF = (h*|p| + s*y - h*s) / norm, positive outside.
    const slantX = (h * ax + s * py - h * s) / norm;
    const slantZ = (h * az + s * py - h * s) / norm;
    // Base half-space: y ≥ cy_base must hold; outward normal (0, -1, 0).
    const base = -py;
    return Math.max(slantX, slantZ, base);
  };
}

// Half-space plane. Normal (nx, ny, nz) need not be unit-length; it gets
// normalised internally. The plane passes through the point where
// dot(p, n) + d = 0. SDF is positive on the +n side, negative on the -n side
// — pass as a carver to `sdfSubtract` to slice a base SDF in half.
function makePlane(nx, ny, nz, d) {
  const len = Math.sqrt(nx * nx + ny * ny + nz * nz) || 1;
  const ux = nx / len, uy = ny / len, uz = nz / len;
  const ud = d / len;
  return function (x, y, z) {
    return x * ux + y * uy + z * uz + ud;
  };
}

// Sphere primitive.
function makeSphere(cx, cy, cz, r) {
  return function (x, y, z) {
    const dx = x - cx, dy = y - cy, dz = z - cz;
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
  };
}

// Y-axis-aligned finite cylinder from y=cy0 to y=cy1, axis at (cx, _, cz),
// radius r. Standard "cylinder = (radial cap, axial cap)" combination.
function makeCylinderY(cx, cy0, cy1, cz, r) {
  return function (x, y, z) {
    const dx = x - cx, dz = z - cz;
    const dxz = Math.sqrt(dx * dx + dz * dz) - r;
    const dyTop = y - cy1, dyBot = cy0 - y;
    const dy = Math.max(dyTop, dyBot);
    const outX = Math.max(dxz, 0), outY = Math.max(dy, 0);
    const outside = Math.sqrt(outX * outX + outY * outY);
    const inside = Math.min(Math.max(dxz, dy), 0);
    return outside + inside;
  };
}

// ============================================================
// Tier 2: domain operators. Each wraps a base SDF and returns a new SDF.
// ============================================================

// 3-D smoothstep value-noise factory. Returns f(x, y, z) ∈ [0, 1].
function makeNoise3D(seedKey) {
  const rng = makeRng(seedKey);
  const GS = 32;
  const grid = new Float32Array(GS * GS * GS);
  for (let i = 0; i < grid.length; i++) grid[i] = rng();
  function idx3(x, y, z) {
    return (x % GS) + (y % GS) * GS + (z % GS) * GS * GS;
  }
  return function n3(x, y, z) {
    const ux = ((x % GS) + GS) % GS;
    const uy = ((y % GS) + GS) % GS;
    const uz = ((z % GS) + GS) % GS;
    const ix = Math.floor(ux), iy = Math.floor(uy), iz = Math.floor(uz);
    const fx = ux - ix, fy = uy - iy, fz = uz - iz;
    const sx = fx * fx * (3 - 2 * fx);
    const sy = fy * fy * (3 - 2 * fy);
    const sz = fz * fz * (3 - 2 * fz);
    const c000 = grid[idx3(ix,     iy,     iz    )];
    const c100 = grid[idx3(ix + 1, iy,     iz    )];
    const c010 = grid[idx3(ix,     iy + 1, iz    )];
    const c110 = grid[idx3(ix + 1, iy + 1, iz    )];
    const c001 = grid[idx3(ix,     iy,     iz + 1)];
    const c101 = grid[idx3(ix + 1, iy,     iz + 1)];
    const c011 = grid[idx3(ix,     iy + 1, iz + 1)];
    const c111 = grid[idx3(ix + 1, iy + 1, iz + 1)];
    const x00 = c000 + (c100 - c000) * sx;
    const x10 = c010 + (c110 - c010) * sx;
    const x01 = c001 + (c101 - c001) * sx;
    const x11 = c011 + (c111 - c011) * sx;
    const y0 = x00 + (x10 - x00) * sy;
    const y1 = x01 + (x11 - x01) * sy;
    return y0 + (y1 - y0) * sz;
  };
}

// Surface displacement: roughen a smooth SDF by adding noise to its value.
// `noiseFn` is expected in [0, 1]; it's centered before applying.
// `amp` is the peak-to-peak displacement amplitude (≤ ~0.2 for raymarch
// stability — large amps make the SDF non-Lipschitz and the raymarcher
// overshoots).
function displace(sdf, noiseFn, amp) {
  return function (x, y, z) {
    return sdf(x, y, z) + (noiseFn(x, y, z) - 0.5) * amp;
  };
}

// Rotate the input position around the Y axis by `k * y` radians before
// evaluating — twists any vertical form into a helix.
function twistY(sdf, k) {
  return function (x, y, z) {
    const c = Math.cos(k * y), s = Math.sin(k * y);
    return sdf(x * c - z * s, y, x * s + z * c);
  };
}

// Cheap-bend (Inigo Quilez): rotate the xy plane by `k * y` before
// evaluating. Turns a straight column into a curve / hook.
function bendY(sdf, k) {
  return function (x, y, z) {
    const c = Math.cos(k * y), s = Math.sin(k * y);
    return sdf(c * x - s * y, s * x + c * y, z);
  };
}

// Mirror around the given axis ('x' | 'y' | 'z') — instant bilateral
// symmetry. The half-SDF you define on the +axis side gets reflected.
function mirror(sdf, axis) {
  if (axis === 'x') return (x, y, z) => sdf(Math.abs(x), y, z);
  if (axis === 'y') return (x, y, z) => sdf(x, Math.abs(y), z);
  return (x, y, z) => sdf(x, y, Math.abs(z));
}

// Domain repetition. `period` is an [x, y, z] array; pass 0 on an axis to
// disable repetition there. Each query point gets wrapped into the
// [-p/2, p/2] cell before evaluating the underlying SDF.
function repeat(sdf, period) {
  return function (x, y, z) {
    if (period[0] > 0) {
      const p = period[0]; x = x - p * Math.floor((x + p / 2) / p);
    }
    if (period[1] > 0) {
      const p = period[1]; y = y - p * Math.floor((y + p / 2) / p);
    }
    if (period[2] > 0) {
      const p = period[2]; z = z - p * Math.floor((z + p / 2) / p);
    }
    return sdf(x, y, z);
  };
}

// X-axis-aligned capsule — useful as a "tunnel" carver to punch a
// horizontal arch through a rock. (Hvítserkur-style.)
function makeCapsuleX(cx, cy, cz, halfLen, r) {
  return function (x, y, z) {
    const tx = Math.max(-halfLen, Math.min(halfLen, x - cx));
    const dx = (x - cx) - tx;
    const dy = y - cy;
    const dz = z - cz;
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
  };
}

// Z-axis-aligned capsule — front-to-back tunnel.
function makeCapsuleZ(cx, cy, cz, halfLen, r) {
  return function (x, y, z) {
    const tz = Math.max(-halfLen, Math.min(halfLen, z - cz));
    const dx = x - cx;
    const dy = y - cy;
    const dz = (z - cz) - tz;
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
  };
}

// ============================================================
// Scene registry. Adding a new sister project = adding an entry here.
// Each entry receives (rng, state) and returns the full scene SDF.
// ============================================================
const SCENES = {
  single: function (rng, state) {
    return makeBlobSDFAt(rng, {
      center: [0, 0, 0],
      nSpheres: state.nSpheres,
      smoothK: state.smoothK,
      spread: state.spread,
      verticality: state.verticality,
      pointiness: state.pointiness
    });
  },
  monoliths: function (rng, state) {
    // 5 tall, slim, pointed stones spread across x. Sharp union so each
    // reads as its own object.
    const blobs = [];
    const n = 5;
    for (let i = 0; i < n; i++) {
      const t = (i + 0.5) / n - 0.5;            // -0.4 to 0.4
      const x = t * 1.7;
      const z = (rng() - 0.5) * 0.55 - 0.1;
      const h = 0.85 + rng() * 0.55;
      blobs.push(makeBlobSDFAt(rng, {
        center: [x, 0, z],
        nSpheres: 3,
        smoothK: 0.12,
        spread: 0.35,
        verticality: 1.4 + h,
        pointiness: 0.25,
        scale: 0.5
      }));
    }
    return sdfUnion(blobs, 0);
  },
  arch: function (rng, state) {
    // Tall-ish rock with a tunnel carved front-to-back, just above the
    // horizon — so the camera sees a circular hole through the rock with
    // sky/water visible on the far side.
    //
    // The tunnel MUST be along Z (front-to-back). An X-axis tunnel runs
    // perpendicular to the view direction and produces an internal cavity
    // invisible from the front.
    const base = makeBlobSDFAt(rng, {
      center: [0, 0.05, 0],
      nSpheres: 5,
      smoothK: 0.35,
      spread: 1.3,
      verticality: 1.6,
      pointiness: 0
    });
    const tunnel = makeCapsuleZ(0, 0.12, 0, 0.55, 0.22);
    return sdfSubtract(base, [tunnel]);
  },
  lighthouse: function (rng, state) {
    // Classic tower: cylindrical body, slightly wider lamp room above,
    // a small hemispherical roof on top. smoothK softens the joins so the
    // sections read as one continuous form rather than stacked tubes.
    const body      = makeCylinderY(0, -0.70,  0.60, 0, 0.16);
    const lamp      = makeCylinderY(0,  0.60,  0.78, 0, 0.22);
    const roof      = makeSphere(0, 0.86, 0, 0.18);
    return sdfUnion([body, lamp, roof], 0.04);
  },
  cone: function (rng, state) {
    // Circular cone — apex up, base on the ground plane.
    return {
      sdf: makeConeY(0, 0.75, -0.7, 0, 0.6),
      camera: { tiltDeg: 9 }
    };
  },
  pyramid: function (rng, state) {
    // Square-base pyramid, apex straight up. 3/4 view (camera yawed 25°)
    // so two faces are visible at different lighting — otherwise from
    // dead-on it reads as a flat triangle silhouette.
    return {
      sdf: makePyramidSquare(0, -0.7, 0, 0.7, 1.45),
      camera: { tiltDeg: 9, yawDeg: 25 }
    };
  },
  iceberg: function (rng, state) {
    // Tip + base softly merged, then surface-roughened with 3-D fBm noise
    // to break the smooth-blob silhouette into jagged ice facets.
    const tip = makeBlobSDFAt(rng, {
      center: [0.08, 0.32, 0],
      nSpheres: 3,
      smoothK: 0.12,
      spread: 0.32,
      verticality: 1.25,
      pointiness: 0.55,
      scale: 0.35
    });
    const base = makeBlobSDFAt(rng, {
      center: [-0.05, -0.30, 0],
      nSpheres: 5,
      smoothK: 0.35,
      spread: 1.1,
      verticality: 0.75,
      pointiness: 0,
      scale: 0.7
    });
    const smoothBerg = sdfUnion([tip, base], 0.22);
    // Two-octave noise for ice character: low frequency for big facets,
    // high frequency for crystalline grain.
    const n3 = makeNoise3D(state.seed + ':icebergNoise');
    function jagged(x, y, z) {
      return 0.65 * n3(x * 4, y * 4, z * 4) +
             0.35 * n3(x * 11, y * 11, z * 11);
    }
    return displace(smoothBerg, jagged, 0.09);
  },
  twistedColumn: function (rng, state) {
    // Tall slab bent into a helix by twistY. Demonstrates the new
    // operator; pairs well with the basket-weave-style hatching on the
    // resulting curved surface.
    const slab = makeBox(0, 0, 0, 0.42, 0.85, 0.16);
    return {
      sdf: twistY(slab, 2.6),
      camera: { tiltDeg: 6, yawDeg: 18 }
    };
  }
};

// ============================================================
// Camera + raymarch (orthographic in y, mild perspective in z so the
// horizon plane is visible)
// ============================================================
function castRay(sx, sy) {
  // direction = F·focal + R·sx + U·sy, normalized
  const dx = camF[0] * FOCAL + camR[0] * sx + camU[0] * sy;
  const dy = camF[1] * FOCAL + camR[1] * sx + camU[1] * sy;
  const dz = camF[2] * FOCAL + camR[2] * sx + camU[2] * sy;
  const len = Math.hypot(dx, dy, dz);
  return [dx / len, dy / len, dz / len];
}
function rayMarch(sdf, ox, oy, oz, dx, dy, dz, tMax) {
  let t = 0;
  for (let i = 0; i < 96; i++) {
    const d = sdf(ox + dx * t, oy + dy * t, oz + dz * t);
    if (d < 0.0008) return t;
    t += Math.max(d, 0.004);
    if (t > tMax) return -1;
  }
  return -1;
}
function normalAt(sdf, x, y, z) {
  const e = 0.0009;
  const nx = sdf(x + e, y, z) - sdf(x - e, y, z);
  const ny = sdf(x, y + e, z) - sdf(x, y - e, z);
  const nz = sdf(x, y, z + e) - sdf(x, y, z - e);
  const l = Math.hypot(nx, ny, nz) || 1;
  return [nx / l, ny / l, nz / l];
}

// ============================================================
// Scene buffer (depth, normal, lighting, surface, precomputed primary
// hatch angle index per pixel)
// surface: 0 = sky, 1 = blob, 2 = ground
// ============================================================
function snapAngle(a) {
  let amod = ((a % Math.PI) + Math.PI) % Math.PI;
  let bestI = 0, bestD = Infinity;
  for (let i = 0; i < HATCH_ANGLES.length; i++) {
    let d = Math.abs(amod - HATCH_ANGLES[i]);
    if (d > Math.PI / 2) d = Math.PI - d;
    if (d < bestD) { bestD = d; bestI = i; }
  }
  return bestI;
}

function renderSceneBuffer(state, sdf) {
  const W = state.bufRes;
  const H = Math.round(W * (SY_MAX - SY_MIN) / (SX_MAX - SX_MIN));
  const N = W * H;
  const buf = {
    W, H,
    surface: new Uint8Array(N),  // 0=sky 1=rock 2=ground
    nx: new Float32Array(N), ny: new Float32Array(N), nz: new Float32Array(N),
    light: new Float32Array(N),
    depth: new Float32Array(N),
    primary: new Uint8Array(N)
  };

  let lL = Math.hypot(state.lx, state.ly, state.lz) || 1;
  const L = [state.lx / lL, state.ly / lL, state.lz / lL];

  for (let py = 0; py < H; py++) {
    const sy = SY_MAX - (py / (H - 1)) * (SY_MAX - SY_MIN);
    for (let px = 0; px < W; px++) {
      const sx = SX_MIN + (px / (W - 1)) * (SX_MAX - SX_MIN);
      const idx = py * W + px;
      const [dx, dy, dz] = castRay(sx, sy);

      let tG = -1;
      if (dy < -1e-5) {
        const t = (GROUND_Y - CAM[1]) / dy;
        if (t > 0) tG = t;
      }
      const tB = rayMarch(sdf, CAM[0], CAM[1], CAM[2], dx, dy, dz, 25);

      let hit = 0, n = null, t = -1;
      if (tB > 0 && (tG < 0 || tB < tG)) {
        hit = 1; t = tB;
        n = normalAt(sdf, CAM[0] + dx * tB, CAM[1] + dy * tB, CAM[2] + dz * tB);
      } else if (tG > 0) {
        hit = 2; t = tG; n = [0, 1, 0];
      }

      if (hit === 0) { buf.surface[idx] = 0; continue; }
      buf.surface[idx] = hit;
      buf.nx[idx] = n[0]; buf.ny[idx] = n[1]; buf.nz[idx] = n[2];
      buf.depth[idx] = t;
      const ld = Math.max(0, n[0] * L[0] + n[1] * L[1] + n[2] * L[2]);
      buf.light[idx] = 0.15 + 0.85 * ld;

      // Per-pixel "primary" hatch angle = perpendicular to projected normal.
      // For very face-on regions (small projected normal), the angle is
      // unstable, so default to the diagonal there.
      const projMag = Math.hypot(n[0], n[1]);
      let pri;
      if (hit === 2) {
        pri = 0; // ground = horizontal
      } else if (projMag < 0.15) {
        pri = 1;
      } else {
        pri = snapAngle(Math.atan2(n[1], n[0]) + Math.PI / 2);
      }
      buf.primary[idx] = pri;
    }
  }
  return buf;
}

function bufIdx(buf, sx, sy) {
  const px = Math.round((sx - SX_MIN) / (SX_MAX - SX_MIN) * (buf.W - 1));
  const py = Math.round((SY_MAX - sy) / (SY_MAX - SY_MIN) * (buf.H - 1));
  if (px < 0 || px >= buf.W || py < 0 || py >= buf.H) return -1;
  return py * buf.W + px;
}

// ============================================================
// Hatching decision: for each (sx, sy) and a given hatch angle index,
// returns whether the scan line at that angle should be "on" here.
// ============================================================
function shouldDrawAt(buf, sx, sy, angleIdx) {
  const idx = bufIdx(buf, sx, sy);
  if (idx < 0) return false;
  // Sky and ground are handled by their own generators — the screen-space
  // scan-line passes here are blob-only.
  if (buf.surface[idx] !== 1) return false;

  const pri = buf.primary[idx];
  if (angleIdx === pri) return true;

  // Blob: tiered crosshatch by offset from primary.
  const offset = (angleIdx - pri + 4) % 4;
  const darkness = 1 - buf.light[idx];
  const T = [0, 0.30, 0.55, 0.78];
  return darkness > T[offset];
}

// ============================================================
// Hatch generation: scan parallel lines across the image at each angle.
// ============================================================
function generateHatches(state, buf) {
  const paths = [];
  const spacingMM = state.lw * state.density;
  const worldStep = Math.max(0.002, spacingMM * WORLD_PER_MM);
  const sampleStep = Math.max(0.0015, worldStep * 0.35);
  const RANGE = 1.8;

  for (let a = 0; a < HATCH_ANGLES.length; a++) {
    const ang = HATCH_ANGLES[a];
    const ca = Math.cos(ang), sa = Math.sin(ang);

    // Stagger every other angle by half spacing so different angle grids
    // don't visually align into moiré.
    const phase = (a % 2) * worldStep * 0.5;
    for (let s = -RANGE + phase; s <= RANGE; s += worldStep) {
      const sx0 = -sa * s;
      const sy0 = ca * s;

      let inDraw = false;
      let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;

      for (let t = -RANGE; t <= RANGE; t += sampleStep) {
        const sx = sx0 + ca * t;
        const sy = sy0 + sa * t;
        const inBounds = (sx >= SX_MIN && sx <= SX_MAX &&
                          sy >= SY_MIN && sy <= SY_MAX);
        const draw = inBounds && shouldDrawAt(buf, sx, sy, a);

        if (draw) {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        } else if (inDraw) {
          const segLen = Math.hypot(lastX - dx0, lastY - dy0);
          if (segLen > worldStep * 0.4) {
            paths.push([[dx0, dy0], [lastX, lastY]]);
          }
          inDraw = false;
        }
      }
      if (inDraw) {
        const segLen = Math.hypot(lastX - dx0, lastY - dy0);
        if (segLen > worldStep * 0.4) {
          paths.push([[dx0, dy0], [lastX, lastY]]);
        }
      }
    }
  }
  return paths;
}

// ============================================================
// Ground hatches: horizontal lines spaced evenly in WORLD z (depth),
// so they bunch toward the horizon and feel like they recede.
//
// Camera at (0, 0, -5) hitting ground at y = -0.5 via image plane at z = -1:
//   ground_z = -5 - 2/sy          ⇔          sy = -2 / (ground_z + 5)
// Stepping ground_z by a constant amount produces sy steps that shrink
// toward the horizon — the perspective compression we want.
// ============================================================
// Wave-style ground: same perspective spacing as the perspective lines,
// but each scan line is displaced by 2-D noise (two octaves) so it
// undulates. Wave amplitude tapers to zero at the horizon (perspective).
// Driven by `state.waviness`.
function generateGroundWaves(state, buf) {
  const paths = [];
  const sampleStep = 0.005;
  const maxDsy = state.lw * state.density * WORLD_PER_MM * 2.0;
  const minDsy = Math.max(state.lw * WORLD_PER_MM * 2.0, 0.006);
  const fullRange = syHorizon - SY_MIN;
  if (fullRange <= 0) return paths;

  const wave2D = makeNoise2D(state.seed + ':groundWaves');
  // Amplitude scales with both the waviness slider and the squared
  // distance-from-horizon factor so far waves are tiny, near ones bold.
  const ampBase = 0.06 * (state.waviness || 1);

  let sy = SY_MIN;
  const stopAt = syHorizon;
  while (sy < stopAt) {
    const d = (syHorizon - sy) / fullRange;       // 1 at bottom → 0 at horizon
    const step = minDsy + (maxDsy - minDsy) * d * d;
    const amp = ampBase * d * d;

    let polyline = [];
    function flush() {
      if (polyline.length >= 2) paths.push(polyline);
      polyline = [];
    }
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      // Two-octave noise centred on 0.5 → centred on 0 after subtraction
      // → ±1 range after the *2. Multiplied by amp gives final displacement.
      const oct1 = wave2D(sx * 5 + sy * 3, sy * 9)  - 0.5;
      const oct2 = wave2D(sx * 13 + sy * 7, sy * 21) - 0.5;
      const wave = (oct1 * 0.7 + oct2 * 0.3) * 2;
      const wavySy = sy + wave * amp;

      const idx = bufIdx(buf, sx, wavySy);
      const onGround = (idx >= 0 && buf.surface[idx] === 2);
      if (onGround) {
        polyline.push([sx, wavySy]);
      } else {
        flush();
      }
    }
    flush();
    sy += step;
  }
  return paths;
}

function generateGroundHatches(state, buf) {
  // Iterate sy DIRECTLY (not via z) with a smoothly shrinking step.
  // This avoids the "skip 1 every N" alternation pattern of the previous
  // algorithm, which caused the visible repeating bands.
  //
  //   step(sy) = minDsy + (maxDsy - minDsy) · ((dist_to_horizon)/full_range)²
  //
  // → sparse at the bottom (large step), tight at the horizon (~minDsy).
  const paths = [];
  const sampleStep = 0.003;

  // Sparse step at the far end (page bottom); tight step near horizon.
  // minDsy floor is 2× line width so even the densest lines keep a visible
  // gap — otherwise the horizon edge reads as a solid black band.
  const maxDsy = state.lw * state.density * WORLD_PER_MM * 2.0;
  const minDsy = Math.max(state.lw * WORLD_PER_MM * 2.0, 0.006);

  const fullRange = syHorizon - SY_MIN;
  if (fullRange <= 0) return paths;

  let sy = SY_MIN;
  // Iterate right up to the horizon so the topmost ground line sits
  // directly beneath the horizon stroke (no white gap between them).
  const stopAt = syHorizon;

  while (sy < stopAt) {
    const d = (syHorizon - sy) / fullRange;          // 1 at bottom → 0 at horizon
    const step = minDsy + (maxDsy - minDsy) * d * d; // squared falloff

    let inDraw = false;
    let x0 = 0, lastX = 0;
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      const idx = bufIdx(buf, sx, sy);
      const draw = (idx >= 0 && buf.surface[idx] === 2);
      if (draw) {
        if (!inDraw) { x0 = sx; inDraw = true; }
        lastX = sx;
      } else if (inDraw) {
        if (lastX - x0 > 0.005) paths.push([[x0, sy], [lastX, sy]]);
        inDraw = false;
      }
    }
    if (inDraw && lastX - x0 > 0.005) paths.push([[x0, sy], [lastX, sy]]);

    sy += step;
  }
  return paths;
}

// ============================================================
// Sky hatches: 45° scan lines clipped to sky pixels, dashed with a
// top-down fade — solid near the top of the page, fading to nothing
// as the scan line approaches the horizon.
// ============================================================
function generateSkyHatches(state, buf) {
  const paths = [];
  const ang = Math.PI / 4;
  const ca = Math.cos(ang), sa = Math.sin(ang);

  // Slightly sparser than blob hatches so the sky reads as background.
  const spacingWorld = state.lw * state.density * WORLD_PER_MM * 1.3;
  const sampleStep = Math.max(0.0015, spacingWorld * 0.22);
  const cycleLen = spacingWorld * 1.4;
  const RANGE = 1.85;

  // syHorizon is set by setupCamera() at render time.
  const maxSky = SY_MAX - syHorizon;
  if (maxSky < 0.05) return paths;

  // Optional waviness — displace each sample perpendicular to the scan
  // direction. When waviness=0, behaves exactly as before (straight 2-pt
  // segments). When waviness>0, we accumulate polylines.
  const wobN2 = state.waviness > 0 ? makeNoise2D(state.seed + ':gradWobble') : null;
  const wobAmp = spacingWorld * 0.2 * state.waviness;

  for (let s = -RANGE; s <= RANGE; s += spacingWorld) {
    const sx0 = -sa * s;
    const sy0 = ca * s;
    let inDraw = false;
    let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;
    let polyline = [];
    function flush() {
      if (wobN2) {
        if (polyline.length >= 2) paths.push(polyline);
        polyline = [];
      } else if (inDraw &&
                 Math.hypot(lastX - dx0, lastY - dy0) > spacingWorld * 0.3) {
        paths.push([[dx0, dy0], [lastX, lastY]]);
      }
      inDraw = false;
    }

    for (let t = -RANGE; t <= RANGE; t += sampleStep) {
      let sx = sx0 + ca * t;
      let sy = sy0 + sa * t;
      if (wobN2) {
        const w = (wobN2(sx * 3, sy * 3) - 0.5) * wobAmp;
        sx += -sa * w;       // perpendicular to scan direction
        sy +=  ca * w;
      }
      let draw = false;
      if (sx >= SX_MIN && sx <= SX_MAX && sy >= SY_MIN && sy <= SY_MAX
          && sy > syHorizon) {
        const idx = bufIdx(buf, sx, sy);
        if (idx >= 0 && buf.surface[idx] === 0) {
          // Inverted from the previous attempt: solid at the TOP, fades
          // down toward the horizon. `above` = 1 at top of page, 0 at horizon.
          const above = (sy - syHorizon) / maxSky;
          const onFrac = above * above;          // squared falloff
          const cyc = (t / cycleLen) - Math.floor(t / cycleLen);
          draw = cyc < onFrac;
        }
      }
      if (draw) {
        if (wobN2) {
          polyline.push([sx, sy]);
        } else {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        }
        inDraw = true;
      } else {
        flush();
      }
    }
    flush();
  }
  return paths;
}

// ============================================================
// Shared 2-D smoothstep value-noise factory used by the sky textures.
// ============================================================
function makeNoise2D(seedKey) {
  const rng = makeRng(seedKey);
  const GS = 64;
  const grid = new Float32Array(GS * GS);
  for (let i = 0; i < grid.length; i++) grid[i] = rng();
  return function n2(x, y) {
    const ux = ((x % GS) + GS) % GS;
    const uy = ((y % GS) + GS) % GS;
    const ix = Math.floor(ux), iy = Math.floor(uy);
    const fx = ux - ix,        fy = uy - iy;
    const sxF = fx * fx * (3 - 2 * fx);
    const syF = fy * fy * (3 - 2 * fy);
    const a = grid[(ix % GS) + (iy % GS) * GS];
    const b = grid[((ix + 1) % GS) + (iy % GS) * GS];
    const c = grid[(ix % GS) + ((iy + 1) % GS) * GS];
    const d = grid[((ix + 1) % GS) + ((iy + 1) % GS) * GS];
    const ab = a + (b - a) * sxF;
    const cd = c + (d - c) * sxF;
    return ab + (cd - ab) * syF;
  };
}

// ============================================================
// Multi-angle gradient — the dashed-fade gradient layered at two angles.
// (Helper supports waviness — non-zero waviness switches output to polylines
// with perpendicular noise displacement.)
// ============================================================
function _skyGradientAtAngle(state, buf, ang) {
  const paths = [];
  const ca = Math.cos(ang), sa = Math.sin(ang);
  const spacingWorld = state.lw * state.density * WORLD_PER_MM * 1.6;
  const sampleStep = Math.max(0.0015, spacingWorld * 0.22);
  const cycleLen = spacingWorld * 1.4;
  const RANGE = 1.85;
  const maxSky = SY_MAX - syHorizon;
  if (maxSky < 0.05) return paths;
  const wobN2 = state.waviness > 0 ? makeNoise2D(state.seed + ':mgWobble' + ang) : null;
  const wobAmp = spacingWorld * 0.2 * state.waviness;

  for (let s = -RANGE; s <= RANGE; s += spacingWorld) {
    const sx0 = -sa * s;
    const sy0 = ca * s;
    let inDraw = false;
    let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;
    let polyline = [];
    function flush() {
      if (wobN2) {
        if (polyline.length >= 2) paths.push(polyline);
        polyline = [];
      } else if (inDraw &&
                 Math.hypot(lastX - dx0, lastY - dy0) > spacingWorld * 0.3) {
        paths.push([[dx0, dy0], [lastX, lastY]]);
      }
      inDraw = false;
    }
    for (let t = -RANGE; t <= RANGE; t += sampleStep) {
      let sx = sx0 + ca * t;
      let sy = sy0 + sa * t;
      if (wobN2) {
        const w = (wobN2(sx * 3, sy * 3) - 0.5) * wobAmp;
        sx += -sa * w;
        sy +=  ca * w;
      }
      let draw = false;
      if (sx >= SX_MIN && sx <= SX_MAX && sy >= SY_MIN && sy <= SY_MAX
          && sy > syHorizon) {
        const idx = bufIdx(buf, sx, sy);
        if (idx >= 0 && buf.surface[idx] === 0) {
          const above = (sy - syHorizon) / maxSky;
          const onFrac = above * above;
          const cyc = (t / cycleLen) - Math.floor(t / cycleLen);
          draw = cyc < onFrac;
        }
      }
      if (draw) {
        if (wobN2) polyline.push([sx, sy]);
        else {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        }
        inDraw = true;
      } else {
        flush();
      }
    }
    flush();
  }
  return paths;
}
function generateSkyMultiGradient(state, buf) {
  return _skyGradientAtAngle(state, buf, Math.PI / 4)
    .concat(_skyGradientAtAngle(state, buf, 3 * Math.PI / 4));
}

// ============================================================
// Paper grain — horizontal dashed lines, density modulated by 2-D noise,
// optional vertical wobble via waviness.
// ============================================================
function generateSkyPaperGrain(state, buf) {
  const paths = [];
  const spacing = state.lw * state.density * WORLD_PER_MM * 1.4;
  const sampleStep = 0.003;
  const cycleLen = spacing * 2.0;
  if (SY_MAX - syHorizon < 0.05) return paths;
  const n2 = makeNoise2D(state.seed + ':paperGrain');
  const wobN2 = state.waviness > 0 ? makeNoise2D(state.seed + ':paperWobble') : null;
  const wobAmp = spacing * 0.3 * state.waviness;
  for (let baseSy = syHorizon + 0.01; baseSy <= SY_MAX; baseSy += spacing) {
    let inDraw = false;
    let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;
    let polyline = [];
    function flush() {
      if (wobN2) {
        if (polyline.length >= 2) paths.push(polyline);
        polyline = [];
      } else if (inDraw && Math.hypot(lastX - dx0, lastY - dy0) > 0.005) {
        paths.push([[dx0, dy0], [lastX, lastY]]);
      }
      inDraw = false;
    }
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      const sy = wobN2 ? baseSy + (wobN2(sx * 4, baseSy * 6) - 0.5) * wobAmp : baseSy;
      const idx = bufIdx(buf, sx, sy);
      const isSky = (idx >= 0 && buf.surface[idx] === 0);
      const density = 0.3 + 0.6 * n2(sx * 2.2, sy * 1.8);
      const cyc = (sx / cycleLen) - Math.floor(sx / cycleLen);
      const draw = isSky && cyc < density;
      if (draw) {
        if (wobN2) polyline.push([sx, sy]);
        else {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        }
        inDraw = true;
      } else flush();
    }
    flush();
  }
  return paths;
}

// ============================================================
// Concentric arcs — arc segments around a focal point above the page.
// Waviness perturbs each arc's radius along its sweep.
// ============================================================
function generateSkyArcs(state, buf) {
  const paths = [];
  if (SY_MAX - syHorizon < 0.05) return paths;
  const focal = [0.0, SY_MAX + 0.3];
  const spacing = state.lw * state.density * WORLD_PER_MM * 1.8;
  const minR = 0.25, maxR = 2.8;
  const angStep = 0.012;
  const wobN2 = state.waviness > 0 ? makeNoise2D(state.seed + ':arcWobble') : null;
  const wobAmp = spacing * 0.4 * state.waviness;
  for (let r = minR; r <= maxR; r += spacing) {
    let polyline = [];
    function flush() {
      if (polyline.length >= 2) paths.push(polyline);
      polyline = [];
    }
    for (let theta = 0; theta <= 2 * Math.PI; theta += angStep) {
      let rr = r;
      if (wobN2) rr += (wobN2(r * 7, theta * 2.5) - 0.5) * wobAmp;
      const sx = focal[0] + rr * Math.cos(theta);
      const sy = focal[1] + rr * Math.sin(theta);
      if (sx < SX_MIN || sx > SX_MAX || sy < syHorizon || sy > SY_MAX) {
        flush(); continue;
      }
      const idx = bufIdx(buf, sx, sy);
      if (idx >= 0 && buf.surface[idx] === 0) polyline.push([sx, sy]);
      else flush();
    }
    flush();
  }
  return paths;
}

// ============================================================
// Sky clouds: horizontal lines in the top third of the page, with a
// wavy noise displacement so they read as cloud strands rather than
// a horizon gradient. Drawn only where the buffer reports sky (surface=0).
// ============================================================
function generateSkyClouds(state, buf) {
  const paths = [];
  // Operate in the top 1/3 of the page (in screen-y).
  const topThirdStart = SY_MAX - (SY_MAX - SY_MIN) / 3;
  if (topThirdStart <= syHorizon) return paths;

  // Line spacing comparable to the blob hatching density but a bit looser.
  const spacing = state.lw * state.density * WORLD_PER_MM * 1.5;
  const sampleStep = 0.005;

  // 2-D value noise — *critical* that this is genuinely 2D, not 1-D shifted
  // per row, otherwise adjacent strands share crest positions and form
  // visible diagonal wave-trains across the cloud band.
  const noiseRng = makeRng(state.seed + ':clouds');
  const GS = 64;
  const grid = new Float32Array(GS * GS);
  for (let i = 0; i < grid.length; i++) grid[i] = noiseRng();
  function n2(x, y) {
    const ux = ((x % GS) + GS) % GS;
    const uy = ((y % GS) + GS) % GS;
    const ix = Math.floor(ux), iy = Math.floor(uy);
    const fx = ux - ix,        fy = uy - iy;
    const sxF = fx * fx * (3 - 2 * fx);
    const syF = fy * fy * (3 - 2 * fy);
    const a = grid[(ix % GS) + (iy % GS) * GS];
    const b = grid[((ix + 1) % GS) + (iy % GS) * GS];
    const c = grid[(ix % GS) + ((iy + 1) % GS) * GS];
    const d = grid[((ix + 1) % GS) + ((iy + 1) % GS) * GS];
    const ab = a + (b - a) * sxF;
    const cd = c + (d - c) * sxF;
    return ab + (cd - ab) * syF;
  }

  // Amplitude of the wavy displacement (in screen-y units). Driven by the
  // global `waviness` slider so the same control affects clouds and waves.
  const ampBase = spacing * 1.4 * state.waviness;

  for (let sy = topThirdStart; sy <= SY_MAX; sy += spacing) {
    let polyline = [];
    function flush() {
      if (polyline.length >= 2) paths.push(polyline);
      polyline = [];
    }
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      // Sample the 2D noise field with different scales per octave. The
      // y-multipliers (9, 19, 31) ensure adjacent cloud rows (spaced ~0.02
      // in sy) land on uncorrelated noise rows.
      const n =
        0.55 * (n2(sx *  3, sy *  9) - 0.5) +
        0.30 * (n2(sx *  8, sy * 19) - 0.5) +
        0.15 * (n2(sx * 17, sy * 31) - 0.5);
      const wavy = sy + n * ampBase;
      if (wavy < topThirdStart || wavy > SY_MAX) { flush(); continue; }
      const idx = bufIdx(buf, sx, wavy);
      const isSky = (idx >= 0 && buf.surface[idx] === 0);
      if (isSky) {
        polyline.push([sx, wavy]);
      } else {
        flush();
      }
    }
    flush();
  }
  return paths;
}

// ============================================================
// Wobbly clouds — slight horizontal wobble + irregular missing segments.
// Two independent 1-D noises per row: one tiny displacement for the wobble,
// one separate noise thresholded at 0.5 for the dash mask. Smoothed value
// noise naturally makes the dash on/off runs variable length, so the
// "missing segments" look organic rather than periodic.
// ============================================================
function generateCloudsWobbly(state, buf) {
  const paths = [];
  const topThirdStart = SY_MAX - (SY_MAX - SY_MIN) / 3;
  if (topThirdStart <= syHorizon) return paths;

  const spacing = state.lw * state.density * WORLD_PER_MM * 1.5;
  const sampleStep = 0.004;

  const noiseRng = makeRng(state.seed + ':wobbly');
  const grid = new Float32Array(256);
  for (let i = 0; i < grid.length; i++) grid[i] = noiseRng();
  function n1(t) {
    const u = ((t % 256) + 256) % 256;
    const i = Math.floor(u);
    const f = u - i;
    const a = grid[i % 256];
    const b = grid[(i + 1) % 256];
    const s = f * f * (3 - 2 * f);
    return a + (b - a) * s;
  }

  // Slight wobble — at default waviness=3 this is ~0.6× the line spacing.
  const wobbleAmp = spacing * 0.2 * state.waviness;

  for (let sy = topThirdStart; sy <= SY_MAX; sy += spacing) {
    const wobblePhase = sy * 13.7;
    const dashPhase = sy * 31.5;          // unrelated to wobble — independent runs

    let polyline = [];
    function flush() {
      if (polyline.length >= 2) paths.push(polyline);
      polyline = [];
    }
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      const wobble = (n1(sx * 5 + wobblePhase) - 0.5) * wobbleAmp;
      const wavy = sy + wobble;
      // Smoothstep noise crossing 0.5 → variable-length on/off runs.
      const drawHere = n1(sx * 2.5 + dashPhase) > 0.5;
      if (wavy < topThirdStart || wavy > SY_MAX) { flush(); continue; }
      const idx = bufIdx(buf, sx, wavy);
      const isSky = (idx >= 0 && buf.surface[idx] === 0);
      if (drawHere && isSky) {
        polyline.push([sx, wavy]);
      } else {
        flush();
      }
    }
    flush();
  }
  return paths;
}

// ============================================================
// Splotchy clouds (legacy "broken-but-good" behaviour).
// Per-row 1-D noise displaces the line, but each in-bounds stretch is
// emitted as a single straight segment from entry to exit point — *not*
// as a curve through every intermediate sample. The result is an
// irregular, patchy hatch rather than smooth wavy strokes.
// ============================================================
function generateCloudsSplotchy(state, buf) {
  const paths = [];
  const topThirdStart = SY_MAX - (SY_MAX - SY_MIN) / 3;
  if (topThirdStart <= syHorizon) return paths;

  const spacing = state.lw * state.density * WORLD_PER_MM * 1.5;
  const sampleStep = 0.005;

  // 2-D value noise — adjacent rows sample independent slices, so segments
  // don't stack into diagonals.
  const noiseRng = makeRng(state.seed + ':cloudsSplotchy');
  const GS = 64;
  const grid = new Float32Array(GS * GS);
  for (let i = 0; i < grid.length; i++) grid[i] = noiseRng();
  function n2(x, y) {
    const ux = ((x % GS) + GS) % GS;
    const uy = ((y % GS) + GS) % GS;
    const ix = Math.floor(ux), iy = Math.floor(uy);
    const fx = ux - ix,        fy = uy - iy;
    const sxF = fx * fx * (3 - 2 * fx);
    const syF = fy * fy * (3 - 2 * fy);
    const a = grid[(ix % GS) + (iy % GS) * GS];
    const b = grid[((ix + 1) % GS) + (iy % GS) * GS];
    const c = grid[(ix % GS) + ((iy + 1) % GS) * GS];
    const d = grid[((ix + 1) % GS) + ((iy + 1) % GS) * GS];
    const ab = a + (b - a) * sxF;
    const cd = c + (d - c) * sxF;
    return ab + (cd - ab) * syF;
  }

  const ampBase = spacing * 1.4 * state.waviness;
  // Mask threshold — higher = sparser clouds with more empty sky between.
  const maskT = 0.42;

  for (let sy = topThirdStart; sy <= SY_MAX; sy += spacing) {
    let inDraw = false;
    let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;
    function flush() {
      if (inDraw && Math.hypot(lastX - dx0, lastY - dy0) > sampleStep * 0.6) {
        paths.push([[dx0, dy0], [lastX, lastY]]);
      }
      inDraw = false;
    }
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      // Wave displacement
      const n = 0.65 * (n2(sx * 4, sy * 11) - 0.5) +
                0.35 * (n2(sx * 10, sy * 23) - 0.5);
      const wavy = sy + n * ampBase;
      // Cloud-presence mask — a separate, lower-frequency noise channel.
      // Large, soft "cloud" regions where segments cluster; gaps between.
      const present = n2(sx * 1.4, sy * 3.2) > maskT;

      if (wavy < topThirdStart || wavy > SY_MAX || !present) {
        flush();
        continue;
      }
      const idx = bufIdx(buf, sx, wavy);
      const isSky = (idx >= 0 && buf.surface[idx] === 0);
      if (isSky) {
        if (!inDraw) { dx0 = sx; dy0 = wavy; inDraw = true; }
        lastX = sx; lastY = wavy;
      } else {
        flush();
      }
    }
    flush();
  }
  return paths;
}

// ============================================================
// fBm cloud noise field — shared between the three cloud styles below.
// 4-octave fractional Brownian motion over a 2-D value-noise table.
// Output normalised to [0, 1] so `cloudThreshold` reads as a percent.
// ============================================================
function makeCloudField(state) {
  const noiseRng = makeRng(state.seed + ':cloudField');
  const GS = 64;
  const grid = new Float32Array(GS * GS);
  for (let i = 0; i < grid.length; i++) grid[i] = noiseRng();
  function n2(x, y) {
    const ux = ((x % GS) + GS) % GS;
    const uy = ((y % GS) + GS) % GS;
    const ix = Math.floor(ux), iy = Math.floor(uy);
    const fx = ux - ix,        fy = uy - iy;
    const sxF = fx * fx * (3 - 2 * fx);
    const syF = fy * fy * (3 - 2 * fy);
    const a = grid[(ix % GS) + (iy % GS) * GS];
    const b = grid[((ix + 1) % GS) + (iy % GS) * GS];
    const c = grid[(ix % GS) + ((iy + 1) % GS) * GS];
    const d = grid[((ix + 1) % GS) + ((iy + 1) % GS) * GS];
    const ab = a + (b - a) * sxF;
    const cd = c + (d - c) * sxF;
    return ab + (cd - ab) * syF;
  }
  const baseScale = 3.2;
  // 4 octaves with geometric weights — Inigo-Quilez-style fBm.
  // Weight sum = 0.9375; normalise at the end so output ∈ [0, 1].
  return function fbm(x, y) {
    let v = 0, amp = 0.5, freq = baseScale;
    for (let i = 0; i < 4; i++) {
      v += amp * n2(x * freq, y * freq);
      freq *= 2;
      amp *= 0.5;
    }
    return v / 0.9375;
  };
}

// ============================================================
// Marching-squares isoline extractor. Samples `fn(x, y)` on a grid and
// emits 2-point line segments along the level set `fn == threshold`.
// ============================================================
function marchingSquares(fn, x0, y0, x1, y1, gridW, gridH, threshold) {
  const segments = [];
  const dx = (x1 - x0) / (gridW - 1);
  const dy = (y1 - y0) / (gridH - 1);
  const field = new Float32Array(gridW * gridH);
  for (let gy = 0; gy < gridH; gy++) {
    const y = y0 + gy * dy;
    for (let gx = 0; gx < gridW; gx++) {
      field[gy * gridW + gx] = fn(x0 + gx * dx, y);
    }
  }
  function lerp(a, b, ax, ay, bx, by) {
    if (Math.abs(b - a) < 1e-10) return [(ax + bx) / 2, (ay + by) / 2];
    const t = (threshold - a) / (b - a);
    return [ax + t * (bx - ax), ay + t * (by - ay)];
  }
  for (let gy = 0; gy < gridH - 1; gy++) {
    for (let gx = 0; gx < gridW - 1; gx++) {
      const tl = field[gy * gridW + gx];
      const tr = field[gy * gridW + gx + 1];
      const bl = field[(gy + 1) * gridW + gx];
      const br = field[(gy + 1) * gridW + gx + 1];
      const config = (tl >= threshold ? 8 : 0) | (tr >= threshold ? 4 : 0) |
                     (br >= threshold ? 2 : 0) | (bl >= threshold ? 1 : 0);
      if (config === 0 || config === 15) continue;
      const tlx = x0 + gx * dx, tly = y0 + gy * dy;
      const trx = tlx + dx,     try_ = tly;
      const blx = tlx,          bly = tly + dy;
      const brx = tlx + dx,     bry = tly + dy;
      const T = lerp(tl, tr, tlx, tly, trx, try_);
      const R = lerp(tr, br, trx, try_, brx, bry);
      const B = lerp(bl, br, blx, bly, brx, bry);
      const L = lerp(tl, bl, tlx, tly, blx, bly);
      switch (config) {
        case 1:  segments.push([L, B]); break;
        case 2:  segments.push([B, R]); break;
        case 3:  segments.push([L, R]); break;
        case 4:  segments.push([T, R]); break;
        case 5:  segments.push([L, T]); segments.push([B, R]); break;
        case 6:  segments.push([T, B]); break;
        case 7:  segments.push([L, T]); break;
        case 8:  segments.push([L, T]); break;
        case 9:  segments.push([T, B]); break;
        case 10: segments.push([T, R]); segments.push([L, B]); break;
        case 11: segments.push([T, R]); break;
        case 12: segments.push([L, R]); break;
        case 13: segments.push([B, R]); break;
        case 14: segments.push([L, B]); break;
      }
    }
  }
  return segments;
}

// Shared: vertical band where clouds live (top 1/3 of the page, above horizon).
function cloudBand() {
  return {
    bot: Math.max(syHorizon + 0.02, SY_MAX - (SY_MAX - SY_MIN) / 3),
    top: SY_MAX
  };
}

// ============================================================
// Option A — Cloud mask:
// horizontal scan lines clipped to `fbm(x, y) > threshold`.
// Cloud-shaped patches of hatching, with empty sky in between.
// ============================================================
function generateCloudsMask(state, buf) {
  const paths = [];
  const { bot, top } = cloudBand();
  if (top - bot < 0.05) return paths;

  const spacing = state.lw * state.density * WORLD_PER_MM * 1.5;
  const sampleStep = 0.005;
  const T = state.cloudThreshold;
  const fbm = makeCloudField(state);

  for (let sy = bot; sy <= top; sy += spacing) {
    let polyline = [];
    function flush() {
      if (polyline.length >= 2) paths.push(polyline);
      polyline = [];
    }
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      const inCloud = fbm(sx, sy) > T;
      const idx = bufIdx(buf, sx, sy);
      const isSky = (idx >= 0 && buf.surface[idx] === 0);
      if (inCloud && isSky) {
        polyline.push([sx, sy]);
      } else {
        flush();
      }
    }
    flush();
  }
  return paths;
}

// ============================================================
// Option B — Cloud outline (marching-squares iso-contour at threshold).
// ============================================================
function generateCloudsContour(state, buf) {
  const { bot, top } = cloudBand();
  if (top - bot < 0.05) return [];
  const fbm = makeCloudField(state);
  const T = state.cloudThreshold;

  const gridW = 220, gridH = 80;
  const segs = marchingSquares(fbm, SX_MIN, bot, SX_MAX, top, gridW, gridH, T);

  // Drop segments where either endpoint is occluded by the blob.
  const paths = [];
  for (const s of segs) {
    const ia = bufIdx(buf, s[0][0], s[0][1]);
    const ib = bufIdx(buf, s[1][0], s[1][1]);
    const okA = (ia >= 0 && buf.surface[ia] === 0);
    const okB = (ib >= 0 && buf.surface[ib] === 0);
    if (okA && okB) paths.push(s);
  }
  return paths;
}

// ============================================================
// Option C — Engraved clouds: outline (B) + interior horizontal hatching (A).
// ============================================================
function generateCloudsEngraved(state, buf) {
  return generateCloudsContour(state, buf).concat(generateCloudsMask(state, buf));
}

// ============================================================
// Horizon line, broken where the blob occludes it
// ============================================================
function addHorizonLine(paths, buf) {
  const HY = syHorizon;
  if (HY < SY_MIN + 0.02 || HY > SY_MAX - 0.02) return;
  const sampleStep = 0.0025;
  let inDraw = false, x0 = 0, lastX = 0;
  for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
    const i = bufIdx(buf, sx, HY);
    const occluded = (i >= 0 && buf.surface[i] === 1);
    if (!occluded) {
      if (!inDraw) { x0 = sx; inDraw = true; }
      lastX = sx;
    } else if (inDraw) {
      paths.push([[x0, HY], [lastX, HY]]);
      inDraw = false;
    }
  }
  if (inDraw) paths.push([[x0, HY], [lastX, HY]]);
}

// ============================================================
// Pen-up travel optimization
// ============================================================
function optimizePaths(paths) {
  const n = paths.length;
  if (n === 0) return paths;
  const used = new Uint8Array(n);
  const out = [];
  let cx = -1, cy = 1.25;
  for (let count = 0; count < n; count++) {
    let best = -1, bestD = Infinity, bestRev = false;
    for (let i = 0; i < n; i++) {
      if (used[i]) continue;
      const p = paths[i];
      const a = p[0], b = p[p.length - 1];
      const dA = (a[0] - cx) * (a[0] - cx) + (a[1] - cy) * (a[1] - cy);
      const dB = (b[0] - cx) * (b[0] - cx) + (b[1] - cy) * (b[1] - cy);
      if (dA < bestD) { bestD = dA; best = i; bestRev = false; }
      if (dB < bestD) { bestD = dB; best = i; bestRev = true; }
    }
    used[best] = 1;
    const p = paths[best];
    const ordered = bestRev ? p.slice().reverse() : p;
    out.push(ordered);
    cx = ordered[ordered.length - 1][0];
    cy = ordered[ordered.length - 1][1];
  }
  return out;
}

// ============================================================
// Hershey Sans (subset) — single-stroke vector font for plotter-friendly
// text overlay. Extracted from HersheySansMed.svg in the WeddingPen repo.

function parseGlyphPath(d) {
  if (!d) return [];
  const polylines = [];
  let current = [];
  const tokens = d.split(/\s+/);
  for (let i = 0; i < tokens.length; ) {
    const t = tokens[i++];
    if (t === 'M' || t === 'L') {
      const x = parseFloat(tokens[i++]);
      const y = parseFloat(tokens[i++]);
      if (t === 'M') {
        if (current.length >= 2) polylines.push(current);
        current = [[x, y]];
      } else {
        current.push([x, y]);
      }
    }
  }
  if (current.length >= 2) polylines.push(current);
  return polylines;
}

function measureText(text, scale) {
  let w = 0;
  for (const ch of text) {
    const g = HERSHEY_GLYPHS[ch];
    w += (g ? g.a : 400) * scale;
  }
  return w;
}

// Returns polylines in viewBox coords. `vbX,vbY` is the baseline-left anchor;
// font y-positive-up is flipped to SVG y-positive-down by subtraction.
function renderTextStrokes(text, vbX, vbY, scale) {
  const out = [];
  let cursor = vbX;
  for (const ch of text) {
    const g = HERSHEY_GLYPHS[ch];
    if (!g) { cursor += 400 * scale; continue; }
    if (g.d) {
      for (const poly of parseGlyphPath(g.d)) {
        out.push(poly.map(([gx, gy]) => [cursor + gx * scale, vbY - gy * scale]));
      }
    }
    cursor += g.a * scale;
  }
  return out;
}

// ============================================================
// SVG output
// ============================================================
function sxToVB(sx) {
  return MARGIN_VB + (sx - SX_MIN) / (SX_MAX - SX_MIN) * (VB_W - 2 * MARGIN_VB);
}
function syToVB(sy) {
  return MARGIN_VB + (SY_MAX - sy) / (SY_MAX - SY_MIN) * (VB_H - 2 * MARGIN_VB);
}
function buildPathD(paths, vbPaths) {
  let d = '';
  for (const p of paths) {
    if (p.length < 2) continue;
    d += 'M' + sxToVB(p[0][0]).toFixed(2) + ',' + syToVB(p[0][1]).toFixed(2);
    for (let i = 1; i < p.length; i++) {
      d += 'L' + sxToVB(p[i][0]).toFixed(2) + ',' + syToVB(p[i][1]).toFixed(2);
    }
  }
  if (vbPaths) {
    // Already in viewBox coordinates — no sx/syToVB transform.
    for (const p of vbPaths) {
      if (p.length < 2) continue;
      d += 'M' + p[0][0].toFixed(2) + ',' + p[0][1].toFixed(2);
      for (let i = 1; i < p.length; i++) {
        d += 'L' + p[i][0].toFixed(2) + ',' + p[i][1].toFixed(2);
      }
    }
  }
  return d;
}

// Display labels for the sky-style id stored in state.
const SKY_STYLE_LABEL = {
  gradient: 'gradient',
  wobbly: 'wobbly lines',
  multiGradient: 'box gradient',
  paperGrain: 'paper grain',
  arcs: 'concentric arcs',
  none: 'empty sky',
  // hidden legacy values still resolvable via URL
  clouds: 'wavy clouds',
  splotchy: 'splotchy lines'
};

// Builds the bottom-margin text polylines (already in viewBox coords).
function buildBottomLabel(state, strokeCount) {
  const sky = SKY_STYLE_LABEL[state.skyStyle] || state.skyStyle;
  const text = 'blobument  /  ' + strokeCount + ' strokes  /  '
             + sky + '  /  brepettis.com';
  const scale = 0.032;                       // ~16 vb cap-height
  const baselineY = VB_H - 18;               // 18 vb above page bottom
  const w = measureText(text, scale);
  // True horizontal center on the page width.
  const startX = (VB_W - w) / 2;
  return renderTextStrokes(text, startX, baselineY, scale);
}
function lwToStrokeVB(lwMM) { return lwMM * (300 / 25.4); }

// State + UI glue
// ============================================================
function readState() {
  return {
    seed: document.getElementById('seed').value || '0',
    scene: document.getElementById('scene').value,
    nSpheres: clampInt(document.getElementById('nSpheres').value, 4, 12, 4),
    spread: clampFloat(document.getElementById('spread').value, 0.2, 3.0, 1.0),
    verticality: clampFloat(document.getElementById('verticality').value, 0.4, 3.0, 1.4),
    pointiness: clampFloat(document.getElementById('pointiness').value, 0, 2.0, 0),
    smoothK: clampFloat(document.getElementById('smoothK').value, 0.05, 0.8, 0.3),
    camTilt: clampFloat(document.getElementById('camTilt').value, 0, 20, 6),
    skyStyle: document.getElementById('skyStyle').value,
    groundStyle: document.getElementById('groundStyle').value,
    waviness: clampFloat(document.getElementById('waviness').value, 0, 8, 3.0),
    cloudThreshold: clampFloat(document.getElementById('cloudThreshold').value, 0.3, 0.8, 0.5),
    lw: clampFloat(document.getElementById('lw').value, 0.05, 2.0, 0.3),
    density: clampFloat(document.getElementById('density').value, 1.2, 8, 2.5),
    bufRes: clampInt(document.getElementById('bufRes').value, 200, 800, 400),
    lx: clampFloat(document.getElementById('lx').value, -2, 2, -0.6),
    ly: clampFloat(document.getElementById('ly').value, -2, 2, 0.8),
    lz: clampFloat(document.getElementById('lz').value, -2, 2, -0.4),
  };
}
function clampInt(v, lo, hi, fb) {
  const n = parseInt(v, 10);
  return Number.isFinite(n) ? Math.min(hi, Math.max(lo, n)) : fb;
}
function clampFloat(v, lo, hi, fb) {
  const n = parseFloat(v);
  return Number.isFinite(n) ? Math.min(hi, Math.max(lo, n)) : fb;
}
function setStatus(msg) { document.getElementById('stats').textContent = msg; }
function tick() { return new Promise(r => setTimeout(r, 0)); }

function syncFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const keys = ['seed','scene','lw','density','nSpheres','spread','verticality',
                'pointiness','smoothK','camTilt','skyStyle','groundStyle','waviness',
                'cloudThreshold','bufRes','lx','ly','lz'];
  for (const k of keys) {
    if (params.has(k)) document.getElementById(k).value = params.get(k);
  }
}
function writeUrl(state) {
  const params = new URLSearchParams();
  for (const k of ['seed','scene','lw','density','nSpheres','spread','verticality',
                   'pointiness','smoothK','camTilt','skyStyle','groundStyle','waviness',
                   'cloudThreshold']) {
    params.set(k, state[k]);
  }
  const url = window.location.pathname + '?' + params.toString();
  window.history.replaceState({}, '', url);
  const link = document.getElementById('permalink');
  link.href = url;
  link.textContent = '?' + params.toString();
}

let lastRender = null;

async function doRender() {
  const btn = document.getElementById('render');
  btn.disabled = true;
  try {
    const state = readState();
    writeUrl(state);

    setStatus('Building blob SDF…');
    await tick();
    const rng = makeRng(state.seed);
    // Scenes can return either a bare SDF function OR `{ sdf, camera }`
    // where `camera` is the same options object that setupCamera() accepts.
    // A scene-supplied camera overrides the UI camTilt for that render.
    const sceneFn = SCENES[state.scene] || SCENES.single;
    const sceneResult = sceneFn(rng, state);
    let sdf, sceneCamera = null;
    if (typeof sceneResult === 'function') {
      sdf = sceneResult;
    } else {
      sdf = sceneResult.sdf;
      sceneCamera = sceneResult.camera || null;
    }
    setupCamera(sceneCamera || { tiltDeg: state.camTilt });

    setStatus('Raymarching scene buffer…');
    await tick();
    const t0 = performance.now();
    const buf = renderSceneBuffer(state, sdf);
    const t1 = performance.now();

    setStatus('Generating hatches…');
    await tick();
    const blob = generateHatches(state, buf);
    const ground = (state.groundStyle === 'waves')
      ? generateGroundWaves(state, buf)
      : generateGroundHatches(state, buf);
    let sky;
    switch (state.skyStyle) {
      case 'wobbly':        sky = generateCloudsWobbly(state, buf); break;
      case 'multiGradient': sky = generateSkyMultiGradient(state, buf); break;
      case 'paperGrain':    sky = generateSkyPaperGrain(state, buf); break;
      case 'arcs':          sky = generateSkyArcs(state, buf); break;
      case 'none':          sky = []; break;
      case 'splotchy':      sky = generateCloudsSplotchy(state, buf); break;
      // The options below are hidden in the UI but still callable from URL
      // params if you want to inspect them.
      case 'clouds':       sky = generateSkyClouds(state, buf); break;
      case 'cloudMask':    sky = generateCloudsMask(state, buf); break;
      case 'cloudContour': sky = generateCloudsContour(state, buf); break;
      case 'cloudEngraved':sky = generateCloudsEngraved(state, buf); break;
      default:             sky = generateSkyHatches(state, buf); break;
    }
    const rawPaths = blob.concat(ground).concat(sky);
    addHorizonLine(rawPaths, buf);
    const t2 = performance.now();

    setStatus('Optimizing pen travel…');
    await tick();
    const paths = optimizePaths(rawPaths);
    const t3 = performance.now();

    const labelPaths = buildBottomLabel(state, paths.length);
    const d = buildPathD(paths, labelPaths);
    const strokeVB = lwToStrokeVB(state.lw);

    const svg = document.getElementById('preview');
    svg.setAttribute('viewBox', '0 0 ' + VB_W + ' ' + VB_H);
    svg.style.width = '480px';
    svg.style.height = '600px';
    svg.innerHTML =
      '<rect width="' + VB_W + '" height="' + VB_H + '" fill="white"/>' +
      '<path d="' + d + '" stroke="black" stroke-width="' + strokeVB.toFixed(3) +
      '" fill="none" stroke-linecap="round" stroke-linejoin="round"/>';

    lastRender = { state, paths, d, strokeVB };

    setStatus(
      paths.length + ' strokes\n' +
      'buffer ' + Math.round(t1 - t0) + 'ms · hatch ' + Math.round(t2 - t1) +
      'ms · opt ' + Math.round(t3 - t2) + 'ms\n' +
      'lw=' + state.lw + 'mm  spacing=' + (state.lw * state.density).toFixed(2) + 'mm'
    );
  } catch (err) {
    setStatus('Error: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

function doSave() {
  if (!lastRender) { setStatus('Nothing to save yet — render first.'); return; }
  const { state, d, strokeVB } = lastRender;
  const svgText =
    '<?xml version="1.0" encoding="UTF-8"?>\n' +
    '<svg xmlns="http://www.w3.org/2000/svg" ' +
    'width="' + W_IN + 'in" height="' + H_IN + 'in" ' +
    'viewBox="0 0 ' + VB_W + ' ' + VB_H + '">\n' +
    '  <path d="' + d + '" stroke="black" stroke-width="' + strokeVB.toFixed(3) +
    '" fill="none" stroke-linecap="round" stroke-linejoin="round"/>\n' +
    '</svg>\n';
  const blob = new Blob([svgText], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'rayblob_seed-' + state.seed + '_lw-' + state.lw + '.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function doRandomize() {
  document.getElementById('seed').value = Math.floor(Math.random() * 1e9).toString(36);
  doRender();
}

document.getElementById('render').addEventListener('click', doRender);
document.getElementById('save').addEventListener('click', doSave);
document.getElementById('randomize').addEventListener('click', doRandomize);
document.querySelectorAll('.panel input').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') doRender(); });
});

syncFromUrl();
doRender();
</script>
</body>
</html>
