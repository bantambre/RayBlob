      const j = y * W + x;
      if (buf.surface[j] === 1) { sum += src[j]; count++; }
    }
  }
  return count > 0 ? sum / count : src[iy * W + ix];
}

// Wide-stencil gradient — central difference over R pixels each side,
// smoothed by a 3x3 box around each sample point. Much more stable
// than 1-pixel central diff on noisy SDF/light buffers.
function gradient(buf, src, ix, iy, R) {
  const W = buf.W, H = buf.H;
  if (ix < R || ix >= W - R || iy < R || iy >= H - R) return null;
  if (buf.surface[iy * W + ix] !== 1) return null;
  const dR = sampleSmooth(buf, src, ix + R, iy);
  const dL = sampleSmooth(buf, src, ix - R, iy);
  const dD = sampleSmooth(buf, src, ix, iy + R);
  const dU = sampleSmooth(buf, src, ix, iy - R);
  return [(dR - dL) / (2 * R), (dD - dU) / (2 * R)];
}

function fieldIsoDepth(buf, ix, iy) {
  const g = gradient(buf, buf.depth, ix, iy, 3);
  if (!g) return null;
  const mag = Math.hypot(g[0], g[1]);
  if (mag < 1e-6) return [1, 0];
  return [-g[1] / mag, g[0] / mag];
}

function fieldProjNormal(buf, ix, iy) {
  const i = iy * buf.W + ix;
  if (buf.surface[i] !== 1) return null;
  // Box-blur the projected normal over a 3x3 neighbourhood so the
  // streamline direction is smoother than the raw per-pixel normal.
  const nxAvg = sampleSmooth(buf, buf.nx, ix, iy);
  const nyAvg = sampleSmooth(buf, buf.ny, ix, iy);
  const mag = Math.hypot(nxAvg, nyAvg);
  if (mag < 1e-4) return [1, 0];
  return [-nyAvg / mag, nxAvg / mag];
}

function fieldPrincipal(buf, ix, iy) {
  const g = gradient(buf, buf.light, ix, iy, 3);
  if (!g) return null;
  const mag = Math.hypot(g[0], g[1]);
  if (mag < 1e-6) return [1, 0];
  return [-g[1] / mag, g[0] / mag];
}

function generateCurveHatches(state, buf, fieldFn) {
  const W = buf.W, H = buf.H;
  const occ = new Uint8Array(W * H);

  // Spacing in pixel space, derived from the same lw × density product
  // the scan-line hatcher uses, but mapped through buffer resolution.
  const spacingMM = state.lw * state.density;
  const spacingWorld = Math.max(0.002, spacingMM * WORLD_PER_MM);
  const pxPerWorld = (W - 1) / (SX_MAX - SX_MIN);
  const spacingPx = Math.max(2, Math.round(spacingWorld * pxPerWorld));
  const sepSqr = spacingPx * spacingPx;

  const stepPx = 1.0;
  const maxSteps = Math.max(80, Math.round(Math.max(W, H) * 0.8));

  function isFreeSeed(px, py) {
    const ix = Math.round(px), iy = Math.round(py);
    if (ix < 0 || ix >= W || iy < 0 || iy >= H) return false;
    if (buf.surface[iy * W + ix] !== 1) return false;
    const r = spacingPx;
    const x0 = Math.max(0, ix - r), x1 = Math.min(W - 1, ix + r);
    const y0 = Math.max(0, iy - r), y1 = Math.min(H - 1, iy + r);
    for (let y = y0; y <= y1; y++) {
      const dy = y - iy;
      for (let x = x0; x <= x1; x++) {
        const dx = x - ix;
        if (dx * dx + dy * dy > sepSqr) continue;
        if (occ[y * W + x]) return false;
      }
    }
    return true;
  }

  function markStrip(px, py) {
    const ix = Math.round(px), iy = Math.round(py);
    if (ix < 0 || ix >= W || iy < 0 || iy >= H) return;
    occ[iy * W + ix] = 1;
  }

  function trace(px, py, dirSign, ignoreFlagsAroundSeed) {
    const points = [[px, py]];
    let lastDx = 0, lastDy = 0;
    let stepsSinceSeed = 0;
    for (let step = 0; step < maxSteps; step++) {
      const ix = Math.round(px), iy = Math.round(py);
      if (ix < 0 || ix >= W || iy < 0 || iy >= H) break;
      if (buf.surface[iy * W + ix] !== 1) break;
      const f = fieldFn(buf, ix, iy);
      if (!f) break;
      let dx = f[0] * dirSign;
      let dy = f[1] * dirSign;
      // Flip if reversing — preserves orientation of the streamline.
      if (step > 0 && (lastDx * dx + lastDy * dy) < 0) { dx = -dx; dy = -dy; }
      px += dx * stepPx;
      py += dy * stepPx;
      lastDx = dx; lastDy = dy;
      stepsSinceSeed++;
      // After we've moved away from the seed (≥ spacing*0.6), enforce
      // separation from other streamlines.
      if (stepsSinceSeed > spacingPx * 0.6 && !ignoreFlagsAroundSeed) {
        const px2 = Math.round(px), py2 = Math.round(py);
        if (px2 < 0 || px2 >= W || py2 < 0 || py2 >= H) break;
        if (occ[py2 * W + px2]) break;
      }
      points.push([px, py]);
    }
    return points;
  }

  const paths = [];
  const seedStride = Math.max(2, Math.floor(spacingPx * 0.7));
  for (let py = 1; py < H - 1; py += seedStride) {
    for (let px = 1; px < W - 1; px += seedStride) {
      const idx = py * W + px;
      if (buf.surface[idx] !== 1) continue;
      if (!isFreeSeed(px, py)) continue;

      // Trace both directions; ignore occupancy near the seed so the
      // forward and backward halves can join through the seed cell.
      const fwd = trace(px, py, +1, false);
      const bwd = trace(px, py, -1, false);
      const merged = bwd.slice(1).reverse().concat(fwd);
      if (merged.length < 3) continue;

      for (const [pxp, pyp] of merged) markStrip(pxp, pyp);

      paths.push(merged.map(p => bufPxToScreen(buf, p[0], p[1])));
    }
  }

  // Multi-level densification — 3 additional passes following the SAME
  // field as the main pass, each weaving streamlines at progressively
  // tighter spacing and gated by a progressively darker threshold.
  // Combined with the main pass this gives 4 discrete tonal levels
  // across the surface, applicable uniformly to iso-depth / projNormal
  // / principal. A SHARED occupancy grid means each tighter layer
  // fills in BETWEEN the previous layer's strokes.
  const densificationLayers = [
    { factor: 0.65, threshold: 0.30 },  // level 2
    { factor: 0.45, threshold: 0.55 },  // level 3
    { factor: 0.30, threshold: 0.75 }   // level 4
  ];
  // Re-use the SAME `occ` grid the main pass populated, so densification
  // strokes can't sit directly on top of main-pass streamlines.
  for (const layer of densificationLayers) {
    const sepPx2 = Math.max(1.5, spacingPx * layer.factor);
    const sepSqr2 = sepPx2 * sepPx2;
    const darkThreshold = layer.threshold;
    const isFreeSeed2 = function (px, py) {
      const ix = Math.round(px), iy = Math.round(py);
      if (ix < 0 || ix >= W || iy < 0 || iy >= H) return false;
      if (buf.surface[iy * W + ix] !== 1) return false;
      const i = iy * W + ix;
      if (computeDarkness(buf, i) < darkThreshold) return false;
      const r = Math.ceil(sepPx2);
      const x0 = Math.max(0, ix - r), x1 = Math.min(W - 1, ix + r);
      const y0 = Math.max(0, iy - r), y1 = Math.min(H - 1, iy + r);
      for (let y = y0; y <= y1; y++) {
        const dy = y - iy;
        for (let x = x0; x <= x1; x++) {
          const dx = x - ix;
          if (dx * dx + dy * dy > sepSqr2) continue;
          if (occ[y * W + x]) return false;
        }
      }
      return true;
    };
    const trace2 = function (px, py, dirSign) {
      const points = [[px, py]];
      let lastDx = 0, lastDy = 0;
      let stepsSinceSeed = 0;
      for (let step = 0; step < maxSteps; step++) {
        const ix = Math.round(px), iy = Math.round(py);
        if (ix < 0 || ix >= W || iy < 0 || iy >= H) break;
        if (buf.surface[iy * W + ix] !== 1) break;
        const i = iy * W + ix;
        // Trace allowed to taper slightly past the threshold so lines
        // end gracefully into lit regions.
        if (computeDarkness(buf, i) < darkThreshold - 0.10) break;
        const f = fieldFn(buf, ix, iy);
        if (!f) break;
        let dx = f[0] * dirSign;
        let dy = f[1] * dirSign;
        if (step > 0 && (lastDx * dx + lastDy * dy) < 0) { dx = -dx; dy = -dy; }
        px += dx * stepPx;
        py += dy * stepPx;
        lastDx = dx; lastDy = dy;
        stepsSinceSeed++;
        if (stepsSinceSeed > sepPx2 * 0.6) {
          const px2 = Math.round(px), py2 = Math.round(py);
          if (px2 < 0 || px2 >= W || py2 < 0 || py2 >= H) break;
          if (occ[py2 * W + px2]) break;
        }
        points.push([px, py]);
      }
      return points;
    };
    const seedStride2 = Math.max(2, Math.floor(sepPx2));
    const seedOffset  = Math.floor(seedStride2 / 2);
    for (let py = seedOffset; py < H - 1; py += seedStride2) {
      for (let px = seedOffset; px < W - 1; px += seedStride2) {
        const idx = py * W + px;
        if (buf.surface[idx] !== 1) continue;
        if (!isFreeSeed2(px, py)) continue;
        const fwd = trace2(px, py, +1);
        const bwd = trace2(px, py, -1);
        const merged = bwd.slice(1).reverse().concat(fwd);
        if (merged.length < 3) continue;
        for (const [pxp, pyp] of merged) {
          const ix = Math.round(pxp), iy = Math.round(pyp);
          if (ix >= 0 && ix < W && iy >= 0 && iy < H) occ[iy * W + ix] = 1;
        }
        paths.push(merged.map(p => bufPxToScreen(buf, p[0], p[1])));
      }
    }
  }

  return paths;
}

// ============================================================
// Ground hatches: horizontal lines spaced evenly in WORLD z (depth),
// so they bunch toward the horizon and feel like they recede.
//
// Camera at (0, 0, -5) hitting ground at y = -0.5 via image plane at z = -1:
//   ground_z = -5 - 2/sy          ⇔          sy = -2 / (ground_z + 5)
// Stepping ground_z by a constant amount produces sy steps that shrink
// toward the horizon — the perspective compression we want.
// ============================================================
// Wave-style ground: same perspective spacing as the perspective lines,
// but each scan line is displaced by 2-D noise (two octaves) so it
// undulates. Wave amplitude tapers to zero at the horizon (perspective).
// Driven by `state.waviness`.
// Two-pass approximate Euclidean distance transform on the blob mask
// (buf.surface === 1). Returns a Float32Array of distances in PIXEL
// units; ground / sky pixels carry the distance to the nearest blob
// pixel. Diagonal weight √2 ≈ 1.4142.
function computeBlobDistanceTransform(buf) {
  const W = buf.W, H = buf.H;
  const dist = new Float32Array(W * H);
  const big = 9999;
  for (let i = 0; i < W * H; i++) {
    dist[i] = (buf.surface[i] === 1) ? 0 : big;
  }
  const D = 1.4142;
  // Forward pass — looks up + left.
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = y * W + x;
      let d = dist[i];
      if (x > 0)              d = Math.min(d, dist[i - 1]    + 1);
      if (y > 0)              d = Math.min(d, dist[i - W]    + 1);
      if (x > 0 && y > 0)     d = Math.min(d, dist[i - W - 1] + D);
      if (x < W - 1 && y > 0) d = Math.min(d, dist[i - W + 1] + D);
      dist[i] = d;
    }
  }
  // Backward pass — looks down + right.
  for (let y = H - 1; y >= 0; y--) {
    for (let x = W - 1; x >= 0; x--) {
      const i = y * W + x;
      let d = dist[i];
      if (x < W - 1)                  d = Math.min(d, dist[i + 1]    + 1);
      if (y < H - 1)                  d = Math.min(d, dist[i + W]    + 1);
      if (x < W - 1 && y < H - 1)     d = Math.min(d, dist[i + W + 1] + D);
      if (x > 0 && y < H - 1)         d = Math.min(d, dist[i + W - 1] + D);
      dist[i] = d;
    }
  }
  return dist;
}

// Zen sand-garden ground (karesansui) — inspired by Piter Pasma's URH
// #420 "Sand Garden". Horizontal scan lines on the ground are displaced
// vertically by cos(distFromBlob × freq), where distFromBlob is the
// 2D screen-space distance from each ground pixel to the nearest blob
// pixel. The ripple amplitude falls off exponentially with distance,
// so it dies away into a quiet horizon. Reads as raked sand with
// concentric ripples surrounding each rock — exactly the look of a
// Japanese zen garden in plan.
// Compute the world-space (xz) centroid of the blob silhouette, projected
// down to the ground plane. Used as the ripple-ring anchor for the sand
// garden so the rings wrap around where the blob actually MEETS the
// ground in 3D, not where it lands on the 2D screen.
// World-space 2-D distance transform on the blob's ground silhouette.
// For each ground sample, returns the distance from that sample to the
// nearest world (x, z) point inside the blob's projected footprint.
// Used by the sand-garden ripples so the concentric rings follow the
// ACTUAL silhouette of the object — irregular shapes get irregular
// rings, not circles around a centroid.
function blobGroundDistanceField(buf, sdf) {
  // 1) Collect world (x, z) positions of the blob's hit points to find a
  //    reasonable BOUNDING BOX for the footprint. (Not used to mark
  //    the footprint itself — that's done by SDF probing below.)
  const W = buf.W, H = buf.H;
  const stride = 4;
  let xMin = Infinity, xMax = -Infinity, zMin = Infinity, zMax = -Infinity;
  let anyBlob = false;
  for (let py = 0; py < H; py += stride) {
    for (let px = 0; px < W; px += stride) {
      const idx = py * W + px;
      if (buf.surface[idx] !== 1) continue;
      const t = buf.depth[idx];
      if (t <= 0) continue;
      const sx = SX_MIN + (px / (W - 1)) * (SX_MAX - SX_MIN);
      const sy = SY_MAX - (py / (H - 1)) * (SY_MAX - SY_MIN);
      const r = castRay(sx, sy);
      const wx = CAM[0] + r[0] * t;
      const wz = CAM[2] + r[2] * t;
      if (wx < xMin) xMin = wx;
      if (wx > xMax) xMax = wx;
      if (wz < zMin) zMin = wz;
      if (wz > zMax) zMax = wz;
      anyBlob = true;
    }
  }
  if (!anyBlob) return null;
  // 2) Expand the bbox so ripples have room to propagate outward.
  const expand = 5.0;
  xMin -= expand; xMax += expand;
  zMin -= expand; zMax += expand;
  // 3) Allocate the coarse distance grid.
  const G = 180;
  const dist = new Float32Array(G * G);
  const big = 9e9;
  for (let i = 0; i < G * G; i++) dist[i] = big;
  const cellW = (xMax - xMin) / G;
  const cellH = (zMax - zMin) / G;
  // 4) Mark grid cells where the OBJECT'S SDF intersects the ground
  //    plane (y = GROUND_Y). The previous approach used camera hit
  //    points projected to (x, z) — but those describe the visible
  //    SURFACE of the object, which for tall thin objects gives a
  //    near-zero footprint. Probing the SDF at the ground plane gives
  //    the true silhouette where the object meets the sand, and rings
  //    correctly hug its actual outline (a column → circle, a colonnade
  //    → row of disks, a long rock → elongated shape).
  if (sdf) {
    for (let z = 0; z < G; z++) {
      for (let x = 0; x < G; x++) {
        const wx = xMin + (x + 0.5) * cellW;
        const wz = zMin + (z + 0.5) * cellH;
        if (sdf(wx, GROUND_Y, wz) <= 0) {
          dist[z * G + x] = 0;
        }
      }
    }
  }
  // 5) Two-pass Chamfer distance transform. Distances are in CELL UNITS;
  // we convert back to world units at sample time.
  const D = 1.4142;
  for (let z = 0; z < G; z++) {
    for (let x = 0; x < G; x++) {
      const i = z * G + x;
      let d = dist[i];
      if (x > 0)              d = Math.min(d, dist[i - 1] + 1);
      if (z > 0)              d = Math.min(d, dist[i - G] + 1);
      if (x > 0 && z > 0)     d = Math.min(d, dist[i - G - 1] + D);
      if (x < G - 1 && z > 0) d = Math.min(d, dist[i - G + 1] + D);
      dist[i] = d;
    }
  }
  for (let z = G - 1; z >= 0; z--) {
    for (let x = G - 1; x >= 0; x--) {
      const i = z * G + x;
      let d = dist[i];
      if (x < G - 1)                  d = Math.min(d, dist[i + 1] + 1);
      if (z < G - 1)                  d = Math.min(d, dist[i + G] + 1);
      if (x < G - 1 && z < G - 1)     d = Math.min(d, dist[i + G + 1] + D);
      if (x > 0 && z < G - 1)         d = Math.min(d, dist[i + G - 1] + D);
      dist[i] = d;
    }
  }
  return { grid: dist, G: G, xMin: xMin, zMin: zMin, cellW: cellW, cellH: cellH };
}

// Bilinear sample of the distance field at a world (x, z) position.
// Returns world-unit distance to the nearest point on the silhouette.
function sampleGroundDistance(field, worldX, worldZ) {
  if (!field) return 9e9;
  const gxf = (worldX - field.xMin) / field.cellW;
  const gzf = (worldZ - field.zMin) / field.cellH;
  if (gxf < 0 || gxf >= field.G - 1 || gzf < 0 || gzf >= field.G - 1) return 9e9;
  const x0 = Math.floor(gxf), z0 = Math.floor(gzf);
  const fx = gxf - x0, fz = gzf - z0;
  const G = field.G;
  const d00 = field.grid[z0 * G + x0];
  const d10 = field.grid[z0 * G + x0 + 1];
  const d01 = field.grid[(z0 + 1) * G + x0];
  const d11 = field.grid[(z0 + 1) * G + x0 + 1];
  const d0 = d00 * (1 - fx) + d10 * fx;
  const d1 = d01 * (1 - fx) + d11 * fx;
  // Convert from cell units to world units (use the smaller cell axis
  // as the unit — the transform was built with isotropic Chamfer steps).
  return (d0 * (1 - fz) + d1 * fz) * Math.min(field.cellW, field.cellH);
}

// Sand-garden displacement at world ground position (worldX, worldZ).
// Rings emanate from the actual SHAPE of the blob's ground silhouette
// via a world-space distance transform — irregular silhouettes produce
// irregular rings that follow the contour.
//
//   amp  — pure HEIGHT of each ripple (driven by Waviness).
//   freq — number of rings per world unit (driven by Ripple freq).
//
// Falloff (0.55) lets the rings persist outward several wavelengths
// so the count and the height are perceptually independent.
function sandGardenRipple(worldX, worldZ, field, freq, amp) {
  const distFromEdge = sampleGroundDistance(field, worldX, worldZ);
  if (distFromEdge >= 9e8) return 0;
  const fadeRate = 0.55;
  const falloff = Math.exp(-distFromEdge * fadeRate);
  return Math.cos(distFromEdge * freq) * amp * falloff;
}

function generateGroundSandGarden(state, buf, sdf) {
  const paths = [];
  if (syHorizon <= SY_MIN) return paths;
  const sampleStep = 0.004;
  // SAND GARDEN uses a FLAT line spacing across the whole ground — not
  // the d² perspective growth the regular ground uses. Perspective
  // compression made the foreground much sparser than the horizon
  // (10x larger steps) which left the foreground ripples illegible.
  // Karesansui-style raked sand reads better with uniform line density
  // anyway, so we just use the tight (minDsy) step everywhere.
  const baseStep = Math.max(state.lw * WORLD_PER_MM * 2.0, 0.006);
  const maxDsy = baseStep;  // amplitude reference — also the line spacing
  // World-space ring anchor — where the blob touches the ground, with
  // a radius equal to the blob's mean horizontal extent.
  const field = blobGroundDistanceField(buf, sdf);
  // Amplitude scales with line spacing so peaks stay near their own row.
  const rippleAmp = maxDsy * 1.10 * (state.waviness != null ? state.waviness : 1);
  const rippleFreq = state.rippleFreq != null ? state.rippleFreq : 7.0;
  let sy = SY_MIN;
  while (sy < syHorizon) {
    const step = baseStep;
    let polyline = [];
    function flush() {
      if (polyline.length >= 2) paths.push(polyline);
      polyline = [];
    }
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      // Project (sx, sy) onto the ground plane to get the world-space
      // ground point under this pixel.
      const r = castRay(sx, sy);
      if (r[1] >= 0) { flush(); continue; }
      const tg = (GROUND_Y - CAM[1]) / r[1];
      if (tg <= 0) { flush(); continue; }
      const worldX = CAM[0] + r[0] * tg;
      const worldZ = CAM[2] + r[2] * tg;
      const ripple = sandGardenRipple(worldX, worldZ, field, rippleFreq, rippleAmp);
      const wavySy = sy + ripple;
      const idx2 = bufIdx(buf, sx, wavySy);
      const onGround = (idx2 >= 0 && buf.surface[idx2] === 2);
      if (onGround) {
        polyline.push([sx, wavySy]);
      } else {
        flush();
      }
    }
    flush();
    sy += step;
  }
  return paths;
}

function generateGroundWaves(state, buf) {
  const paths = [];
  const sampleStep = 0.005;
  const maxDsy = state.lw * state.density * WORLD_PER_MM * 2.0;
  const minDsy = Math.max(state.lw * WORLD_PER_MM * 2.0, 0.006);
  const fullRange = syHorizon - SY_MIN;
  if (fullRange <= 0) return paths;

  const wave2D = makeNoise2D(state.seed + ':groundWaves');
  // Amplitude is tied to line spacing so wavy lines stay near their
  // neighbours instead of crossing several rows. The waviness slider
  // scales it further.
  const ampBase = maxDsy * 0.50 * (state.waviness != null ? state.waviness : 1);

  let sy = SY_MIN;
  const stopAt = syHorizon;
  while (sy < stopAt) {
    const d = (syHorizon - sy) / fullRange;       // 1 at bottom → 0 at horizon
    const step = minDsy + (maxDsy - minDsy) * d * d;
    // Taper amplitude with distance from horizon: bold near, subtle far.
    // Keep a small floor so distant rows aren't perfectly flat.
    const amp = ampBase * (0.30 + 0.70 * d * d);

    let polyline = [];
    function flush() {
      if (polyline.length >= 2) paths.push(polyline);
      polyline = [];
    }
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      // Three long-wavelength sine swells with slow phase drift in y so
      // adjacent rows have crests at almost-the-same x — coherent waves,
      // not independent per-row noise.
      const swell1 = Math.sin(sx * 3.0 + sy * 0.9 + 0.0) * 0.45;
      const swell2 = Math.sin(sx * 5.5 - sy * 0.5 + 1.7) * 0.28;
      const swell3 = Math.sin(sx * 1.6 + sy * 1.3 + 4.2) * 0.40;
      // Slow-varying organic detail. Both noise frequencies are LOW in y
      // so consecutive rows produce similar detail patterns.
      const detail = (wave2D(sx * 3.5 + sy * 0.4, sy * 0.7) - 0.5) * 0.40;
      const wave = swell1 + swell2 + swell3 + detail;
      const wavySy = sy + wave * amp;

      const idx = bufIdx(buf, sx, wavySy);
      const onGround = (idx >= 0 && buf.surface[idx] === 2);
      if (onGround) {
        polyline.push([sx, wavySy]);
      } else {
        flush();
      }
    }
    flush();
    sy += step;
  }
  return paths;
}

// Cast-shadow dashes on the ground: short perpendicular (vertical)
// strokes scattered through ground regions where buf.shadow is set.
// Pairs with whatever ground style is active — adds crosshatch only in
// shadowed areas.
function generateGroundShadows(state, buf, sdf) {
  const paths = [];
  if (syHorizon <= SY_MIN) return paths;
  const spacing = state.lw * state.density * WORLD_PER_MM;
  const dashLen = spacing * 0.90;
  const xStep = spacing * 0.55;
  const yStep = spacing * 0.45;
  // If the sand-garden ground style is active, displace each shadow
  // dash by the SAME world-space ring ripple so the cast shadow wobbles
  // with the sand pattern instead of stippling a flat grid over it.
  const useSandGarden = (state.groundStyle === 'sandGarden');
  const maxDsy = state.lw * state.density * WORLD_PER_MM * 2.0;
  const wavinessVal = state.waviness != null ? state.waviness : 1;
  const rippleAmp = useSandGarden ? maxDsy * 1.10 * wavinessVal : 0;
  const rippleFreq = state.rippleFreq != null ? state.rippleFreq : 7.0;
  const field = useSandGarden ? blobGroundDistanceField(buf, sdf) : null;
  for (let sy = SY_MIN + 0.01; sy < syHorizon - 0.005; sy += yStep) {
    for (let sx = SX_MIN + 0.01; sx <= SX_MAX - 0.01; sx += xStep) {
      const idx = bufIdx(buf, sx, sy);
      if (idx < 0 || buf.surface[idx] !== 2) continue;
      const s = buf.shadow[idx];
      if (s < 0.40) continue;
      const len = dashLen * (0.6 + 0.4 * s);
      let drawSy = sy;
      if (useSandGarden) {
        const r = castRay(sx, sy);
        if (r[1] < 0) {
          const tg = (GROUND_Y - CAM[1]) / r[1];
          if (tg > 0) {
            const worldX = CAM[0] + r[0] * tg;
            const worldZ = CAM[2] + r[2] * tg;
            drawSy = sy + sandGardenRipple(worldX, worldZ, field, rippleFreq, rippleAmp);
          }
        }
      }
      paths.push([
        [sx, drawSy - len / 2],
        [sx, drawSy + len / 2]
      ]);
    }
  }
  return paths;
}

function generateGroundHatches(state, buf) {
  // Iterate sy DIRECTLY (not via z) with a smoothly shrinking step.
  // This avoids the "skip 1 every N" alternation pattern of the previous
  // algorithm, which caused the visible repeating bands.
  //
  //   step(sy) = minDsy + (maxDsy - minDsy) · ((dist_to_horizon)/full_range)²
  //
  // → sparse at the bottom (large step), tight at the horizon (~minDsy).
  const paths = [];
  const sampleStep = 0.003;

  // Sparse step at the far end (page bottom); tight step near horizon.
  // minDsy floor is 2× line width so even the densest lines keep a visible
  // gap — otherwise the horizon edge reads as a solid black band.
  const maxDsy = state.lw * state.density * WORLD_PER_MM * 2.0;
  const minDsy = Math.max(state.lw * WORLD_PER_MM * 2.0, 0.006);

  const fullRange = syHorizon - SY_MIN;
  if (fullRange <= 0) return paths;

  let sy = SY_MIN;
  // Iterate right up to the horizon so the topmost ground line sits
  // directly beneath the horizon stroke (no white gap between them).
  const stopAt = syHorizon;

  while (sy < stopAt) {
    const d = (syHorizon - sy) / fullRange;          // 1 at bottom → 0 at horizon
    const step = minDsy + (maxDsy - minDsy) * d * d; // squared falloff

    let inDraw = false;
    let x0 = 0, lastX = 0;
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      const idx = bufIdx(buf, sx, sy);
      const draw = (idx >= 0 && buf.surface[idx] === 2);
      if (draw) {
        if (!inDraw) { x0 = sx; inDraw = true; }
        lastX = sx;
      } else if (inDraw) {
        if (lastX - x0 > 0.005) paths.push([[x0, sy], [lastX, sy]]);
        inDraw = false;
      }
    }
    if (inDraw && lastX - x0 > 0.005) paths.push([[x0, sy], [lastX, sy]]);

    sy += step;
  }
  return paths;
}

// ============================================================
// Sky hatches: 45° scan lines clipped to sky pixels, dashed with a
// top-down fade — solid near the top of the page, fading to nothing
// as the scan line approaches the horizon.
// ============================================================
// Stars: sparse Poisson-disc scatter of small crosses / dots in the sky
// region. Pairs with any scene as the sky style — gives a clear-night
// reading without any horizon hatching at all.
function generateStarSky(state, buf) {
  const paths = [];
  if (SY_MAX - syHorizon < 0.05) return paths;
  const rng = makeRng(state.seed + ':stars');
  const minDist = 0.045;
  const pad = 0.03;
  const stars = poissonScatter(rng, minDist, {
    xMin: SX_MIN + pad, xMax: SX_MAX - pad,
    yMin: syHorizon + pad, yMax: SY_MAX - pad
  }, 18);
  for (const [sx, sy] of stars) {
    const idx = bufIdx(buf, sx, sy);
    if (idx >= 0 && buf.surface[idx] !== 0) continue;       // skip if blob in front
    const size = 0.005 + rng() * 0.011;
    const kind = rng();
    if (kind < 0.48) {
      // Plus-cross — most common star
      paths.push([[sx - size, sy], [sx + size, sy]]);
      paths.push([[sx, sy - size], [sx, sy + size]]);
    } else if (kind < 0.78) {
      // Dim point — single short dash
      paths.push([[sx - size * 0.35, sy], [sx + size * 0.35, sy]]);
    } else if (kind < 0.92) {
      // 3-line asterisk (typographic *): three line segments through
      // the centre, 60° apart. Vertical + 30° + 150° orientation gives
      // a clean star with a hint of vertical alignment.
      const a3 = [Math.PI / 2, Math.PI / 6, 5 * Math.PI / 6];
      for (const a of a3) {
        const c = Math.cos(a), s = Math.sin(a);
        paths.push([[sx - c * size, sy - s * size], [sx + c * size, sy + s * size]]);
      }
    } else {
      // Bright star — full 4-line asterisk (cross + both diagonals).
      paths.push([[sx - size, sy], [sx + size, sy]]);
      paths.push([[sx, sy - size], [sx, sy + size]]);
      const d = size * 0.7;
      paths.push([[sx - d, sy - d], [sx + d, sy + d]]);
      paths.push([[sx - d, sy + d], [sx + d, sy - d]]);
    }
  }
  return paths;
}

// Constellation sky — Poisson-scattered stars with thin lines connecting
// some nearby pairs, forming a constellation pattern. Lines refuse to
// cross blob silhouettes so the constellations don't slice through the
// foreground subject.
function generateSkyConstellation(state, buf) {
  const paths = [];
  if (SY_MAX - syHorizon < 0.05) return paths;
  const rng = makeRng(state.seed + ':constellation');
  const minDist = 0.06;
  const pad = 0.04;
  const candidates = poissonScatter(rng, minDist, {
    xMin: SX_MIN + pad, xMax: SX_MAX - pad,
    yMin: syHorizon + pad, yMax: SY_MAX - pad
  }, 18);
  // Keep only candidates that fall on actual sky pixels (not occluded
  // by a blob in front).
  const stars = [];
  for (const [sx, sy] of candidates) {
    const idx = bufIdx(buf, sx, sy);
    if (idx < 0 || buf.surface[idx] === 0) stars.push([sx, sy]);
  }
  // Draw the stars themselves as small plus marks.
  for (const [sx, sy] of stars) {
    const size = 0.007 + rng() * 0.005;
    paths.push([[sx - size, sy], [sx + size, sy]]);
    paths.push([[sx, sy - size], [sx, sy + size]]);
  }
  // Connect a sparse subset of nearby pairs. Each star caps at maxConn
  // connections so the network reads as constellations, not a graph.
  const connectDist = 0.20;
  const maxConn = 2;
  const linkProb = 0.45;
  const used = new Array(stars.length).fill(0);
  for (let i = 0; i < stars.length; i++) {
    if (used[i] >= maxConn) continue;
    for (let j = i + 1; j < stars.length; j++) {
      if (used[j] >= maxConn) continue;
      const dx = stars[j][0] - stars[i][0];
      const dy = stars[j][1] - stars[i][1];
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > connectDist || d < 0.03) continue;
      if (rng() > linkProb) continue;
      // Reject the line if it crosses a non-sky pixel (blob in front).
      const segs = 10;
      let blocked = false;
      for (let k = 1; k < segs; k++) {
        const t = k / segs;
        const cx = stars[i][0] + dx * t;
        const cy = stars[i][1] + dy * t;
        const idx = bufIdx(buf, cx, cy);
        if (idx >= 0 && buf.surface[idx] !== 0) { blocked = true; break; }
      }
      if (blocked) continue;
      paths.push([stars[i].slice(), stars[j].slice()]);
      used[i]++; used[j]++;
      if (used[i] >= maxConn) break;
    }
  }
  return paths;
}

// Vertical-scan sky — parallel vertical scan lines covering the sky
// region. Replicates the URH #437 background: uniform vertical hatch
// that strongly contrasts with horizontal-line foregrounds. Stroke
// density follows the global lw × density spacing.
function generateSkyVertical(state, buf) {
  const paths = [];
  if (SY_MAX - syHorizon < 0.05) return paths;
  const spacing = Math.max(0.003, state.lw * state.density * WORLD_PER_MM * 1.1);
  const sampleStep = Math.max(0.0015, spacing * 0.25);
  for (let sx = SX_MIN; sx <= SX_MAX; sx += spacing) {
    let inDraw = false;
    let sy0 = 0, lastY = 0;
    for (let sy = syHorizon; sy <= SY_MAX; sy += sampleStep) {
      const idx = bufIdx(buf, sx, sy);
      const isSky = (idx >= 0 && buf.surface[idx] === 0);
      if (isSky) {
        if (!inDraw) { sy0 = sy; inDraw = true; }
        lastY = sy;
      } else if (inDraw) {
        if (Math.abs(lastY - sy0) > spacing * 0.4) {
          paths.push([[sx, sy0], [sx, lastY]]);
        }
        inDraw = false;
      }
    }
    if (inDraw && Math.abs(lastY - sy0) > spacing * 0.4) {
      paths.push([[sx, sy0], [sx, lastY]]);
    }
  }
  return paths;
}

// Rain sky — many short slanted dashes scattered uniformly across the
// sky region, all at the same angle. Reads as falling rain / steep
// drizzle. Distinct from the existing sky-style options because most
// of them are horizontal (gradient, wobbly, bands) or radial (arcs,
// stars) — this is the only one with a consistent diagonal motion.
function generateSkyRain(state, buf) {
  const paths = [];
  if (SY_MAX - syHorizon < 0.05) return paths;
  const rng = makeRng(state.seed + ':rain');
  const angleDeg = 78;
  const a = angleDeg * Math.PI / 180;
  const dx = Math.cos(a), dy = Math.sin(a);
  // Density scales with line spacing so denser hatching gives denser rain.
  const targetCount = Math.round(8000 * (0.30 / state.lw));
  for (let i = 0; i < targetCount; i++) {
    const sx = SX_MIN + rng() * (SX_MAX - SX_MIN);
    const sy = syHorizon + 0.005 + rng() * (SY_MAX - syHorizon - 0.005);
    const idx = bufIdx(buf, sx, sy);
    if (idx < 0 || buf.surface[idx] !== 0) continue;
    const len = 0.018 + rng() * 0.020;
    paths.push([
      [sx - dx * len * 0.5, sy + dy * len * 0.5],
      [sx + dx * len * 0.5, sy - dy * len * 0.5]
    ]);
  }
  return paths;
}

function generateSkyHatches(state, buf) {
  const paths = [];
  const ang = Math.PI / 4;
  const ca = Math.cos(ang), sa = Math.sin(ang);

  // Slightly sparser than blob hatches so the sky reads as background.
  const spacingWorld = state.lw * state.density * WORLD_PER_MM * 1.3;
  const sampleStep = Math.max(0.0015, spacingWorld * 0.22);
  const cycleLen = spacingWorld * 1.4;
  const RANGE = 1.85;

  // syHorizon is set by setupCamera() at render time.
  const maxSky = SY_MAX - syHorizon;
  if (maxSky < 0.05) return paths;

  // Optional waviness — displace each sample perpendicular to the scan
  // direction. When waviness=0, behaves exactly as before (straight 2-pt
  // segments). When waviness>0, we accumulate polylines.
  const wobN2 = state.waviness > 0 ? makeNoise2D(state.seed + ':gradWobble') : null;
  const wobAmp = spacingWorld * 0.2 * state.waviness;

  for (let s = -RANGE; s <= RANGE; s += spacingWorld) {
    const sx0 = -sa * s;
    const sy0 = ca * s;
    let inDraw = false;
    let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;
    let polyline = [];
    function flush() {
      if (wobN2) {
        if (polyline.length >= 2) paths.push(polyline);
        polyline = [];
      } else if (inDraw &&
                 Math.hypot(lastX - dx0, lastY - dy0) > spacingWorld * 0.3) {
        paths.push([[dx0, dy0], [lastX, lastY]]);
      }
      inDraw = false;
    }

    for (let t = -RANGE; t <= RANGE; t += sampleStep) {
      let sx = sx0 + ca * t;
      let sy = sy0 + sa * t;
      if (wobN2) {
        const w = (wobN2(sx * 3, sy * 3) - 0.5) * wobAmp;
        sx += -sa * w;       // perpendicular to scan direction
        sy +=  ca * w;
      }
      let draw = false;
      if (sx >= SX_MIN && sx <= SX_MAX && sy >= SY_MIN && sy <= SY_MAX
          && sy > syHorizon) {
        const idx = bufIdx(buf, sx, sy);
        if (idx >= 0 && buf.surface[idx] === 0) {
          // Inverted from the previous attempt: solid at the TOP, fades
          // down toward the horizon. `above` = 1 at top of page, 0 at horizon.
          const above = (sy - syHorizon) / maxSky;
          const onFrac = above * above;          // squared falloff
          const cyc = (t / cycleLen) - Math.floor(t / cycleLen);
          draw = cyc < onFrac;
        }
      }
      if (draw) {
        if (wobN2) {
          polyline.push([sx, sy]);
        } else {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        }
        inDraw = true;
      } else {
        flush();
      }
    }
    flush();
  }
  return paths;
}

// ============================================================
// Shared 2-D smoothstep value-noise factory used by the sky textures.
// ============================================================
function makeNoise2D(seedKey) {
  const rng = makeRng(seedKey);
  const GS = 64;
  const grid = new Float32Array(GS * GS);
  for (let i = 0; i < grid.length; i++) grid[i] = rng();
  return function n2(x, y) {
    const ux = ((x % GS) + GS) % GS;
    const uy = ((y % GS) + GS) % GS;
    const ix = Math.floor(ux), iy = Math.floor(uy);
    const fx = ux - ix,        fy = uy - iy;
    const sxF = fx * fx * (3 - 2 * fx);
    const syF = fy * fy * (3 - 2 * fy);
    const a = grid[(ix % GS) + (iy % GS) * GS];
    const b = grid[((ix + 1) % GS) + (iy % GS) * GS];
    const c = grid[(ix % GS) + ((iy + 1) % GS) * GS];
    const d = grid[((ix + 1) % GS) + ((iy + 1) % GS) * GS];
    const ab = a + (b - a) * sxF;
    const cd = c + (d - c) * sxF;
    return ab + (cd - ab) * syF;
  };
}

// ============================================================
// Multi-angle gradient — the dashed-fade gradient layered at two angles.
// (Helper supports waviness — non-zero waviness switches output to polylines
// with perpendicular noise displacement.)
// ============================================================
function _skyGradientAtAngle(state, buf, ang) {
  const paths = [];
  const ca = Math.cos(ang), sa = Math.sin(ang);
  const spacingWorld = state.lw * state.density * WORLD_PER_MM * 1.6;
  const sampleStep = Math.max(0.0015, spacingWorld * 0.22);
  const cycleLen = spacingWorld * 1.4;
  const RANGE = 1.85;
  const maxSky = SY_MAX - syHorizon;
  if (maxSky < 0.05) return paths;
  const wobN2 = state.waviness > 0 ? makeNoise2D(state.seed + ':mgWobble' + ang) : null;
  const wobAmp = spacingWorld * 0.2 * state.waviness;

  for (let s = -RANGE; s <= RANGE; s += spacingWorld) {
    const sx0 = -sa * s;
    const sy0 = ca * s;
    let inDraw = false;
    let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;
    let polyline = [];
    function flush() {
      if (wobN2) {
        if (polyline.length >= 2) paths.push(polyline);
        polyline = [];
      } else if (inDraw &&
                 Math.hypot(lastX - dx0, lastY - dy0) > spacingWorld * 0.3) {
        paths.push([[dx0, dy0], [lastX, lastY]]);
      }
      inDraw = false;
    }
    for (let t = -RANGE; t <= RANGE; t += sampleStep) {
      let sx = sx0 + ca * t;
      let sy = sy0 + sa * t;
      if (wobN2) {
        const w = (wobN2(sx * 3, sy * 3) - 0.5) * wobAmp;
        sx += -sa * w;
        sy +=  ca * w;
      }
      let draw = false;
      if (sx >= SX_MIN && sx <= SX_MAX && sy >= SY_MIN && sy <= SY_MAX
          && sy > syHorizon) {
        const idx = bufIdx(buf, sx, sy);
        if (idx >= 0 && buf.surface[idx] === 0) {
          const above = (sy - syHorizon) / maxSky;
          const onFrac = above * above;
          const cyc = (t / cycleLen) - Math.floor(t / cycleLen);
          draw = cyc < onFrac;
        }
      }
      if (draw) {
        if (wobN2) polyline.push([sx, sy]);
        else {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        }
        inDraw = true;
      } else {
        flush();
      }
    }
    flush();
  }
  return paths;
}
function generateSkyMultiGradient(state, buf) {
  return _skyGradientAtAngle(state, buf, Math.PI / 4)
    .concat(_skyGradientAtAngle(state, buf, 3 * Math.PI / 4));
}

// ============================================================
// Paper grain — horizontal dashed lines, density modulated by 2-D noise,
// optional vertical wobble via waviness.
// ============================================================
function generateSkyPaperGrain(state, buf) {
  const paths = [];
  const spacing = state.lw * state.density * WORLD_PER_MM * 1.4;
  const sampleStep = 0.003;
  const cycleLen = spacing * 2.0;
  if (SY_MAX - syHorizon < 0.05) return paths;
  const n2 = makeNoise2D(state.seed + ':paperGrain');
  const wobN2 = state.waviness > 0 ? makeNoise2D(state.seed + ':paperWobble') : null;
  const wobAmp = spacing * 0.3 * state.waviness;
  for (let baseSy = syHorizon + 0.01; baseSy <= SY_MAX; baseSy += spacing) {
    let inDraw = false;
    let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;
    let polyline = [];
    function flush() {
      if (wobN2) {
        if (polyline.length >= 2) paths.push(polyline);
        polyline = [];
      } else if (inDraw && Math.hypot(lastX - dx0, lastY - dy0) > 0.005) {
        paths.push([[dx0, dy0], [lastX, lastY]]);
      }
      inDraw = false;
    }
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      const sy = wobN2 ? baseSy + (wobN2(sx * 4, baseSy * 6) - 0.5) * wobAmp : baseSy;
      const idx = bufIdx(buf, sx, sy);
      const isSky = (idx >= 0 && buf.surface[idx] === 0);
      const density = 0.3 + 0.6 * n2(sx * 2.2, sy * 1.8);
      const cyc = (sx / cycleLen) - Math.floor(sx / cycleLen);
      const draw = isSky && cyc < density;
      if (draw) {
        if (wobN2) polyline.push([sx, sy]);
        else {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        }
        inDraw = true;
      } else flush();
    }
    flush();
  }
  return paths;
}

// ============================================================
// Concentric arcs — arc segments around a focal point above the page.
// Waviness perturbs each arc's radius along its sweep.
// ============================================================
function generateSkyArcs(state, buf) {
  const paths = [];
  if (SY_MAX - syHorizon < 0.05) return paths;
  const focal = [0.0, SY_MAX + 0.3];
  const spacing = state.lw * state.density * WORLD_PER_MM * 1.8;
  const minR = 0.25, maxR = 2.8;
  const angStep = 0.012;
  const wobN2 = state.waviness > 0 ? makeNoise2D(state.seed + ':arcWobble') : null;
  const wobAmp = spacing * 0.4 * state.waviness;
  for (let r = minR; r <= maxR; r += spacing) {
    let polyline = [];
    function flush() {
      if (polyline.length >= 2) paths.push(polyline);
      polyline = [];
    }
    for (let theta = 0; theta <= 2 * Math.PI; theta += angStep) {
      let rr = r;
      if (wobN2) rr += (wobN2(r * 7, theta * 2.5) - 0.5) * wobAmp;
      const sx = focal[0] + rr * Math.cos(theta);
      const sy = focal[1] + rr * Math.sin(theta);
      if (sx < SX_MIN || sx > SX_MAX || sy < syHorizon || sy > SY_MAX) {
        flush(); continue;
      }
      const idx = bufIdx(buf, sx, sy);
      if (idx >= 0 && buf.surface[idx] === 0) polyline.push([sx, sy]);
      else flush();
    }
    flush();
  }
  return paths;
}

// ============================================================
// Sky cellular automata: classic Conway B3/S23 seeded at 30% density,
// stepped a few generations, then alive cells rendered as short
// horizontal dashes. Port of the cellular-automata-as-texture idea from
// VectorFriend's Genuary/cellularautomata. Distinct from the noise-based
// sky styles — produces clusters of dashes rather than uniform speckle.
// ============================================================
function generateSkyCellular(state, buf) {
  const paths = [];
  if (SY_MAX - syHorizon < 0.05) return paths;
  const cellsX = 80;
  const cellSize = (SX_MAX - SX_MIN) / cellsX;
  const skyTop = SY_MAX;
  const skyBot = Math.max(syHorizon, SY_MIN);
  const skyHeight = skyTop - skyBot;
  const cellsY = Math.max(2, Math.round(skyHeight / cellSize));
  const rng = makeRng(state.seed + ':cellularSky');
  // Initialise with ~30 % alive cells.
  let grid = new Uint8Array(cellsX * cellsY);
  for (let i = 0; i < grid.length; i++) grid[i] = rng() < 0.30 ? 1 : 0;
  // Step Conway's B3/S23 for a few generations so clusters stabilise.
  const NUM_ITER = 4;
  for (let iter = 0; iter < NUM_ITER; iter++) {
    const next = new Uint8Array(cellsX * cellsY);
    for (let y = 0; y < cellsY; y++) {
      for (let x = 0; x < cellsX; x++) {
        let n = 0;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            const nx = (x + dx + cellsX) % cellsX;
            const ny = y + dy;
            if (ny < 0 || ny >= cellsY) continue;
            n += grid[ny * cellsX + nx];
          }
        }
        const alive = grid[y * cellsX + x];
        const survives = alive && (n === 2 || n === 3);
        const born = !alive && (n === 3);
        next[y * cellsX + x] = (survives || born) ? 1 : 0;
      }
    }
    grid = next;
  }
  // Render alive cells as short horizontal dashes in the sky region.
  const dashLen = cellSize * 0.75;
  for (let y = 0; y < cellsY; y++) {
    for (let x = 0; x < cellsX; x++) {
      if (!grid[y * cellsX + x]) continue;
      const cx = SX_MIN + (x + 0.5) * cellSize;
      const cy = skyTop - (y + 0.5) * cellSize;
      if (cy <= syHorizon) continue;
      const idx = bufIdx(buf, cx, cy);
      if (idx < 0 || buf.surface[idx] !== 0) continue;
      paths.push([
        [cx - dashLen / 2, cy],
        [cx + dashLen / 2, cy]
      ]);
    }
  }
  return paths;
}


// ============================================================
// Wobbly clouds — slight horizontal wobble + irregular missing segments.
// Two independent 1-D noises per row: one tiny displacement for the wobble,
// one separate noise thresholded at 0.5 for the dash mask. Smoothed value
// noise naturally makes the dash on/off runs variable length, so the
// "missing segments" look organic rather than periodic.
// ============================================================
function generateCloudsWobbly(state, buf) {
  const paths = [];
  const topThirdStart = SY_MAX - (SY_MAX - SY_MIN) / 3;
  if (topThirdStart <= syHorizon) return paths;

  const spacing = state.lw * state.density * WORLD_PER_MM * 1.5;
  const sampleStep = 0.004;

  const noiseRng = makeRng(state.seed + ':wobbly');
  const grid = new Float32Array(256);
  for (let i = 0; i < grid.length; i++) grid[i] = noiseRng();
  function n1(t) {
    const u = ((t % 256) + 256) % 256;
    const i = Math.floor(u);
    const f = u - i;
    const a = grid[i % 256];
    const b = grid[(i + 1) % 256];
    const s = f * f * (3 - 2 * f);
    return a + (b - a) * s;
  }

  // Slight wobble — at default waviness=3 this is ~0.6× the line spacing.
  const wobbleAmp = spacing * 0.2 * state.waviness;

  for (let sy = topThirdStart; sy <= SY_MAX; sy += spacing) {
    const wobblePhase = sy * 13.7;
    const dashPhase = sy * 31.5;          // unrelated to wobble — independent runs

    let polyline = [];
    function flush() {
      if (polyline.length >= 2) paths.push(polyline);
      polyline = [];
    }
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      const wobble = (n1(sx * 5 + wobblePhase) - 0.5) * wobbleAmp;
      const wavy = sy + wobble;
      // Smoothstep noise crossing 0.5 → variable-length on/off runs.
      const drawHere = n1(sx * 2.5 + dashPhase) > 0.5;
      if (wavy < topThirdStart || wavy > SY_MAX) { flush(); continue; }
      const idx = bufIdx(buf, sx, wavy);
      const isSky = (idx >= 0 && buf.surface[idx] === 0);
      if (drawHere && isSky) {
        polyline.push([sx, wavy]);
      } else {
        flush();
      }
    }
    flush();
  }
  return paths;
}

// ============================================================
// Horizon line, broken where the blob occludes it
// ============================================================
function addHorizonLine(paths, buf) {
  const HY = syHorizon;
  if (HY < SY_MIN + 0.02 || HY > SY_MAX - 0.02) return;
  const sampleStep = 0.0025;
  let inDraw = false, x0 = 0, lastX = 0;
  for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
    const i = bufIdx(buf, sx, HY);
    const occluded = (i >= 0 && buf.surface[i] === 1);
    if (!occluded) {
      if (!inDraw) { x0 = sx; inDraw = true; }
      lastX = sx;
    } else if (inDraw) {
      paths.push([[x0, HY], [lastX, HY]]);
      inDraw = false;
    }
  }
  if (inDraw) paths.push([[x0, HY], [lastX, HY]]);
}

// ============================================================
// Pen-up travel optimization
// ============================================================
function optimizePaths(paths) {
  const n = paths.length;
  if (n === 0) return paths;
  const used = new Uint8Array(n);
  const out = [];
  let cx = -1, cy = 1.25;
  for (let count = 0; count < n; count++) {
    let best = -1, bestD = Infinity, bestRev = false;
    for (let i = 0; i < n; i++) {
      if (used[i]) continue;
      const p = paths[i];
      const a = p[0], b = p[p.length - 1];
      const dA = (a[0] - cx) * (a[0] - cx) + (a[1] - cy) * (a[1] - cy);
      const dB = (b[0] - cx) * (b[0] - cx) + (b[1] - cy) * (b[1] - cy);
      if (dA < bestD) { bestD = dA; best = i; bestRev = false; }
      if (dB < bestD) { bestD = dB; best = i; bestRev = true; }
    }
    used[best] = 1;
    const p = paths[best];
    const ordered = bestRev ? p.slice().reverse() : p;
    out.push(ordered);
    cx = ordered[ordered.length - 1][0];
    cy = ordered[ordered.length - 1][1];
  }
  return out;
}

function parseGlyphPath(d) {
  if (!d) return [];
  const polylines = [];
  let current = [];
  const tokens = d.split(/\s+/);
  for (let i = 0; i < tokens.length; ) {
    const t = tokens[i++];
    if (t === 'M' || t === 'L') {
      const x = parseFloat(tokens[i++]);
      const y = parseFloat(tokens[i++]);
      if (t === 'M') {
        if (current.length >= 2) polylines.push(current);
        current = [[x, y]];
      } else {
        current.push([x, y]);
      }
    }
  }
  if (current.length >= 2) polylines.push(current);
  return polylines;
}

function measureText(text, scale) {
  let w = 0;
  for (const ch of text) {
    const g = HERSHEY_GLYPHS[ch];
    w += (g ? g.a : 400) * scale;
  }
  return w;
}

// Returns polylines in viewBox coords. `vbX,vbY` is the baseline-left anchor;
// font y-positive-up is flipped to SVG y-positive-down by subtraction.
function renderTextStrokes(text, vbX, vbY, scale) {
  const out = [];
  let cursor = vbX;
  for (const ch of text) {
    const g = HERSHEY_GLYPHS[ch];
    if (!g) { cursor += 400 * scale; continue; }
    if (g.d) {
      for (const poly of parseGlyphPath(g.d)) {
        out.push(poly.map(([gx, gy]) => [cursor + gx * scale, vbY - gy * scale]));
      }
    }
    cursor += g.a * scale;
  }
  return out;
}

// ============================================================
// SVG output
// ============================================================
function sxToVB(sx) {
  return MARGIN_VB + (sx - SX_MIN) / (SX_MAX - SX_MIN) * (VB_W - 2 * MARGIN_VB);
}
function syToVB(sy) {
  return MARGIN_VB + (SY_MAX - sy) / (SY_MAX - SY_MIN) * (VB_H - 2 * MARGIN_VB);
}
function buildPathD(paths, vbPaths) {
  let d = '';
  for (const p of paths) {
    if (p.length < 2) continue;
    d += 'M' + sxToVB(p[0][0]).toFixed(2) + ',' + syToVB(p[0][1]).toFixed(2);
    for (let i = 1; i < p.length; i++) {
      d += 'L' + sxToVB(p[i][0]).toFixed(2) + ',' + syToVB(p[i][1]).toFixed(2);
    }
  }
  if (vbPaths) {
    // Already in viewBox coordinates — no sx/syToVB transform.
    for (const p of vbPaths) {
      if (p.length < 2) continue;
      d += 'M' + p[0][0].toFixed(2) + ',' + p[0][1].toFixed(2);
      for (let i = 1; i < p.length; i++) {
        d += 'L' + p[i][0].toFixed(2) + ',' + p[i][1].toFixed(2);
      }
    }
  }
  return d;
}

// Builds the bottom-margin text polylines (already in viewBox coords).
function buildBottomLabel(state, strokeCount) {
  const text = 'monument  /  ' + strokeCount + ' strokes  /  bre pettis';
  const baselineY = VB_H - 18;               // 18 vb above page bottom
  // Pick a scale that keeps the label inside the printable width even
  // when the strokeCount runs to 5 digits.
  const maxWidth = VB_W - 2 * MARGIN_VB;
  let scale = 0.032;                         // ~16 vb cap-height (preferred)
  let w = measureText(text, scale);
  if (w > maxWidth) scale *= maxWidth / w;
  w = measureText(text, scale);
  const startX = (VB_W - w) / 2;
  return renderTextStrokes(text, startX, baselineY, scale);
}
function lwToStrokeVB(lwMM) { return lwMM * (300 / 25.4); }

function getInputValue(id, fallback) {
  const el = document.getElementById(id);
  return el ? el.value : fallback;
}
function readState() {
  return {
    seed: document.getElementById('seed').value || '0',
    scene: document.getElementById('scene').value,
    // Composition fields below only exist in the DOM when the active
    // scene declares them in its ui schema (currently just `single`).
    nSpheres:    clampInt  (getInputValue('nSpheres',    4),   4,    12,  4),
    spread:      clampFloat(getInputValue('spread',      1.0), 0.2,  3.0, 1.0),
    verticality: clampFloat(getInputValue('verticality', 1.4), 0.4,  3.0, 1.4),
    pointiness:  clampFloat(getInputValue('pointiness',  0),   0,    2.0, 0),
    smoothK:     clampFloat(getInputValue('smoothK',     0.3), 0.05, 0.8, 0.3),
    camTilt: clampFloat(document.getElementById('camTilt').value, 0, 20, 6),
    hatchStyle: document.getElementById('hatchStyle').value,
    skyStyle: document.getElementById('skyStyle').value,
    groundStyle: document.getElementById('groundStyle').value,
    waviness: clampFloat(document.getElementById('waviness').value, 0, 8, 3.0),
    rippleFreq: clampFloat(getInputValue('rippleFreq', 7.0), 1, 40, 7.0),
    paperSize: getInputValue('paperSize', '4x5'),
    lw: clampFloat(document.getElementById('lw').value, 0.05, 2.0, 0.3),
    density: clampFloat(document.getElementById('density').value, 1.2, 8, 2.5),
    bufRes: clampInt(document.getElementById('bufRes').value, 200, 800, 400),
    lx: clampFloat(document.getElementById('lx').value, -2, 2, -0.6),
    ly: clampFloat(document.getElementById('ly').value, -2, 2, 0.8),
    lz: clampFloat(document.getElementById('lz').value, -2, 2, -0.4),
    brightness: clampFloat(document.getElementById('brightness').value, -0.5, 0.5, 0),
    contrast: clampFloat(document.getElementById('contrast').value, 0.5, 2.0, 1),
    gamma: clampFloat(document.getElementById('gamma').value, 0.4, 2.5, 1),
    posterLevels: clampInt(document.getElementById('posterLevels').value, 1, 8, 1),
  };
}
function clampInt(v, lo, hi, fb) {
  const n = parseInt(v, 10);
  return Number.isFinite(n) ? Math.min(hi, Math.max(lo, n)) : fb;
}
function clampFloat(v, lo, hi, fb) {
  const n = parseFloat(v);
  return Number.isFinite(n) ? Math.min(hi, Math.max(lo, n)) : fb;
}
function setStatus(msg) { document.getElementById('stats').textContent = msg; }
function tick() { return new Promise(r => setTimeout(r, 0)); }

function renderSceneUi(sceneName) {
  const panel = document.getElementById('sceneParamsPanel');
  const header = document.getElementById('sceneParamsHeader');
  const scene = SCENES[sceneName];
  if (!scene || typeof scene === 'function' || !scene.ui) {
    panel.innerHTML = '';
    header.style.display = 'none';
    return;
  }
  header.style.display = '';
  // Scenes whose UI is too dynamic for the schema array (the builder)
  // render themselves into the panel.
  if (scene.ui === 'custom' && typeof scene.renderCustomUi === 'function') {
    scene.renderCustomUi(panel);
    return;
  }
  let html = '';
  for (const c of scene.ui) {
    if (c.type === 'enum') {
      let opts = '';
      for (const o of c.options) {
        const val = (typeof o === 'object') ? o.value : o;
        const lab = (typeof o === 'object') ? o.label : o;
        opts += '<option value="' + val + '"' +
                (val === c.default ? ' selected' : '') + '>' + lab + '</option>';
      }
      html += '<div class="field"><label>' + c.label + '</label>' +
              '<select id="' + c.id + '"' +
              ' style="width:78px;padding:3px 5px;background:#1a1a1a;color:#eee;border:1px solid #3a3a3a;border-radius:3px;font:inherit">' +
              opts + '</select></div>';
    } else {
      const step = c.step != null ? c.step : (c.type === 'int' ? 1 : 0.1);
      html += '<div class="field"><label>' + c.label + '</label>' +
              '<input id="' + c.id + '" type="number"' +
              ' min="' + c.min + '" max="' + c.max +
              '" step="' + step + '" value="' + c.default + '"></div>';
    }
  }
  panel.innerHTML = html;
  // Inputs created dynamically don't carry the Enter-key listener wired
  // up at startup, so attach one now.
  panel.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doRender(); });
  });
}

// Read current values from the per-scene UI inputs, validated against
// the schema's min/max/default. Returns null if the scene has no UI.
function readSceneParams(sceneName) {
  const scene = SCENES[sceneName];
  if (!scene || typeof scene === 'function' || !scene.ui) return null;
  const out = {};
  for (const c of scene.ui) {
    const el = document.getElementById(c.id);
    if (!el) { out[c.id] = c.default; continue; }
    if (c.type === 'enum') {
      out[c.id] = el.value;
    } else if (c.type === 'int') {
      out[c.id] = clampInt(el.value, c.min, c.max, c.default);
    } else {
      out[c.id] = clampFloat(el.value, c.min, c.max, c.default);
    }
  }
  return out;
}

// Single source of truth for which global state keys get serialised into
// the permalink. Both syncFromUrl and writeUrl iterate this — they used
// to maintain parallel lists that drifted.
const URL_KEYS = [
  'seed','scene','lw','density','nSpheres','spread','verticality',
  'pointiness','smoothK','camTilt','hatchStyle','skyStyle','groundStyle',
  'waviness','rippleFreq','brightness','contrast','gamma','posterLevels',
  'bufRes','lx','ly','lz','paperSize'
];

function syncFromUrl() {
  const params = new URLSearchParams(window.location.search);
  // If the URL carries a serialised builder composition, restore it
  // before rendering the builder's UI so the inputs reflect the layers.
  if (params.has('builder')) {
    deserialiseBuilder(params.get('builder'));
  }
  // If the URL specifies a scene with dynamic UI, render its panel first
  // so the per-scene inputs exist before we copy values into them.
  const urlScene = params.get('scene');
  if (urlScene) {
    document.getElementById('scene').value = urlScene;
    renderSceneUi(urlScene);
  }
  for (const k of URL_KEYS) {
    const el = document.getElementById(k);
    if (el && params.has(k)) el.value = params.get(k);
  }
  // Per-scene dynamic inputs: render them above, then copy any URL params
  // that match the active scene's UI schema into those inputs.
  const activeScene = document.getElementById('scene').value;
  const scene = SCENES[activeScene];
  if (scene && scene.ui && Array.isArray(scene.ui)) {
    for (const c of scene.ui) {
      const el = document.getElementById(c.id);
      if (el && params.has(c.id)) el.value = params.get(c.id);
    }
  }
}
function writeUrl(state) {
  const params = new URLSearchParams();
  for (const k of URL_KEYS) {
    if (state[k] != null) params.set(k, state[k]);
  }
  // Per-scene params: walk the active scene's UI schema and write any
  // current input values. These match `syncFromUrl`'s read so links can
  // round-trip scene-specific controls (rockScale, etc.).
  const scene = SCENES[state.scene];
  if (scene && scene.ui && Array.isArray(scene.ui)) {
    for (const c of scene.ui) {
      const el = document.getElementById(c.id);
      if (el && el.value !== '') params.set(c.id, el.value);
    }
  }
  if (state.scene === 'builder') {
    params.set('builder', serialiseBuilder());
  }
  const url = window.location.pathname + '?' + params.toString();
  window.history.replaceState({}, '', url);
  const link = document.getElementById('permalink');
  link.href = url;
  link.textContent = '?' + params.toString();
}

let lastRender = null;

// =============================================================================
// Style registries. Each entry is { label, fn(state, buf, sdf?) -> paths[] }.
// The render dispatcher looks up the active style here; option lists in the
// <select> elements should match the keys (asserted at startup, see below).
// =============================================================================
const HATCH_STYLES = {
  scan:       { label: 'Scan (4-angle)',     fn: (s, b) => generateHatches(s, b) },
  crosshatch: { label: 'Crosshatch (H + V)', fn: (s, b) => generateCrosshatchHatches(s, b) },
  vertical:   { label: 'Vertical only',      fn: (s, b) => generateVerticalHatches(s, b) },
  cell:       { label: 'Cell halftone',      fn: (s, b) => generateCellHatches(s, b) },
  monet:      { label: 'Monet brushstrokes', fn: (s, b) => generateMonetHatches(s, b) },
  tsp:        { label: 'TSP infill',         fn: (s, b) => generateTspHatches(s, b) },
  isoDepth:   { label: 'Iso-depth contours', fn: (s, b) => generateCurveHatches(s, b, fieldIsoDepth) },
  projNormal: { label: 'Projected normal',   fn: (s, b) => generateCurveHatches(s, b, fieldProjNormal) },
  principal:  { label: 'Principal curvature',fn: (s, b) => generateCurveHatches(s, b, fieldPrincipal) }
};

const GROUND_STYLES = {
  perspective: { label: 'Perspective',  fn: (s, b)       => generateGroundHatches(s, b) },
  waves:       { label: 'Waves',        fn: (s, b)       => generateGroundWaves(s, b) },
  sandGarden:  { label: 'Sand garden',  fn: (s, b, sdf)  => generateGroundSandGarden(s, b, sdf) }
};

const SKY_STYLES = {
  gradient:     { label: 'Gradient',           fn: (s, b) => generateSkyHatches(s, b) },
  wobbly:       { label: 'Wobbly lines',       fn: (s, b) => generateCloudsWobbly(s, b) },
  multiGradient:{ label: 'Box gradient',       fn: (s, b) => generateSkyMultiGradient(s, b) },
  paperGrain:   { label: 'Paper grain',        fn: (s, b) => generateSkyPaperGrain(s, b) },
  arcs:         { label: 'Concentric arcs',    fn: (s, b) => generateSkyArcs(s, b) },
  stars:        { label: 'Stars',              fn: (s, b) => generateStarSky(s, b) },
  cellular:     { label: 'Cellular automata',  fn: (s, b) => generateSkyCellular(s, b) },
  constellation:{ label: 'Constellation',      fn: (s, b) => generateSkyConstellation(s, b) },
  rain:         { label: 'Rain',               fn: (s, b) => generateSkyRain(s, b) },
  vertical:     { label: 'Vertical scan',      fn: (s, b) => generateSkyVertical(s, b) },
  none:         { label: 'None (empty sky)',   fn: ()     => [] }
};

// Sanity-check: every <option> in a style dropdown must have a registry entry.
// Fires at script-load; surfaces the dropdown↔registry drift bug we hit twice.
function assertDropdownRegistryParity() {
  const checks = [
    ['hatchStyle',  HATCH_STYLES],
    ['groundStyle', GROUND_STYLES],
    ['skyStyle',    SKY_STYLES]
  ];
  for (const [selId, registry] of checks) {
    const sel = document.getElementById(selId);
    if (!sel) continue;
    for (const opt of sel.options) {
      if (!(opt.value in registry)) {
        console.error('Dropdown "' + selId + '" has option "' + opt.value +
                      '" with no matching registry entry');
      }
    }
  }
}

// A sensible default state object — every key the renderer reads. The
// gallery page calls this for a baseline and applies its overrides on top.
function defaultState() {
  return {
    seed: 'gallery', scene: 'single',
    nSpheres: 4, spread: 1.0, verticality: 1.4, pointiness: 0, smoothK: 0.3,
    camTilt: 6,
    hatchStyle: 'scan', skyStyle: 'gradient', groundStyle: 'perspective',
    waviness: 3.0, rippleFreq: 7.0,
    paperSize: '4x5',
    lw: 0.3, density: 2.5, bufRes: 400,
    lx: -0.6, ly: 0.8, lz: -0.4,
    brightness: 0, contrast: 1, gamma: 1, posterLevels: 1
  };
}

// Synchronous render: state in → SVG markup string out. No DOM reads,
// no UI updates. The interactive doRender below uses this and then
// updates the page; the gallery page calls it directly with arbitrary
// state objects.
//
// Pass scene-specific params either inline on `state` (matching the
// scene's ui ids) OR via `state.sceneParams = { ... }`. If neither is
// supplied, the scene's UI defaults are used.
function renderToSvgString(state) {
  // Apply the requested paper size before any of the SX/SY/VB math runs.
  const paper = PAPER_SIZES[state.paperSize] || PAPER_SIZES['4x5'];
  setPaperSize(paper.w, paper.h);
  const rng = makeRng(state.seed);
  const sceneEntry = SCENES[state.scene] || SCENES.single;
  let sceneResult;
  if (typeof sceneEntry === 'function') {
    sceneResult = sceneEntry(rng, state);
  } else if (sceneEntry.ui === 'custom') {
    sceneResult = sceneEntry.build(rng, state);
  } else {
    // Resolve scene params: explicit state.sceneParams > flat state keys
    // (for back-compat with the existing single-scene URL params) >
    // schema defaults.
    const params = {};
    for (const c of sceneEntry.ui) {
      if (state.sceneParams && state.sceneParams[c.id] != null) {
        params[c.id] = state.sceneParams[c.id];
      } else if (state[c.id] != null) {
        params[c.id] = state[c.id];
      } else {
        params[c.id] = c.default;
      }
    }
    sceneResult = sceneEntry.build(rng, state, params);
  }
  let sdf, sceneCamera = null, sceneMaterialFn = null, sceneBeamMask = null;
  if (typeof sceneResult === 'function') {
    sdf = sceneResult;
  } else {
    sdf = sceneResult.sdf;
    sceneCamera = sceneResult.camera || null;
    sceneMaterialFn = sceneResult.materialFn || null;
    sceneBeamMask = sceneResult.beamMask || null;
  }
  setupCamera(sceneCamera || { tiltDeg: state.camTilt });

  const buf = renderSceneBuffer(state, sdf, sceneMaterialFn);
  if (sceneBeamMask) applyBeamMask(buf, sceneBeamMask);
  applyToneMap(buf, state);

  const hatchEntry  = HATCH_STYLES[state.hatchStyle]   || HATCH_STYLES.scan;
  const groundEntry = GROUND_STYLES[state.groundStyle] || GROUND_STYLES.perspective;
  const skyEntry    = SKY_STYLES[state.skyStyle]       || SKY_STYLES.gradient;
  const blob = hatchEntry.fn(state, buf);
  const groundLines = groundEntry.fn(state, buf, sdf);
  const groundShadow = generateGroundShadows(state, buf, sdf);
  const ground = groundLines.concat(groundShadow);
  const sky = skyEntry.fn(state, buf);
  const rawPaths = blob.concat(ground).concat(sky);
  addHorizonLine(rawPaths, buf);
  const paths = optimizePaths(rawPaths);

  let extraVB = [];
  if (sceneResult && sceneResult.extraStrokes) {
    const ctx = {
      worldToScreen,
      worldToVB: function (P) {
        const s = worldToScreen(P);
        return s ? [sxToVB(s[0]), syToVB(s[1])] : null;
      },
      sxToVB, syToVB, syHorizon: syHorizon
    };
    extraVB = sceneResult.extraStrokes(ctx, state) || [];
  }
  const labelPaths = buildBottomLabel(state, paths.length);
  const d = buildPathD(paths, extraVB.concat(labelPaths));
  const strokeVB = lwToStrokeVB(state.lw);
  return {
    svg: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + VB_W + ' ' + VB_H + '">' +
         '<rect width="' + VB_W + '" height="' + VB_H + '" fill="white"/>' +
         '<path d="' + d + '" stroke="black" stroke-width="' + strokeVB.toFixed(3) +
         '" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    paths: paths,
    d: d,
    strokeVB: strokeVB,
    strokeCount: paths.length + extraVB.length,
    // True if the scene supplied its own camera, in which case the
    // global Cam tilt slider had no effect on this render.
    sceneOwnsCamera: sceneCamera !== null
  };
}

// Expose to test pages loading us via iframe.
window.renderToSvgString = renderToSvgString;
window.defaultState = defaultState;
window.SCENES = SCENES;

// postMessage bridge — the gallery page (or any parent) can drive the
// renderer without needing direct property access. This works even when
// the parent and iframe are 'cross-origin' under Chrome's strict file://
// policy, where the direct path fails.
//
// Protocol:
//   parent → iframe: { type: 'rayblob:render', requestId, state }
//   iframe → parent: { type: 'rayblob:result', requestId,
//                      svg, strokeCount }   or   { error }
//
//   parent → iframe: { type: 'rayblob:defaultState', requestId }
//   iframe → parent: { type: 'rayblob:defaultStateResult', requestId,
//                      state }
//
// On script-load the iframe posts 'rayblob:ready' to its parent so the
// gallery can stop polling and start sending render requests.
window.addEventListener('message', function (e) {
  const data = e.data;
  if (!data || typeof data !== 'object') return;
  if (data.type === 'rayblob:render') {
    try {
      const result = renderToSvgString(data.state || {});
      e.source.postMessage({
        type: 'rayblob:result', requestId: data.requestId,
        svg: result.svg, strokeCount: result.strokeCount
      }, '*');
    } catch (err) {
      e.source.postMessage({
        type: 'rayblob:result', requestId: data.requestId,
        error: (err && err.message) || String(err)
      }, '*');
    }
  } else if (data.type === 'rayblob:defaultState') {
    e.source.postMessage({
      type: 'rayblob:defaultStateResult', requestId: data.requestId,
      state: defaultState()
    }, '*');
  } else if (data.type === 'rayblob:visibleScenes') {
    // Reports the scene <select>'s current option values so the gallery
    // can filter out hidden scenes without breaching same-origin
    // restrictions on iframe.contentDocument access (file:// blocks it).
    const sel = document.getElementById('scene');
    const ids = sel ? Array.from(sel.options).map(function (o) { return o.value; }) : [];
    e.source.postMessage({
      type: 'rayblob:visibleScenesResult', requestId: data.requestId,
      scenes: ids
    }, '*');
  }
});
// Announce readiness to the parent. The parent may not exist (when the
// app is loaded directly) — postMessage to window.parent === window is
// harmless.
try {
  window.parent.postMessage({ type: 'rayblob:ready' }, '*');
} catch (e) { /* no parent */ }

async function doRender() {
  const btn = document.getElementById('render');
  btn.disabled = true;
  try {
    const state = readState();
    // Bundle current scene params into state.sceneParams so the renderer
    // sees them even when called from outside this page.
    state.sceneParams = readSceneParams(state.scene) || {};
    writeUrl(state);

    setStatus('Rendering…');
    await tick();
    const t0 = performance.now();
    const result = renderToSvgString(state);
    const t1 = performance.now();
    const svg = document.getElementById('preview');
    svg.setAttribute('viewBox', '0 0 ' + VB_W + ' ' + VB_H);
    // Preview occupies a 480×600 box but keeps the paper's aspect ratio,
    // so non-4:5 sizes (4:6, 5:7, 9:12) don't get stretched.
    const aspect = H_IN / W_IN;
    if (aspect >= 600 / 480) {
      svg.style.height = '600px';
      svg.style.width  = (600 / aspect) + 'px';
    } else {
      svg.style.width  = '480px';
      svg.style.height = (480 * aspect) + 'px';
    }
    svg.innerHTML = result.svg.replace(/^<svg[^>]*>|<\/svg>$/g, '');
    lastRender = { state, paths: result.paths, d: result.d, strokeVB: result.strokeVB };
    // Grey out the global Cam tilt slider for scenes that supply their
    // own camera (the scene-specific camera fully overrides state.camTilt).
    const camTiltEl = document.getElementById('camTilt');
    camTiltEl.disabled = !!result.sceneOwnsCamera;
    camTiltEl.title = result.sceneOwnsCamera
      ? 'Disabled — this scene defines its own camera angle'
      : '';
    setStatus(
      result.strokeCount + ' strokes · ' + Math.round(t1 - t0) + 'ms\n' +
      'lw=' + state.lw + 'mm  spacing=' + (state.lw * state.density).toFixed(2) + 'mm'
    );
  } catch (err) {
    setStatus('Error: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

function doSave() {
  if (!lastRender) { setStatus('Nothing to save yet — render first.'); return; }
  const { state, d, strokeVB } = lastRender;
  const svgText =
    '<?xml version="1.0" encoding="UTF-8"?>\n' +
    '<svg xmlns="http://www.w3.org/2000/svg" ' +
    'width="' + W_IN + 'in" height="' + H_IN + 'in" ' +
    'viewBox="0 0 ' + VB_W + ' ' + VB_H + '">\n' +
    '  <path d="' + d + '" stroke="black" stroke-width="' + strokeVB.toFixed(3) +
    '" fill="none" stroke-linecap="round" stroke-linejoin="round"/>\n' +
    '</svg>\n';
  const blob = new Blob([svgText], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'rayblob_' + state.scene + '_seed-' + state.seed + '_lw-' + state.lw + '.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function doRandomize() {
  document.getElementById('seed').value = Math.floor(Math.random() * 1e9).toString(36);
  doRender();
}

document.getElementById('render').addEventListener('click', doRender);
document.getElementById('save').addEventListener('click', doSave);
document.getElementById('randomize').addEventListener('click', doRandomize);
document.getElementById('scene').addEventListener('change', e => {
  renderSceneUi(e.target.value);
});
document.querySelectorAll('.panel input').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') doRender(); });
});

// Render the per-scene UI before syncFromUrl so the dynamic inputs exist
// when URL values are written to them. syncFromUrl also calls renderSceneUi
// when the URL specifies a scene, so this initial call handles the "no
// URL scene param → default scene" case.
renderSceneUi(document.getElementById('scene').value);
assertDropdownRegistryParity();
syncFromUrl();
doRender();
</script>
</body>
</html>
