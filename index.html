<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RayBlob — 4×5" Hatched Blob</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 24px; font: 13px/1.45 system-ui, sans-serif;
         background: #1c1c1c; color: #ddd; }
  .layout { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
  .panel { display: flex; flex-direction: column; gap: 10px;
           min-width: 280px; padding: 18px;
           background: #262626; border-radius: 8px; }
  .panel h2 { margin: 0 0 4px; font-size: 11px; font-weight: 600;
              letter-spacing: 0.08em; text-transform: uppercase; color: #999; }
  .field { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .field label { color: #aaa; }
  .field input { width: 120px; padding: 5px 8px; background: #1a1a1a;
                 color: #eee; border: 1px solid #3a3a3a; border-radius: 4px;
                 font: inherit; text-align: right; }
  .field input[type="text"] { text-align: left; }
  .row { display: flex; gap: 8px; }
  button { padding: 9px 14px; background: #3a78d8; color: white;
           border: none; border-radius: 4px; cursor: pointer; font: inherit; flex: 1; }
  button:hover { background: #4a88e8; }
  button.secondary { background: #444; }
  button.secondary:hover { background: #555; }
  button:disabled { opacity: 0.5; cursor: wait; }
  .stats { padding-top: 10px; margin-top: 6px; border-top: 1px solid #3a3a3a;
           color: #888; font-size: 11px; line-height: 1.6;
           font-family: ui-monospace, monospace; white-space: pre-wrap;
           min-height: 32px; }
  .stage { background: white; border-radius: 6px;
           box-shadow: 0 6px 24px rgba(0,0,0,0.4); }
  #preview { display: block; }
  a.url-link { color: #6aa8ff; font-family: ui-monospace, monospace;
               font-size: 10px; word-break: break-all; }
</style>
</head>
<body>
<div class="layout">
  <div class="panel">
    <h2>Composition</h2>
    <div class="field"><label>Seed</label><input id="seed" type="text" value="42"></div>
    <div class="field"><label>Blob spheres</label><input id="nSpheres" type="number" min="2" max="8" value="4"></div>
    <div class="field"><label>Spread</label><input id="spread" type="number" min="0.2" max="3.0" step="0.1" value="1.0"></div>
    <div class="field"><label>Verticality</label><input id="verticality" type="number" min="0.4" max="3.0" step="0.1" value="1.4"></div>
    <div class="field"><label>Smoothing k</label><input id="smoothK" type="number" min="0.05" max="0.8" step="0.05" value="0.3"></div>
    <div class="field"><label>Cam tilt (°)</label><input id="camTilt" type="number" min="0" max="20" step="0.5" value="6"></div>
    <div class="field"><label>Sky style</label>
      <select id="skyStyle"
              style="width:120px;padding:5px;background:#1a1a1a;color:#eee;border:1px solid #3a3a3a;border-radius:4px;font:inherit">
        <option value="gradient">Gradient</option>
        <option value="clouds">Wavy clouds</option>
      </select>
    </div>
    <div class="field"><label>Waviness</label><input id="waviness" type="number" min="0" max="8" step="0.25" value="3.0"></div>

    <h2>Hatching (Pasma)</h2>
    <div class="field"><label>lw (mm)</label><input id="lw" type="number" min="0.1" max="1.0" step="0.05" value="0.3"></div>
    <div class="field"><label>Density ×lw</label><input id="density" type="number" min="1.5" max="6" step="0.25" value="2.5"></div>
    <div class="field"><label>Buffer res</label><input id="bufRes" type="number" min="200" max="800" step="50" value="400"></div>

    <h2>Light</h2>
    <div class="field"><label>Light X</label><input id="lx" type="number" step="0.1" value="-0.6"></div>
    <div class="field"><label>Light Y</label><input id="ly" type="number" step="0.1" value="0.8"></div>
    <div class="field"><label>Light Z</label><input id="lz" type="number" step="0.1" value="-0.4"></div>

    <div class="row" style="margin-top:10px">
      <button id="render">Render</button>
      <button id="randomize" class="secondary">Random</button>
      <button id="save" class="secondary">Save SVG</button>
    </div>

    <div class="stats" id="stats">Ready.</div>
    <a class="url-link" id="permalink" href="#">permalink</a>
  </div>

  <div class="stage">
    <svg id="preview" width="480" height="600" viewBox="0 0 1200 1500"
         xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<script>
'use strict';

// ============================================================
// Constants & coordinate system
// ============================================================
// SVG output: 4×5 inch portrait, viewBox 1200×1500 (300 units/inch)
const W_IN = 4, H_IN = 5;
const VB_W = 1200, VB_H = 1500;
const MARGIN_VB = 60;

// Screen-space coords. sx ∈ [-1, 1], sy ∈ [-1.25, 1.25] (positive sy = UP).
const SX_MIN = -1, SX_MAX = 1;
const SY_MIN = -1.25, SY_MAX = 1.25;

// Camera position is fixed; the *direction* changes with `camTilt`, so the
// horizon position on screen is configurable. These F/R/U vectors are
// recomputed at render time by setupCamera().
const CAM = [0, 0, -5];
const FOCAL = 4;
const GROUND_Y = -0.5;
let camF = [0, 0, 1];
let camR = [1, 0, 0];
let camU = [0, 1, 0];
let syHorizon = 0;

function setupCamera(tiltDeg) {
  const t = tiltDeg * Math.PI / 180;
  camF = [0, Math.sin(t), Math.cos(t)];
  camR = [1, 0, 0];
  // U = F × R for right-handed +y-up
  camU = [
    camF[1] * camR[2] - camF[2] * camR[1],
    camF[2] * camR[0] - camF[0] * camR[2],
    camF[0] * camR[1] - camF[1] * camR[0]
  ];
  // Horizon on screen: where the world-y component of the ray is zero.
  syHorizon = -camF[1] * FOCAL / camU[1];
}

// Hatching: 4 fixed screen-space angles, picked per-pixel from the projected
// surface normal of the blob.
const HATCH_ANGLES = [0, Math.PI / 4, Math.PI / 2, 3 * Math.PI / 4];

// 1 sx-unit = 2 inches = 50.8mm  ⇒  WORLD_PER_MM = 0.5 / 25.4
const WORLD_PER_MM = 2.0 / (W_IN * 25.4);

// ============================================================
// PRNG
// ============================================================
function hashSeed(s) {
  s = String(s);
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function makeRng(seed) {
  let s = hashSeed(seed);
  return function () {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ============================================================
// SDF
// ============================================================
function sphereSDF(x, y, z, c, r) {
  const dx = x - c[0], dy = y - c[1], dz = z - c[2];
  return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
}
function smin(a, b, k) {
  const h = Math.max(k - Math.abs(a - b), 0) / k;
  return Math.min(a, b) - h * h * k * 0.25;
}
function makeBlobSDF(rng, nSpheres, smoothK, spread, verticality) {
  // `spread`       — horizontal/radial offset multiplier on lobes
  // `verticality`  — stretches lobe placement AND each sphere's apparent
  //                  reach in world-y, producing a vertically elongated blob.
  if (!spread && spread !== 0) spread = 1;
  if (!verticality && verticality !== 0) verticality = 1;
  const V = verticality;
  // Slightly negative anchor — with a 6° camera tilt the new horizon falls
  // to sy ≈ -0.42, so a blob at world y = 0 projects right around the horizon.
  const ANCHOR_Y = 0;
  const spheres = [];
  spheres.push({ c: [0, ANCHOR_Y, 0], r: 0.4 + rng() * 0.15 });
  for (let i = 1; i < nSpheres; i++) {
    spheres.push({
      c: [
        (rng() - 0.5) * 0.7 * spread,
        ((rng() - 0.5) * 0.6 * spread) * V + ANCHOR_Y,
        (rng() - 0.5) * 0.5 * spread
      ],
      r: 0.22 + rng() * 0.25
    });
  }
  // For a vertical stretch we evaluate distance as if the world y axis is
  // compressed by 1/V — points further from the centre in y map to "smaller"
  // distances, so the resulting blob is taller. Not a true Euclidean SDF
  // (it's an ellipsoidal approximation) but it works for our raymarcher.
  function ellipsoidSDF(x, y, z, c, r) {
    const dx = x - c[0];
    const dy = (y - c[1]) / V;
    const dz = z - c[2];
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
  }
  return function (x, y, z) {
    let d = ellipsoidSDF(x, y, z, spheres[0].c, spheres[0].r);
    for (let i = 1; i < spheres.length; i++) {
      d = smin(d, ellipsoidSDF(x, y, z, spheres[i].c, spheres[i].r), smoothK);
    }
    return d;
  };
}

// ============================================================
// Camera + raymarch (orthographic in y, mild perspective in z so the
// horizon plane is visible)
// ============================================================
function castRay(sx, sy) {
  // direction = F·focal + R·sx + U·sy, normalized
  const dx = camF[0] * FOCAL + camR[0] * sx + camU[0] * sy;
  const dy = camF[1] * FOCAL + camR[1] * sx + camU[1] * sy;
  const dz = camF[2] * FOCAL + camR[2] * sx + camU[2] * sy;
  const len = Math.hypot(dx, dy, dz);
  return [dx / len, dy / len, dz / len];
}
function rayMarch(sdf, ox, oy, oz, dx, dy, dz, tMax) {
  let t = 0;
  for (let i = 0; i < 96; i++) {
    const d = sdf(ox + dx * t, oy + dy * t, oz + dz * t);
    if (d < 0.0008) return t;
    t += Math.max(d, 0.004);
    if (t > tMax) return -1;
  }
  return -1;
}
function normalAt(sdf, x, y, z) {
  const e = 0.0009;
  const nx = sdf(x + e, y, z) - sdf(x - e, y, z);
  const ny = sdf(x, y + e, z) - sdf(x, y - e, z);
  const nz = sdf(x, y, z + e) - sdf(x, y, z - e);
  const l = Math.hypot(nx, ny, nz) || 1;
  return [nx / l, ny / l, nz / l];
}

// ============================================================
// Scene buffer (depth, normal, lighting, surface, precomputed primary
// hatch angle index per pixel)
// surface: 0 = sky, 1 = blob, 2 = ground
// ============================================================
function snapAngle(a) {
  let amod = ((a % Math.PI) + Math.PI) % Math.PI;
  let bestI = 0, bestD = Infinity;
  for (let i = 0; i < HATCH_ANGLES.length; i++) {
    let d = Math.abs(amod - HATCH_ANGLES[i]);
    if (d > Math.PI / 2) d = Math.PI - d;
    if (d < bestD) { bestD = d; bestI = i; }
  }
  return bestI;
}

function renderSceneBuffer(state, sdf) {
  const W = state.bufRes;
  const H = Math.round(W * (SY_MAX - SY_MIN) / (SX_MAX - SX_MIN));
  const N = W * H;
  const buf = {
    W, H,
    surface: new Uint8Array(N),
    nx: new Float32Array(N), ny: new Float32Array(N), nz: new Float32Array(N),
    light: new Float32Array(N),
    depth: new Float32Array(N),
    primary: new Uint8Array(N)
  };

  let lL = Math.hypot(state.lx, state.ly, state.lz) || 1;
  const L = [state.lx / lL, state.ly / lL, state.lz / lL];

  for (let py = 0; py < H; py++) {
    const sy = SY_MAX - (py / (H - 1)) * (SY_MAX - SY_MIN);
    for (let px = 0; px < W; px++) {
      const sx = SX_MIN + (px / (W - 1)) * (SX_MAX - SX_MIN);
      const idx = py * W + px;
      const [dx, dy, dz] = castRay(sx, sy);

      let tG = -1;
      if (dy < -1e-5) {
        const t = (GROUND_Y - CAM[1]) / dy;
        if (t > 0) tG = t;
      }
      const tB = rayMarch(sdf, CAM[0], CAM[1], CAM[2], dx, dy, dz, 25);

      let hit = 0, n = null, t = -1;
      if (tB > 0 && (tG < 0 || tB < tG)) {
        hit = 1; t = tB;
        n = normalAt(sdf, CAM[0] + dx * tB, CAM[1] + dy * tB, CAM[2] + dz * tB);
      } else if (tG > 0) {
        hit = 2; t = tG; n = [0, 1, 0];
      }

      if (hit === 0) { buf.surface[idx] = 0; continue; }
      buf.surface[idx] = hit;
      buf.nx[idx] = n[0]; buf.ny[idx] = n[1]; buf.nz[idx] = n[2];
      buf.depth[idx] = t;
      const ld = Math.max(0, n[0] * L[0] + n[1] * L[1] + n[2] * L[2]);
      buf.light[idx] = 0.15 + 0.85 * ld;

      // Per-pixel "primary" hatch angle = perpendicular to projected normal.
      // For very face-on regions (small projected normal), the angle is
      // unstable, so default to the diagonal there.
      const projMag = Math.hypot(n[0], n[1]);
      let pri;
      if (hit === 2) {
        pri = 0; // ground = horizontal
      } else if (projMag < 0.15) {
        pri = 1;
      } else {
        pri = snapAngle(Math.atan2(n[1], n[0]) + Math.PI / 2);
      }
      buf.primary[idx] = pri;
    }
  }
  return buf;
}

function bufIdx(buf, sx, sy) {
  const px = Math.round((sx - SX_MIN) / (SX_MAX - SX_MIN) * (buf.W - 1));
  const py = Math.round((SY_MAX - sy) / (SY_MAX - SY_MIN) * (buf.H - 1));
  if (px < 0 || px >= buf.W || py < 0 || py >= buf.H) return -1;
  return py * buf.W + px;
}

// ============================================================
// Hatching decision: for each (sx, sy) and a given hatch angle index,
// returns whether the scan line at that angle should be "on" here.
// ============================================================
function shouldDrawAt(buf, sx, sy, angleIdx) {
  const idx = bufIdx(buf, sx, sy);
  if (idx < 0) return false;
  // Sky and ground are handled by their own generators — the screen-space
  // scan-line passes here are blob-only.
  if (buf.surface[idx] !== 1) return false;

  const pri = buf.primary[idx];
  if (angleIdx === pri) return true;

  // Blob: tiered crosshatch by offset from primary.
  const offset = (angleIdx - pri + 4) % 4;
  const darkness = 1 - buf.light[idx];
  const T = [0, 0.30, 0.55, 0.78];
  return darkness > T[offset];
}

// ============================================================
// Hatch generation: scan parallel lines across the image at each angle.
// ============================================================
function generateHatches(state, buf) {
  const paths = [];
  const spacingMM = state.lw * state.density;
  const worldStep = Math.max(0.002, spacingMM * WORLD_PER_MM);
  const sampleStep = Math.max(0.0015, worldStep * 0.35);
  const RANGE = 1.8;

  for (let a = 0; a < HATCH_ANGLES.length; a++) {
    const ang = HATCH_ANGLES[a];
    const ca = Math.cos(ang), sa = Math.sin(ang);

    // Stagger every other angle by half spacing so different angle grids
    // don't visually align into moiré.
    const phase = (a % 2) * worldStep * 0.5;
    for (let s = -RANGE + phase; s <= RANGE; s += worldStep) {
      const sx0 = -sa * s;
      const sy0 = ca * s;

      let inDraw = false;
      let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;

      for (let t = -RANGE; t <= RANGE; t += sampleStep) {
        const sx = sx0 + ca * t;
        const sy = sy0 + sa * t;
        const inBounds = (sx >= SX_MIN && sx <= SX_MAX &&
                          sy >= SY_MIN && sy <= SY_MAX);
        const draw = inBounds && shouldDrawAt(buf, sx, sy, a);

        if (draw) {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        } else if (inDraw) {
          const segLen = Math.hypot(lastX - dx0, lastY - dy0);
          if (segLen > worldStep * 0.4) {
            paths.push([[dx0, dy0], [lastX, lastY]]);
          }
          inDraw = false;
        }
      }
      if (inDraw) {
        const segLen = Math.hypot(lastX - dx0, lastY - dy0);
        if (segLen > worldStep * 0.4) {
          paths.push([[dx0, dy0], [lastX, lastY]]);
        }
      }
    }
  }
  return paths;
}

// ============================================================
// Ground hatches: horizontal lines spaced evenly in WORLD z (depth),
// so they bunch toward the horizon and feel like they recede.
//
// Camera at (0, 0, -5) hitting ground at y = -0.5 via image plane at z = -1:
//   ground_z = -5 - 2/sy          ⇔          sy = -2 / (ground_z + 5)
// Stepping ground_z by a constant amount produces sy steps that shrink
// toward the horizon — the perspective compression we want.
// ============================================================
function generateGroundHatches(state, buf) {
  // Iterate sy DIRECTLY (not via z) with a smoothly shrinking step.
  // This avoids the "skip 1 every N" alternation pattern of the previous
  // algorithm, which caused the visible repeating bands.
  //
  //   step(sy) = minDsy + (maxDsy - minDsy) · ((dist_to_horizon)/full_range)²
  //
  // → sparse at the bottom (large step), tight at the horizon (~minDsy).
  const paths = [];
  const sampleStep = 0.003;

  // Sparse step at the far end (page bottom); tight step near horizon.
  const maxDsy = state.lw * state.density * WORLD_PER_MM * 1.6;
  const minDsy = Math.max(state.lw * WORLD_PER_MM * 0.95, 0.0035);

  const fullRange = syHorizon - SY_MIN;
  if (fullRange <= 0) return paths;

  let sy = SY_MIN;
  // A small safety to stop juuust short of the horizon where lines would
  // start overlapping the horizon stroke.
  const stopAt = syHorizon - minDsy * 0.6;

  while (sy < stopAt) {
    const d = (syHorizon - sy) / fullRange;          // 1 at bottom → 0 at horizon
    const step = minDsy + (maxDsy - minDsy) * d * d; // squared falloff

    let inDraw = false;
    let x0 = 0, lastX = 0;
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      const idx = bufIdx(buf, sx, sy);
      const draw = (idx >= 0 && buf.surface[idx] === 2);
      if (draw) {
        if (!inDraw) { x0 = sx; inDraw = true; }
        lastX = sx;
      } else if (inDraw) {
        if (lastX - x0 > 0.005) paths.push([[x0, sy], [lastX, sy]]);
        inDraw = false;
      }
    }
    if (inDraw && lastX - x0 > 0.005) paths.push([[x0, sy], [lastX, sy]]);

    sy += step;
  }
  return paths;
}

// ============================================================
// Sky hatches: 45° scan lines clipped to sky pixels, dashed with a
// top-down fade — solid near the top of the page, fading to nothing
// as the scan line approaches the horizon.
// ============================================================
function generateSkyHatches(state, buf) {
  const paths = [];
  const ang = Math.PI / 4;
  const ca = Math.cos(ang), sa = Math.sin(ang);

  // Slightly sparser than blob hatches so the sky reads as background.
  const spacingWorld = state.lw * state.density * WORLD_PER_MM * 1.3;
  const sampleStep = Math.max(0.0015, spacingWorld * 0.22);
  const cycleLen = spacingWorld * 1.4;
  const RANGE = 1.85;

  // syHorizon is set by setupCamera() at render time.
  const maxSky = SY_MAX - syHorizon;
  if (maxSky < 0.05) return paths;

  for (let s = -RANGE; s <= RANGE; s += spacingWorld) {
    const sx0 = -sa * s;
    const sy0 = ca * s;
    let inDraw = false;
    let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;

    for (let t = -RANGE; t <= RANGE; t += sampleStep) {
      const sx = sx0 + ca * t;
      const sy = sy0 + sa * t;
      let draw = false;
      if (sx >= SX_MIN && sx <= SX_MAX && sy >= SY_MIN && sy <= SY_MAX
          && sy > syHorizon) {
        const idx = bufIdx(buf, sx, sy);
        if (idx >= 0 && buf.surface[idx] === 0) {
          // Inverted from the previous attempt: solid at the TOP, fades
          // down toward the horizon. `above` = 1 at top of page, 0 at horizon.
          const above = (sy - syHorizon) / maxSky;
          const onFrac = above * above;          // squared falloff
          const cyc = (t / cycleLen) - Math.floor(t / cycleLen);
          draw = cyc < onFrac;
        }
      }
      if (draw) {
        if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
        lastX = sx; lastY = sy;
      } else if (inDraw) {
        if (Math.hypot(lastX - dx0, lastY - dy0) > spacingWorld * 0.3) {
          paths.push([[dx0, dy0], [lastX, lastY]]);
        }
        inDraw = false;
      }
    }
    if (inDraw && Math.hypot(lastX - dx0, lastY - dy0) > spacingWorld * 0.3) {
      paths.push([[dx0, dy0], [lastX, lastY]]);
    }
  }
  return paths;
}

// ============================================================
// Sky clouds: horizontal lines in the top third of the page, with a
// wavy noise displacement so they read as cloud strands rather than
// a horizon gradient. Drawn only where the buffer reports sky (surface=0).
// ============================================================
function generateSkyClouds(state, buf) {
  const paths = [];
  // Operate in the top 1/3 of the page (in screen-y).
  const topThirdStart = SY_MAX - (SY_MAX - SY_MIN) / 3;
  if (topThirdStart <= syHorizon) return paths;

  // Line spacing comparable to the blob hatching density but a bit looser.
  const spacing = state.lw * state.density * WORLD_PER_MM * 1.5;
  const sampleStep = 0.005;

  // Two octaves of value-noise generated from a seeded PRNG. Cheap and good
  // enough to evoke cloud strands without bringing in a real noise lib.
  const noiseRng = makeRng(state.seed + ':clouds');
  const grid = new Float32Array(256);
  for (let i = 0; i < grid.length; i++) grid[i] = noiseRng();
  function n1(t) {
    // 1-D smoothed value noise over `t`, modulo 256.
    const u = ((t % 256) + 256) % 256;
    const i = Math.floor(u);
    const f = u - i;
    const a = grid[i % 256];
    const b = grid[(i + 1) % 256];
    const s = f * f * (3 - 2 * f);                // smoothstep
    return a + (b - a) * s;
  }

  // Amplitude of the wavy displacement (in screen-y units). Driven by the
  // global `waviness` slider so the same control affects clouds and waves.
  const ampBase = spacing * 1.4 * state.waviness;

  for (let sy = topThirdStart; sy <= SY_MAX; sy += spacing) {
    // How far up in the band — 0 at bottom of the band, 1 at the top of page.
    const tBand = (sy - topThirdStart) / (SY_MAX - topThirdStart);
    // Per-line phase offsets, so adjacent strands don't move in lockstep.
    const px = 7.13 * (sy - topThirdStart);
    const py = 19.7 * (sy - topThirdStart);

    let inDraw = false;
    let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;
    for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
      // Composite of two octaves for organic but still-cloud-like wobble.
      const n =
        0.65 * (n1(sx * 4 + px) - 0.5) +
        0.35 * (n1(sx * 10 + py) - 0.5);
      const wavy = sy + n * ampBase;
      if (wavy < topThirdStart || wavy > SY_MAX) {
        if (inDraw) {
          if (Math.hypot(lastX - dx0, lastY - dy0) > sampleStep * 0.6) {
            paths.push([[dx0, dy0], [lastX, lastY]]);
          }
          inDraw = false;
        }
        continue;
      }
      const idx = bufIdx(buf, sx, wavy);
      const isSky = (idx >= 0 && buf.surface[idx] === 0);
      if (isSky) {
        if (!inDraw) { dx0 = sx; dy0 = wavy; inDraw = true; }
        lastX = sx; lastY = wavy;
      } else if (inDraw) {
        if (Math.hypot(lastX - dx0, lastY - dy0) > sampleStep * 0.6) {
          paths.push([[dx0, dy0], [lastX, lastY]]);
        }
        inDraw = false;
      }
    }
    if (inDraw && Math.hypot(lastX - dx0, lastY - dy0) > sampleStep * 0.6) {
      paths.push([[dx0, dy0], [lastX, lastY]]);
    }
  }
  return paths;
}

// ============================================================
// Horizon line, broken where the blob occludes it
// ============================================================
function addHorizonLine(paths, buf) {
  const HY = syHorizon;
  if (HY < SY_MIN + 0.02 || HY > SY_MAX - 0.02) return;
  const sampleStep = 0.0025;
  let inDraw = false, x0 = 0, lastX = 0;
  for (let sx = SX_MIN; sx <= SX_MAX; sx += sampleStep) {
    const i = bufIdx(buf, sx, HY);
    const occluded = (i >= 0 && buf.surface[i] === 1);
    if (!occluded) {
      if (!inDraw) { x0 = sx; inDraw = true; }
      lastX = sx;
    } else if (inDraw) {
      paths.push([[x0, HY], [lastX, HY]]);
      inDraw = false;
    }
  }
  if (inDraw) paths.push([[x0, HY], [lastX, HY]]);
}

// ============================================================
// Pen-up travel optimization
// ============================================================
function optimizePaths(paths) {
  const n = paths.length;
  if (n === 0) return paths;
  const used = new Uint8Array(n);
  const out = [];
  let cx = -1, cy = 1.25;
  for (let count = 0; count < n; count++) {
    let best = -1, bestD = Infinity, bestRev = false;
    for (let i = 0; i < n; i++) {
      if (used[i]) continue;
      const p = paths[i];
      const a = p[0], b = p[p.length - 1];
      const dA = (a[0] - cx) * (a[0] - cx) + (a[1] - cy) * (a[1] - cy);
      const dB = (b[0] - cx) * (b[0] - cx) + (b[1] - cy) * (b[1] - cy);
      if (dA < bestD) { bestD = dA; best = i; bestRev = false; }
      if (dB < bestD) { bestD = dB; best = i; bestRev = true; }
    }
    used[best] = 1;
    const p = paths[best];
    const ordered = bestRev ? p.slice().reverse() : p;
    out.push(ordered);
    cx = ordered[ordered.length - 1][0];
    cy = ordered[ordered.length - 1][1];
  }
  return out;
}

// ============================================================
// SVG output
// ============================================================
function sxToVB(sx) {
  return MARGIN_VB + (sx - SX_MIN) / (SX_MAX - SX_MIN) * (VB_W - 2 * MARGIN_VB);
}
function syToVB(sy) {
  return MARGIN_VB + (SY_MAX - sy) / (SY_MAX - SY_MIN) * (VB_H - 2 * MARGIN_VB);
}
function buildPathD(paths) {
  let d = '';
  for (const p of paths) {
    if (p.length < 2) continue;
    d += 'M' + sxToVB(p[0][0]).toFixed(2) + ',' + syToVB(p[0][1]).toFixed(2);
    for (let i = 1; i < p.length; i++) {
      d += 'L' + sxToVB(p[i][0]).toFixed(2) + ',' + syToVB(p[i][1]).toFixed(2);
    }
  }
  return d;
}
function lwToStrokeVB(lwMM) { return lwMM * (300 / 25.4); }

// ============================================================
// State + UI glue
// ============================================================
function readState() {
  return {
    seed: document.getElementById('seed').value || '0',
    nSpheres: clampInt(document.getElementById('nSpheres').value, 2, 8, 4),
    spread: clampFloat(document.getElementById('spread').value, 0.2, 3.0, 1.0),
    verticality: clampFloat(document.getElementById('verticality').value, 0.4, 3.0, 1.4),
    smoothK: clampFloat(document.getElementById('smoothK').value, 0.05, 0.8, 0.3),
    camTilt: clampFloat(document.getElementById('camTilt').value, 0, 20, 6),
    skyStyle: document.getElementById('skyStyle').value,
    waviness: clampFloat(document.getElementById('waviness').value, 0, 8, 3.0),
    lw: clampFloat(document.getElementById('lw').value, 0.05, 2.0, 0.3),
    density: clampFloat(document.getElementById('density').value, 1.2, 8, 2.5),
    bufRes: clampInt(document.getElementById('bufRes').value, 200, 800, 400),
    lx: clampFloat(document.getElementById('lx').value, -2, 2, -0.6),
    ly: clampFloat(document.getElementById('ly').value, -2, 2, 0.8),
    lz: clampFloat(document.getElementById('lz').value, -2, 2, -0.4),
  };
}
function clampInt(v, lo, hi, fb) {
  const n = parseInt(v, 10);
  return Number.isFinite(n) ? Math.min(hi, Math.max(lo, n)) : fb;
}
function clampFloat(v, lo, hi, fb) {
  const n = parseFloat(v);
  return Number.isFinite(n) ? Math.min(hi, Math.max(lo, n)) : fb;
}
function setStatus(msg) { document.getElementById('stats').textContent = msg; }
function tick() { return new Promise(r => setTimeout(r, 0)); }

function syncFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const keys = ['seed','lw','density','nSpheres','spread','verticality',
                'smoothK','camTilt','skyStyle','waviness','bufRes','lx','ly','lz'];
  for (const k of keys) {
    if (params.has(k)) document.getElementById(k).value = params.get(k);
  }
}
function writeUrl(state) {
  const params = new URLSearchParams();
  for (const k of ['seed','lw','density','nSpheres','spread','verticality',
                   'smoothK','camTilt','skyStyle','waviness']) {
    params.set(k, state[k]);
  }
  const url = window.location.pathname + '?' + params.toString();
  window.history.replaceState({}, '', url);
  const link = document.getElementById('permalink');
  link.href = url;
  link.textContent = '?' + params.toString();
}

let lastRender = null;

async function doRender() {
  const btn = document.getElementById('render');
  btn.disabled = true;
  try {
    const state = readState();
    writeUrl(state);

    setStatus('Building blob SDF…');
    await tick();
    setupCamera(state.camTilt);
    const rng = makeRng(state.seed);
    const sdf = makeBlobSDF(rng, state.nSpheres, state.smoothK,
                            state.spread, state.verticality);

    setStatus('Raymarching scene buffer…');
    await tick();
    const t0 = performance.now();
    const buf = renderSceneBuffer(state, sdf);
    const t1 = performance.now();

    setStatus('Generating hatches…');
    await tick();
    const blob = generateHatches(state, buf);
    const ground = generateGroundHatches(state, buf);
    const sky = (state.skyStyle === 'clouds')
      ? generateSkyClouds(state, buf)
      : generateSkyHatches(state, buf);
    const rawPaths = blob.concat(ground).concat(sky);
    addHorizonLine(rawPaths, buf);
    const t2 = performance.now();

    setStatus('Optimizing pen travel…');
    await tick();
    const paths = optimizePaths(rawPaths);
    const t3 = performance.now();

    const d = buildPathD(paths);
    const strokeVB = lwToStrokeVB(state.lw);

    const svg = document.getElementById('preview');
    svg.setAttribute('viewBox', '0 0 ' + VB_W + ' ' + VB_H);
    svg.style.width = '480px';
    svg.style.height = '600px';
    svg.innerHTML =
      '<rect width="' + VB_W + '" height="' + VB_H + '" fill="white"/>' +
      '<path d="' + d + '" stroke="black" stroke-width="' + strokeVB.toFixed(3) +
      '" fill="none" stroke-linecap="round" stroke-linejoin="round"/>';

    lastRender = { state, paths, d, strokeVB };

    setStatus(
      paths.length + ' strokes\n' +
      'buffer ' + Math.round(t1 - t0) + 'ms · hatch ' + Math.round(t2 - t1) +
      'ms · opt ' + Math.round(t3 - t2) + 'ms\n' +
      'lw=' + state.lw + 'mm  spacing=' + (state.lw * state.density).toFixed(2) + 'mm'
    );
  } catch (err) {
    setStatus('Error: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

function doSave() {
  if (!lastRender) { setStatus('Nothing to save yet — render first.'); return; }
  const { state, d, strokeVB } = lastRender;
  const svgText =
    '<?xml version="1.0" encoding="UTF-8"?>\n' +
    '<svg xmlns="http://www.w3.org/2000/svg" ' +
    'width="' + W_IN + 'in" height="' + H_IN + 'in" ' +
    'viewBox="0 0 ' + VB_W + ' ' + VB_H + '">\n' +
    '  <path d="' + d + '" stroke="black" stroke-width="' + strokeVB.toFixed(3) +
    '" fill="none" stroke-linecap="round" stroke-linejoin="round"/>\n' +
    '</svg>\n';
  const blob = new Blob([svgText], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'rayblob_seed-' + state.seed + '_lw-' + state.lw + '.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function doRandomize() {
  document.getElementById('seed').value = Math.floor(Math.random() * 1e9).toString(36);
  doRender();
}

document.getElementById('render').addEventListener('click', doRender);
document.getElementById('save').addEventListener('click', doSave);
document.getElementById('randomize').addEventListener('click', doRandomize);
document.querySelectorAll('.panel input').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') doRender(); });
});

syncFromUrl();
doRender();
</script>
</body>
</html>
