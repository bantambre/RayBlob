<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RayBlob — 4×5" Hatched Blob</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 16px; font: 12px/1.35 system-ui, sans-serif;
         background: #1c1c1c; color: #ddd; }
  .layout { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .panel { display: flex; flex-direction: column; gap: 4px;
           width: 220px; padding: 12px;
           background: #262626; border-radius: 6px; }
  .panel h2 { margin: 6px 0 1px; font-size: 10px; font-weight: 600;
              letter-spacing: 0.06em; text-transform: uppercase; color: #999; }
  .field { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .field label { color: #aaa; font-size: 11px; }
  .field input, .field select { width: 78px; padding: 3px 5px; background: #1a1a1a;
                 color: #eee; border: 1px solid #3a3a3a; border-radius: 3px;
                 font: inherit; font-size: 11px; text-align: right; }
  .field input[type="text"] { text-align: left; }
  .row { display: flex; gap: 6px; }
  button { padding: 6px 8px; background: #3a78d8; color: white;
           border: none; border-radius: 3px; cursor: pointer; font: inherit;
           font-size: 11px; flex: 1; }
  button:hover { background: #4a88e8; }
  button.secondary { background: #444; }
  button.secondary:hover { background: #555; }
  button:disabled { opacity: 0.5; cursor: wait; }
  .stats { padding-top: 10px; margin-top: 6px; border-top: 1px solid #3a3a3a;
           color: #888; font-size: 11px; line-height: 1.6;
           font-family: ui-monospace, monospace; white-space: pre-wrap;
           min-height: 32px; }
  .stage { background: white; border-radius: 6px;
           box-shadow: 0 6px 24px rgba(0,0,0,0.4); }
  #preview { display: block; }
  a.url-link { color: #6aa8ff; font-family: ui-monospace, monospace;
               font-size: 10px; word-break: break-all; }
</style>
</head>
<body>
<div class="layout">
  <div class="panel">
    <h2>Composition</h2>
    <div class="field"><label>Seed</label><input id="seed" type="text" value="42"></div>

    <h2 id="sceneParamsHeader" style="display:none">Scene parameters</h2>
    <div id="sceneParamsPanel"></div>
    <div class="field"><label>Ground style</label>
      <select id="groundStyle"
              style="width:120px;padding:5px;background:#1a1a1a;color:#eee;border:1px solid #3a3a3a;border-radius:4px;font:inherit">
        <option value="perspective" selected>Perspective</option>
        <option value="waves">Waves</option>
        <option value="sandGarden">Sand garden</option>
      </select>
    </div>
    <div class="field"><label>Sky style</label>
      <select id="skyStyle"
              style="width:120px;padding:5px;background:#1a1a1a;color:#eee;border:1px solid #3a3a3a;border-radius:4px;font:inherit">
        <option value="gradient" selected>Gradient</option>
        <option value="wobbly">Wobbly lines</option>
        <option value="multiGradient">Box gradient</option>
        <option value="paperGrain">Paper grain</option>
        <option value="arcs">Concentric arcs</option>
        <option value="stars">Stars</option>
      </select>
    </div>

    <div class="row" style="margin-top:10px">
      <button id="render">Render</button>
      <button id="randomize" class="secondary">Random</button>
      <button id="save" class="secondary">Save SVG</button>
    </div>

    <div class="stats" id="stats">Ready.</div>
    <a class="url-link" id="permalink" href="#">permalink</a>
    <a class="url-link" href="gallery.html" style="margin-top:4px">→ gallery</a>
  </div>

  <div class="stage">
    <svg id="preview" width="480" height="600" viewBox="0 0 1200 1500"
         xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<script>
'use strict';

// ============================================================
// Constants & coordinate system
// ============================================================
// SVG output: paper size in inches, viewBox at 300 units/inch. The
// concrete paper size is configurable via the UI; setPaperSize() below
// is the single point that keeps all derived values consistent.
let W_IN = 4, H_IN = 5;
let VB_W = 1200, VB_H = 1500;
const MARGIN_VB = 60;

// Screen-space coords. sx ∈ [-1, 1] regardless of paper, sy extends
// proportionally so the aspect matches the paper (positive sy = UP).
const SX_MIN = -1, SX_MAX = 1;
let SY_MIN = -1.25, SY_MAX = 1.25;

// Paper-size registry — string id → {w, h} in inches. Add a new entry
// + an <option> in the paperSize <select> to expose another size.
const PAPER_SIZES = {
  '4x5':  { w: 4, h: 5  },
  '4x6':  { w: 4, h: 6  },
  '5x7':  { w: 5, h: 7  },
  '8x10': { w: 8, h: 10 },
  '9x12': { w: 9, h: 12 }
};

// Set the active paper size and recompute everything that derives from
// it (viewBox, sy range, world-per-mm). Call before each render whenever
// state.paperSize changes.
function setPaperSize(wIn, hIn) {
  W_IN = wIn; H_IN = hIn;
  VB_W = Math.round(wIn * 300); VB_H = Math.round(hIn * 300);
  // SY range is centred at 0 and scales with paper aspect (SX range stays [-1, 1]).
  const halfSY = hIn / wIn;
  SY_MIN = -halfSY; SY_MAX = halfSY;
  // 1 sx-unit spans wIn/2 inches; WORLD_PER_MM = 1 / (wIn/2 * 25.4) = 2 / (wIn * 25.4).
  WORLD_PER_MM = 2.0 / (wIn * 25.4);
}

// Camera position is fixed; the *direction* changes with `camTilt`, so the
// horizon position on screen is configurable. These F/R/U vectors are
// recomputed at render time by setupCamera().
// Camera position and focal distance — `let` so scenes can override them
// per-render through `setupCamera({ pos, focal, tiltDeg })`. Defaults work
// for the standard "subject on a horizon" composition.
let CAM = [0, 0, -5];
let FOCAL = 4;
const GROUND_Y = -0.5;
let camF = [0, 0, 1];
let camR = [1, 0, 0];
let camU = [0, 1, 0];
let syHorizon = 0;

// `opts` is an object: { tiltDeg, yawDeg, distance, pos: [x,y,z], focal }.
// Defaults: tilt 0, yaw 0, distance 5 (camera orbits at this radius around
// the origin in the xz plane). `pos` overrides the orbit math entirely.
function setupCamera(opts) {
  opts = opts || {};
  const tiltDeg = opts.tiltDeg != null ? opts.tiltDeg : 0;
  const yawDeg  = opts.yawDeg  != null ? opts.yawDeg  : 0;
  const dist    = opts.distance != null ? opts.distance : 5;
  const tilt = tiltDeg * Math.PI / 180;
  const yaw  = yawDeg  * Math.PI / 180;
  const sy_ = Math.sin(yaw), cy_ = Math.cos(yaw);
  const st_ = Math.sin(tilt), ct_ = Math.cos(tilt);
  // Orbit: yaw=0 → camera at (0, 0, -dist) (legacy default).
  if (opts.pos) CAM = opts.pos.slice();
  else          CAM = [dist * sy_, 0, -dist * cy_];
  FOCAL = opts.focal != null ? opts.focal : 4;
  // Yaw-then-pitch camera basis. F points from CAM toward the origin
  // (modulo the pitch).
  camF = [-sy_ * ct_, st_, cy_ * ct_];
  camR = [ cy_,       0,   sy_      ];
  // U = F × R for right-handed +y-up
  camU = [
    camF[1] * camR[2] - camF[2] * camR[1],
    camF[2] * camR[0] - camF[0] * camR[2],
    camF[0] * camR[1] - camF[1] * camR[0]
  ];
  // Horizon on screen: where the world-y component of the ray is zero.
  syHorizon = -camF[1] * FOCAL / camU[1];
}

// Named camera poses. Scenes can `return { sdf, camera: CAMERA.hero }` for
// a standard horizon-line composition (mostly used for ground-based forms)
// or use one of the alternates. Scene-specific compositions still pass
// their own `{ tiltDeg, yawDeg, distance }` literals where the framing is
// genuinely bespoke.
const CAMERA = {
  hero:        { tiltDeg: 6 },                       // standard horizon, looking at a ground-anchored form
  threeQuarter:{ tiltDeg: 6,  yawDeg: 22 },          // hero pose with a slight off-axis turn
  closeUp:     { tiltDeg: 14, yawDeg: 22 },          // closer, more vertical (polyhedron-style)
  topDown:     { tiltDeg: 22, yawDeg: 18 }           // dramatic looking-down (UFO/mengerSponge)
};

// Hatching: 4 fixed screen-space angles, picked per-pixel from the projected
// surface normal of the blob.
const HATCH_ANGLES = [0, Math.PI / 4, Math.PI / 2, 3 * Math.PI / 4];

// Per-pixel material id (buf.material[idx]) is set by scenes via their
// materialFn. Each id selects a row of MATERIAL_PROPS that shifts the
// hatcher's per-pixel darkness up or down — positive shifts more hatching
// (denser/darker), negative shifts less (sparser/lighter). 0 is the
// default and has no effect, so scenes that don't set material at all
// render exactly as before.
const MATERIAL_PROPS = [
  { darknessShift:  0.00 },  // 0: default
  { darknessShift:  0.30 },  // 1: dense / shadowed (e.g. underwater)
  { darknessShift: -0.30 },  // 2: bright / sparse (e.g. ice in sun)
  { darknessShift:  0.18 },  // 3: medium dense
  { darknessShift: -0.18 },  // 4: medium sparse
  { darknessShift:  0.45 },  // 5: very dense (near-solid black)
  { darknessShift: -0.45 }   // 6: very sparse (near highlights only)
];
function materialDarknessShift(buf, idx) {
  const m = buf.material[idx];
  const p = MATERIAL_PROPS[m];
  return p ? p.darknessShift : 0;
}

// Cheap deterministic [0,1) hash from (sx, sy). Used by hatchers that
// need a per-position dropout probability.
function hash01(sx, sy) {
  const h = Math.sin(sx * 1234.5 + sy * 5678.9 + 0.137) * 43758.5;
  return h - Math.floor(h);
}

// Canonical per-pixel darkness for the blob surface, in [0, 1]:
// Lambert (inverted) + soft-shadow penumbra + AO contribution + material shift.
// Every hatcher should call this; tonal-curve tweaks happen in one place.
function computeDarkness(buf, idx) {
  return Math.max(0, Math.min(1,
    (1 - buf.light[idx]) +
    0.50 * buf.shadow[idx] +
    0.20 * (1 - buf.ao[idx]) +
    materialDarknessShift(buf, idx)
  ));
}

// Width of one sx-unit in mm, derived from current paper width. Updated
// by setPaperSize() — `let` so it tracks the active paper.
let WORLD_PER_MM = 2.0 / (W_IN * 25.4);

// ============================================================
// PRNG
// ============================================================
function hashSeed(s) {
  s = String(s);
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function makeRng(seed) {
  let s = hashSeed(seed);
  return function () {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ============================================================
// SDF
// ============================================================
function sphereSDF(x, y, z, c, r) {
  const dx = x - c[0], dy = y - c[1], dz = z - c[2];
  return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
}
function smin(a, b, k) {
  const h = Math.max(k - Math.abs(a - b), 0) / k;
  return Math.min(a, b) - h * h * k * 0.25;
}
// Position-aware blob SDF — multiple of these can be composed via
// sdfUnion() to build "multiple blobs in a scene" (Monoliths, Forest,
// Cacti, Skyline, …). Each blob picks its own random lobes from `rng`.
//
//   opts = {
//     center:      [x, y, z]   (default [0,0,0])
//     nSpheres:    int         lobes incl. central anchor
//     smoothK:     0..0.8      smooth-min radius
//     spread:      0..3        horizontal/radial offset multiplier
//     verticality: 0.4..3      world-y stretch (taller > 1)
//     pointiness:  0..2        upper-lobe taper for sea-stack/cone forms
//     scale:       any         overall size multiplier
//   }
function makeBlobSDFAt(rng, opts) {
  const center = opts.center || [0, 0, 0];
  const nSpheres = opts.nSpheres || 4;
  const smoothK = opts.smoothK == null ? 0.3 : opts.smoothK;
  const spread = opts.spread == null ? 1 : opts.spread;
  const V = opts.verticality == null ? 1 : opts.verticality;
  const P = opts.pointiness || 0;
  const sc = opts.scale == null ? 1 : opts.scale;

  const spheres = [];
  spheres.push({ c: center.slice(), r: (0.4 + rng() * 0.15) * sc });
  for (let i = 1; i < nSpheres; i++) {
    const cyRaw = ((rng() - 0.5) * 0.6 * spread) * V * sc;
    const taper = cyRaw > 0 ? Math.max(0.15, 1 - P * cyRaw) : 1;
    spheres.push({
      c: [
        center[0] + (rng() - 0.5) * 0.7 * spread * taper * sc,
        center[1] + cyRaw,
        center[2] + (rng() - 0.5) * 0.5 * spread * taper * sc
      ],
      r: (0.22 + rng() * 0.25) * Math.max(0.3, taper) * sc
    });
  }
  return function (x, y, z) {
    function ell(c, r) {
      const dx = x - c[0];
      const dy = (y - c[1]) / V;
      const dz = z - c[2];
      return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
    }
    let d = ell(spheres[0].c, spheres[0].r);
    for (let i = 1; i < spheres.length; i++) {
      d = smin(d, ell(spheres[i].c, spheres[i].r), smoothK);
    }
    return d;
  };
}

// Octahedral analogue of makeBlobSDFAt — same parameter shape (centre,
// nSpheres, smoothK, spread, verticality, pointiness, scale) but each
// primitive is an octahedron instead of an ellipsoidal sphere. With
// smoothK ≈ 0 the union preserves the diamond-face silhouettes, so the
// result reads as a faceted/edgy rock instead of a soft blob.
//
// Extras to break the "all-pyramids" silhouette pattern:
//   - randomRotate (default true): each shard is rotated by a random
//     angle around Y plus small tilts around X and Z, so vertices land
//     in different directions instead of aligning into a regular pyramid
//     grid.
//   - roundMix (0..1, default 0): fraction of shards (excluding the
//     central one) rendered as spheres instead of octahedra, giving a
//     mix of faceted + weathered rock surfaces.
function makeOctahedralBlobAt(rng, opts) {
  const center  = opts.center || [0, 0, 0];
  const n       = opts.nSpheres || 4;
  const smoothK = opts.smoothK == null ? 0 : opts.smoothK;
  const spread  = opts.spread  == null ? 1 : opts.spread;
  const V       = opts.verticality == null ? 1 : opts.verticality;
  const P       = opts.pointiness || 0;
  const sc      = opts.scale == null ? 1 : opts.scale;
  const randomRotate = opts.randomRotate !== false;
  const roundMix     = opts.roundMix == null ? 0 : opts.roundMix;
  const shards = [];
  // Central shard: always an octahedron, axis-aligned so the form has
  // a stable centre of mass even with random rotation on the others.
  shards.push(makeOctahedron(
    center[0], center[1], center[2],
    (0.40 + rng() * 0.15) * sc
  ));
  for (let i = 1; i < n; i++) {
    const cyRaw = ((rng() - 0.5) * 0.6 * spread) * V * sc;
    const taper = cyRaw > 0 ? Math.max(0.15, 1 - P * cyRaw) : 1;
    const cx = center[0] + (rng() - 0.5) * 0.7 * spread * taper * sc;
    const cy = center[1] + cyRaw;
    const cz = center[2] + (rng() - 0.5) * 0.5 * spread * taper * sc;
    const sz = (0.22 + rng() * 0.25) * Math.max(0.3, taper) * sc;
    // Decide primitive: sphere with probability roundMix, otherwise oct.
    const useSphere = (rng() < roundMix);
    if (useSphere) {
      // Spheres need no rotation (rotational symmetry).
      shards.push(makeSphere(cx, cy, cz, sz));
    } else if (randomRotate) {
      // Random Y rotation (full 0..2π) + small X / Z tilts (±0.35 rad ≈
      // ±20°) so the octahedron's vertices land in unique directions.
      const ay = rng() * Math.PI * 2;
      const ax = (rng() - 0.5) * 0.70;
      const az = (rng() - 0.5) * 0.70;
      let o = makeOctahedron(0, 0, 0, sz);
      o = rotateY(o, ay);
      if (ax !== 0) o = rotateX(o, ax);
      if (az !== 0) o = rotateZ(o, az);
      o = translate(o, cx, cy, cz);
      shards.push(o);
    } else {
      shards.push(makeOctahedron(cx, cy, cz, sz));
    }
  }
  return sdfUnion(shards, smoothK);
}

// ============================================================
// SDF composition engines
// ============================================================
// Union of multiple SDFs. `smoothK > 0` → smooth-min blending (good for
// organic forms that flow into each other). `smoothK = 0` → sharp
// Math.min (good for visually distinct objects).
function sdfUnion(sdfs, smoothK) {
  if (sdfs.length === 0) return function () { return Infinity; };
  if (sdfs.length === 1) return sdfs[0];
  if (smoothK > 0) {
    return function (x, y, z) {
      let d = sdfs[0](x, y, z);
      for (let i = 1; i < sdfs.length; i++) {
        d = smin(d, sdfs[i](x, y, z), smoothK);
      }
      return d;
    };
  }
  return function (x, y, z) {
    let d = sdfs[0](x, y, z);
    for (let i = 1; i < sdfs.length; i++) {
      const e = sdfs[i](x, y, z);
      if (e < d) d = e;
    }
    return d;
  };
}

// Intersect a list of SDFs — `result = max(d0, d1, …)`. Inside = where ALL
// component SDFs are inside.
function sdfIntersect(sdfs) {
  return function (x, y, z) {
    let d = -Infinity;
    for (let i = 0; i < sdfs.length; i++) {
      const di = sdfs[i](x, y, z);
      if (di > d) d = di;
    }
    return d;
  };
}

// Plane carving — subtract each carver from base. `result = max(base, -c0, -c1, …)`.
// Useful for arches, cave mouths, windows, valleys.
function sdfSubtract(base, carvers) {
  if (!carvers || carvers.length === 0) return base;
  return function (x, y, z) {
    let d = base(x, y, z);
    for (let i = 0; i < carvers.length; i++) {
      const c = -carvers[i](x, y, z);
      if (c > d) d = c;
    }
    return d;
  };
}

// Axis-aligned box (optionally rounded). cx,cy,cz = centre; hx,hy,hz = half-sizes.
// `round` shrinks the box by `round` and adds it back as a fillet — set to 0 for
// sharp corners.
function makeBox(cx, cy, cz, hx, hy, hz, round) {
  const r = round || 0;
  const hxR = hx - r, hyR = hy - r, hzR = hz - r;
  return function (x, y, z) {
    const dx = Math.abs(x - cx) - hxR;
    const dy = Math.abs(y - cy) - hyR;
    const dz = Math.abs(z - cz) - hzR;
    const ox = Math.max(dx, 0), oy = Math.max(dy, 0), oz = Math.max(dz, 0);
    const outside = Math.sqrt(ox * ox + oy * oy + oz * oz);
    const inside = Math.min(Math.max(dx, Math.max(dy, dz)), 0);
    return outside + inside - r;
  };
}

// Finite cone with apex at (cx, cy_apex, cz), base disk at y = cy_base with
// radius r_base. `cy_apex > cy_base` for an upward-pointing cone (pyramid /
// rocket-cone shape); pass `cy_apex < cy_base` for a downward-pointing cone.
function makeConeY(cx, cy_apex, cy_base, cz, r_base) {
  const apexUp = cy_apex > cy_base;
  const h = Math.abs(cy_apex - cy_base);
  const slantLen = Math.sqrt(r_base * r_base + h * h);
  return function (x, y, z) {
    const dx = x - cx, dz = z - cz;
    const dxz = Math.sqrt(dx * dx + dz * dz);
    const py = y - cy_apex;

    // Past the apex point (outside the cone, on the pointy side):
    if (apexUp ? (py > 0) : (py < 0)) {
      return Math.sqrt(dxz * dxz + py * py);
    }
    // Past the base disk (outside the cone, on the open side):
    if (apexUp ? (y < cy_base) : (y > cy_base)) {
      const dxDisk = Math.max(0, dxz - r_base);
      const dy = y - cy_base;
      return Math.sqrt(dxDisk * dxDisk + dy * dy);
    }
    // Within the cone's height range — signed distance to the slant surface.
    return (dxz * h - Math.abs(py) * r_base) / slantLen;
  };
}

// Square pyramid: square base of `halfSide` half-length centered at
// (cx, cy_base, cz), apex straight above at (cx, cy_base + height, cz).
// SDF = max of the four slanted-face half-spaces + the base plane —
// not a true Euclidean SDF (it under-estimates near edges) but it's
// a valid Lipschitz SDF that raymarches correctly.
function makePyramidSquare(cx, cy_base, cz, halfSide, height) {
  const s = halfSide;
  const h = height;
  const norm = Math.sqrt(h * h + s * s) || 1;
  return function (x, y, z) {
    const px = x - cx;
    const py = y - cy_base;
    const pz = z - cz;
    // Mirror through the diagonal symmetry of the square so we only have
    // to evaluate two slant planes instead of four.
    const ax = Math.abs(px);
    const az = Math.abs(pz);
    // Slanted faces: outward normal (h, s, 0)/norm and (0, s, h)/norm.
    // Plane SDF = (h*|p| + s*y - h*s) / norm, positive outside.
    const slantX = (h * ax + s * py - h * s) / norm;
    const slantZ = (h * az + s * py - h * s) / norm;
    // Base half-space: y ≥ cy_base must hold; outward normal (0, -1, 0).
    const base = -py;
    return Math.max(slantX, slantZ, base);
  };
}

// Half-space plane. Normal (nx, ny, nz) need not be unit-length; it gets
// normalised internally. The plane passes through the point where
// dot(p, n) + d = 0. SDF is positive on the +n side, negative on the -n side
// — pass as a carver to `sdfSubtract` to slice a base SDF in half.
function makePlane(nx, ny, nz, d) {
  const len = Math.sqrt(nx * nx + ny * ny + nz * nz) || 1;
  const ux = nx / len, uy = ny / len, uz = nz / len;
  const ud = d / len;
  return function (x, y, z) {
    return x * ux + y * uy + z * uz + ud;
  };
}

// Torus on the xz plane: major radius R, minor radius r.
function makeTorus(cx, cy, cz, R, r) {
  return function (x, y, z) {
    const dx = x - cx, dz = z - cz;
    const q = Math.sqrt(dx * dx + dz * dz) - R;
    const dy = y - cy;
    return Math.sqrt(q * q + dy * dy) - r;
  };
}

// Sphere primitive.
function makeSphere(cx, cy, cz, r) {
  return function (x, y, z) {
    const dx = x - cx, dy = y - cy, dz = z - cz;
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
  };
}

// Regular octahedron centred at (cx, cy, cz). `s` controls overall size —
// the inscribed sphere has radius s × sqrt(1/3). This is the L1-ball
// distance approximation; not a perfect Euclidean SDF, but accurate
// enough for raymarched silhouette rendering.
function makeOctahedron(cx, cy, cz, s) {
  return function (x, y, z) {
    return (Math.abs(x - cx) + Math.abs(y - cy) + Math.abs(z - cz) - s) * 0.5774;
  };
}

// Y-axis-aligned finite cylinder from y=cy0 to y=cy1, axis at (cx, _, cz),
// radius r. Standard "cylinder = (radial cap, axial cap)" combination.
function makeCylinderY(cx, cy0, cy1, cz, r) {
  return function (x, y, z) {
    const dx = x - cx, dz = z - cz;
    const dxz = Math.sqrt(dx * dx + dz * dz) - r;
    const dyTop = y - cy1, dyBot = cy0 - y;
    const dy = Math.max(dyTop, dyBot);
    const outX = Math.max(dxz, 0), outY = Math.max(dy, 0);
    const outside = Math.sqrt(outX * outX + outY * outY);
    const inside = Math.min(Math.max(dxz, dy), 0);
    return outside + inside;
  };
}

// ============================================================
// Tier 2: domain operators. Each wraps a base SDF and returns a new SDF.
// ============================================================

// 3-D smoothstep value-noise factory. Returns f(x, y, z) ∈ [0, 1].
function makeNoise3D(seedKey) {
  const rng = makeRng(seedKey);
  const GS = 32;
  const grid = new Float32Array(GS * GS * GS);
  for (let i = 0; i < grid.length; i++) grid[i] = rng();
  function idx3(x, y, z) {
    return (x % GS) + (y % GS) * GS + (z % GS) * GS * GS;
  }
  return function n3(x, y, z) {
    const ux = ((x % GS) + GS) % GS;
    const uy = ((y % GS) + GS) % GS;
    const uz = ((z % GS) + GS) % GS;
    const ix = Math.floor(ux), iy = Math.floor(uy), iz = Math.floor(uz);
    const fx = ux - ix, fy = uy - iy, fz = uz - iz;
    const sx = fx * fx * (3 - 2 * fx);
    const sy = fy * fy * (3 - 2 * fy);
    const sz = fz * fz * (3 - 2 * fz);
    const c000 = grid[idx3(ix,     iy,     iz    )];
    const c100 = grid[idx3(ix + 1, iy,     iz    )];
    const c010 = grid[idx3(ix,     iy + 1, iz    )];
    const c110 = grid[idx3(ix + 1, iy + 1, iz    )];
    const c001 = grid[idx3(ix,     iy,     iz + 1)];
    const c101 = grid[idx3(ix + 1, iy,     iz + 1)];
    const c011 = grid[idx3(ix,     iy + 1, iz + 1)];
    const c111 = grid[idx3(ix + 1, iy + 1, iz + 1)];
    const x00 = c000 + (c100 - c000) * sx;
    const x10 = c010 + (c110 - c010) * sx;
    const x01 = c001 + (c101 - c001) * sx;
    const x11 = c011 + (c111 - c011) * sx;
    const y0 = x00 + (x10 - x00) * sy;
    const y1 = x01 + (x11 - x01) * sy;
    return y0 + (y1 - y0) * sz;
  };
}

// Surface displacement: roughen a smooth SDF by adding noise to its value.
// `noiseFn` is expected in [0, 1]; it's centered before applying.
// `amp` is the peak-to-peak displacement amplitude (≤ ~0.2 for raymarch
// stability — large amps make the SDF non-Lipschitz and the raymarcher
// overshoots).
function displace(sdf, noiseFn, amp) {
  return function (x, y, z) {
    return sdf(x, y, z) + (noiseFn(x, y, z) - 0.5) * amp;
  };
}

// 3-octave isotropic surface roughening. Standard pattern across rock /
// stone / ice scenes. Caller supplies a seed key (so multiple instances
// don't share noise), the displacement amplitude, and optionally per-
// octave frequencies and weights. Default freqs/weights produce a
// general-purpose "weathered stone" texture. amp ≤ 0 returns sdf
// unchanged so callers don't need their own zero-guard.
function roughenSDF(sdf, seedKey, amp, freqs, weights) {
  if (amp <= 0) return sdf;
  const F = freqs   || [6,    16,   38];
  const W = weights || [0.50, 0.30, 0.20];
  const n3 = makeNoise3D(seedKey);
  return displace(sdf, function (x, y, z) {
    return W[0] * n3(x * F[0], y * F[0], z * F[0]) +
           W[1] * n3(x * F[1], y * F[1], z * F[1]) +
           W[2] * n3(x * F[2], y * F[2], z * F[2]);
  }, amp);
}

// Rotate the input position around the Y axis by `k * y` radians before
// evaluating — twists any vertical form into a helix.
// Generic position warp: offset the input p by a 3-vector returned by
// `fn(x, y, z)` before evaluating. More general than twistY/bendY —
// can do any sinusoidal/turbulent positional distortion.
function warp(sdf, fn) {
  return function (x, y, z) {
    const w = fn(x, y, z);
    return sdf(x + w[0], y + w[1], z + w[2]);
  };
}

// Constant-angle rotations around each axis. `angle` is in radians.
// The position is rotated by the inverse so the SHAPE is rotated by +angle.
function rotateY(sdf, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return function (x, y, z) {
    return sdf(x * c + z * s, y, -x * s + z * c);
  };
}
function rotateZ(sdf, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return function (x, y, z) {
    return sdf(x * c + y * s, -x * s + y * c, z);
  };
}
function rotateX(sdf, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return function (x, y, z) {
    return sdf(x, y * c + z * s, -y * s + z * c);
  };
}

// Translate an SDF by (dx, dy, dz). Pairs with rotate to place rotated
// shapes anywhere in space.
function translate(sdf, dx, dy, dz) {
  return function (x, y, z) {
    return sdf(x - dx, y - dy, z - dz);
  };
}

// Domain repetition: wrap each axis by its period before evaluating, so
// a single SDF tiles infinitely along that axis. period <= 0 disables
// repetition on that axis.
function repeat(sdf, periodX, periodY, periodZ) {
  return function (x, y, z) {
    const px = periodX > 0 ? ((x % periodX) + periodX) % periodX - periodX / 2 : x;
    const py = periodY > 0 ? ((y % periodY) + periodY) % periodY - periodY / 2 : y;
    const pz = periodZ > 0 ? ((z % periodZ) + periodZ) % periodZ - periodZ / 2 : z;
    return sdf(px, py, pz);
  };
}

function twistY(sdf, k) {
  return function (x, y, z) {
    const c = Math.cos(k * y), s = Math.sin(k * y);
    return sdf(x * c - z * s, y, x * s + z * c);
  };
}

// Cheap-bend (Inigo Quilez): rotate the xy plane by `k * y` before
// evaluating. Turns a straight column into a curve / hook.
function bendY(sdf, k) {
  return function (x, y, z) {
    const c = Math.cos(k * y), s = Math.sin(k * y);
    return sdf(c * x - s * y, s * x + c * y, z);
  };
}

// Mirror around the given axis ('x' | 'y' | 'z') — instant bilateral
// symmetry. The half-SDF you define on the +axis side gets reflected.
function mirror(sdf, axis) {
  if (axis === 'x') return (x, y, z) => sdf(Math.abs(x), y, z);
  if (axis === 'y') return (x, y, z) => sdf(x, Math.abs(y), z);
  return (x, y, z) => sdf(x, y, Math.abs(z));
}

// Poisson-disc / blue-noise scatter — Bridson's dart-throwing algorithm.
// Returns an array of [x, y] points within `region` (xMin/xMax/yMin/yMax)
// such that every pair is at least `minDist` apart. Each `rng()` draw
// supplies a uniform [0, 1) random.
function poissonScatter(rng, minDist, region, maxAttempts) {
  maxAttempts = maxAttempts || 20;
  const cellSize = minDist / Math.SQRT2;
  const cols = Math.max(1, Math.ceil((region.xMax - region.xMin) / cellSize));
  const rows = Math.max(1, Math.ceil((region.yMax - region.yMin) / cellSize));
  const grid = new Array(cols * rows).fill(null);
  const points = [];
  const active = [];

  function cellOf(p) {
    return [
      Math.floor((p[0] - region.xMin) / cellSize),
      Math.floor((p[1] - region.yMin) / cellSize)
    ];
  }
  function place(p) {
    points.push(p);
    active.push(p);
    const [cx, cy] = cellOf(p);
    grid[cy * cols + cx] = p;
  }

  place([
    region.xMin + rng() * (region.xMax - region.xMin),
    region.yMin + rng() * (region.yMax - region.yMin)
  ]);

  while (active.length) {
    const idx = Math.floor(rng() * active.length);
    const c = active[idx];
    let placed = false;
    for (let k = 0; k < maxAttempts; k++) {
      const ang = rng() * 2 * Math.PI;
      const rad = minDist * (1 + rng());
      const p = [c[0] + Math.cos(ang) * rad, c[1] + Math.sin(ang) * rad];
      if (p[0] < region.xMin || p[0] > region.xMax) continue;
      if (p[1] < region.yMin || p[1] > region.yMax) continue;
      const [pcx, pcy] = cellOf(p);
      let ok = true;
      for (let dy = -2; dy <= 2 && ok; dy++) {
        for (let dx = -2; dx <= 2 && ok; dx++) {
          const ny = pcy + dy, nx = pcx + dx;
          if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
          const other = grid[ny * cols + nx];
          if (!other) continue;
          const ddx = other[0] - p[0], ddy = other[1] - p[1];
          if (ddx * ddx + ddy * ddy < minDist * minDist) ok = false;
        }
      }
      if (ok) { place(p); placed = true; break; }
    }
    if (!placed) active.splice(idx, 1);
  }
  return points;
}

// ============================================================
// 2-D distance functions in the (r, y) plane — for revolveY profiles.
// Same call signature as 3-D SDFs (x, y, z) so they compose with the
// existing sdfUnion/sdfSubtract/smin operators; the `z` argument is
// ignored. By convention r = the first coord (treat as "radius") and
// y = the second.
// ============================================================
function circle2D(cr, cy, radius) {
  return function (r, y) {
    const dr = r - cr, dy = y - cy;
    return Math.sqrt(dr * dr + dy * dy) - radius;
  };
}
function box2D(cr, cy, hr, hy, round) {
  const ro = round || 0;
  const hrR = hr - ro, hyR = hy - ro;
  return function (r, y) {
    const dr = Math.abs(r - cr) - hrR;
    const dy = Math.abs(y - cy) - hyR;
    const oR = Math.max(dr, 0), oY = Math.max(dy, 0);
    const outside = Math.sqrt(oR * oR + oY * oY);
    const inside = Math.min(Math.max(dr, dy), 0);
    return outside + inside - ro;
  };
}

// Revolve a 2-D distance function around the Y axis. The 2-D SDF lives
// in the (r, y) plane (r = signed radius). The 3-D SDF samples it at
// r = sqrt(x² + z²). Useful for vases, urns, saucers, banisters, any
// rotationally-symmetric form.
function revolveY(dist2D) {
  return function (x, y, z) {
    return dist2D(Math.sqrt(x * x + z * z), y, 0);
  };
}

// Stack — build N instances of an SDF parametrised by index and combine
// them. `builder(i)` returns the per-instance SDF. Sharp union when
// smoothK is 0, smooth-min otherwise. Useful for recursive towers,
// spiral staircases, repeated motifs that vary slightly per instance.
function stack(builder, count, smoothK) {
  const sdfs = [];
  for (let i = 0; i < count; i++) sdfs.push(builder(i));
  return sdfUnion(sdfs, smoothK || 0);
}

// X-axis-aligned capsule — useful as a "tunnel" carver to punch a
// horizontal arch through a rock. (Hvítserkur-style.)
function makeCapsuleX(cx, cy, cz, halfLen, r) {
  return function (x, y, z) {
    const tx = Math.max(-halfLen, Math.min(halfLen, x - cx));
    const dx = (x - cx) - tx;
    const dy = y - cy;
    const dz = z - cz;
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
  };
}

// Z-axis-aligned capsule — front-to-back tunnel.
function makeCapsuleZ(cx, cy, cz, halfLen, r) {
  return function (x, y, z) {
    const tz = Math.max(-halfLen, Math.min(halfLen, z - cz));
    const dx = x - cx;
    const dy = y - cy;
    const dz = (z - cz) - tz;
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - r;
  };
}

// Beam helper: returns viewBox-space polylines for a fan of light rays
// emanating from a world-space lamp position. Used by the lighthouse
// scenes via the scene `extraStrokes` callback. Rays are clipped to the
// printable area (inside MARGIN_VB) so they don't bleed into the page
// margin.
function lighthouseBeam(ctx, lampWorldPos, opts) {
  opts = opts || {};
  const lampVB = ctx.worldToVB(lampWorldPos);
  if (!lampVB) return [];
  const numRays    = opts.numRays    != null ? opts.numRays    : 7;
  const centerDeg  = opts.centerDeg  != null ? opts.centerDeg  : 30;  // 0=up, +=right
  const spreadDeg  = opts.spreadDeg  != null ? opts.spreadDeg  : 22;
  const lengthVB   = opts.lengthVB   != null ? opts.lengthVB   : 900;
  // Inside-margin bounds. Liang-Barsky clip clamps each ray's end to
  // the first place it exits this rectangle, so rays don't run into
  // the page margin.
  const m = MARGIN_VB;
  const xMin = m, yMin = m, xMax = VB_W - m, yMax = VB_H - m;
  const paths = [];
  for (let i = 0; i < numRays; i++) {
    const t = numRays === 1 ? 0 : (i / (numRays - 1) - 0.5) * 2;  // -1..1
    const ang = (centerDeg + t * spreadDeg) * Math.PI / 180;
    // 0° = straight up in viewBox (negative y direction).
    const dx =  Math.sin(ang) * lengthVB;
    const dy = -Math.cos(ang) * lengthVB;
    let tMax = 1;
    if (dx > 0) tMax = Math.min(tMax, (xMax - lampVB[0]) / dx);
    if (dx < 0) tMax = Math.min(tMax, (xMin - lampVB[0]) / dx);
    if (dy > 0) tMax = Math.min(tMax, (yMax - lampVB[1]) / dy);
    if (dy < 0) tMax = Math.min(tMax, (yMin - lampVB[1]) / dy);
    if (tMax <= 0) continue;
    paths.push([
      [lampVB[0],            lampVB[1]],
      [lampVB[0] + dx * tMax, lampVB[1] + dy * tMax]
    ]);
  }
  return paths;
}

// Rain dashes: short straight strokes scattered across the sky region,
// all at the same angle. Deterministic via seed so the same image renders
// the same rain every time.
function rainDashes(ctx, opts) {
  opts = opts || {};
  const numDashes = opts.numDashes != null ? opts.numDashes : 250;
  const dashLen = opts.dashLen != null ? opts.dashLen : 20;
  const angleDeg = opts.angleDeg != null ? opts.angleDeg : 78;
  const a = angleDeg * Math.PI / 180;
  const dx = Math.cos(a) * dashLen;
  const dy = Math.sin(a) * dashLen;
  let s = (opts.seed != null) ? hashStringToInt(String(opts.seed)) : 12345;
  function r() { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; }
  const yMin = 50;
  const yMax = ctx.syHorizon - 20;
  const paths = [];
  for (let i = 0; i < numDashes; i++) {
    const x = r() * 1200;
    const y = yMin + r() * (yMax - yMin);
    paths.push([[x, y], [x + dx, y + dy]]);
  }
  return paths;
}

function hashStringToInt(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// ============================================================
// Scene registry. Adding a new sister project = adding an entry here.
//
// Two entry shapes are accepted:
//   1. A function of (rng, state) — back-compat shape; scenes with no
//      tunable parameters just use this. State carries global controls
//      (lw, density, light, camera tilt, etc.) only.
//   2. An object { ui: [...], build: function (rng, state, params) }
//      where `ui` is a list of param descriptors rendered into the
//      "Scene parameters" panel, and `build` receives the live values.
//      Param descriptors: { id, label, type: 'int' | 'number', min, max,
//      step?, default }.
// ============================================================

// Forest tree builders. Body (small, many) and hero (big, one) use the
// SAME 4-style switch; pulled out so each style's branching logic lives
// in one place per call site. They were previously two ~50-line inline
// switches, identical in structure but with slightly different
// proportions.
function buildForestTreeBody(rng, style, cx, cz, trunkR, canopyR, baseHeight, heightScale) {
  if (style === 'conifer') {
    const trunkTop = -0.70 + 0.25 * baseHeight;
    const conePeak = trunkTop + canopyR * 2.6 * heightScale;
    const trunk  = makeCylinderY(cx, -0.70, trunkTop, cz, trunkR * 0.6);
    const canopy = makeConeY(cx, conePeak, trunkTop - 0.04, cz, canopyR * 0.85);
    return sdfUnion([trunk, canopy], 0.012);
  }
  if (style === 'winter') {
    const trunkTop = -0.70 + 0.55 * heightScale;
    const trunk = makeCylinderY(cx, -0.70, trunkTop, cz, trunkR);
    const parts = [trunk];
    const nB = 4;
    for (let b = 0; b < nB; b++) {
      const yaw  = (b / nB) * Math.PI * 2 + rng() * 0.8;
      const lift = (0.5 + rng() * 0.5) * Math.PI / 4;
      const len  = canopyR * (1.1 + rng() * 0.6);
      const seg  = makeCapsuleX(0, 0, 0, len, trunkR * 0.45);
      let b1 = rotateZ(seg, lift);
      b1 = rotateY(b1, yaw);
      b1 = translate(b1, cx, trunkTop + len * 0.5, cz);
      parts.push(b1);
    }
    return sdfUnion(parts, 0.012);
  }
  if (style === 'oldgrowth') {
    const trunkTop = -0.70 + 0.40 * baseHeight * heightScale;
    const trunk = makeCylinderY(cx, -0.70, trunkTop, cz, trunkR * 1.8);
    const c1 = makeSphere(cx, trunkTop + canopyR * 0.60 * heightScale, cz, canopyR * 1.4 * heightScale);
    const c2 = makeSphere(cx + canopyR * 0.5, trunkTop + canopyR * 0.95 * heightScale,
                          cz + (rng() - 0.5) * canopyR * 0.5, canopyR * 1.0 * heightScale);
    return sdfUnion([trunk, c1, c2], 0.04);
  }
  // 'mixed' — per-tree random pick between conifer-ish and round.
  if (rng() < 0.55) {
    const trunkTop = -0.70 + 0.25 * baseHeight;
    const conePeak = trunkTop + canopyR * 2.4 * heightScale;
    const trunk  = makeCylinderY(cx, -0.70, trunkTop, cz, trunkR * 0.6);
    const canopy = makeConeY(cx, conePeak, trunkTop - 0.04, cz, canopyR * 0.8);
    return sdfUnion([trunk, canopy], 0.012);
  }
  const trunkTop = -0.70 + 0.35 * baseHeight;
  const canopyY  = trunkTop + canopyR * 0.6 * heightScale;
  const trunk = makeCylinderY(cx, -0.70, trunkTop, cz, trunkR);
  const canopy = makeSphere(cx, canopyY, cz, canopyR * heightScale);
  return sdfUnion([trunk, canopy], 0.025);
}

function buildForestTreeHero(rng, style, hx, hz, trunkR, canopyR, H) {
  if (style === 'conifer') {
    const trunkTop = -0.70 + 0.20 * H;
    const conePeak = trunkTop + canopyR * 3.4;
    const trunk = makeCylinderY(hx, -0.72, trunkTop, hz, trunkR * 0.7);
    const cone  = makeConeY(hx, conePeak, trunkTop - 0.05, hz, canopyR * 0.95);
    return sdfUnion([trunk, cone], 0.015);
  }
  if (style === 'winter') {
    const trunkTop = -0.70 + 0.55 * H;
    const trunk = makeCylinderY(hx, -0.72, trunkTop, hz, trunkR);
    const parts = [trunk];
    const nB = 6;
    for (let b = 0; b < nB; b++) {
      const yaw  = (b / nB) * Math.PI * 2 + rng() * 0.6;
      const lift = (0.5 + rng() * 0.5) * Math.PI / 4;
      const len  = canopyR * (1.4 + rng() * 0.6);
      const seg  = makeCapsuleX(0, 0, 0, len, trunkR * 0.4);
      let b1 = rotateZ(seg, lift);
      b1 = rotateY(b1, yaw);
      b1 = translate(b1, hx, trunkTop + len * 0.5, hz);
      parts.push(b1);
    }
    return sdfUnion(parts, 0.015);
  }
  if (style === 'oldgrowth') {
    const trunkTop = -0.70 + 0.35 * H;
    const trunk = makeCylinderY(hx, -0.72, trunkTop, hz, trunkR * 1.6);
    const c1 = makeSphere(hx,                  trunkTop + canopyR * 0.5, hz,         canopyR * 1.5);
    const c2 = makeSphere(hx + canopyR * 0.55, trunkTop + canopyR * 0.9, hz - 0.04,  canopyR * 1.1);
    const c3 = makeSphere(hx - canopyR * 0.35, trunkTop + canopyR * 1.1, hz + 0.04,  canopyR * 0.9);
    return sdfUnion([trunk, c1, c2, c3], 0.05);
  }
  // 'mixed' — round-canopy hero with thick trunk.
  const trunkTop = -0.70 + 0.30 * H;
  const trunk = makeCylinderY(hx, -0.72, trunkTop, hz, trunkR);
  const c1 = makeSphere(hx,                trunkTop + canopyR * 0.6, hz, canopyR * 1.3);
  const c2 = makeSphere(hx + canopyR * 0.5, trunkTop + canopyR * 0.9, hz, canopyR * 0.9);
  return sdfUnion([trunk, c1, c2], 0.04);
}

const SCENES = {
  single: {
    ui: [
      { id: 'nSpheres',    label: 'Blob spheres', type: 'int',    min: 8,    max: 12,  step: 1,    default: 10  },
      { id: 'spread',      label: 'Spread',       type: 'number', min: 1.0,  max: 2.5, step: 0.1,  default: 1.5 },
      { id: 'verticality', label: 'Verticality',  type: 'number', min: 1.5,  max: 1.9, step: 0.1,  default: 1.7 },
      { id: 'smoothK',     label: 'Smoothing k',  type: 'number', min: 0.3,  max: 0.5, step: 0.05, default: 0.4 }
    ],
    build: function (rng, state, params) {
      return makeBlobSDFAt(rng, {
        center: [0, 0, 0],
        nSpheres: params.nSpheres,
        smoothK: params.smoothK,
        spread: params.spread,
        verticality: params.verticality,
        pointiness: 0
      });
    }
  },
};


// ============================================================
// Camera + raymarch (orthographic in y, mild perspective in z so the
// horizon plane is visible)
// ============================================================
// Inverse of castRay — projects a 3-D world point onto the screen (sx, sy).
// Returns null if the point is behind the camera.
function worldToScreen(P) {
  const dx = P[0] - CAM[0], dy = P[1] - CAM[1], dz = P[2] - CAM[2];
  const fDotD = camF[0] * dx + camF[1] * dy + camF[2] * dz;
  if (fDotD <= 1e-6) return null;
  const t = FOCAL / fDotD;
  return [
    t * (camR[0] * dx + camR[1] * dy + camR[2] * dz),
    t * (camU[0] * dx + camU[1] * dy + camU[2] * dz)
  ];
}

function castRay(sx, sy) {
  // direction = F·focal + R·sx + U·sy, normalized
  const dx = camF[0] * FOCAL + camR[0] * sx + camU[0] * sy;
  const dy = camF[1] * FOCAL + camR[1] * sx + camU[1] * sy;
  const dz = camF[2] * FOCAL + camR[2] * sx + camU[2] * sy;
  const len = Math.hypot(dx, dy, dz);
  return [dx / len, dy / len, dz / len];
}
function rayMarch(sdf, ox, oy, oz, dx, dy, dz, tMax) {
  let t = 0;
  for (let i = 0; i < 96; i++) {
    const d = sdf(ox + dx * t, oy + dy * t, oz + dz * t);
    if (d < 0.0008) return t;
    t += Math.max(d, 0.004);
    if (t > tMax) return -1;
  }
  return -1;
}

// Cast a shadow ray from a near-surface point toward the light direction L.
// Returns 1 if another SDF surface blocks the ray before maxT, else 0.
// Soft shadow with penumbra. Returns 0..1 where 1 = fully shadowed and
// 0 = fully lit. Inigo Quilez's "soft shadow" technique: at each marching
// step track min(k*d/t) along the ray; small values of d (close to a
// surface) at large t (far from origin) produce a soft falloff.
//
// `k` controls penumbra hardness — higher k = sharper edge. maxT extends
// the ray's reach so we get the LONG cast shadows you see in URH-style
// landscapes when the sun is low.
function softShadow(sdf, x, y, z, L, maxT, k) {
  let res = 1.0;
  let t = 0.008;
  for (let i = 0; i < 48; i++) {
    const d = sdf(x + L[0] * t, y + L[1] * t, z + L[2] * t);
    if (d < 0.001) return 1;          // hard occlusion
    const r = k * d / t;
    if (r < res) res = r;
    t += Math.max(d, 0.006);
    if (t > maxT) break;
  }
  if (res < 0) res = 0;
  if (res > 1) res = 1;
  return 1 - res;                     // invert: 1 = shadowed
}

// Ambient occlusion: short rays along the surface normal sampled at
// progressive distances. Inward corners and creases see less open space
// and read darker. Returns 0..1 where 1 = fully exposed.
function ambientOcclusion(sdf, x, y, z, nx, ny, nz) {
  let occ = 0.0;
  let weight = 1.0;
  for (let i = 1; i <= 5; i++) {
    const d = 0.025 * i;
    const sample = sdf(x + nx * d, y + ny * d, z + nz * d);
    occ += weight * (d - sample);
    weight *= 0.65;
  }
  let v = 1 - 3.0 * occ;
  if (v < 0) v = 0;
  if (v > 1) v = 1;
  return v;
}
function normalAt(sdf, x, y, z) {
  const e = 0.0009;
  const nx = sdf(x + e, y, z) - sdf(x - e, y, z);
  const ny = sdf(x, y + e, z) - sdf(x, y - e, z);
  const nz = sdf(x, y, z + e) - sdf(x, y, z - e);
  const l = Math.hypot(nx, ny, nz) || 1;
  return [nx / l, ny / l, nz / l];
}

// ============================================================
// Scene buffer (depth, normal, lighting, surface, precomputed primary
// hatch angle index per pixel)
// surface: 0 = sky, 1 = blob, 2 = ground
// ============================================================
function snapAngle(a) {
  let amod = ((a % Math.PI) + Math.PI) % Math.PI;
  let bestI = 0, bestD = Infinity;
  for (let i = 0; i < HATCH_ANGLES.length; i++) {
    let d = Math.abs(amod - HATCH_ANGLES[i]);
    if (d > Math.PI / 2) d = Math.PI - d;
    if (d < bestD) { bestD = d; bestI = i; }
  }
  return bestI;
}

function renderSceneBuffer(state, sdf, materialFn) {
  const W = state.bufRes;
  const H = Math.round(W * (SY_MAX - SY_MIN) / (SX_MAX - SX_MIN));
  const N = W * H;
  const buf = {
    W, H,
    surface: new Uint8Array(N),  // 0=sky 1=rock 2=ground
    nx: new Float32Array(N), ny: new Float32Array(N), nz: new Float32Array(N),
    light: new Float32Array(N),
    depth: new Float32Array(N),
    primary: new Uint8Array(N),
    shadow: new Float32Array(N), // 0..1, 1 = fully shadowed (soft shadows)
    ao: new Float32Array(N),     // 0..1, 1 = fully exposed (1.0 by default)
    material: new Uint8Array(N)  // 0=default; scenes may set 1..255 per pixel
  };

  let lL = Math.hypot(state.lx, state.ly, state.lz) || 1;
  const L = [state.lx / lL, state.ly / lL, state.lz / lL];

  for (let py = 0; py < H; py++) {
    const sy = SY_MAX - (py / (H - 1)) * (SY_MAX - SY_MIN);
    for (let px = 0; px < W; px++) {
      const sx = SX_MIN + (px / (W - 1)) * (SX_MAX - SX_MIN);
      const idx = py * W + px;
      const [dx, dy, dz] = castRay(sx, sy);

      let tG = -1;
      if (dy < -1e-5) {
        const t = (GROUND_Y - CAM[1]) / dy;
        if (t > 0) tG = t;
      }
      const tB = rayMarch(sdf, CAM[0], CAM[1], CAM[2], dx, dy, dz, 25);

      let hit = 0, n = null, t = -1;
      if (tB > 0 && (tG < 0 || tB < tG)) {
        hit = 1; t = tB;
        n = normalAt(sdf, CAM[0] + dx * tB, CAM[1] + dy * tB, CAM[2] + dz * tB);
      } else if (tG > 0) {
        hit = 2; t = tG; n = [0, 1, 0];
      }

      if (hit === 0) { buf.surface[idx] = 0; continue; }
      buf.surface[idx] = hit;
      buf.nx[idx] = n[0]; buf.ny[idx] = n[1]; buf.nz[idx] = n[2];
      buf.depth[idx] = t;
      const ld = Math.max(0, n[0] * L[0] + n[1] * L[1] + n[2] * L[2]);
      buf.light[idx] = 0.15 + 0.85 * ld;

      // Scene-supplied per-pixel material id. Only computed for blob
      // hits (hit === 1) — ground and sky always sit at material 0.
      if (hit === 1 && materialFn) {
        const wx = CAM[0] + dx * t;
        const wy = CAM[1] + dy * t;
        const wz = CAM[2] + dz * t;
        const m = materialFn(wx, wy, wz);
        buf.material[idx] = (m >= 0 && m <= 255) ? (m | 0) : 0;
      }

      // Soft shadow ray + AO. For blobs, offset along the surface normal.
      // For ground, the surface normal is (0, 1, 0) so we offset slightly
      // upward. AO defaults to 1 (fully exposed); we compute it for blob
      // hits where creases / pockets matter.
      buf.ao[idx] = 1;
      if (ld > 0) {
        if (hit === 1) {
          const hx = CAM[0] + dx * t + n[0] * 0.004;
          const hy = CAM[1] + dy * t + n[1] * 0.004;
          const hz = CAM[2] + dz * t + n[2] * 0.004;
          // maxT 25 + penumbra factor 24 → long soft cast shadows.
          buf.shadow[idx] = softShadow(sdf, hx, hy, hz, L, 25, 24);
          buf.ao[idx] = ambientOcclusion(sdf, hx, hy, hz, n[0], n[1], n[2]);
        } else if (hit === 2) {
          const gx = CAM[0] + dx * t;
          const gy = GROUND_Y + 0.005;
          const gz = CAM[2] + dz * t;
          buf.shadow[idx] = softShadow(sdf, gx, gy, gz, L, 25, 24);
        }
      }

      // Per-pixel "primary" hatch angle = perpendicular to projected normal.
      // For very face-on regions (small projected normal), the angle is
      // unstable, so default to the diagonal there.
      const projMag = Math.hypot(n[0], n[1]);
      let pri;
      if (hit === 2) {
        pri = 0; // ground = horizontal
      } else if (projMag < 0.15) {
        pri = 1;
      } else {
        pri = snapAngle(Math.atan2(n[1], n[0]) + Math.PI / 2);
      }
      buf.primary[idx] = pri;
    }
  }
  return buf;
}

function bufIdx(buf, sx, sy) {
  const px = Math.round((sx - SX_MIN) / (SX_MAX - SX_MIN) * (buf.W - 1));
  const py = Math.round((SY_MAX - sy) / (SY_MAX - SY_MIN) * (buf.H - 1));
  if (px < 0 || px >= buf.W || py < 0 || py >= buf.H) return -1;
  return py * buf.W + px;
}

// ============================================================
// Hatching decision: for each (sx, sy) and a given hatch angle index,
// returns whether the scan line at that angle should be "on" here.
// ============================================================
function shouldDrawAt(buf, sx, sy, angleIdx) {
  const idx = bufIdx(buf, sx, sy);
  if (idx < 0) return false;
  // Sky and ground are handled by their own generators — the screen-space
  // scan-line passes here are blob-only.
  if (buf.surface[idx] !== 1) return false;

  const pri = buf.primary[idx];
  if (angleIdx === pri) return true;

  // Blob: tiered crosshatch by offset from primary. Cast shadow pushes
  // the effective darkness up, so shadowed regions reach further
  // crosshatch tiers than their Lambert lighting alone would. The
  // scene-supplied material id can shift darkness further (denser or
  // sparser hatching per region — see MATERIAL_PROPS).
  const offset = (angleIdx - pri + 4) % 4;
  const darkness = computeDarkness(buf, idx);
  const T = [0, 0.30, 0.55, 0.78];
  return darkness > T[offset];
}

// ============================================================
// Hatch generation: scan parallel lines across the image at each angle.
// ============================================================
function generateHatches(state, buf) {
  const paths = [];
  const spacingMM = state.lw * state.density;
  const worldStep = Math.max(0.002, spacingMM * WORLD_PER_MM);
  const sampleStep = Math.max(0.0015, worldStep * 0.35);
  const RANGE = 1.8;

  for (let a = 0; a < HATCH_ANGLES.length; a++) {
    const ang = HATCH_ANGLES[a];
    const ca = Math.cos(ang), sa = Math.sin(ang);

    // Stagger every other angle by half spacing so different angle grids
    // don't visually align into moiré.
    const phase = (a % 2) * worldStep * 0.5;
    for (let s = -RANGE + phase; s <= RANGE; s += worldStep) {
      const sx0 = -sa * s;
      const sy0 = ca * s;

      let inDraw = false;
      let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;

      for (let t = -RANGE; t <= RANGE; t += sampleStep) {
        const sx = sx0 + ca * t;
        const sy = sy0 + sa * t;
        const inBounds = (sx >= SX_MIN && sx <= SX_MAX &&
                          sy >= SY_MIN && sy <= SY_MAX);
        const draw = inBounds && shouldDrawAt(buf, sx, sy, a);

        if (draw) {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        } else if (inDraw) {
          const segLen = Math.hypot(lastX - dx0, lastY - dy0);
          if (segLen > worldStep * 0.4) {
            paths.push([[dx0, dy0], [lastX, lastY]]);
          }
          inDraw = false;
        }
      }
      if (inDraw) {
        const segLen = Math.hypot(lastX - dx0, lastY - dy0);
        if (segLen > worldStep * 0.4) {
          paths.push([[dx0, dy0], [lastX, lastY]]);
        }
      }
    }
  }
  return paths;
}

// ============================================================
// Cell hatcher: port of VectorFriend's modules/hatching.js.
//
// Divide the image into a grid of square cells. For each cell that lands
// on the blob surface, compute the average brightness and emit up to
// maxHatches horizontal hatches whose count is proportional to darkness.
// The hatch lines are evenly distributed within the cell's vertical
// slots so the placement reads as a halftone screen. A small Perlin
// wobble can be applied to each line (line wobble parameter).
//
// Unlike the scan-line hatcher (continuous strokes broken by surface
// transitions), each cell contributes its own short strokes — a tight
// halftone look distinct from any of the curve modes.
// ============================================================
function generateCellHatches(state, buf) {
  const paths = [];
  const baseSpacing = Math.max(0.002, state.lw * state.density * WORLD_PER_MM);
  // Cell grid: maxHatches and cellSize are now decoupled so we can keep
  // 4 tonal levels per cell while shrinking cells for halftone density.
  // - maxHatches = 4 → cells resolve 4 tonal steps (1, 2, 3, 4 lines).
  // - cellSize = baseSpacing × 2.5 → cells are ~1.6× smaller per side
  //   (about 2.6× more cells per page area) than the original
  //   baseSpacing × 4 sizing.
  // Line spacing inside a cell = cellSize / maxHatches = 0.625 × the
  // user's lw spacing — a touch denser than the lw spec, which is the
  // tradeoff for finer halftone resolution.
  const maxHatches = 4;
  const cellSize = baseSpacing * 2.5;
  const cellsX = Math.max(2, Math.round((SX_MAX - SX_MIN) / cellSize));
  const actualCellSize = (SX_MAX - SX_MIN) / cellsX;
  const cellsY = Math.max(2, Math.round((SY_MAX - SY_MIN) / actualCellSize));
  const wobbleNoise = makeNoise2D(state.seed + ':cellWobble');
  const wobbleAmp = baseSpacing * 0.30;
  for (let cy = 0; cy < cellsY; cy++) {
    const cellY0 = SY_MIN + cy * actualCellSize;
    const cellY1 = cellY0 + actualCellSize;
    for (let cx = 0; cx < cellsX; cx++) {
      const cellX0 = SX_MIN + cx * actualCellSize;
      const cellX1 = cellX0 + actualCellSize;
      let total = 0, count = 0;
      const subStep = actualCellSize / 6;
      for (let sy = cellY0; sy < cellY1; sy += subStep) {
        for (let sx = cellX0; sx < cellX1; sx += subStep) {
          const idx = bufIdx(buf, sx, sy);
          if (idx >= 0 && buf.surface[idx] === 1) {
            total += 1 - computeDarkness(buf, idx);
            count++;
          }
        }
      }
      if (count === 0) continue;
      const avg = total / count;
      // Even the brightest cell on the blob gets ONE line so highlights
      // read as the first hatch level rather than pure white paper.
      // buf.light has 0.15 ambient floor (light = 0.15 + 0.85 × lambert),
      // so the darkest single-blob cells only reach avg ≈ 0.15 — not low
      // enough to round up to numHatches = maxHatches. Rescale (1 − avg)
      // by 1/0.85 ≈ 1.18 so unlit cells fully reach the 4-line tier, and
      // clamp at maxHatches.
      const darkness = Math.min(1, (1 - avg) / 0.85);
      const numHatches = Math.max(1, Math.min(maxHatches, Math.floor(darkness * maxHatches + 0.5)));
      for (let i = 0; i < numHatches; i++) {
        // Distribute `numHatches` lines across `maxHatches` slot positions.
        // Old formula was Math.round((i+1) * (M/(N+1))) - 1 which collided
        // (e.g. N=M=4 → slots 0,1,1,2 — only 3 distinct lines for 4 levels).
        // floor((i + 0.5) * M / N) is collision-free for N ≤ M.
        const slotIdx = Math.floor((i + 0.5) * maxHatches / numHatches);
        if (slotIdx < 0 || slotIdx >= maxHatches) continue;
        const slotY = cellY0 + (slotIdx + 0.5) / maxHatches * actualCellSize;
        const segs = 8;
        let pts = [];
        for (let s = 0; s <= segs; s++) {
          const t = s / segs;
          const x = cellX0 + t * actualCellSize;
          const w = (wobbleNoise(x * 8, slotY * 8) - 0.5) * wobbleAmp * 2;
          const ySamp = slotY + w;
          const idx = bufIdx(buf, x, ySamp);
          if (idx >= 0 && buf.surface[idx] === 1) {
            pts.push([x, ySamp]);
          } else if (pts.length >= 2) {
            paths.push(pts);
            pts = [];
          } else {
            pts = [];
          }
        }
        if (pts.length >= 2) paths.push(pts);
      }
    }
  }
  return paths;
}

// ============================================================
// Monet hatcher: short wavy brushstrokes scattered on the blob surface.
// Each stroke is a curved polyline of ~8 segments centred on its seed
// point, oriented along the projected-normal perpendicular with a small
// random direction jitter. A sinusoidal perpendicular wobble overlaid
// on the stroke gives the brush-mark feel. Stroke density is driven by
// per-pixel darkness so unlit regions accumulate strokes.
// ============================================================
// TSP infill: scatter fill points across the blob surface with density
// modulated by brightness (darker areas get more points), then visit
// every point with a single nearest-neighbour path. The result is a
// single continuous polyline — minimal pen lifts, organic flowing
// fill, denser passes through shadowed regions.
//
// Uses a spatial-hash bucket grid for O(N) (amortised) nearest-neighbour
// lookups so the pen routing stays fast even for thousands of points.
function generateTspHatches(state, buf) {
  const paths = [];
  const baseSpacing = Math.max(0.002, state.lw * state.density * WORLD_PER_MM);
  // Seed grid — slightly tighter than line spacing so dropouts give
  // a usable point density.
  const seedStep = baseSpacing * 1.1;
  // Collect points with brightness-modulated keep probability.
  const points = [];
  for (let sy = SY_MIN; sy <= SY_MAX; sy += seedStep) {
    for (let sx = SX_MIN; sx <= SX_MAX; sx += seedStep) {
      const idx = bufIdx(buf, sx, sy);
      if (idx < 0 || buf.surface[idx] !== 1) continue;
      const darkness = computeDarkness(buf, idx);
      // 12 % minimum so highlights get sparse coverage (not pure white).
      const keepProb = Math.max(0.12, Math.pow(darkness, 1.4));
      if (hash01(sx, sy) > keepProb) continue;
      points.push([sx, sy]);
    }
  }
  if (points.length < 2) return paths;

  // Spatial-hash bucket so nearest-neighbour scans are O(local cell) not
  // O(N). Bucket size ≈ 4 × seedStep keeps each cell to a few points.
  const bucketSize = seedStep * 4;
  const buckets = new Map();
  function bkey(bx, by) { return bx + ',' + by; }
  for (let i = 0; i < points.length; i++) {
    const bx = Math.floor(points[i][0] / bucketSize);
    const by = Math.floor(points[i][1] / bucketSize);
    const k = bkey(bx, by);
    let list = buckets.get(k);
    if (!list) { list = []; buckets.set(k, list); }
    list.push(i);
  }
  const visited = new Uint8Array(points.length);
  function findNearest(cx, cy) {
    const cbx = Math.floor(cx / bucketSize);
    const cby = Math.floor(cy / bucketSize);
    let best = -1;
    let bestDist = Infinity;
    for (let radius = 0; radius < 16; radius++) {
      for (let dby = -radius; dby <= radius; dby++) {
        for (let dbx = -radius; dbx <= radius; dbx++) {
          if (Math.max(Math.abs(dbx), Math.abs(dby)) !== radius) continue;
          const list = buckets.get(bkey(cbx + dbx, cby + dby));
          if (!list) continue;
          for (let li = 0; li < list.length; li++) {
            const i = list[li];
            if (visited[i]) continue;
            const dx = points[i][0] - cx, dy = points[i][1] - cy;
            const d = dx * dx + dy * dy;
            if (d < bestDist) { bestDist = d; best = i; }
          }
        }
      }
      // If we found a candidate and the next ring can't beat it, stop.
      if (best >= 0) {
        const ringReach = radius * bucketSize;
        if (bestDist <= ringReach * ringReach) return best;
      }
    }
    return best;
  }
  // Build the path. If the next-nearest jump is too long, break the
  // polyline and start a fresh one — keeps long penlines from slashing
  // across the silhouette.
  const maxJump = baseSpacing * 14;
  const maxJumpSqr = maxJump * maxJump;
  let path = [points[0]];
  visited[0] = 1;
  let current = 0;
  let remaining = points.length - 1;
  while (remaining > 0) {
    const next = findNearest(points[current][0], points[current][1]);
    if (next < 0) break;
    visited[next] = 1;
    remaining--;
    const dx = points[next][0] - points[current][0];
    const dy = points[next][1] - points[current][1];
    if (dx * dx + dy * dy > maxJumpSqr) {
      // Far jump — emit current path, start a new one at this point.
      if (path.length >= 2) paths.push(path);
      path = [points[next]];
    } else {
      path.push(points[next]);
    }
    current = next;
  }
  if (path.length >= 2) paths.push(path);
  return paths;
}

function generateMonetHatches(state, buf) {
  const paths = [];
  const baseSpacing = Math.max(0.002, state.lw * state.density * WORLD_PER_MM);
  const strokeLen = baseSpacing * 7;
  // Seeds spaced 1.4× line spacing (was 0.9×) so the foreground stroke
  // population is much sparser by default. Density still scales with
  // darkness via the probabilistic dropout test below.
  const seedStep = baseSpacing * 1.4;
  const wobbleAmp = baseSpacing * 0.45;
  const dirNoise = makeNoise2D(state.seed + ':monetDir');
  for (let sy = SY_MIN; sy <= SY_MAX; sy += seedStep) {
    for (let sx = SX_MIN; sx <= SX_MAX; sx += seedStep) {
      const idx = bufIdx(buf, sx, sy);
      if (idx < 0 || buf.surface[idx] !== 1) continue;
      const darkness = computeDarkness(buf, idx);
      // Probability of placing a stroke = darkness^1.8 — a steeper
      // exponent than the old linear curve so mid-tones thin out fast
      // while only the genuinely dark regions stay densely stroked.
      // Minimum 8 % stroke probability everywhere on the surface — even
      // the brightest highlights get a sparse first-tier of brushstrokes
      // (no pure-white-paper gaps).
      const strokeProb = Math.max(0.08, Math.pow(darkness, 1.8));
      if (hash01(sx, sy) > strokeProb) continue;
      const nx = buf.nx[idx], ny = buf.ny[idx];
      let dirX = -ny, dirY = nx;
      const m = Math.hypot(dirX, dirY);
      if (m < 1e-4) { dirX = 1; dirY = 0; } else { dirX /= m; dirY /= m; }
      const jitter = (dirNoise(sx * 5, sy * 5) - 0.5) * 0.6;
      const cosJ = Math.cos(jitter), sinJ = Math.sin(jitter);
      const dx = dirX * cosJ - dirY * sinJ;
      const dy = dirX * sinJ + dirY * cosJ;
      const segs = 8;
      const pts = [];
      let allOn = true;
      for (let i = -segs / 2; i <= segs / 2; i++) {
        const t = i / segs;
        const px = sx + dx * t * strokeLen;
        const py = sy + dy * t * strokeLen;
        const wob = Math.sin(t * Math.PI * 3) * wobbleAmp;
        const wpx = px - dy * wob;
        const wpy = py + dx * wob;
        const sIdx = bufIdx(buf, wpx, wpy);
        if (sIdx < 0 || buf.surface[sIdx] !== 1) { allOn = false; break; }
        pts.push([wpx, wpy]);
      }
      if (allOn && pts.length >= 2) paths.push(pts);
    }
  }
  return paths;
}

// ============================================================
// Crosshatch hatcher: just horizontals + verticals. Two-tier threshold:
// horizontals always draw on the surface; verticals only draw in regions
// darker than 'crossThreshold'. Lightweight alternative to the 4-angle
// scan-line.
// ============================================================
function generateCrosshatchHatches(state, buf) {
  const paths = [];
  const worldStep = Math.max(0.002, state.lw * state.density * WORLD_PER_MM);
  const sampleStep = Math.max(0.0015, worldStep * 0.35);
  const RANGE = 1.8;
  // Four-level threshold-based crosshatch. Each layer adds another set
  // of strokes in progressively darker regions, so the user sees
  // continuous tonal variation instead of a single bright/dark split.
  //
  //   Layer 0: primary H lines    (always — bright surface = level 1)
  //   Layer 1: secondary H lines  (darkness > 0.30 — level 2)
  //   Layer 2: primary V lines    (darkness > 0.50 — level 3)
  //   Layer 3: secondary V lines  (darkness > 0.70 — level 4)
  //
  // Secondary H/V are offset by half a worldStep so they interleave
  // with the primary lines, doubling local line density.
  const layers = [
    { ang: 0,           offset: 0,                threshold: -0.01 },
    { ang: 0,           offset: worldStep * 0.5,  threshold: 0.30  },
    { ang: Math.PI / 2, offset: 0,                threshold: 0.50  },
    { ang: Math.PI / 2, offset: worldStep * 0.5,  threshold: 0.70  }
  ];
  for (const L of layers) {
    const ca = Math.cos(L.ang), sa = Math.sin(L.ang);
    for (let s = -RANGE + L.offset; s <= RANGE; s += worldStep) {
      const sx0 = -sa * s;
      const sy0 = ca * s;
      let inDraw = false;
      let dx0 = 0, dy0 = 0, lastX = 0, lastY = 0;
      for (let t = -RANGE; t <= RANGE; t += sampleStep) {
        const sx = sx0 + ca * t;
        const sy = sy0 + sa * t;
        const inBounds = (sx >= SX_MIN && sx <= SX_MAX &&
                          sy >= SY_MIN && sy <= SY_MAX);
        let draw = false;
        if (inBounds) {
          const idx = bufIdx(buf, sx, sy);
          if (idx >= 0 && buf.surface[idx] === 1) {
            draw = computeDarkness(buf, idx) > L.threshold;
          }
        }
        if (draw) {
          if (!inDraw) { dx0 = sx; dy0 = sy; inDraw = true; }
          lastX = sx; lastY = sy;
        } else if (inDraw) {
          if (Math.hypot(lastX - dx0, lastY - dy0) > worldStep * 0.4) {
            paths.push([[dx0, dy0], [lastX, lastY]]);
          }
          inDraw = false;
        }
      }
      if (inDraw && Math.hypot(lastX - dx0, lastY - dy0) > worldStep * 0.4) {
        paths.push([[dx0, dy0], [lastX, lastY]]);
      }
    }
  }
  return paths;
}

// ============================================================
// Vertical-only hatcher: single pass of evenly-spaced vertical scan
// lines, clipped to the blob surface. Reads as engraving / wood-cut.
// ============================================================
function generateVerticalHatches(state, buf) {
  const paths = [];
  const baseSpacing = Math.max(0.002, state.lw * state.density * WORLD_PER_MM);
  const sampleStep = baseSpacing * 0.4;
  const RANGE = 1.8;
  // Four-level vertical hatching. Each level is a separate set of
  // columns at an OFFSET position so the layers interleave on the page.
  //
  //   Layer 0:  offset 0       always (level 1)
  //   Layer 1:  offset 0.5     darkness > 0.30 (level 2 — 2× density)
  //   Layer 2:  offset 0.25    darkness > 0.55 (level 3 — 3× density)
  //   Layer 3:  offset 0.75    darkness > 0.75 (level 4 — 4× density)
  //
  // All offsets are fractions of baseSpacing, so the four sub-grids
  // interleave to give true tonal variation across light → dark.
  const layers = [
    { offset: 0.00 * baseSpacing, threshold: -0.01 },
    { offset: 0.50 * baseSpacing, threshold: 0.30  },
    { offset: 0.25 * baseSpacing, threshold: 0.55  },
    { offset: 0.75 * baseSpacing, threshold: 0.75  }
  ];
  for (const L of layers) {
    for (let sx = -RANGE + L.offset; sx <= RANGE; sx += baseSpacing) {
      let inDraw = false;
      let sy0 = 0, lastY = 0;
      function flush() {
        if (inDraw && Math.abs(lastY - sy0) > baseSpacing * 0.4) {
          paths.push([[sx, sy0], [sx, lastY]]);
        }
        inDraw = false;
      }
      for (let sy = SY_MIN; sy <= SY_MAX; sy += sampleStep) {
        const idx = bufIdx(buf, sx, sy);
        let draw = false;
        if (idx >= 0 && buf.surface[idx] === 1) {
          draw = L.threshold < 0 || computeDarkness(buf, idx) > L.threshold;
        }
        if (draw) {
          if (!inDraw) { sy0 = sy; inDraw = true; }
          lastY = sy;
        } else if (inDraw) {
          flush();
        }
      }
      flush();
    }
  }
  return paths;
}

// ============================================================
// Beam-mask post-process: scenes can return { beamMask: { apex, targetSx,
// targetSy, halfAngleDeg } } to carve a wedge of negative space out of
// the sky. The apex is a world position (projected to screen here);
// targetSx/Sy give the direction of the beam in screen space, and any
// sky pixel inside [centreAngle ± halfAngle] of the wedge is reclassified
// from surface=0 to surface=4 ("beam"). Existing sky generators all gate
// on surface===0 so they automatically skip the beam region.
// ============================================================
function applyBeamMask(buf, spec) {
  if (!spec || !spec.apex) return;
  const apexScreen = worldToScreen(spec.apex);
  if (!apexScreen) return;
  const aSx = apexScreen[0], aSy = apexScreen[1];
  // Accept either an explicit direction vector (dirSx/dirSy — easier to
  // reason about for "horizontal beam") or an absolute screen target
  // (targetSx/targetSy) as a back-compat fallback.
  let bdx, bdy;
  if (spec.dirSx != null || spec.dirSy != null) {
    bdx = spec.dirSx != null ? spec.dirSx : 0;
    bdy = spec.dirSy != null ? spec.dirSy : 0;
  } else {
    bdx = (spec.targetSx != null ? spec.targetSx : -aSx) - aSx;
    bdy = (spec.targetSy != null ? spec.targetSy : aSy + 1.0) - aSy;
  }
  const bMag = Math.hypot(bdx, bdy);
  if (bMag < 1e-6) return;
  bdx /= bMag; bdy /= bMag;
  const cosHalf = Math.cos((spec.halfAngleDeg != null ? spec.halfAngleDeg : 12) * Math.PI / 180);
  const W = buf.W, H = buf.H;
  for (let py = 0; py < H; py++) {
    const sy = SY_MAX - (py / (H - 1)) * (SY_MAX - SY_MIN);
    for (let px = 0; px < W; px++) {
      const idx = py * W + px;
      if (buf.surface[idx] !== 0) continue;
      const sx = SX_MIN + (px / (W - 1)) * (SX_MAX - SX_MIN);
      const vx = sx - aSx;
      const vy = sy - aSy;
      const vMag = Math.hypot(vx, vy);
      if (vMag < 1e-6) continue;
      const dot = (vx * bdx + vy * bdy) / vMag;
      if (dot > cosHalf) buf.surface[idx] = 4;
    }
  }
}

// ============================================================
// Tone mapping on buf.light. Applied after raymarching, before the hatcher
// reads brightness for stroke-density decisions.
//
//   brightness:  uniform offset on the final brightness value
//   contrast:    multiplicative scaling around 0.5
//   gamma:       power curve (gamma > 1 deepens shadows)
//   posterLevels: quantize the result into N discrete levels
//                 (1 = no quantization)
//
// Only the blob surfaces (buf.surface === 1) are affected; sky and
// ground keep their original light.
// ============================================================
function applyToneMap(buf, state) {
  const b = state.brightness || 0;
  const c = state.contrast != null ? state.contrast : 1;
  const g = state.gamma != null ? state.gamma : 1;
  const p = state.posterLevels != null ? state.posterLevels : 1;
  const skipTransform = (b === 0 && c === 1 && g === 1);
  const skipPoster = (p <= 1);
  if (skipTransform && skipPoster) return;
  for (let i = 0; i < buf.light.length; i++) {
    if (buf.surface[i] !== 1) continue;
    let v = buf.light[i];
    if (!skipTransform) {
      v = (v - 0.5) * c + 0.5 + b;
      if (v < 0) v = 0; else if (v > 1) v = 1;
      if (g !== 1) v = Math.pow(v, g);
    }
    if (!skipPoster) {
      // Quantize into p discrete buckets: {0, 1/(p-1), 2/(p-1), ..., 1}.
      // Use min(floor(v * p), p - 1) so v = 1.0 maps to the top bucket.
      let bucket = Math.floor(v * p);
      if (bucket >= p) bucket = p - 1;
      v = bucket / (p - 1);
    }
    buf.light[i] = v;
  }
}

// ============================================================
// Curved hatching: trace evenly-spaced streamlines through a direction
// field defined per buffer pixel. Three field flavours are available:
//
//   isoDepth   — perpendicular to the depth gradient (topographic
//                contours: lines of constant distance from the camera).
//   projNormal — perpendicular to the projected surface normal in
//                screen space (continuous version of the scan-line
//                hatcher's per-pixel primary angle).
//   principal  — direction of slowest change of the lighting field; a
//                cheap stand-in for principal curvature.
// ============================================================
function bufPxToScreen(buf, px, py) {
  const sx = SX_MIN + (px / (buf.W - 1)) * (SX_MAX - SX_MIN);
  const sy = SY_MAX - (py / (buf.H - 1)) * (SY_MAX - SY_MIN);
  return [sx, sy];
}

// Sample a Float32 buffer with a 3x3 box blur centred at (ix, iy),
// skipping pixels where mask is not 1. Returns 0 if no valid samples.
function sampleSmooth(buf, src, ix, iy) {
  const W = buf.W, H = buf.H;
  let sum = 0, count = 0;
  for (let dy = -1; dy <= 1; dy++) {
    const y = iy + dy;
    if (y < 0 || y >= H) continue;
    for (let dx = -1; dx <= 1; dx++) {
      const x = ix + dx;
      if (x < 0 || x >= W) continue;
      const j = y * W + x;
      if (buf.surface[j] === 1) { sum += src[j]; count++; }
    }
  }
  return count > 0 ? sum / count : src[iy * W + ix];
}

// Wide-stencil gradient — central difference over R pixels each side,
// smoothed by a 3x3 box around each sample point. Much more stable
// than 1-pixel central diff on noisy SDF/light buffers.
function gradient(buf, src, ix, iy, R) {
  const W = buf.W, H = buf.H;
  if (ix < R || ix >= W - R || iy < R || iy >= H - R) return null;
  if (buf.surface[iy * W + ix] !== 1) return null;
  const dR = sampleSmooth(buf, src, ix + R, iy);
  const dL = sampleSmooth(buf, src, ix - R, iy);
  const dD = sampleSmooth(buf, src, ix, iy + R);
  const dU = sampleSmooth(buf, src, ix, iy - R);
  return [(dR - dL) / (2 * R), (dD - dU) / (2 * R)];
}

function fieldIsoDepth(buf, ix, iy) {
  const g = gradient(buf, buf.depth, ix, iy, 3);
  if (!g) return null;
  const mag = Math.hypot(g[0], g[1]);
  if (mag < 1e-6) return [1, 0];
  return [-g[1] / mag, g[0] / mag];
}

function fieldProjNormal(buf, ix, iy) {
  const i = iy * buf.W + ix;
  if (buf.surface[i] !== 1) return null;
  // Box-blur the projected normal over a 3x3 neighbourhood so the
  // streamline direction is smoother than the raw per-pixel normal.
  const nxAvg = sampleSmooth(buf, buf.nx, ix, iy);
  const nyAvg = sampleSmooth(buf, buf.ny, ix, iy);
  const mag = Math.hypot(nxAvg, nyAvg);
  if (mag < 1e-4) return [1, 0];
  return [-nyAvg / mag, nxAvg / mag];
}

function fieldPrincipal(buf, ix, iy) {
  const g = gradient(buf, buf.light, ix, iy, 3);
  if (!g) return null;
  const mag = Math.hypot(g[0], g[1]);
  if (mag < 1e-6) return [1, 0];
  return [-g[1] / mag, g[0] / mag];
}

function generateCurveHatches(state, buf, fieldFn) {
  const W = buf.W, H = buf.H;
  const occ = new Uint8Array(W * H);

  // Spacing in pixel space, derived from the same lw × density product
  // the scan-line hatcher uses, but mapped through buffer resolution.
  const spacingMM = state.lw * state.density;
  const spacingWorld = Math.max(0.002, spacingMM * WORLD_PER_MM);
  const pxPerWorld = (W - 1) / (SX_MAX - SX_MIN);
  const spacingPx = Math.max(2, Math.round(spacingWorld * pxPerWorld));
  const sepSqr = spacingPx * spacingPx;

  const stepPx = 1.0;
  const maxSteps = Math.max(80, Math.round(Math.max(W, H) * 0.8));

  function isFreeSeed(px, py) {
    const ix = Math.round(px), iy = Math.round(py);
    if (ix < 0 || ix >= W || iy < 0 || iy >= H) return false;
    if (buf.surface[iy * W + ix] !== 1) return false;
    const r = spacingPx;
    const x0 = Math.max(0, ix - r), x1 = Math.min(W - 1, ix + r);
    const y0 = Math.max(0, iy - r), y1 = Math.min(H - 1, iy + r);
    for (let y = y0; y <= y1; y++) {
      const dy = y - iy;
      for (let x = x0; x <= x1; x++) {
        const dx = x - ix;
        if (dx * dx + dy * dy > sepSqr) continue;
        if (occ[y * W + x]) return false;
      }
    }
    return true;
  }

  function markStrip(px, py) {
    const ix = Math.round(px), iy = Math.round(py);
    if (ix < 0 || ix >= W || iy < 0 || iy >= H) return;
    occ[iy * W + ix] = 1;
  }

  function trace(px, py, dirSign, ignoreFlagsAroundSeed) {
    const points = [[px, py]];
    let lastDx = 0, lastDy = 0;
    let stepsSinceSeed = 0;
    for (let step = 0; step < maxSteps; step++) {
      const ix = Math.round(px), iy = Math.round(py);
      if (ix < 0 || ix >= W || iy < 0 || iy >= H) break;
      if (buf.surface[iy * W + ix] !== 1) break;
      const f = fieldFn(buf, ix, iy);
      if (!f) break;
      let dx = f[0] * dirSign;
      let dy = f[1] * dirSign;
      // Flip if reversing — preserves orientation of the streamline.
      if (step > 0 && (lastDx * dx + lastDy * dy) < 0) { dx = -dx; dy = -dy; }
      px += dx * stepPx;
      py += dy * stepPx;
      lastDx = dx; lastDy = dy;
      stepsSinceSeed++;
      // After we've moved away from the seed (≥ spacing*0.6), enforce
      // separation from other streamlines.
      if (stepsSinceSeed > spacingPx * 0.6 && !ignoreFlagsAroundSeed) {
        const px2 = Math.round(px), py2 = Math.round(py);
        if (px2 < 0 || px2 >= W || py2 < 0 || py2 >= H) break;
        if (occ[py2 * W + px2]) break;
      }
      points.push([px, py]);
    }
    return points;
  }

  const paths = [];
  const seedStride = Math.max(2, Math.floor(spacingPx * 0.7));
  for (let py = 1; py < H - 1; py += seedStride) {
    for (let px = 1; px < W - 1; px += seedStride) {
      const idx = py * W + px;
      if (buf.surface[idx] !== 1) continue;
      if (!isFreeSeed(px, py)) continue;

      // Trace both directions; ignore occupancy near the seed so the
      // forward and backward halves can join through the seed cell.
      const fwd = trace(px, py, +1, false);
      const bwd = trace(px, py, -1, false);
      const merged = bwd.slice(1).reverse().concat(fwd);
      if (merged.length < 3) continue;

      for (const [pxp, pyp] of merged) markStrip(pxp, pyp);

      paths.push(merged.map(p => bufPxToScreen(buf, p[0], p[1])));
    }
  }

  // Multi-level densification — 3 additional passes following the SAME
  // field as the main pass, each weaving streamlines at progressively
  // tighter spacing and gated by a progressively darker threshold.
  // Combined with the main pass this gives 4 discrete tonal levels
  // across the surface, applicable uniformly to iso-depth / projNormal
  // / principal. A SHARED occupancy grid means each tighter layer
  // fills in BETWEEN the previous layer's strokes.
  const densificationLayers = [
    { factor: 0.65, threshold: 0.30 },  // level 2
    { factor: 0.45, threshold: 0.55 },  // level 3
    { factor: 0.30, threshold: 0.75 }   // level 4
  ];
  // Re-use the SAME `occ` grid the main pass populated, so densification
  // strokes can't sit directly on top of main-pass streamlines.
  for (const layer of densificationLayers) {
    const sepPx2 = Math.max(1.5, spacingPx * layer.factor);
    const sepSqr2 = sepPx2 * sepPx2;
    const darkThreshold = layer.threshold;
    const isFreeSeed2 = function (px, py) {
      const ix = Math.round(px), iy = Math.round(py);
      if (ix < 0 || ix >= W || iy < 0 || iy >= H) return false;
      if (buf.surface[iy * W + ix] !== 1) return false;
      const i = iy * W + ix;
      if (computeDarkness(buf, i) < darkThreshold) return false;
      const r = Math.ceil(sepPx2);
      const x0 = Math.max(0, ix - r), x1 = Math.min(W - 1, ix + r);
      const y0 = Math.max(0, iy - r), y1 = Math.min(H - 1, iy + r);
      for (let y = y0; y <= y1; y++) {
        const dy = y - iy;
        for (let x = x0; x <= x1; x++) {
          const dx = x - ix;
          if (dx * dx + dy * dy > sepSqr2) continue;
          if (occ[y * W + x]) return false;
        }
      }
      return true;
    };
    const trace2 = function (px, py, dirSign) {
      const points = [[px, py]];
      let lastDx = 0, lastDy = 0;
      let stepsSinceSeed = 0;
